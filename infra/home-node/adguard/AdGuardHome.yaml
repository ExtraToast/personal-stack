http:
  address: 0.0.0.0:3000
  session_ttl: 720h

dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  anonymize_client_ip: false
  ratelimit: 0
  upstream_dns:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
    - '[/consul/]127.0.0.1:8600'
  bootstrap_dns:
    - 1.1.1.1
    - 8.8.8.8
  enable_dnssec: true
  cache_size: 4194304
  cache_ttl_min: 300
  cache_ttl_max: 86400
  cache_optimistic: true
  rewrites:
    - domain: jellyfin.jorisjonkers.dev
      answer: __HOME_LAN_IP__
    - domain: jellyseerr.jorisjonkers.dev
      answer: __HOME_LAN_IP__
    - domain: bazarr.jorisjonkers.dev
      answer: __HOME_LAN_IP__
    - domain: sonarr.jorisjonkers.dev
      answer: __HOME_LAN_IP__
    - domain: radarr.jorisjonkers.dev
      answer: __HOME_LAN_IP__
    - domain: prowlarr.jorisjonkers.dev
      answer: __HOME_LAN_IP__
    - domain: qbittorrent.jorisjonkers.dev
      answer: __HOME_LAN_IP__

filtering:
  protection_enabled: true
  filtering_enabled: true
  safe_search:
    enabled: false

filters:
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
    name: AdGuard DNS filter
    id: 1
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
    name: AdAway Default Blocklist
    id: 2
  - enabled: true
    url: https://easylist.to/easylist/easylist.txt
    name: EasyList
    id: 3
  - enabled: true
    url: https://easylist.to/easylist/easyprivacy.txt
    name: EasyPrivacy
    id: 4
  - enabled: true
    url: https://malware-filter.gitlab.io/malware-filter/urlhaus-filter-agh-online.txt
    name: Malware URL Blocklist
    id: 5

user_rules: []

log:
  file: ''
  max_backups: 0
  max_size: 100
  max_age: 3
  compress: false
  local_time: false
  verbose: false

schema_version: 29
