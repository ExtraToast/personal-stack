auth_backends.1 = rabbit_auth_backend_oauth2
auth_backends.2 = internal

auth_oauth2.resource_server_id = rabbitmq
auth_oauth2.issuer = https://auth.jorisjonkers.dev
auth_oauth2.scope_prefix = rabbitmq.
auth_oauth2.preferred_username_claims.1 = preferred_username
auth_oauth2.preferred_username_claims.2 = username
auth_oauth2.preferred_username_claims.3 = email

management.oauth_enabled = true
management.oauth_disable_basic_auth = false
management.oauth_client_id = rabbitmq
management.oauth_scopes = openid profile email rabbitmq.tag:administrator
