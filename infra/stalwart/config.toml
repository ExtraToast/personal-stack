# Stalwart Mail Server Configuration
#
# This config uses environment variable substitution (%{env:VAR}%) for
# environment-specific values. Local development uses docker-compose.yml.
# Production rendering happens via the Flux-managed stalwart manifests under
# platform/cluster/flux/apps/mail; this file only backs the local dev loop.
#
# Admin credentials for the webadmin UI:
#   Dev:  admin / stalwart-dev-admin  (hardcoded in docker-compose.yml)
#   Prod: values stored in Vault KV at secret/platform/mail and injected via
#         the stalwart Deployment's vault-agent template
#
# The webadmin does NOT support SSO redirect. Access is gated by Traefik
# forward-auth, so only authenticated users reach the login page.

# ── Local keys ───────────────────────────────────────────────────
#
# Stalwart imports every key whose pattern does NOT match
# config.local-keys into its internal rocksdb store on first boot and
# subsequently serves it from there. Only keys that DO match are
# re-read from this TOML on every boot — and crucially, only those
# get %{env:VAR}% macro expansion (database settings are stored
# verbatim). The upstream default list omits acme.*, which means the
# %{env:STALWART_HOSTNAME}%, %{env:STALWART_DOMAIN}% and
# %{env:CF_DNS_API_TOKEN}% macros under acme."letsencrypt" were being
# persisted as literal strings and surfaced in the webadmin UI. Listing
# the upstream defaults explicitly plus acme.* + config.local-keys
# itself keeps the macros expanding on every boot.
config.local-keys = [
    "store.*",
    "directory.*",
    "tracer.*",
    "server.*",
    "!server.blocked-ip.*",
    "!server.allowed-ip.*",
    "authentication.fallback-admin.*",
    "cluster.*",
    "storage.data",
    "storage.blob",
    "storage.lookup",
    "storage.fts",
    "storage.directory",
    "acme.*",
    "config.local-keys",
]

# ── Server ───────────────────────────────────────────────────────

server.hostname = "%{env:STALWART_HOSTNAME}%"

# ── Listeners ────────────────────────────────────────────────────

server.listener.smtp.bind = "[::]:25"
server.listener.smtp.protocol = "smtp"

server.listener.submission.bind = "[::]:587"
server.listener.submission.protocol = "smtp"
server.listener.submission.tls.starttls = true

server.listener.submissions.bind = "[::]:465"
server.listener.submissions.protocol = "smtp"
server.listener.submissions.tls.implicit = true

server.listener.imap.bind = "[::]:143"
server.listener.imap.protocol = "imap"

server.listener.imaptls.bind = "[::]:993"
server.listener.imaptls.protocol = "imap"
server.listener.imaptls.tls.implicit = true

server.listener.pop3.bind = "[::]:110"
server.listener.pop3.protocol = "pop3"

server.listener.pop3s.bind = "[::]:995"
server.listener.pop3s.protocol = "pop3"
server.listener.pop3s.tls.implicit = true

server.listener.sieve.bind = "[::]:4190"
server.listener.sieve.protocol = "managesieve"

server.listener.https.bind = "[::]:443"
server.listener.https.protocol = "http"
server.listener.https.tls.implicit = true

server.listener.http.bind = "[::]:8080"
server.listener.http.protocol = "http"

# ── TLS via ACME (Let's Encrypt + Cloudflare DNS) ───────────────

acme."letsencrypt".directory = "https://acme-v02.api.letsencrypt.org/directory"
acme."letsencrypt".challenge = "dns-01"
acme."letsencrypt".contact = ["postmaster@%{env:STALWART_DOMAIN}%"]
acme."letsencrypt".domains = ["%{env:STALWART_HOSTNAME}%"]
acme."letsencrypt".cache = "/opt/stalwart/etc/acme"
acme."letsencrypt".renew-before = "30d"
acme."letsencrypt".default = true
acme."letsencrypt".dns.provider = "cloudflare"
acme."letsencrypt".dns.secret = "%{env:CF_DNS_API_TOKEN}%"

# ── Storage ──────────────────────────────────────────────────────

storage.data = "rocksdb"
storage.fts = "rocksdb"
storage.blob = "rocksdb"
storage.lookup = "rocksdb"
storage.directory = "internal"

store.rocksdb.type = "rocksdb"
store.rocksdb.path = "/opt/stalwart/data"
store.rocksdb.compression = "lz4"

# ── Directories ──────────────────────────────────────────────────

# Internal directory for local account management.
directory.internal.type = "internal"
directory.internal.store = "rocksdb"

# ── Authentication ───────────────────────────────────────────────

authentication.fallback-admin.user = "%{env:STALWART_ADMIN_USER}%"
authentication.fallback-admin.secret = "%{env:STALWART_ADMIN_SECRET}%"

# ── Metrics ──────────────────────────────────────────────────────

metrics.prometheus.enable = true

# ── Logging ──────────────────────────────────────────────────────

tracer.log.type = "log"
tracer.log.level = "info"
tracer.log.path = "/opt/stalwart/logs"
tracer.log.prefix = "stalwart.log"
tracer.log.rotate = "daily"
tracer.log.ansi = false
tracer.log.enable = true
