#cloud-config

package_update: true
package_upgrade: true

packages:
  - ufw
  - fail2ban
  - curl
  - gnupg
  - apt-transport-https
  - ca-certificates
  - unattended-upgrades

users:
  - name: deploy
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    ssh_authorized_keys:
      - ssh-ed25519 AAAA_REPLACE_WITH_YOUR_PUBLIC_KEY deploy@private-stack

write_files:
  - path: /etc/ssh/sshd_config.d/99-private-stack.conf
    content: |
      Port 2222
      PasswordAuthentication no
      PermitRootLogin no
      ChallengeResponseAuthentication no
      UsePAM yes
      X11Forwarding no
      PrintMotd no
      AcceptEnv LANG LC_*
      Subsystem sftp /usr/lib/openssh/sftp-server
    permissions: "0644"
    owner: root:root

  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = 2222
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
    permissions: "0644"
    owner: root:root

runcmd:
  # Restart SSH with new config
  - systemctl restart sshd

  # Configure UFW
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 2222/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - systemctl enable ufw

  # Start fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable unattended upgrades
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  # Install Docker via official script
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker deploy
  - systemctl enable docker
  - systemctl start docker

  # Initialize Docker Swarm
  - docker swarm init
