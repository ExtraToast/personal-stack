#cloud-config

package_update: true
package_upgrade: true

packages:
  - ufw
  - fail2ban
  - curl
  - gnupg
  - git
  - apt-transport-https
  - ca-certificates
  - unattended-upgrades

users:
  - default
  - name: deploy
    groups: sudo, docker
    shell: /bin/bash
    sudo: 'ALL=(ALL) NOPASSWD:ALL'
    ssh_authorized_keys:
      - __SSH_PUBLIC_KEY__

write_files:
  - path: /etc/ssh/sshd_config.d/99-personal-stack.conf
    content: |
      Port 2222
      PasswordAuthentication no
      PermitRootLogin no
      ChallengeResponseAuthentication no
      UsePAM yes
      X11Forwarding no
      PrintMotd no
      AcceptEnv LANG LC_*
      Subsystem sftp /usr/lib/openssh/sftp-server
    permissions: '0644'
    owner: root:root

  - path: /etc/systemd/resolved.conf.d/fallback-dns.conf
    content: |
      [Resolve]
      DNS=1.1.1.1 8.8.8.8
      FallbackDNS=1.0.0.1 8.8.4.4
    permissions: '0644'
    owner: root:root

  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = 2222
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
    permissions: '0644'
    owner: root:root

runcmd:
  # Apply fallback DNS configuration
  - systemctl restart systemd-resolved

  # Restart SSH with new config
  - systemctl restart sshd

  # Configure UFW
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 2222/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - systemctl enable ufw

  # Start fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable unattended upgrades
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  # Install Docker via official script
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker deploy
  - systemctl enable docker
  - systemctl start docker

  # Initialize Docker Swarm
  - docker swarm init

  # Write deploy key (done in runcmd so deploy user definitely exists)
  - mkdir -p /home/deploy/.ssh
  - echo '__DEPLOY_KEY_PRIVATE_B64__' | base64 -d > /home/deploy/.ssh/id_ed25519
  - chmod 600 /home/deploy/.ssh/id_ed25519
  - ssh-keyscan -t ed25519 github.com >> /home/deploy/.ssh/known_hosts
  - chown -R deploy:deploy /home/deploy/.ssh

  # Clone the repository
  - install -d -o deploy -g deploy /opt/personal-stack
  - su - deploy -c 'GIT_SSH_COMMAND="ssh -i /home/deploy/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new" git clone __GITHUB_REPO__ /opt/personal-stack'

  # Create Docker Swarm secrets (printf -n avoids trailing newline)
  - printf '%s' '__POSTGRES_USER__' | docker secret create postgres_user -
  - printf '%s' '__POSTGRES_PASSWORD__' | docker secret create postgres_password -
  - printf '%s' '__RABBITMQ_USER__' | docker secret create rabbitmq_user -
  - printf '%s' '__RABBITMQ_PASSWORD__' | docker secret create rabbitmq_password -
  - printf '%s' '__CF_DNS_API_TOKEN__' | docker secret create cf_dns_api_token -
  - printf '%s' '__GRAFANA_ADMIN_USER__' | docker secret create grafana_admin_user -
  - printf '%s' '__GRAFANA_ADMIN_PASSWORD__' | docker secret create grafana_admin_password -
  - printf '%s' '__N8N_DB_USER__' | docker secret create n8n_db_user -
  - printf '%s' '__N8N_DB_PASSWORD__' | docker secret create n8n_db_password -
  - printf '%s' '__AUTH_DB_PASSWORD__' | docker secret create auth_db_password -
  - printf '%s' '__ASSISTANT_DB_PASSWORD__' | docker secret create assistant_db_password -
  - printf '%s' '__STALWART_ADMIN_USER__' | docker secret create stalwart_admin_user -
  - printf '%s' '__STALWART_ADMIN_PASSWORD__' | docker secret create stalwart_admin_password -
  - printf '%s' 'placeholder' | docker secret create vault_auth_api_role_id -
  - printf '%s' 'placeholder' | docker secret create vault_auth_api_secret_id -
  - printf '%s' 'placeholder' | docker secret create vault_assistant_api_role_id -
  - printf '%s' 'placeholder' | docker secret create vault_assistant_api_secret_id -

  # Login to GHCR so both root (Swarm) and deploy user can pull private images
  - echo '__GHCR_TOKEN__' | docker login ghcr.io -u __GHCR_USER__ --password-stdin
  - su - deploy -c 'echo __GHCR_TOKEN__ | docker login ghcr.io -u __GHCR_USER__ --password-stdin'

  # Deploy the stack
  - docker stack deploy -c /opt/personal-stack/docker-compose.prod.yml personal-stack --with-registry-auth

  # Write application credentials for Vault KV population (read by init-vault.sh)
  - |
    cat > /opt/personal-stack/.vault-app-secrets <<'EOF'
    RABBITMQ_USER=__RABBITMQ_USER__
    RABBITMQ_PASSWORD=__RABBITMQ_PASSWORD__
    AUTH_DB_USER=__AUTH_DB_USER__
    AUTH_DB_PASSWORD=__AUTH_DB_PASSWORD__
    ASSISTANT_DB_USER=__ASSISTANT_DB_USER__
    ASSISTANT_DB_PASSWORD=__ASSISTANT_DB_PASSWORD__
    STALWART_ADMIN_USER=__STALWART_ADMIN_USER__
    STALWART_ADMIN_PASSWORD=__STALWART_ADMIN_PASSWORD__
    EOF
    chmod 600 /opt/personal-stack/.vault-app-secrets

  # Initialize Vault and update Docker secrets with real AppRole credentials
  # Initialize Vault, swap placeholder secrets with real AppRole credentials, and redeploy
  - bash /opt/personal-stack/infra/vault/scripts/init-vault.sh

  # Install and enable the credential rotation systemd timer
  - cp /opt/personal-stack/infra/systemd/credential-rotation.service /etc/systemd/system/
  - cp /opt/personal-stack/infra/systemd/credential-rotation.timer /etc/systemd/system/
  - systemctl daemon-reload
  - systemctl enable --now credential-rotation.timer
