#cloud-config

package_update: true
package_upgrade: true

packages:
  - ufw
  - fail2ban
  - curl
  - gnupg
  - git
  - apt-transport-https
  - ca-certificates
  - unattended-upgrades

users:
  - default
  - name: deploy
    groups: sudo
    shell: /bin/bash
    sudo: 'ALL=(ALL) NOPASSWD:ALL'
    ssh_authorized_keys:
      - __SSH_PUBLIC_KEY__

write_files:
  - path: /etc/ssh/sshd_config.d/99-personal-stack.conf
    content: |
      Port 2222
      PasswordAuthentication no
      PermitRootLogin no
      ChallengeResponseAuthentication no
      UsePAM yes
      X11Forwarding no
      PrintMotd no
      AcceptEnv LANG LC_*
      Subsystem sftp /usr/lib/openssh/sftp-server
    permissions: '0644'
    owner: root:root

  - path: /etc/systemd/resolved.conf.d/fallback-dns.conf
    content: |
      [Resolve]
      DNS=1.1.1.1 8.8.8.8
      FallbackDNS=1.0.0.1 8.8.4.4
    permissions: '0644'
    owner: root:root

  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = 2222
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
    permissions: '0644'
    owner: root:root

runcmd:
  - systemctl restart systemd-resolved
  - systemctl restart sshd

  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 2222/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 25/tcp
  - ufw allow 110/tcp
  - ufw allow 143/tcp
  - ufw allow 465/tcp
  - ufw allow 587/tcp
  - ufw allow 993/tcp
  - ufw allow 995/tcp
  - ufw allow 4190/tcp
  - ufw --force enable
  - systemctl enable ufw

  - systemctl enable fail2ban
  - systemctl start fail2ban

  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  - mkdir -p /home/deploy/.ssh
  - echo '__DEPLOY_KEY_PRIVATE_B64__' | base64 -d > /home/deploy/.ssh/id_ed25519
  - chmod 600 /home/deploy/.ssh/id_ed25519
  - ssh-keyscan -t ed25519 github.com >> /home/deploy/.ssh/known_hosts
  - chown -R deploy:deploy /home/deploy/.ssh

  - install -d -o deploy -g deploy /opt/personal-stack
  - su - deploy -c 'GIT_SSH_COMMAND="ssh -i /home/deploy/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new" git clone __GITHUB_REPO__ /opt/personal-stack'

  - |
    cat > /opt/personal-stack/.nomad-bootstrap.env <<'EOF'
    IMAGE_TAG='__IMAGE_TAG__'
    GHCR_USER='__GHCR_USER__'
    GHCR_TOKEN='__GHCR_TOKEN__'
    POSTGRES_USER='__POSTGRES_USER__'
    POSTGRES_PASSWORD='__POSTGRES_PASSWORD__'
    AUTH_DB_USER='__AUTH_DB_USER__'
    AUTH_DB_PASSWORD='__AUTH_DB_PASSWORD__'
    ASSISTANT_DB_USER='__ASSISTANT_DB_USER__'
    ASSISTANT_DB_PASSWORD='__ASSISTANT_DB_PASSWORD__'
    N8N_DB_USER='__N8N_DB_USER__'
    N8N_DB_PASSWORD='__N8N_DB_PASSWORD__'
    RABBITMQ_USER='__RABBITMQ_USER__'
    RABBITMQ_PASSWORD='__RABBITMQ_PASSWORD__'
    CF_DNS_API_TOKEN='__CF_DNS_API_TOKEN__'
    GRAFANA_ADMIN_USER='__GRAFANA_ADMIN_USER__'
    GRAFANA_ADMIN_PASSWORD='__GRAFANA_ADMIN_PASSWORD__'
    STALWART_ADMIN_USER='__STALWART_ADMIN_USER__'
    STALWART_ADMIN_PASSWORD='__STALWART_ADMIN_PASSWORD__'
    N8N_OAUTH_CLIENT_SECRET='__N8N_OAUTH_CLIENT_SECRET__'
    GRAFANA_OAUTH_CLIENT_SECRET='__GRAFANA_OAUTH_CLIENT_SECRET__'
    VAULT_OIDC_CLIENT_SECRET='__VAULT_OIDC_CLIENT_SECRET__'
    AUTH_ISSUER='https://auth.jorisjonkers.dev'
    VAULT_PUBLIC_ADDR='https://vault.jorisjonkers.dev'
    EOF
    chmod 600 /opt/personal-stack/.nomad-bootstrap.env

  - bash -lc 'cd /opt/personal-stack && bash infra/scripts/setup.sh full > /var/log/personal-stack-bootstrap.log 2>&1'
