#cloud-config

package_update: true
package_upgrade: true

packages:
  - ufw
  - fail2ban
  - curl
  - gnupg
  - git
  - apt-transport-https
  - ca-certificates
  - unattended-upgrades

users:
  - default
  - name: deploy
    groups: sudo, docker
    shell: /bin/bash
    sudo: 'ALL=(ALL) NOPASSWD:ALL'
    ssh_authorized_keys:
      - __SSH_PUBLIC_KEY__

write_files:
  - path: /etc/ssh/sshd_config.d/99-private-stack.conf
    content: |
      Port 2222
      PasswordAuthentication no
      PermitRootLogin no
      ChallengeResponseAuthentication no
      UsePAM yes
      X11Forwarding no
      PrintMotd no
      AcceptEnv LANG LC_*
      Subsystem sftp /usr/lib/openssh/sftp-server
    permissions: '0644'
    owner: root:root

  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = 2222
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
    permissions: '0644'
    owner: root:root

runcmd:
  # Restart SSH with new config
  - systemctl restart sshd

  # Configure UFW
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 2222/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - systemctl enable ufw

  # Start fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable unattended upgrades
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  # Install Docker via official script
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker deploy
  - systemctl enable docker
  - systemctl start docker

  # Initialize Docker Swarm
  - docker swarm init

  # Write deploy key (done in runcmd so deploy user definitely exists)
  - mkdir -p /home/deploy/.ssh
  - echo '__DEPLOY_KEY_PRIVATE_B64__' | base64 -d > /home/deploy/.ssh/id_ed25519
  - chmod 600 /home/deploy/.ssh/id_ed25519
  - ssh-keyscan -t ed25519 github.com >> /home/deploy/.ssh/known_hosts
  - chown -R deploy:deploy /home/deploy/.ssh

  # Clone the repository
  - install -d -o deploy -g deploy /opt/private-stack
  - su - deploy -c 'GIT_SSH_COMMAND="ssh -i /home/deploy/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new" git clone __GITHUB_REPO__ /opt/private-stack'

  # Create Docker Swarm secrets (bootstrap with placeholders where needed)
  - echo '__POSTGRES_USER__' | docker secret create postgres_user -
  - echo '__POSTGRES_PASSWORD__' | docker secret create postgres_password -
  - echo '__RABBITMQ_USER__' | docker secret create rabbitmq_user -
  - echo '__RABBITMQ_PASSWORD__' | docker secret create rabbitmq_password -
  - echo '__CF_DNS_API_TOKEN__' | docker secret create cf_dns_api_token -
  - echo '__GRAFANA_ADMIN_USER__' | docker secret create grafana_admin_user -
  - echo '__GRAFANA_ADMIN_PASSWORD__' | docker secret create grafana_admin_password -
  - echo '__N8N_DB_USER__' | docker secret create n8n_db_user -
  - echo '__N8N_DB_PASSWORD__' | docker secret create n8n_db_password -
  - echo 'placeholder' | docker secret create vault_auth_api_role_id -
  - echo 'placeholder' | docker secret create vault_auth_api_secret_id -
  - echo 'placeholder' | docker secret create vault_assistant_api_role_id -
  - echo 'placeholder' | docker secret create vault_assistant_api_secret_id -

  # Deploy the stack
  - docker stack deploy -c /opt/private-stack/docker-compose.prod.yml private-stack

  # Initialize Vault and update Docker secrets with real AppRole credentials
  - bash /opt/private-stack/infra/vault/scripts/init-vault.sh

  # Redeploy so auth-api and assistant-api pick up the real Vault secrets
  - docker stack deploy -c /opt/private-stack/docker-compose.prod.yml private-stack
