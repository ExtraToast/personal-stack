http:
  middlewares:
    forward-auth:
      forwardAuth:
        address: 'http://auth-api:8081/api/v1/auth/verify'
        trustForwardHeader: true
        authResponseHeaders:
          - 'X-User-Id'
          - 'X-User-Email'
          - 'X-User-Roles'

    rate-limit:
      rateLimit:
        average: 100
        burst: 200

    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: 'strict-origin-when-cross-origin'
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.jorisjonkers.test https://*.jorisjonkers.dev; font-src 'self'; connect-src 'self' https://*.jorisjonkers.test https://jorisjonkers.test https://*.jorisjonkers.dev; frame-ancestors 'none'"
        customResponseHeaders:
          X-Frame-Options: 'DENY'

    stalwart-security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: 'strict-origin-when-cross-origin'
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.jorisjonkers.test https://*.jorisjonkers.dev; font-src 'self'; connect-src 'self' https://*.jorisjonkers.test https://jorisjonkers.test https://*.jorisjonkers.dev; frame-ancestors 'none'"
        customResponseHeaders:
          X-Frame-Options: 'DENY'

    n8n-security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: 'strict-origin-when-cross-origin'
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn-rs.n8n.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.jorisjonkers.test https://*.jorisjonkers.dev; font-src 'self'; connect-src 'self' https://*.jorisjonkers.test https://jorisjonkers.test https://*.jorisjonkers.dev https://api.n8n.io https://ph.n8n.io; frame-ancestors 'none'"
        customResponseHeaders:
          X-Frame-Options: 'DENY'

    rabbitmq-security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: 'strict-origin-when-cross-origin'
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.jorisjonkers.test https://*.jorisjonkers.dev; font-src 'self'; connect-src 'self' https://*.jorisjonkers.test https://jorisjonkers.test https://*.jorisjonkers.dev; frame-ancestors 'none'"
        customResponseHeaders:
          X-Frame-Options: 'DENY'

    grafana-security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: 'strict-origin-when-cross-origin'
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.jorisjonkers.test https://*.jorisjonkers.dev; font-src 'self'; connect-src 'self' https://*.jorisjonkers.test https://jorisjonkers.test https://*.jorisjonkers.dev; frame-ancestors 'none'"
        customResponseHeaders:
