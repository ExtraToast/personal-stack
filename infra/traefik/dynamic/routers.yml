http:
  routers:
    # ── App UI (root domain) ────────────────────────────────────
    app-ui:
      rule: 'Host(`jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: app-ui
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Auth API (.well-known for OIDC discovery) ────────────────
    auth-api-well-known:
      rule: 'Host(`auth.jorisjonkers.dev`) && PathPrefix(`/.well-known/`)'
      entryPoints:
        - websecure
      service: auth-api
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare
      priority: 100

    # ── Auth API ────────────────────────────────────────────────
    auth-api:
      rule: 'Host(`auth.jorisjonkers.dev`) && PathPrefix(`/api/`) && !PathPrefix(`/api/actuator/prometheus`) && !PathPrefix(`/api/actuator/metrics`)'
      entryPoints:
        - websecure
      service: auth-api
      middlewares:
        - security-headers
        - rate-limit
      tls:
        certResolver: cloudflare

    # ── Auth UI ─────────────────────────────────────────────────
    auth-ui:
      rule: 'Host(`auth.jorisjonkers.dev`) && !PathPrefix(`/api/`) && !PathPrefix(`/.well-known/`)'
      entryPoints:
        - websecure
      service: auth-ui
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Assistant API ───────────────────────────────────────────
    assistant-api:
      rule: 'Host(`assistant.jorisjonkers.dev`) && PathPrefix(`/api/`) && !PathPrefix(`/api/actuator/health`) && !Path(`/api/v1/health`) && !PathPrefix(`/api/actuator/prometheus`) && !PathPrefix(`/api/actuator/metrics`)'
      entryPoints:
        - websecure
      service: assistant-api
      middlewares:
        - forward-auth
        - security-headers
        - rate-limit
      tls:
        certResolver: cloudflare

    assistant-api-health:
      rule: 'Host(`assistant.jorisjonkers.dev`) && (Path(`/api/actuator/health`) || PathPrefix(`/api/actuator/health/`) || Path(`/api/v1/health`))'
      entryPoints:
        - websecure
      service: assistant-api
      middlewares:
        - security-headers
        - rate-limit
      tls:
        certResolver: cloudflare
      priority: 100

    # ── Assistant UI ────────────────────────────────────────────
    assistant-ui:
      rule: 'Host(`assistant.jorisjonkers.dev`) && !PathPrefix(`/api/`)'
      entryPoints:
        - websecure
      service: assistant-ui
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Vault ───────────────────────────────────────────────────
    vault:
      rule: 'Host(`vault.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: vault
      middlewares:
        - rate-limit
        - security-headers
      tls:
        certResolver: cloudflare

    # ── RabbitMQ Management ────────────────────────────────────
    rabbitmq:
      rule: 'Host(`rabbitmq.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: rabbitmq
      middlewares:
        - forward-auth
        - rabbitmq-security-headers
      tls:
        certResolver: cloudflare

    # ── n8n ─────────────────────────────────────────────────────
    n8n:
      rule: 'Host(`n8n.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: n8n
      middlewares:
        - rate-limit
        - n8n-security-headers
      tls:
        certResolver: cloudflare

    # ── Grafana ─────────────────────────────────────────────────
    grafana:
      rule: 'Host(`grafana.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: grafana
      middlewares:
        - grafana-security-headers
      tls:
        certResolver: cloudflare

    # ── Uptime Kuma ─────────────────────────────────────────────
    uptime-kuma:
      rule: 'Host(`status.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: uptime-kuma
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Stalwart Mail (WebAdmin + JMAP) ─────────────────────
    stalwart:
      rule: 'Host(`stalwart.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: stalwart
      middlewares:
        - forward-auth
        - stalwart-security-headers
      tls:
        certResolver: cloudflare

    # ── Nomad ───────────────────────────────────────────────────
    nomad:
      rule: 'Host(`nomad.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: nomad
      middlewares:
        - nomad-proxy-headers
        - forward-auth
        - rate-limit
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Jellyfin ────────────────────────────────────────────────
    jellyfin:
      rule: 'Host(`jellyfin.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: jellyfin
      middlewares:
        - forward-auth
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Sonarr ──────────────────────────────────────────────────
    sonarr:
      rule: 'Host(`sonarr.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: sonarr
      middlewares:
        - forward-auth
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Radarr ──────────────────────────────────────────────────
    radarr:
      rule: 'Host(`radarr.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: radarr
      middlewares:
        - forward-auth
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Prowlarr ────────────────────────────────────────────────
    prowlarr:
      rule: 'Host(`prowlarr.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: prowlarr
      middlewares:
        - forward-auth
        - security-headers
      tls:
        certResolver: cloudflare

    # ── qBittorrent ─────────────────────────────────────────────
    qbittorrent:
      rule: 'Host(`qbittorrent.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: qbittorrent
      middlewares:
        - forward-auth
        - security-headers
      tls:
        certResolver: cloudflare

    # ── AdGuard Home ────────────────────────────────────────────
    adguard:
      rule: 'Host(`adguard.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: adguard
      middlewares:
        - forward-auth
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Traefik Dashboard ───────────────────────────────────────
    traefik-dashboard:
      rule: 'Host(`traefik.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - forward-auth
        - rate-limit
        - security-headers
      tls:
        certResolver: cloudflare

  services:
    app-ui:
      loadBalancer:
        servers:
          - url: 'http://app-ui:80'

    auth-api:
      loadBalancer:
        servers:
          - url: 'http://auth-api:8081'

    auth-ui:
      loadBalancer:
        servers:
          - url: 'http://auth-ui:80'

    assistant-api:
      loadBalancer:
        servers:
          - url: 'http://assistant-api:8082'

    assistant-ui:
      loadBalancer:
        servers:
          - url: 'http://assistant-ui:80'

    vault:
      loadBalancer:
        servers:
          - url: 'http://vault:8200'

    rabbitmq:
      loadBalancer:
        servers:
          - url: 'http://rabbitmq:15672'

    n8n:
      loadBalancer:
        servers:
          - url: 'http://n8n:5678'

    grafana:
      loadBalancer:
        servers:
          - url: 'http://grafana:3000'

    uptime-kuma:
      loadBalancer:
        servers:
          - url: 'http://uptime-kuma:3001'

    stalwart:
      loadBalancer:
        servers:
          - url: 'http://stalwart:8080'

    nomad:
      loadBalancer:
        servers:
          - url: 'http://127.0.0.1:4646'

    jellyfin:
      loadBalancer:
        servers:
          - url: 'http://100.64.0.2:8096'

    sonarr:
      loadBalancer:
        servers:
          - url: 'http://100.64.0.2:8989'

    radarr:
      loadBalancer:
        servers:
          - url: 'http://100.64.0.2:7878'

    prowlarr:
      loadBalancer:
        servers:
          - url: 'http://100.64.0.2:9696'

    qbittorrent:
      loadBalancer:
        servers:
          - url: 'http://100.64.0.2:8080'

    adguard:
      loadBalancer:
        servers:
          - url: 'http://100.64.0.2:3000'
