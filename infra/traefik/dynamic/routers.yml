http:
  routers:
    # ── App UI (root domain) ────────────────────────────────────
    app-ui:
      rule: 'Host(`jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: app-ui
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Auth API (.well-known for OIDC discovery) ────────────────
    auth-api-well-known:
      rule: 'Host(`auth.jorisjonkers.dev`) && PathPrefix(`/.well-known/`)'
      entryPoints:
        - websecure
      service: auth-api
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare
      priority: 100

    # ── Auth API ────────────────────────────────────────────────
    auth-api:
      rule: 'Host(`auth.jorisjonkers.dev`) && PathPrefix(`/api/`)'
      entryPoints:
        - websecure
      service: auth-api
      middlewares:
        - security-headers
        - rate-limit
      tls:
        certResolver: cloudflare

    # ── Auth UI ─────────────────────────────────────────────────
    auth-ui:
      rule: 'Host(`auth.jorisjonkers.dev`) && !PathPrefix(`/api/`)'
      entryPoints:
        - websecure
      service: auth-ui
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Assistant API ───────────────────────────────────────────
    assistant-api:
      rule: 'Host(`assistant.jorisjonkers.dev`) && PathPrefix(`/api/`)'
      entryPoints:
        - websecure
      service: assistant-api
      middlewares:
        - security-headers
        - rate-limit
      tls:
        certResolver: cloudflare

    # ── Assistant UI ────────────────────────────────────────────
    assistant-ui:
      rule: 'Host(`assistant.jorisjonkers.dev`) && !PathPrefix(`/api/`)'
      entryPoints:
        - websecure
      service: assistant-ui
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Vault ───────────────────────────────────────────────────
    vault:
      rule: 'Host(`vault.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: vault
      middlewares:
        - forward-auth
        - rate-limit
        - security-headers
      tls:
        certResolver: cloudflare

    # ── n8n ─────────────────────────────────────────────────────
    n8n:
      rule: 'Host(`n8n.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: n8n
      middlewares:
        - forward-auth
        - rate-limit
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Grafana ─────────────────────────────────────────────────
    grafana:
      rule: 'Host(`grafana.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: grafana
      middlewares:
        - forward-auth
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Uptime Kuma ─────────────────────────────────────────────
    uptime-kuma:
      rule: 'Host(`status.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: uptime-kuma
      middlewares:
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Stalwart Mail (WebAdmin + JMAP) ─────────────────────
    stalwart:
      rule: 'Host(`mail.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: stalwart
      middlewares:
        - forward-auth
        - security-headers
      tls:
        certResolver: cloudflare

    # ── Traefik Dashboard ───────────────────────────────────────
    traefik-dashboard:
      rule: 'Host(`traefik.jorisjonkers.dev`)'
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - forward-auth
        - rate-limit
        - security-headers
      tls:
        certResolver: cloudflare

  services:
    app-ui:
      loadBalancer:
        servers:
          - url: 'http://app-ui:80'

    auth-api:
      loadBalancer:
        servers:
          - url: 'http://auth-api:8081'

    auth-ui:
      loadBalancer:
        servers:
          - url: 'http://auth-ui:80'

    assistant-api:
      loadBalancer:
        servers:
          - url: 'http://assistant-api:8082'

    assistant-ui:
      loadBalancer:
        servers:
          - url: 'http://assistant-ui:80'

    vault:
      loadBalancer:
        servers:
          - url: 'http://vault:8200'

    n8n:
      loadBalancer:
        servers:
          - url: 'http://n8n:5678'

    grafana:
      loadBalancer:
        servers:
          - url: 'http://grafana:3000'

    uptime-kuma:
      loadBalancer:
        servers:
          - url: 'http://uptime-kuma:3001'

    stalwart:
      loadBalancer:
        servers:
          - url: 'http://stalwart:8080'
