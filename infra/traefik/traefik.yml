entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ':443'
    http:
      tls:
        certResolver: cloudflare

certificatesResolvers:
  cloudflare:
    acme:
      email: admin@jorisjonkers.dev
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - '1.1.1.1:53'
          - '1.0.0.1:53'

providers:
  swarm:
    endpoint: 'unix:///var/run/docker.sock'
    exposedByDefault: false
    network: personal-stack-overlay
  file:
    directory: /etc/traefik/dynamic/
    watch: true

api:
  dashboard: true

metrics:
  prometheus: {}

accessLog:
  filters:
    statusCodes:
      - '400-599'

tracing:
  otlp:
    http:
      endpoint: http://tempo:4318/v1/traces

ping:
  entryPoint: web

log:
  level: INFO
