[extend]
useDefault = true

[allowlist]
description = "False positives in test fixtures and CI route checks"
regexTarget = "match"
regexes = [
  '''localhost:\d+/api/actuator/health''',
  '''(?:auth|assistant)\.jorisjonkers\.test:80/api/actuator/health''',
  '''eyJhbGciOiJSUzI1NiJ9\.eyJzdWIiOiJ0ZXN0IiwiZXhwIjoxfQ\.invalid''',
  '''-----BEGIN (?:RSA )?PRIVATE KEY-----.*""''',
  # Test fixtures + UI placeholders that look like OpenSSH ed25519
  # private keys. Real keys never appear in-repo — they live in
  # Vault at secret/data/agents/projects/<pid>/repos/<lid> and the
  # AttachDeployKeyCommandHandler test only needs the structural
  # framing for its regex validation.
  '''-----BEGIN OPENSSH PRIVATE KEY-----[\s\S]*?-----END OPENSSH PRIVATE KEY-----''',
  '''\d+/api/actuator/prometheus''',
]
