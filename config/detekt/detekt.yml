complexity:
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 10
  LongMethod:
    active: true
    allowedLines: 30
  LongParameterList:
    active: true
    allowedFunctionParameters: 6
    allowedConstructorParameters: 6
  LargeClass:
    active: true
    allowedLines: 300
  TooManyFunctions:
    active: true
    allowedFunctionsPerFile: 15
    allowedFunctionsPerClass: 15
    allowedFunctionsPerInterface: 15
    allowedFunctionsPerObject: 15
    allowedFunctionsPerEnum: 15

style:
  ForbiddenComment:
    active: true
    comments:
      - 'TODO'
      - 'FIXME'
    severity: warning
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
  MaxLineLength:
    active: true
    maxLineLength: 120
  ReturnCount:
    active: true
    max: 3
  UnusedImport:
    active: true
  VarCouldBeVal:
    active: true
  WildcardImport:
    active: true

potential-bugs:
  UnsafeCallOnNullableType:
    active: true

exceptions:
  TooGenericExceptionCaught:
    active: true

naming:
  FunctionNaming:
    active: true
  ClassNaming:
    active: true
  PackageNaming:
    active: true
