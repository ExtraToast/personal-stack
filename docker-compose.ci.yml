# CI override for system tests.
# Usage: bootstrap with .github/scripts/start-system-test-stack.sh

services:
  # ── Use CI-built images ──────────────────────────────────────────
  auth-api:
    image: personal-stack/auth-api:ci
    pull_policy: never
    environment:
      DB_PASSWORD: ci_auth_pass
      OTEL_TRACES_EXPORTER: none
      OTEL_EXPORTER_OTLP_ENDPOINT: ''

  agents-api:
    image: ghcr.io/extratoast/agents/agents-api:latest
    pull_policy: always
    depends_on:
      vault:
        condition: service_healthy
    environment:
      DB_PASSWORD: ci_agents_pass
      OTEL_TRACES_EXPORTER: none
      OTEL_EXPORTER_OTLP_ENDPOINT: ''
      SPRING_PROFILES_ACTIVE: system-test
      VAULT_ENABLED: 'true'
      VAULT_ADDR: http://vault:8200
      VAULT_AUTHENTICATION: TOKEN
      SPRING_CLOUD_VAULT_TOKEN: dev-root-token

  auth-ui:
    image: personal-stack/auth-ui:ci
    pull_policy: never

  agents-ui:
    image: ghcr.io/extratoast/agents/agents-ui:latest
    pull_policy: always

  app-ui:
    image: personal-stack/app-ui:ci
    pull_policy: never

  stalwart-bootstrap:
    image: personal-stack/stalwart-tools:ci
    pull_policy: never

  # ── CI-specific credentials ──────────────────────────────────────
  postgres:
    environment:
      AUTH_DB_PASSWORD: ci_auth_pass
      AGENTS_DB_PASSWORD: ci_agents_pass
      N8N_DB_PASSWORD: ci_n8n_pass

  # ── Disable OTEL on traefik (alloy is disabled) ─────────────────
  traefik:
    environment:
      OTEL_TRACES_EXPORTER: none

  # ── Disable services not needed for system tests ─────────────────
  vault-oidc-init:
    profiles: [bootstrap]
  prometheus:
    profiles: [disabled]
  loki:
    profiles: [disabled]
  alloy:
    profiles: [disabled]
  tempo:
    profiles: [disabled]
  uptime-kuma:
    profiles: [disabled]
  uptime-kuma-init:
    profiles: [disabled]
