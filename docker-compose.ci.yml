services:
  auth-api:
    image: personal-stack/auth-api:ci
    environment:
      AUTH_LOGIN_URL: http://auth.localhost/login
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_EXPORTER: none
      MANAGEMENT_HEALTH_MAIL_ENABLED: 'false'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth-api.rule=Host(`auth.localhost`) && PathPrefix(`/api/`)'
      - 'traefik.http.routers.auth-api.middlewares=security-headers@file'
      - 'traefik.http.services.auth-api.loadbalancer.server.port=8081'

  assistant-api:
    image: personal-stack/assistant-api:ci
    environment:
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_EXPORTER: none
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.assistant-api.rule=Host(`app.localhost`) && PathPrefix(`/api/`)'
      - 'traefik.http.routers.assistant-api.middlewares=security-headers@file'
      - 'traefik.http.services.assistant-api.loadbalancer.server.port=8082'

  auth-ui:
    image: personal-stack/auth-ui:ci
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1/ || exit 1']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth-ui.rule=Host(`auth.localhost`)'
      - 'traefik.http.routers.auth-ui.priority=1'
      - 'traefik.http.routers.auth-ui.middlewares=security-headers@file'
      - 'traefik.http.services.auth-ui.loadbalancer.server.port=80'

  assistant-ui:
    image: personal-stack/assistant-ui:ci
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1/ || exit 1']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.assistant-ui.rule=Host(`app.localhost`)'
      - 'traefik.http.routers.assistant-ui.priority=1'
      - 'traefik.http.routers.assistant-ui.middlewares=security-headers@file'
      - 'traefik.http.services.assistant-ui.loadbalancer.server.port=80'

  app-ui:
    image: personal-stack/app-ui:ci
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1/ || exit 1']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.app-ui.rule=Host(`localhost`)'
      - 'traefik.http.routers.app-ui.middlewares=security-headers@file'
      - 'traefik.http.services.app-ui.loadbalancer.server.port=80'

  traefik:
    volumes:
      - ./infra/traefik/traefik-dev.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.traefik-dashboard.rule=Host(`traefik.localhost`)'
      - 'traefik.http.routers.traefik-dashboard.entrypoints=web'
      - 'traefik.http.routers.traefik-dashboard.service=api@internal'
      - 'traefik.http.routers.traefik-dashboard.middlewares=forward-auth@docker,security-headers@file'

  vault:
    healthcheck:
      test: ['CMD', 'vault', 'status', '-address=http://127.0.0.1:8200']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.vault.rule=Host(`vault.localhost`)'
      - 'traefik.http.routers.vault.middlewares=forward-auth@docker,security-headers@file'
      - 'traefik.http.services.vault.loadbalancer.server.port=8200'
      - 'traefik.http.middlewares.forward-auth.forwardauth.address=http://auth-api:8081/api/v1/auth/verify'
      - 'traefik.http.middlewares.forward-auth.forwardauth.trustForwardHeader=true'
      - 'traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Email,X-User-Roles'

  n8n:
    image: n8nio/n8n:2.13.4
    environment:
      N8N_HOST: n8n.localhost
      N8N_PROTOCOL: http
      N8N_PORT: '5678'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.n8n.rule=Host(`n8n.localhost`)'
      - 'traefik.http.routers.n8n.middlewares=forward-auth@docker,security-headers@file'
      - 'traefik.http.services.n8n.loadbalancer.server.port=5678'

  stalwart:
    image: stalwartlabs/stalwart:latest
    healthcheck:
      test: ['CMD', 'bash', '-c', 'echo >/dev/tcp/localhost/8080']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.stalwart.rule=Host(`stalwart.localhost`)'
      - 'traefik.http.routers.stalwart.middlewares=forward-auth@docker,security-headers@file'
      - 'traefik.http.services.stalwart.loadbalancer.server.port=8080'

  grafana:
    image: grafana/grafana:11.6.0
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`grafana.localhost`)'
      - 'traefik.http.routers.grafana.middlewares=forward-auth@docker,security-headers@file'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3000'
