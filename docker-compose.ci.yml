services:
  auth-api:
    image: private-stack/auth-api:ci
    environment:
      AUTH_LOGIN_URL: http://auth.localhost/login

  assistant-api:
    image: private-stack/assistant-api:ci

  auth-ui:
    image: private-stack/auth-ui:ci

  assistant-ui:
    image: private-stack/assistant-ui:ci

  app-ui:
    image: private-stack/app-ui:ci

  traefik:
    volumes:
      - ./infra/traefik/traefik-ci.yml:/etc/traefik/traefik.yml:ro
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault:
    healthcheck:
      test: ['CMD', 'vault', 'status', '-address=http://127.0.0.1:8200']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.vault.rule=Host(`vault.localhost`)'
      - 'traefik.http.routers.vault.middlewares=forward-auth@docker'
      - 'traefik.http.services.vault.loadbalancer.server.port=8200'
      - 'traefik.http.middlewares.forward-auth.forwardauth.address=http://auth-api:8081/api/v1/auth/verify'
      - 'traefik.http.middlewares.forward-auth.forwardauth.trustForwardHeader=true'
      - 'traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Email,X-User-Roles'

  n8n:
    image: n8nio/n8n:2.13.4
    environment:
      N8N_HOST: n8n.localhost
      N8N_PROTOCOL: http
      N8N_PORT: '5678'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.n8n.rule=Host(`n8n.localhost`)'
      - 'traefik.http.routers.n8n.middlewares=forward-auth@docker'
      - 'traefik.http.services.n8n.loadbalancer.server.port=5678'

  grafana:
    image: grafana/grafana:11.6.0
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`grafana.localhost`)'
      - 'traefik.http.routers.grafana.middlewares=forward-auth@docker'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3000'
