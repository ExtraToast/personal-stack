# CI override for system tests.
# Usage: bootstrap with .github/scripts/start-system-test-stack.sh

services:
  # ── Use CI-built images ──────────────────────────────────────────
  auth-api:
    image: personal-stack/auth-api:ci
    pull_policy: never
    environment:
      DB_PASSWORD: ci_auth_pass
      OTEL_TRACES_EXPORTER: none
      OTEL_EXPORTER_OTLP_ENDPOINT: ''

  assistant-api:
    image: personal-stack/assistant-api:ci
    pull_policy: never
    environment:
      DB_PASSWORD: ci_assistant_pass
      OTEL_TRACES_EXPORTER: none
      OTEL_EXPORTER_OTLP_ENDPOINT: ''
      # The system-test stack doesn't ship a Kubernetes cluster, so
      # the production `Fabric8AgentRunnerOrchestrator` (which
      # bootstraps a fabric8 KubernetesClient against the in-cluster
      # API) would refuse to start. The `system-test` Spring profile
      # swaps it for `StubAgentRunnerOrchestrator` — a no-op
      # implementation that returns synthesised RunnerHandles so the
      # workspace lifecycle commands run end-to-end except for the
      # actual Pod side-effects. Real-cluster behaviour is exercised
      # by Fabric8AgentRunnerOrchestratorIntegrationTest under
      # assistant-api/integrationTest, against a Testcontainers k3s.
      SPRING_PROFILES_ACTIVE: system-test

  auth-ui:
    image: personal-stack/auth-ui:ci
    pull_policy: never

  assistant-ui:
    image: personal-stack/assistant-ui:ci
    pull_policy: never

  app-ui:
    image: personal-stack/app-ui:ci
    pull_policy: never

  # ── CI-specific credentials ──────────────────────────────────────
  postgres:
    environment:
      AUTH_DB_PASSWORD: ci_auth_pass
      ASSISTANT_DB_PASSWORD: ci_assistant_pass
      N8N_DB_PASSWORD: ci_n8n_pass

  # ── Disable OTEL on traefik (alloy is disabled) ─────────────────
  traefik:
    environment:
      OTEL_TRACES_EXPORTER: none

  # ── Disable services not needed for system tests ─────────────────
  vault-oidc-init:
    profiles: [bootstrap]
  prometheus:
    profiles: [disabled]
  loki:
    profiles: [disabled]
  alloy:
    profiles: [disabled]
  tempo:
    profiles: [disabled]
  uptime-kuma:
    profiles: [disabled]
  uptime-kuma-init:
    profiles: [disabled]
