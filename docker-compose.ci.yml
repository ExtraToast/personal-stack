# CI override for system tests.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait

services:
  # ── Use CI-built images ──────────────────────────────────────────
  auth-api:
    image: personal-stack/auth-api:ci
    build: !reset null
    environment:
      DB_PASSWORD: ci_auth_pass
      OTEL_TRACES_EXPORTER: none
      OTEL_EXPORTER_OTLP_ENDPOINT: ''

  assistant-api:
    image: personal-stack/assistant-api:ci
    build: !reset null
    environment:
      DB_PASSWORD: ci_assistant_pass
      OTEL_TRACES_EXPORTER: none
      OTEL_EXPORTER_OTLP_ENDPOINT: ''

  auth-ui:
    image: personal-stack/auth-ui:ci
    build: !reset null

  assistant-ui:
    image: personal-stack/assistant-ui:ci
    build: !reset null

  app-ui:
    image: personal-stack/app-ui:ci
    build: !reset null

  # ── CI-specific credentials ──────────────────────────────────────
  postgres:
    environment:
      AUTH_DB_PASSWORD: ci_auth_pass
      ASSISTANT_DB_PASSWORD: ci_assistant_pass
      N8N_DB_PASSWORD: ci_n8n_pass

  # ── Disable OTEL on traefik (alloy is disabled) ─────────────────
  traefik:
    environment:
      OTEL_TRACES_EXPORTER: none

  # ── Disable services not needed for system tests ─────────────────
  vault:
    profiles: [disabled]
  vault-oidc-init:
    profiles: [disabled]
  prometheus:
    profiles: [disabled]
  loki:
    profiles: [disabled]
  alloy:
    profiles: [disabled]
  tempo:
    profiles: [disabled]
  uptime-kuma:
    profiles: [disabled]
  uptime-kuma-init:
    profiles: [disabled]
