version: 1

cluster:
  name: personal-stack
  public_domain: jorisjonkers.dev
  kubernetes:
    bootstrap_control_plane: frankfurt-contabo-1
    api_server_endpoint: https://167.86.79.203:6443
    control_plane_token_file: /var/lib/rancher/k3s/server/node-token
    worker_join_token_file: /var/lib/personal-stack/secrets/k3s/agent-token

sites:
  frankfurt:
    kind: vps
    purpose: primary_cluster_site
  enschede:
    kind: home
    purpose: home_lan_and_media_site
    networking:
      lan_ingress_ip: 192.168.0.99
      # Static IPv4 the ISP hands out on the home WAN. Feeds
      # `ingress_intent.wan_origin_overrides: home_direct` services so
      # Cloudflare DNS points them straight at the home router (grey
      # cloud), not at the Frankfurt VPS.
      wan_public_ip: 130.89.169.227

nodes:
  frankfurt-contabo-1:
    status: active
    site: frankfurt
    arch: amd64
    ssh:
      host: 167.86.79.203
      user: deploy
      port: 2222
    target_roles:
      - k3s-control-plane
      - k3s-worker
    capacity:
      cpu_millicores: 16000
      memory_mib: 32768
    capabilities:
      - tailscale
      - public-ingress

  enschede-gtx-960m-1:
    status: install-ready
    site: enschede
    arch: amd64
    # Pinned to the tailnet IP post-install (matches enschede-t1000-1
    # pattern). MagicDNS is off fleet-wide (--accept-dns=false), so the
    # bare hostname would not resolve.
    ssh:
      host: 100.89.41.92
      user: deploy
      port: 2222
    target_roles:
      - k3s-worker
      - utility-host
    capacity:
      cpu_millicores: 28800
      memory_mib: 16384
    gpus:
      - vendor: nvidia
        model: gtx960m
        class: transcode
    capabilities:
      - tailscale
      - lan-ingress
      - game-streaming
      - nvidia

  enschede-t1000-1:
    status: active
    site: enschede
    arch: amd64
    ssh:
      host: 100.103.175.110
      user: deploy
      port: 2222
    target_roles:
      - k3s-worker
      - utility-host
    capacity:
      cpu_millicores: 54000
      memory_mib: 32000
    gpus:
      - vendor: nvidia
        model: t1000
        class: transcode
    capabilities:
      - tailscale
      - lan-ingress
      - samba
      - adguard
      - nvidia

  enschede-pi-1:
    status: active
    site: enschede
    arch: arm64
    ssh:
      host: 100.65.192.22
      user: deploy
      port: 2222
    target_roles:
      - k3s-worker
    capacity:
      cpu_millicores: 6000
      memory_mib: 8192
    capabilities:
      - tailscale

  enschede-pi-2:
    status: install-ready
    site: enschede
    arch: arm64
    ssh:
      host: enschede-pi-2
      user: deploy
      port: 2222
    target_roles:
      - k3s-worker
    capacity:
      cpu_millicores: 6000
      memory_mib: 4096
    capabilities:
      - tailscale

  enschede-pi-3:
    status: install-ready
    site: enschede
    arch: arm64
    ssh:
      host: enschede-pi-3
      user: deploy
      port: 2222
    target_roles:
      - k3s-worker
    capacity:
      cpu_millicores: 6000
      memory_mib: 4096
    capabilities:
      - tailscale

service_intent:
  kubernetes:
    public_apps:
      - app-ui
      - auth-ui
      - auth-api
      - assistant-ui
      - assistant-api
      - stalwart
      - n8n
      - gatus
      - grafana
      - headlamp
      # AdGuard Home runs as a k8s Deployment pinned to the
      # capability-adguard node (enschede-t1000-1). State lives on a
      # hostPath under /var/lib/AdGuardHome so it survives pod
      # restarts and mirrors the on-disk layout the retired NixOS
      # service used.
      - adguard
      # WolfManager manages the host-native Games On Whales Wolf service
      # running on enschede-gtx-960m-1. Gameplay still streams directly
      # from that node to Moonlight; this is only the browser management UI.
      - wolf
    internal_platform:
      - postgres
      - rabbitmq
      - valkey
      - prometheus
      - loki
      - tempo
      - alloy
      - flaresolverr
      - vault
      - pyroscope
    home_media:
      - downloads
      - qbittorrent
      - prowlarr
      - radarr
      - sonarr
      - jellyfin
      - jellyseerr
      - bazarr

  host_native:
    enschede-gtx-960m-1:
      - tailscale
      - game-streaming
    enschede-t1000-1:
      - samba
      - tailscale

placement_intent:
  frankfurt_only:
    - app-ui
    - auth-ui
    - auth-api
    - assistant-ui
    - assistant-api
    - stalwart
    - postgres
    - rabbitmq
    - valkey
    - grafana
    - prometheus
    - loki
    - tempo
    - alloy
    - flaresolverr
    - n8n
    - gatus
    - vault
    - headlamp

  enschede_only:
    - downloads
    - qbittorrent
    - prowlarr
    - radarr
    - sonarr
    - jellyfin
    - jellyseerr
    - bazarr
    - adguard
    - wolf
    - samba

  gpu_specific:
    jellyfin:
      preferred_gpu_model: t1000
      temporary_gpu_model: gtx960m

exposure_intent:
  public:
    - app-ui
    - auth-ui
    - auth-api
    - assistant-ui
    - assistant-api
    - stalwart
    - grafana
    - n8n
    - gatus
    - rabbitmq
    - vault
    - headlamp
    - adguard
    - wolf

  public_and_lan:
    - bazarr
    - jellyfin
    - jellyseerr
    - prowlarr
    - qbittorrent
    - radarr
    - sonarr

  internal_only:
    - postgres
    - valkey
    - prometheus
    - loki
    - tempo
    - alloy
    - flaresolverr

  lan_only:
    - samba

access_intent:
  sso_protected:
    - assistant-api
    - stalwart
    - bazarr
    - prowlarr
    - qbittorrent
    - radarr
    - sonarr
    - rabbitmq
    - vault
    - headlamp
    - adguard
    - wolf
  host_labels:
    app-ui: root
    auth-ui: auth
    auth-api: auth
    assistant-ui: assistant
    assistant-api: assistant
    stalwart: stalwart
    grafana: grafana
    n8n: n8n
    gatus: status
    rabbitmq: rabbitmq
    vault: vault
    bazarr: bazarr
    jellyfin: jellyfin
    jellyseerr: jellyseerr
    prowlarr: prowlarr
    qbittorrent: qbittorrent
    radarr: radarr
    sonarr: sonarr
    adguard: adguard
    wolf: wolf
    samba: samba
    # Kubernetes dashboard (Headlamp) at dashboard.jorisjonkers.dev.
    headlamp: dashboard

ingress_intent:
  kubernetes_backends:
    # AdGuard Home runs as a k8s Deployment in utility-system/adguard,
    # pinned to the capability-adguard node (enschede-t1000-1) with
    # state on a hostPath at /var/lib/AdGuardHome.
    adguard:
      namespace: utility-system
      service: adguard
      port: 3000
    wolf:
      namespace: utility-system
      service: wolfmanager
      port: 3000
    app-ui:
      namespace: app-system
      service: app-ui
      port: 80
    auth-api:
      namespace: auth-system
      service: auth-api
      port: 8081
      # /api/actuator/health aggregates every indicator (including the
      # optional mail one), so transient SMTP TLS hiccups flip the
      # aggregate to DOWN/503 while readiness/liveness stay UP. Probe
      # the readiness group — same endpoint the k8s readinessProbe hits.
      health:
        path: /api/actuator/health/readiness
    auth-ui:
      namespace: auth-system
      service: auth-ui
      port: 80
    assistant-api:
      namespace: assistant-system
      service: assistant-api
      port: 8082
      health:
        path: /api/actuator/health/readiness
    assistant-ui:
      namespace: assistant-system
      service: assistant-ui
      port: 80
    stalwart:
      namespace: mail-system
      service: stalwart
      port: 8080
    gatus:
      namespace: observability
      service: gatus
      port: 80
      health:
        path: /health
    grafana:
      namespace: observability
      service: grafana
      # Grafana's chart Service is port: 80 -> targetPort: grafana
      # (container 3000). IngressRoute must reference the Service port,
      # not the container port, or traefik 404s.
      port: 80
      health:
        path: /api/health
    bazarr:
      namespace: media-system
      service: bazarr
      port: 6767
    jellyfin:
      namespace: media-system
      service: jellyfin
      port: 8096
    jellyseerr:
      namespace: media-system
      service: jellyseerr
      port: 5055
    n8n:
      namespace: automation-system
      service: n8n
      port: 5678
    prowlarr:
      namespace: media-system
      service: prowlarr
      port: 9696
    qbittorrent:
      namespace: media-system
      service: qbittorrent
      port: 8080
    rabbitmq:
      namespace: data-system
      service: rabbitmq
      port: 15672
      # Probe AMQP instead of the management UI (which returns a login
      # redirect, not 200, from the root path).
      health:
        type: tcp
        port: 5672
    radarr:
      namespace: media-system
      service: radarr
      port: 7878
    sonarr:
      namespace: media-system
      service: sonarr
      port: 8989
    vault:
      namespace: data-system
      service: vault
      port: 8200
      # /v1/sys/health returns 200 when active; standbyok=true also
      # accepts standby nodes as healthy.
      health:
        path: /v1/sys/health?standbyok=true
    headlamp:
      namespace: utility-system
      service: headlamp
      port: 80
  # Per-service WAN origin. Default is CF-proxied via the Frankfurt
  # VPS (`ingress.jorisjonkers.dev`). Services listed here override
  # that: `home_direct` switches the Cloudflare A record to the home
  # WAN IP (grey cloud / DNS-only), intended for bandwidth-heavy flows
  # that shouldn't transit the VPS or CF's proxy.
  wan_origin_overrides:
    jellyfin: home_direct

monitoring_intent:
  # Cluster-only services with no external ingress. Gatus probes these
  # from inside the cluster so they still show up on the status page.
  kubernetes_backends:
    alloy:
      namespace: observability
      service: alloy
      port: 12345
      health:
        path: /-/ready
    flaresolverr:
      namespace: utility-system
      service: flaresolverr
      port: 8191
      health:
        path: /health
    loki:
      namespace: observability
      service: loki
      port: 3100
      health:
        path: /ready
    postgres:
      namespace: data-system
      service: postgres
      port: 5432
      health:
        type: tcp
    prometheus:
      # kube-prometheus-stack sets fullnameOverride: metrics-stack, so
      # the service name is metrics-stack-prometheus.
      namespace: observability
      service: metrics-stack-prometheus
      port: 9090
      health:
        path: /-/healthy
    tempo:
      namespace: observability
      service: tempo
      port: 3200
      health:
        path: /ready
    valkey:
      namespace: data-system
      service: valkey
      port: 6379
      health:
        type: tcp
    pyroscope:
      namespace: observability
      service: pyroscope
      port: 4040
      health:
        path: /ready
