    auth-ui: auth
    auth-api: auth
    assistant-ui: assistant
    assistant-api: assistant
    stalwart: stalwart
    grafana: grafana
    n8n: n8n
    uptime-kuma: status
    rabbitmq: rabbitmq
    vault: vault
    bazarr: bazarr
    jellyfin: jellyfin
    jellyseerr: jellyseerr
    prowlarr: prowlarr
    qbittorrent: qbittorrent
    radarr: radarr
    sonarr: sonarr
    adguard: adguard
    samba: samba

