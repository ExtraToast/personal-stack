    - app-ui
    - auth-ui
    - auth-api
    - assistant-ui
    - assistant-api
    - stalwart
    - grafana
    - n8n
    - uptime-kuma
    - rabbitmq
    - vault

  public_and_lan:
    - bazarr
    - jellyfin
    - jellyseerr
    - prowlarr
    - qbittorrent
    - radarr
    - sonarr

  internal_only:
    - postgres
    - valkey
    - prometheus
    - loki
    - tempo
    - alloy
    - flaresolverr
    - wireguard-check

  lan_only:
    - adguard
    - samba

access_intent:
  sso_protected:
    - assistant-api
    - stalwart
    - bazarr
    - prowlarr
    - qbittorrent
    - rabbitmq
    - vault
  host_labels:
