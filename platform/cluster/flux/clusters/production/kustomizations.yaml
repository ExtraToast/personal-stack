---
# Split the single root Kustomization into layers so Helm-owned CRDs
# install before any CR that depends on them. apps-core installs charts
# (cert-manager, MetalLB, ingress, external-dns, nvidia-device-plugin)
# and waits for the HelmReleases to report Ready. Every other domain
# dependsOn apps-core.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-core
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./platform/cluster/flux/apps/core
  prune: true
  wait: true
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-metallb-config
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./platform/cluster/flux/apps/metallb-config
  prune: true
  dependsOn:
    - name: apps-core
  sourceRef:
    kind: GitRepository
    name: flux-system
---
