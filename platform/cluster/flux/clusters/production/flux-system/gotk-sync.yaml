---
# Generated once as the manual bootstrap of Flux against this repository.
# Flux does not push back to main; reconciliation only pulls from here.
# If the repo moves or the branch changes, update the url/branch fields and
# `kubectl apply -k platform/cluster/flux/clusters/production/flux-system/`.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: https://github.com/ExtraToast/personal-stack
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./platform/cluster/flux/clusters/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
