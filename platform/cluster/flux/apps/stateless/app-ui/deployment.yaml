apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-ui
  namespace: app-system
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  replicas: 2
  # nginx pods, ~10–20Mi RAM each — surge=1 maxUnavailable=0 gives
  # true zero-downtime rollouts. The new pod becomes Ready before the
  # old one terminates, so the Service load-balancer routes are never
  # empty. Explicit strategy + progressDeadlineSeconds avoids relying
  # on the chart-default 25% percentages, which round to the same
  # values for replicas=2 but would silently change if anyone bumped
  # replicas later.
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: app-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-ui
    spec:
      # Pinned to enschede arm64 nodes (the Pis) — frees ~150m CPU per
      # replica on Frankfurt, which is at 90% requested. UI is nginx-
      # served static SPA so cross-site latency from Cloudflare →
      # Frankfurt Traefik → Pi adds ~30 ms first byte but doesn't
      # affect cached asset loads. PRECONDITION: the UI image at ghcr
      # must be multi-arch (linux/amd64,linux/arm64) — see #228 (or
      # the deploy.yml change shipped alongside this PR).
      nodeSelector:
        kubernetes.io/arch: arm64
      # Spread replicas across as many distinct Pis as possible so the
      # UI is reachable from at least 2 nodes. ScheduleAnyway means we
      # don't pend the second replica if only one Pi is healthy —
      # degraded HA beats a Pending pod.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: app-ui
      containers:
        - name: app-ui
          image: ghcr.io/extratoast/personal-stack/app-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: app-ui
  namespace: app-system
spec:
  selector:
    app.kubernetes.io/name: app-ui
  ports:
    - name: http
      port: 80
      targetPort: http
