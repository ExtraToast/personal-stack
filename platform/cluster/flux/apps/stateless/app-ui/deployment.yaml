apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-ui
  namespace: app-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: app-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-ui
    spec:
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        - name: app-ui
          image: ghcr.io/extratoast/personal-stack/app-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: app-ui
  namespace: app-system
spec:
  selector:
    app.kubernetes.io/name: app-ui
  ports:
    - name: http
      port: 80
      targetPort: http
