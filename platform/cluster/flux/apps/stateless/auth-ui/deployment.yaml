apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-ui
  namespace: auth-system
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  replicas: 2
  # nginx pods, ~10–20Mi RAM each — surge=1 maxUnavailable=0 gives
  # true zero-downtime rollouts. The new pod becomes Ready before the
  # old one terminates, so the Service load-balancer routes are never
  # empty. Explicit strategy + progressDeadlineSeconds avoids relying
  # on the chart-default 25% percentages, which round to the same
  # values for replicas=2 but would silently change if anyone bumped
  # replicas later.
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-ui
    spec:
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        - name: auth-ui
          image: ghcr.io/extratoast/personal-stack/auth-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-ui
  namespace: auth-system
spec:
  selector:
    app.kubernetes.io/name: auth-ui
  ports:
    - name: http
      port: 80
      targetPort: http
