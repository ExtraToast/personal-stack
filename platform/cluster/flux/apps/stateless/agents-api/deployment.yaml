apiVersion: v1
kind: ServiceAccount
metadata:
  name: agents-api
  namespace: agents-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-api
  namespace: agents-system
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  # Single replica, zero-downtime rollout (mirrors auth-api):
  # maxSurge=1 + maxUnavailable=0. On a new image the surge pod is
  # created and must reach Ready before the old pod is torn down, so a
  # cutover never leaves zero pods serving — critical here because a
  # cold start is slow (~5 min: Spring + Vault init on the tight
  # Frankfurt VPS). The previous maxSurge=0/maxUnavailable=1 with a
  # single replica killed the only pod first and left the service down
  # for the whole startup window. Briefly runs 2 pods (~800m CPU
  # requested) during the roll; progressDeadlineSeconds covers the
  # slow start.
  replicas: 1
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-api
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: agents-api
        vault.hashicorp.com/agent-inject-secret-agents-api.env: rabbitmq/creds/app-consumer
        vault.hashicorp.com/agent-inject-template-agents-api.env: |
          # Datasource credential. The Spring Cloud Vault database backend
          # (dynamic creds via database/creds/agents-api) is preferred
          # and overrides these when it engages, but it is not binding the
          # datasource in the current image, so without an explicit
          # credential the connection falls back to the application.yml
          # defaults and Flyway fails. Supply the real credential from the
          # single source of truth (secret/platform/postgres). See auth-api.
          DB_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "agents.user" }}{{ end }}
          DB_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "agents.password" }}{{ end }}
          {{ with secret "rabbitmq/creds/app-consumer" }}
          SPRING_RABBITMQ_USERNAME={{ .Data.username }}
          SPRING_RABBITMQ_PASSWORD={{ .Data.password }}
          {{ end }}
    spec:
      serviceAccountName: agents-api
      priorityClassName: platform-critical-app
      nodeSelector:
        personal-stack/site: frankfurt
      initContainers:
        - name: download-pyroscope-agent
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -ec
            - |
              curl -fsSL -o /agent/pyroscope.jar \
                https://github.com/grafana/pyroscope-java/releases/download/v0.16.0/pyroscope.jar
          volumeMounts:
            - name: pyroscope-agent
              mountPath: /agent
      containers:
        - name: agents-api
          image: ghcr.io/extratoast/agents/agents-api:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
            - |
              export SPRING_CLOUD_VAULT_TOKEN="$(cat /vault/secrets/token)"
              set -a
              . /vault/secrets/agents-api.env
              set +a
              # See auth-api deployment.yaml for the rationale behind these
              # JVM flags. MaxRAMPercentage=55 (down from 75) leaves native
              # headroom under the 2304 MiB limit for the two javaagents +
              # tracing aspect, avoiding the OOMKills the 75 % heap caused
              # during cold start. ZGC for sub-ms pauses. AppCDS args were
              # dropped with the BellSoft Liberica CRaC image switch.
              exec java \
                -XX:+UseZGC \
                -XX:MaxRAMPercentage=55 \
                -javaagent:/app/otel-javaagent.jar \
                -javaagent:/pyroscope/pyroscope.jar \
                -jar /app/app.jar
          env:
            - name: SERVER_PORT
              value: '8082'
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_CONFIG_IMPORT
              value: vault://
            - name: VAULT_ENABLED
              value: 'true'
            - name: VAULT_ADDR
              value: http://vault.data-system.svc.cluster.local:8200
            - name: VAULT_DB_ENABLED
              value: 'true'
            - name: DB_HOST
              value: postgres.data-system.svc.cluster.local
            - name: DB_PORT
              value: '5432'
            - name: VALKEY_HOST
              value: valkey.data-system.svc.cluster.local
            - name: VALKEY_PORT
              value: '6379'
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq.data-system.svc.cluster.local
            - name: SPRING_RABBITMQ_PORT
              value: '5672'
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
            - name: OTEL_SERVICE_NAME
              value: agents-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_LOGS_EXPORTER
              value: none
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: '5000'
            - name: OTEL_BSP_SCHEDULE_DELAY
              value: '5000'
            - name: OTEL_BSP_MAX_QUEUE_SIZE
              value: '16384'
            - name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
              value: '2048'
            - name: PYROSCOPE_APPLICATION_NAME
              value: agents-api
            - name: PYROSCOPE_SERVER_ADDRESS
              value: http://pyroscope.observability.svc.cluster.local:4040
            - name: PYROSCOPE_FORMAT
              value: jfr
            - name: PYROSCOPE_PROFILER_EVENT
              value: cpu
            - name: PYROSCOPE_PROFILER_ALLOC
              value: '524288'
            - name: PYROSCOPE_PROFILER_LOCK
              value: 10ms
            - name: PYROSCOPE_LABELS
              value: service.name=agents-api,deployment.environment=production
            # Agent runtime — per-workspace runner Pod orchestration.
            - name: AGENT_RUNTIME_NAMESPACE
              value: agents-system
            - name: AGENT_RUNTIME_IMAGE
              value: ghcr.io/extratoast/agents/agent-runner:latest
            # Runner Pods must co-locate with the credential PVCs.
            - name: AGENT_RUNTIME_NODE
              value: enschede-gtx-960m-1
            # Must match users.groups.docker.gid on the selected Nix host.
            - name: AGENT_RUNTIME_DOCKER_SOCKET_SUPPLEMENTAL_GROUPS
              value: '131'
            - name: GITHUB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-api-token
                  key: token
                  optional: true
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: app-id
                  optional: true
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: private-key
                  optional: true
            - name: GITHUB_APP_TOKEN_BEARER
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: token-bearer
                  optional: true
            # Credential-login worker — agents-api proxies the agents-ui
            # Credentials page to it. INTERNAL_TOKEN is the shared bearer
            # projected into agents-login-internal; optional so the Deployment
            # still starts before the path is seeded (the page just
            # errors until then).
            - name: CREDENTIAL_WORKER_URL
              value: http://agents-login-worker.agents-system.svc.cluster.local:8081
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agents-login-internal
                  key: token
                  optional: true
          ports:
            - containerPort: 8082
              name: http
          startupProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 400m
              memory: 1792Mi
            limits:
              cpu: 2000m
              memory: 3Gi
          volumeMounts:
            - name: pyroscope-agent
              mountPath: /pyroscope
              readOnly: true
      volumes:
        - name: pyroscope-agent
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agents-api
  namespace: agents-system
spec:
  selector:
    app.kubernetes.io/name: agents-api
  ports:
    - name: http
      port: 8082
      targetPort: http
