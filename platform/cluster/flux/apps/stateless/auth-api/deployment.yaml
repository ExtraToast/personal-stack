apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-api
  namespace: auth-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: auth-system
  annotations:
    # Keel.sh watches this Deployment's :latest tag in ghcr and triggers
    # a rollout when the digest changes. Two non-obvious knobs are load
    # bearing: `policy: force` is the only policy that works for
    # non-semver tags, and `match-tag: "true"` scopes Keel to the tag
    # currently on the Deployment (i.e. :latest) instead of listing
    # every tag in the registry and picking whichever sorts highest.
    # Without match-tag Keel pinned every app to an ancient :<sha>
    # tag that sorted above the others.
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  # Single replica with surge-based zero-downtime deploys. auth-api is on
  # the forward-auth path, so a rollout must never drop to zero ready
  # endpoints — but a second always-on replica is not required to achieve
  # that. maxSurge=1 + maxUnavailable=0 brings a new pod to Ready *before*
  # the old one terminates, so forward-auth keeps a live endpoint across
  # every Keel-driven rollout, at one replica's steady-state cost.
  #
  # This is viable now that CPU requests are right-sized (request 400m,
  # not 1000m): the transient surge pod needs only ~400m, which the
  # freed Frankfurt budget has many times over — the old maxSurge=0 note
  # about the node being "chronically near 91% requested" no longer holds.
  #
  # Trade-off: a single replica means a pod or node *failure* (as opposed
  # to a deploy) causes a brief gap until the pod restarts. That is an
  # accepted trade for the reclaimed core; deploys stay zero-downtime.
  replicas: 1
  # Long deadline so a slow cold start doesn't flip the HelmRelease to
  # Failed (chart default is 600s = 10 min).
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-api
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: auth-api
        vault.hashicorp.com/agent-inject-secret-auth-api.env: secret/data/auth-api
        vault.hashicorp.com/agent-inject-template-auth-api.env: |
          AUTH_TRANSIT_ENABLED=true
          AUTH_TRANSIT_KEY_NAME=auth-api-jwt
          AUTH_CLIENTS_GRAFANA_SECRET={{ with secret "secret/data/auth-api" }}{{ index .Data.data "auth.clients.grafana.secret" }}{{ end }}
          AUTH_CLIENTS_N8N_SECRET={{ with secret "secret/data/auth-api" }}{{ index .Data.data "auth.clients.n8n.secret" }}{{ end }}
          AUTH_CLIENTS_VAULT_SECRET={{ with secret "secret/data/auth-api" }}{{ index .Data.data "auth.clients.vault.secret" }}{{ end }}
          # SMTP submission account. Stalwart owns this account and its
          # password lives in secret/platform/mail (account.password) —
          # the same value stalwart's accounts.json provisions the
          # principal with. Sourcing it here (instead of a duplicated
          # mail.username/mail.password under secret/auth-api) keeps a
          # single source of truth and removes the lock-step the
          # stalwart auth-provisioning Job used to maintain. The account
          # address is the MAIL_FROM identity, set as a plain env below.
          MAIL_PASSWORD={{ with secret "secret/data/platform/mail" }}{{ index .Data.data "account.password" }}{{ end }}
          # Datasource credential. The Spring Cloud Vault database backend
          # (dynamic creds via database/creds/auth-api) is still enabled and
          # is the preferred source — when it engages it overrides these.
          # But it is currently not binding the datasource in this image, so
          # without an explicit credential the connection falls back to the
          # application.yml defaults (auth_user/auth_password) and Flyway
          # fails with "password authentication failed for user auth_user".
          # Supplying the real auth_user credential from the single source of
          # truth (secret/platform/postgres) makes the static path correct.
          DB_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "auth.user" }}{{ end }}
          DB_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "auth.password" }}{{ end }}
          {{ with secret "rabbitmq/creds/app-consumer" }}
          SPRING_RABBITMQ_USERNAME={{ .Data.username }}
          SPRING_RABBITMQ_PASSWORD={{ .Data.password }}
          {{ end }}
    spec:
      serviceAccountName: auth-api
      priorityClassName: platform-critical-app
      nodeSelector:
        personal-stack/site: frankfurt
      initContainers:
        # Download the Pyroscope Java agent into a shared emptyDir so the
        # main container can attach it as a -javaagent. Avoids baking the
        # jar into the application image. Pin the version to keep the
        # rollout deterministic.
        - name: download-pyroscope-agent
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -ec
            - |
              curl -fsSL -o /agent/pyroscope.jar \
                https://github.com/grafana/pyroscope-java/releases/download/v0.16.0/pyroscope.jar
          volumeMounts:
            - name: pyroscope-agent
              mountPath: /agent
      containers:
        - name: auth-api
          image: ghcr.io/extratoast/personal-stack/auth-api:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
            - |
              export SPRING_CLOUD_VAULT_TOKEN="$(cat /vault/secrets/token)"
              set -a
              . /vault/secrets/auth-api.env
              set +a
              # -XX:MaxRAMPercentage=55: cgroup-aware heap sizing off the
              # 3 GiB limit → ~1.65 GiB heap, leaving ~1.35 GiB for native
              # memory. 75 % (the prior value) left only ~768 MiB of native
              # headroom under the limit — not enough for the two javaagents
              # (otel + Pyroscope) plus kotlin-commons-observability's per-method tracing
              # aspect plus metaspace/threads/direct buffers, so the JVM was
              # OOMKilled (exit 137) during the agent-heavy cold start. The
              # old comment assumed 75 % of the 2 GiB request (~1.5 GiB heap),
              # but the JVM sizes off the 3 GiB limit, so it took ~2.25 GiB.
              # ZGC: sub-ms pauses under cache-warm loads + better throughput
              # than G1 on workloads that touch many short-lived objects (jOOQ
              # row mappers, Jackson, OAuth2 token responses).
              # AppCDS args were dropped together with the image switch to
              # BellSoft Liberica CRaC: Liberica's CDS handling differs from
              # standard OpenJDK and CRaC restore (next PR in the stack)
              # supersedes AppCDS as the cold-start optimisation. Cold
              # start temporarily regresses to the pre-AppCDS baseline
              # (~250–300 s); the 600 s startupProbe budget covers it.
              exec java \
                -XX:+UseZGC \
                -XX:MaxRAMPercentage=55 \
                -javaagent:/app/otel-javaagent.jar \
                -javaagent:/pyroscope/pyroscope.jar \
                -jar /app/app.jar
          env:
            - name: SERVER_PORT
              value: '8081'
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_CONFIG_IMPORT
              value: vault://
            - name: VAULT_ENABLED
              value: 'true'
            - name: VAULT_ADDR
              value: http://vault.data-system.svc.cluster.local:8200
            - name: VAULT_DB_ENABLED
              value: 'true'
            - name: DB_HOST
              value: postgres.data-system.svc.cluster.local
            - name: DB_PORT
              value: '5432'
            - name: VALKEY_HOST
              value: valkey.data-system.svc.cluster.local
            - name: VALKEY_PORT
              value: '6379'
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq.data-system.svc.cluster.local
            - name: SPRING_RABBITMQ_PORT
              value: '5672'
            - name: MAIL_HOST
              value: stalwart.mail-system.svc.cluster.local
            # SMTP submission account address (the MAIL_FROM identity).
            # Matches the principal stalwart provisions; password comes
            # from secret/platform/mail via the vault-agent template.
            - name: MAIL_USERNAME
              value: auth@jorisjonkers.dev
            - name: MAIL_PORT
              value: '587'
            - name: AUTH_LOGIN_URL
              value: https://auth.jorisjonkers.dev/login
            - name: AUTH_ISSUER
              value: https://auth.jorisjonkers.dev
            - name: SESSION_COOKIE_DOMAIN
              value: jorisjonkers.dev
            - name: SESSION_COOKIE_SECURE
              value: 'true'
            - name: CONFIRMATION_URL
              value: https://auth.jorisjonkers.dev/confirm-email
            - name: AUTH_CORS_ALLOWED_ORIGINS
              value: https://jorisjonkers.dev,https://auth.jorisjonkers.dev,https://assistant.jorisjonkers.dev,https://vault.jorisjonkers.dev,https://n8n.jorisjonkers.dev,https://grafana.jorisjonkers.dev,https://dashboard.jorisjonkers.dev,https://rabbitmq.jorisjonkers.dev,https://status.jorisjonkers.dev
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
            # SERVICE_VERSION is baked into the image by the build pipeline
            # (Dockerfile `ARG GIT_SHA` → `ENV SERVICE_VERSION`). Do not
            # re-declare it here — a manifest env var overrides the image
            # ENV, which would put `service.version=latest` back on every
            # span and log line and hide build-to-build regressions.
            - name: OTEL_SERVICE_NAME
              value: auth-api
            # entrypoint.sh composes OTEL_RESOURCE_ATTRIBUTES from
            # SERVICE_VERSION (image-baked) and DEPLOYMENT_ENVIRONMENT
            # (above). Setting it here would shadow that — only set if
            # you need to add extra ad-hoc attributes for the entrypoint
            # to append to.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_LOGS_EXPORTER
              value: none
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            # No OTEL_TRACES_SAMPLER — fall back to the agent's
            # default (parentbased_always_on, 100% sampling). The
            # previous setting of parentbased_traceidratio + 0.1
            # dropped 90% of user traces and was masking /me, /login,
            # page-load spans behind the much louder kubelet probes;
            # PR #277 filters actuator/health out at the source so the
            # trace volume stays manageable even at 100%. If Alloy
            # ever becomes the bottleneck, prefer raising
            # OTEL_BSP_MAX_QUEUE_SIZE before reintroducing sampling.
            # Fail the OTLP POST fast if Alloy is slow/down, and drain
            # the batch every 5s instead of waiting for a full 8192-span
            # buffer. Together these cap worst-case exporter-induced
            # tail latency at ~5s rather than the default ~30s.
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: '5000'
            - name: OTEL_BSP_SCHEDULE_DELAY
              value: '5000'
            # Bumped from the default 2048 because kotlin-commons-observability's
            # ApplicationTracingAspect wraps every bean method in our
            # packages with a Micrometer observation — a single /me
            # request produces tens of spans, hundreds on busier
            # endpoints. Smaller queues drop spans under burst.
            - name: OTEL_BSP_MAX_QUEUE_SIZE
              value: '16384'
            - name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
              value: '2048'
            # Pyroscope continuous profiling. Agent ships profiles
            # (CPU + alloc + lock) to the in-cluster pyroscope server
            # via push every 10s by default. JFR format is the most
            # accurate / lowest-overhead option on modern JDKs.
            - name: PYROSCOPE_APPLICATION_NAME
              value: auth-api
            - name: PYROSCOPE_SERVER_ADDRESS
              value: http://pyroscope.observability.svc.cluster.local:4040
            - name: PYROSCOPE_FORMAT
              value: jfr
            - name: PYROSCOPE_PROFILER_EVENT
              value: cpu
            - name: PYROSCOPE_PROFILER_ALLOC
              value: '524288'
            - name: PYROSCOPE_PROFILER_LOCK
              value: 10ms
            - name: PYROSCOPE_LABELS
              value: service.name=auth-api,deployment.environment=production
          ports:
            - containerPort: 8081
              name: http
          startupProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            periodSeconds: 5
            # 600 s (120 × 5 s) window covers the worst-observed cold start
            # at request==limit==1000m + AppCDS: a fresh roll measured
            # "Started AuthApi" at 208 s with the container's overall
            # process-running time hitting 302 s, so the previous 300 s
            # budget killed the pod ~2 s before Spring Boot finished.
            # auth-api carries OAuth2 server + the full Spring Security
            # filter chain, so it's slower to wire than assistant-api
            # (which Started at 156 s under the same conditions). 600 s
            # leaves comfortable margin without changing the steady-state
            # liveness budget below.
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            timeoutSeconds: 5
          resources:
            # CPU request sized to measured steady state (~60m) + headroom,
            # not the cold-start peak. The old request==limit==1000m
            # reserved a full core while the pod idles at ~60m — that
            # reservation is what kept Frankfurt's budget "full" and starved
            # the scheduler. The cold-start CPU need is transient and the
            # node has abundant real CPU, so the limit is raised to 2000m
            # to let class loading burst higher (faster cold start) while
            # the 400m request frees the reservation. Under genuine node
            # contention CFS throttles toward the request; steady-state
            # usage makes that moot.
            requests:
              cpu: 400m
              memory: 2Gi
            limits:
              cpu: 2000m
              # 4Gi (was 3Gi) to cover the transient cold-start memory
              # peak. Measured steady state is ~1 GiB, but during JVM
              # warmup the ~1.65 GiB heap (MaxRAMPercentage=55) plus the
              # native footprint of the two javaagents — OTel + Pyroscope
              # (continuous CPU + alloc profiling) — plus JIT scratch and
              # metaspace briefly crossed 3 GiB and the kernel OOMKilled
              # the container (exit 137) before it reached Ready. The
              # request stays 2Gi, so this adds no scheduling reservation;
              # the node has ample free memory for the transient peak.
              memory: 4Gi
          volumeMounts:
            - name: pyroscope-agent
              mountPath: /pyroscope
              readOnly: true
      volumes:
        - name: pyroscope-agent
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api
  namespace: auth-system
spec:
  selector:
    app.kubernetes.io/name: auth-api
  ports:
    - name: http
      port: 8081
      targetPort: http
