apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: auth-api
  namespace: auth-system
  labels:
    release: metrics-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-api
  endpoints:
    - port: http
      path: /api/actuator/prometheus
      interval: 30s
      scheme: http
