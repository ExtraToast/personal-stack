# VSO mints its kube-auth JWT against a `vault-secrets-operator`
# ServiceAccount in the secret's own namespace. assistant-system owns
# the github-app VaultStaticSecret, so it needs this SA (and a matching
# entry in the vso role's bound_service_account_namespaces — see
# data/vault/bootstrap-auth.sh). VsoCoverageTest enforces both.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-secrets-operator
  namespace: assistant-system
