apiVersion: v1
kind: ServiceAccount
metadata:
  name: assistant-api
  namespace: assistant-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant-api
  namespace: assistant-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: assistant-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: assistant-api
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: assistant-api
        vault.hashicorp.com/agent-inject-secret-assistant-api.env: rabbitmq/creds/app-consumer
        vault.hashicorp.com/agent-inject-template-assistant-api.env: |
          {{ with secret "rabbitmq/creds/app-consumer" }}
          SPRING_RABBITMQ_USERNAME={{ .Data.username }}
          SPRING_RABBITMQ_PASSWORD={{ .Data.password }}
          {{ end }}
    spec:
      serviceAccountName: assistant-api
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        - name: assistant-api
          image: ghcr.io/extratoast/personal-stack/assistant-api:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
            - |
              export SPRING_CLOUD_VAULT_TOKEN="$(cat /vault/secrets/token)"
              set -a
              . /vault/secrets/assistant-api.env
              set +a
              exec java -javaagent:/app/otel-javaagent.jar -jar /app/app.jar
          env:
            - name: SERVER_PORT
              value: '8082'
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_CONFIG_IMPORT
              value: vault://
            - name: VAULT_ENABLED
              value: 'true'
            - name: VAULT_ADDR
              value: http://vault.data-system.svc.cluster.local:8200
            - name: VAULT_DB_ENABLED
              value: 'true'
            - name: DB_HOST
              value: postgres.data-system.svc.cluster.local
            - name: DB_PORT
              value: '5432'
            - name: VALKEY_HOST
              value: valkey.data-system.svc.cluster.local
            - name: VALKEY_PORT
              value: '6379'
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq.data-system.svc.cluster.local
            - name: SPRING_RABBITMQ_PORT
              value: '5672'
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
            - name: SERVICE_VERSION
              value: latest
            - name: OTEL_SERVICE_NAME
              value: assistant-api
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=production,service.version=latest
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_LOGS_EXPORTER
              value: none
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_TRACES_EXPORTER
              value: otlp
          ports:
            - containerPort: 8082
              name: http
          readinessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
          resources:
            requests:
              cpu: 600m
              memory: 1536Mi
            limits:
              cpu: 1200m
              memory: 2304Mi
---
apiVersion: v1
kind: Service
metadata:
  name: assistant-api
  namespace: assistant-system
spec:
  selector:
    app.kubernetes.io/name: assistant-api
  ports:
    - name: http
      port: 8082
      targetPort: http
