apiVersion: v1
kind: ServiceAccount
metadata:
  name: assistant-api
  namespace: assistant-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant-api
  namespace: assistant-system
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  # Two replicas + maxUnavailable=1 + maxSurge=0 — see auth-api's
  # deployment.yaml for the full rationale. Frankfurt CPU is tight
  # so the spare may sit Pending until capacity is available, but
  # the Deployment is Available with 1 of 2 (maxUnavailable=1) and
  # rollouts replace one at a time so a new image cutover never
  # leaves zero pods serving.
  replicas: 1
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: assistant-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: assistant-api
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: assistant-api
        vault.hashicorp.com/agent-inject-secret-assistant-api.env: rabbitmq/creds/app-consumer
        vault.hashicorp.com/agent-inject-template-assistant-api.env: |
          {{ with secret "rabbitmq/creds/app-consumer" }}
          SPRING_RABBITMQ_USERNAME={{ .Data.username }}
          SPRING_RABBITMQ_PASSWORD={{ .Data.password }}
          {{ end }}
    spec:
      serviceAccountName: assistant-api
      priorityClassName: platform-critical-app
      nodeSelector:
        personal-stack/site: frankfurt
      initContainers:
        - name: download-pyroscope-agent
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -ec
            - |
              curl -fsSL -o /agent/pyroscope.jar \
                https://github.com/grafana/pyroscope-java/releases/download/v0.16.0/pyroscope.jar
          volumeMounts:
            - name: pyroscope-agent
              mountPath: /agent
      containers:
        - name: assistant-api
          image: ghcr.io/extratoast/personal-stack/assistant-api:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
            - |
              export SPRING_CLOUD_VAULT_TOKEN="$(cat /vault/secrets/token)"
              set -a
              . /vault/secrets/assistant-api.env
              set +a
              # See auth-api deployment.yaml for the rationale behind these
              # JVM flags (MaxRAMPercentage for cgroup-aware heap sizing,
              # ZGC for sub-ms pauses). AppCDS args were dropped together
              # with the image switch to BellSoft Liberica CRaC; CRaC
              # restore (next PR in the stack) supersedes AppCDS.
              exec java \
                -XX:+UseZGC \
                -XX:MaxRAMPercentage=75 \
                -javaagent:/app/otel-javaagent.jar \
                -javaagent:/pyroscope/pyroscope.jar \
                -jar /app/app.jar
          env:
            - name: SERVER_PORT
              value: '8082'
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_CONFIG_IMPORT
              value: vault://
            - name: VAULT_ENABLED
              value: 'true'
            - name: VAULT_ADDR
              value: http://vault.data-system.svc.cluster.local:8200
            - name: VAULT_DB_ENABLED
              value: 'true'
            - name: DB_HOST
              value: postgres.data-system.svc.cluster.local
            - name: DB_PORT
              value: '5432'
            - name: VALKEY_HOST
              value: valkey.data-system.svc.cluster.local
            - name: VALKEY_PORT
              value: '6379'
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq.data-system.svc.cluster.local
            - name: SPRING_RABBITMQ_PORT
              value: '5672'
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
            # SERVICE_VERSION is baked into the image by the build pipeline.
            # See auth-api deployment.yaml for the rationale.
            - name: OTEL_SERVICE_NAME
              value: assistant-api
            # entrypoint.sh composes OTEL_RESOURCE_ATTRIBUTES from
            # SERVICE_VERSION + DEPLOYMENT_ENVIRONMENT at container start.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_LOGS_EXPORTER
              value: none
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            # See auth-api deployment.yaml for the rationale behind
            # these OTel tunings (agent-default sampling, 5s exporter
            # timeout + batch schedule, bounded queue).
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: '5000'
            - name: OTEL_BSP_SCHEDULE_DELAY
              value: '5000'
            # See auth-api deployment.yaml — same rationale.
            - name: OTEL_BSP_MAX_QUEUE_SIZE
              value: '16384'
            - name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
              value: '2048'
            - name: PYROSCOPE_APPLICATION_NAME
              value: assistant-api
            - name: PYROSCOPE_SERVER_ADDRESS
              value: http://pyroscope.observability.svc.cluster.local:4040
            - name: PYROSCOPE_FORMAT
              value: jfr
            - name: PYROSCOPE_PROFILER_EVENT
              value: cpu
            - name: PYROSCOPE_PROFILER_ALLOC
              value: '524288'
            - name: PYROSCOPE_PROFILER_LOCK
              value: 10ms
            - name: PYROSCOPE_LABELS
              value: service.name=assistant-api,deployment.environment=production
            # Agent runtime — per-workspace runner Pod orchestration.
            # All values live in application.yml's defaults; overrides
            # here cover environment specifics (site selector, image
            # tag pinning if needed).
            - name: AGENT_RUNTIME_NAMESPACE
              value: agents-system
            - name: AGENT_RUNTIME_IMAGE
              value: ghcr.io/extratoast/personal-stack/agent-runner:latest
            # Runner Pods must co-locate with the credential PVCs.
            - name: AGENT_RUNTIME_NODE
              value: enschede-gtx-960m-1
          ports:
            - containerPort: 8082
              name: http
          startupProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            periodSeconds: 5
            # 600 s (120 × 5 s) window matches auth-api's PR #250 — the 300 s
            # budget had no margin for cold-start variance and got crossed
            # the moment a rebuild forced the second replica to roll, sending
            # the pod into an exit-137 / restart loop. Cold start under
            # AppCDS at 1000m typically lands around 150–200 s, so 600 s is
            # ample headroom without altering the steady-state liveness
            # budget below.
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            timeoutSeconds: 5
          resources:
            # request == cpu limit; see auth-api deployment.yaml for the
            # rationale (eliminates CFS throttling during JVM class load).
            # Lower than auth-api's 1500m because steady-state usage is
            # ~100m and assistant-api isn't on the cluster's forward-auth
            # critical path. Set to 1000m (down from 1200m) after 750m
            # was found to push Spring/Flyway startup past the 300s
            # startupProbe window, killing the pod mid-roll. 1000m keeps
            # cold start under ~3 min while still saving ~400m × 2 of
            # Frankfurt CPU headroom for safe auth-api rollouts.
            requests:
              cpu: 1000m
              memory: 1792Mi
            limits:
              cpu: 1000m
              memory: 2304Mi
          volumeMounts:
            - name: pyroscope-agent
              mountPath: /pyroscope
              readOnly: true
      volumes:
        - name: pyroscope-agent
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: assistant-api
  namespace: assistant-system
spec:
  selector:
    app.kubernetes.io/name: assistant-api
  ports:
    - name: http
      port: 8082
      targetPort: http
