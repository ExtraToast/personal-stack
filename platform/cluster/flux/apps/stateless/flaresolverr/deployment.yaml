apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: utility-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flaresolverr
    spec:
      nodeSelector:
        personal-stack/site: enschede
      containers:
        - name: flaresolverr
          # Upstream resumed active development (v3.5.0, 2026-05; now
          # resolves Turnstile captchas) after the 21hsmw/:nodriver fork
          # went stale at 2025-03. Track upstream :latest and always
          # re-pull so restarts pick up new builds without a manifest bump.
          image: flaresolverr/flaresolverr:latest
          imagePullPolicy: Always
          env:
            - name: LOG_LEVEL
              value: info
            - name: TZ
              value: Europe/Amsterdam
          ports:
            - containerPort: 8191
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: utility-system
spec:
  selector:
    app.kubernetes.io/name: flaresolverr
  ports:
    - name: http
      port: 8191
      targetPort: http
