apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-secrets-operator
  namespace: automation-system
---
# Dynamic Postgres creds for n8n. Writing the agent-inject env file
# and sourcing it at container start left n8n holding a stale
# username/password after Vault rotated the lease at max_ttl; new
# connections then failed with "password authentication failed for
# user v-kubernet-n8n-...". VSO rotates the Secret AND rolls the
# Deployment, so n8n re-reads fresh creds on every rotation.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: n8n-db
  namespace: automation-system
spec:
  vaultAuthRef: vso-system/default
  mount: database
  path: creds/n8n
  destination:
    name: n8n-db
    create: true
    transformation:
      templates:
        DB_POSTGRESDB_USER:
          text: '{{- get .Secrets "username" -}}'
        DB_POSTGRESDB_PASSWORD:
          text: '{{- get .Secrets "password" -}}'
  rolloutRestartTargets:
    - kind: Deployment
      name: n8n
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: n8n-app
  namespace: automation-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: platform/automation
  destination:
    name: n8n-app
    create: true
    transformation:
      templates:
        OIDC_CLIENT_SECRET:
          text: '{{- get .Secrets "n8n.oauth_client_secret" -}}'
        N8N_ENCRYPTION_KEY:
          text: '{{- get .Secrets "n8n.encryption_key" -}}'
  refreshAfter: 1h
  rolloutRestartTargets:
    - kind: Deployment
      name: n8n
