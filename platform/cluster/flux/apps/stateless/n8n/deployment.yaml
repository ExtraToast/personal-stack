apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n
  namespace: automation-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: automation-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: automation-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/role: n8n
        vault.hashicorp.com/agent-inject-secret-n8n.env: secret/data/platform/automation
        vault.hashicorp.com/agent-inject-template-n8n.env: |
          {{ with secret "database/creds/n8n" }}
          DB_POSTGRESDB_USER={{ .Data.username }}
          DB_POSTGRESDB_PASSWORD={{ .Data.password }}
          {{ end }}
          OIDC_CLIENT_SECRET={{ with secret "secret/data/platform/automation" }}{{ index .Data.data "n8n.oauth_client_secret" }}{{ end }}
          N8N_ENCRYPTION_KEY={{ with secret "secret/data/platform/automation" }}{{ index .Data.data "n8n.encryption_key" }}{{ end }}
    spec:
      serviceAccountName: n8n
      # Kubernetes auto-injects env vars for every Service in the pod's
      # namespace (service NAME_PORT=tcp://ip:port). With a Service also
      # named "n8n", that sets N8N_PORT=tcp://..., which n8n parses as the
      # HTTP port and crashes with "Invalid number value for N8N_PORT".
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        - name: n8n
          image: n8nio/n8n:2.13.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              export SPRING_CLOUD_VAULT_TOKEN="$(cat /vault/secrets/token)"
              set -a
              . /vault/secrets/n8n.env
              set +a
              exec n8n start
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres.data-system.svc.cluster.local
            - name: DB_POSTGRESDB_PORT
              value: '5432'
            - name: DB_POSTGRESDB_DATABASE
              value: n8n_db
            - name: N8N_PROTOCOL
              value: https
            - name: N8N_HOST
              value: n8n.jorisjonkers.dev
            - name: N8N_EDITOR_BASE_URL
              value: https://n8n.jorisjonkers.dev
            - name: N8N_TRUST_PROXY
              value: 'true'
            - name: WEBHOOK_URL
              value: https://n8n.jorisjonkers.dev/
            - name: EXTERNAL_HOOK_FILES
              value: /data/n8n/hooks.js
            - name: EXTERNAL_FRONTEND_HOOKS_URLS
              value: /assets/oidc-frontend-hook.js
            - name: N8N_ADDITIONAL_NON_UI_ROUTES
              value: auth
            - name: OIDC_ISSUER_URL
              value: https://auth.jorisjonkers.dev
            - name: OIDC_CLIENT_ID
              value: n8n
            - name: OIDC_REDIRECT_URI
              value: https://n8n.jorisjonkers.dev/auth/oidc/callback
            - name: OIDC_SCOPES
              value: openid email profile
          ports:
            - containerPort: 5678
              name: http
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            # Tolerate transient Postgres outages without SIGKILLing
            # n8n. /healthz returns 503 "Database is not ready!" for
            # the ~15 s window while Postgres rolls; the default
            # liveness (failureThreshold=3, period=10 → 30 s) used
            # to kill n8n during every blip and take every in-flight
            # webhook + cron down with it. 15 s period × 10 failures
            # = 150 s of DB-down tolerance. Readiness is untouched
            # so Traefik still yanks the pod out of rotation
            # immediately — we just stop the pod from being killed.
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            - name: n8n-hooks
              mountPath: /data/n8n/hooks.js
              subPath: hooks.js
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data
        - name: n8n-hooks
          configMap:
            name: n8n-hooks
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: automation-system
spec:
  selector:
    app.kubernetes.io/name: n8n
  ports:
    - name: http
      port: 5678
      targetPort: http
