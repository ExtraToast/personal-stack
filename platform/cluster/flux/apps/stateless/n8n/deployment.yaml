apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n
  namespace: automation-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: automation-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: automation-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
    spec:
      serviceAccountName: n8n
      # Kubernetes auto-injects env vars for every Service in the pod's
      # namespace (service NAME_PORT=tcp://ip:port). With a Service also
      # named "n8n", that sets N8N_PORT=tcp://..., which n8n parses as the
      # HTTP port and crashes with "Invalid number value for N8N_PORT".
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      # The `n8n-data` PVC uses the cluster's default local-path
      # provisioner, so the underlying PV pins to whichever node first
      # bound it (frankfurt-contabo-1 — see
      # `kubectl get pv $(kubectl get pvc -n automation-system n8n-data \
      #   -o jsonpath='{.spec.volumeName}') -o jsonpath='{.spec.nodeAffinity}'`).
      # Pinning the pod to that same node is what keeps RWO scheduling
      # honest. An earlier attempt set `kubernetes.io/arch: arm64` to
      # move n8n onto a Pi, but the PV stayed on Frankfurt; rolling
      # updates then got stuck in Pending with
      # "didn't match PersistentVolume's node affinity" while the
      # previous pod kept running on stale dynamic DB credentials,
      # producing `password authentication failed for user
      # v-kubernet-n8n-...` on every Vault rotation. Cross-site Pi
      # migration needs explicit PV data migration first; pin to the
      # bound node until then.
      nodeSelector:
        kubernetes.io/hostname: frankfurt-contabo-1
      containers:
        - name: n8n
          image: n8nio/n8n:2.13.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: n8n-db
            - secretRef:
                name: n8n-app
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres.data-system.svc.cluster.local
            - name: DB_POSTGRESDB_PORT
              value: '5432'
            - name: DB_POSTGRESDB_DATABASE
              value: n8n_db
            - name: N8N_PROTOCOL
              value: https
            - name: N8N_HOST
              value: n8n.jorisjonkers.dev
            - name: N8N_EDITOR_BASE_URL
              value: https://n8n.jorisjonkers.dev
            - name: N8N_TRUST_PROXY
              value: 'true'
            - name: WEBHOOK_URL
              value: https://n8n.jorisjonkers.dev/
            - name: EXTERNAL_HOOK_FILES
              value: /data/n8n/hooks.js
            - name: EXTERNAL_FRONTEND_HOOKS_URLS
              value: /assets/oidc-frontend-hook.js
            - name: N8N_ADDITIONAL_NON_UI_ROUTES
              value: auth
            - name: OIDC_ISSUER_URL
              value: https://auth.jorisjonkers.dev
            - name: OIDC_CLIENT_ID
              value: n8n
            - name: OIDC_REDIRECT_URI
              value: https://n8n.jorisjonkers.dev/auth/oidc/callback
            - name: OIDC_SCOPES
              value: openid email profile
            # Expose Prometheus metrics on /metrics (same :5678 port).
            # Captures workflow execution counts, success/failure ratios,
            # active executions, queue depth, plus default Node.js
            # process metrics.
            - name: N8N_METRICS
              value: 'true'
            - name: N8N_METRICS_INCLUDE_DEFAULT_METRICS
              value: 'true'
            - name: N8N_METRICS_INCLUDE_API_ENDPOINTS
              value: 'true'
            - name: N8N_METRICS_INCLUDE_QUEUE_METRICS
              value: 'true'
            - name: N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL
              value: 'true'
            # OpenTelemetry tracing — n8n emits two span kinds:
            # workflow.execute (one per workflow run with id, name, mode,
            # status, error type) and node.execute (one per node, nested
            # under its workflow span, with node id/name/type/version and
            # input/output item counts). Endpoint points at the Alloy
            # DaemonSet's Service OTLP receiver — base URL, no /v1/traces
            # suffix (n8n appends it). Sampling=1.0 to match the rest of
            # the stack on this low-traffic homelab.
            - name: N8N_OTEL_ENABLED
              value: 'true'
            - name: N8N_OTEL_SERVICE_NAME
              value: n8n
            - name: N8N_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4318
            - name: N8N_OTEL_TRACES_SAMPLE_RATE
              value: '1.0'
            - name: N8N_OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=production
          ports:
            - containerPort: 5678
              name: http
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            # Tolerate transient Postgres outages without SIGKILLing
            # n8n. /healthz returns 503 "Database is not ready!" for
            # the ~15 s window while Postgres rolls; the default
            # liveness (failureThreshold=3, period=10 → 30 s) used
            # to kill n8n during every blip and take every in-flight
            # webhook + cron down with it. 15 s period × 10 failures
            # = 150 s of DB-down tolerance. Readiness is untouched
            # so Traefik still yanks the pod out of rotation
            # immediately — we just stop the pod from being killed.
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            - name: n8n-hooks
              mountPath: /data/n8n/hooks.js
              subPath: hooks.js
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data
        - name: n8n-hooks
          configMap:
            name: n8n-hooks
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: automation-system
spec:
  selector:
    app.kubernetes.io/name: n8n
  ports:
    - name: http
      port: 5678
      targetPort: http
