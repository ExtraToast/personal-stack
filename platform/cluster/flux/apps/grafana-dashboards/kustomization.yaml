apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Grafana custom resources (Grafana, GrafanaFolder, GrafanaDashboard)
# managed by grafana-operator. Lives in its own Flux Kustomization
# (apps-grafana-dashboards) so it can dependsOn apps-observability —
# the operator's CRDs ship with that HelmRelease and need to exist
# before these CRs can be applied.
resources:
  - grafana-instance.yaml
  - folders.yaml
  - dashboards
