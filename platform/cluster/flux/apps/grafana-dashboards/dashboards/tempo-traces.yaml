apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: tempo-traces
  namespace: observability
spec:
  folder: 'Traces'
  resyncPeriod: 24h
  instanceSelector: { matchLabels: { dashboards: grafana } }
  json: |
    {"uid":"tempo-traces","title":"Tempo / Traces","tags":["tempo","traces","opentelemetry"],"timezone":"browser","editable":false,"refresh":"30s","time":{"from":"now-1h","to":"now"},"templating":{"list":[{"name":"service","type":"query","datasource":{"type":"tempo","uid":"tempo"},"query":{"type":"3","refId":"ServiceName"},"allValue":".*","includeAll":true,"multi":true,"refresh":2,"sort":1,"current":{"text":"All","value":"$__all"}},{"name":"min_duration","type":"custom","query":"0s,10ms,50ms,100ms,500ms,1s,5s","current":{"text":"0s","value":"0s"},"label":"Min Duration"}],"hide":0},"panels":[{"id":1,"title":"Trace Search (actuator + health excluded)","type":"traces","gridPos":{"h":12,"w":24,"x":0,"y":0},"description":"User-facing traces only — span name matching /actuator or /api/v1/health is dropped at the Tempo query so kubelet/gatus/Prometheus noise does not bury real requests.","targets":[{"datasource":{"type":"tempo","uid":"tempo"},"queryType":"traceqlSearch","query":"{resource.service.name=~\"${service:regex}\" && duration > $min_duration && span.http.route !~ \"/actuator.*|/api/actuator.*|/api/v1/health\" && name !~ \"(GET|HEAD) /actuator.*|(GET|HEAD) /api/actuator.*|(GET|HEAD) /api/v1/health\"}","limit":50}],"datasource":{"type":"tempo","uid":"tempo"}},{"id":2,"title":"Service Graph","type":"nodeGraph","gridPos":{"h":10,"w":24,"x":0,"y":12},"targets":[{"datasource":{"type":"tempo","uid":"tempo"},"queryType":"serviceMap"}],"datasource":{"type":"tempo","uid":"tempo"}},{"id":3,"title":"Span Rate by Service","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":22},"targets":[{"expr":"sum by(service_name)(rate(traces_spanmetrics_calls_total{service_name=~\"${service:regex}\"}[5m]))","legendFormat":"{{service_name}}"}],"fieldConfig":{"defaults":{"unit":"ops","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":4,"title":"Span Duration P95 by Service","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":22},"targets":[{"expr":"histogram_quantile(0.95, sum by(le, service_name)(rate(traces_spanmetrics_latency_bucket{service_name=~\"${service:regex}\"}[5m])))","legendFormat":"{{service_name}} p95"}],"fieldConfig":{"defaults":{"unit":"s","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":8,"title":"Top Spans by Rate","type":"timeseries","gridPos":{"h":8,"w":24,"x":0,"y":30},"description":"Per-operation span rate (top 15). Shows EVERY operation including actuator endpoints so you can spot what is dominating traffic before excluding it from the Trace Search panel above.","targets":[{"expr":"topk(15, sum by(service_name, span_name)(rate(traces_spanmetrics_calls_total{service_name=~\"${service:regex}\"}[5m])))","legendFormat":"{{service_name}} {{span_name}}"}],"fieldConfig":{"defaults":{"unit":"ops","custom":{"drawStyle":"line","fillOpacity":5,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":5,"title":"Error Spans","type":"traces","gridPos":{"h":10,"w":24,"x":0,"y":38},"targets":[{"datasource":{"type":"tempo","uid":"tempo"},"queryType":"traceqlSearch","query":"{resource.service.name=~\"${service:regex}\" && status = error}","limit":20}],"datasource":{"type":"tempo","uid":"tempo"}},{"id":6,"title":"Span Error Rate by Service","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":48},"targets":[{"expr":"sum by(service_name)(rate(traces_spanmetrics_calls_total{service_name=~\"${service:regex}\", status_code=\"STATUS_CODE_ERROR\"}[5m]))","legendFormat":"{{service_name}} errors"}],"fieldConfig":{"defaults":{"unit":"ops","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2},"color":{"fixedColor":"red","mode":"fixed"}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":7,"title":"Span Duration P50 / P95 / P99","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":48},"targets":[{"expr":"histogram_quantile(0.50, sum by(le)(rate(traces_spanmetrics_latency_bucket{service_name=~\"${service:regex}\"}[5m])))","legendFormat":"p50"},{"expr":"histogram_quantile(0.95, sum by(le)(rate(traces_spanmetrics_latency_bucket{service_name=~\"${service:regex}\"}[5m])))","legendFormat":"p95"},{"expr":"histogram_quantile(0.99, sum by(le)(rate(traces_spanmetrics_latency_bucket{service_name=~\"${service:regex}\"}[5m])))","legendFormat":"p99"}],"fieldConfig":{"defaults":{"unit":"s","custom":{"drawStyle":"line","fillOpacity":5,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}}],"schemaVersion":39}
