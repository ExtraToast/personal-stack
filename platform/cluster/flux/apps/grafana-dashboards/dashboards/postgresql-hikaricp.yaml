apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: postgresql-hikaricp
  namespace: observability
spec:
  folder: 'Data Tier'
  resyncPeriod: 24h
  instanceSelector: { matchLabels: { dashboards: grafana } }
  json: |
    {"uid":"postgresql-hikaricp","title":"PostgreSQL / HikariCP","tags":["database","postgresql","hikari"],"timezone":"browser","editable":false,"refresh":"30s","time":{"from":"now-1h","to":"now"},"templating":{"list":[{"name":"job","type":"query","datasource":{"type":"prometheus","uid":"prometheus"},"query":"label_values(hikaricp_connections, job)","includeAll":true,"multi":true,"current":{"text":"All","value":"$__all"},"refresh":2},{"name":"pool","type":"query","datasource":{"type":"prometheus","uid":"prometheus"},"query":"label_values(hikaricp_connections{job=~\"$job\"}, pool)","includeAll":true,"multi":true,"current":{"text":"All","value":"$__all"},"refresh":2}]},"panels":[{"id":1,"title":"Active Connections","type":"timeseries","gridPos":{"h":8,"w":8,"x":0,"y":0},"targets":[{"expr":"hikaricp_connections_active{job=~\"$job\", pool=~\"$pool\"}","legendFormat":"{{job}} active"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","fillOpacity":20,"lineWidth":2},"thresholds":{"steps":[{"color":"green","value":null},{"color":"red","value":8}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":2,"title":"Idle Connections","type":"timeseries","gridPos":{"h":8,"w":8,"x":8,"y":0},"targets":[{"expr":"hikaricp_connections_idle{job=~\"$job\", pool=~\"$pool\"}","legendFormat":"{{job}} idle"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","fillOpacity":20,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":3,"title":"Total / Max / Min Connections","type":"timeseries","gridPos":{"h":8,"w":8,"x":16,"y":0},"targets":[{"expr":"hikaricp_connections{job=~\"$job\", pool=~\"$pool\"}","legendFormat":"{{job}} total"},{"expr":"hikaricp_connections_max{job=~\"$job\", pool=~\"$pool\"}","legendFormat":"{{job}} max"},{"expr":"hikaricp_connections_min{job=~\"$job\", pool=~\"$pool\"}","legendFormat":"{{job}} min"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":4,"title":"Pending Connections","type":"timeseries","gridPos":{"h":8,"w":8,"x":0,"y":8},"targets":[{"expr":"hikaricp_connections_pending{job=~\"$job\", pool=~\"$pool\"}","legendFormat":"{{job}} pending"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","fillOpacity":20,"lineWidth":2},"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":1},{"color":"red","value":5}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":5,"title":"Pool Utilization %","type":"gauge","gridPos":{"h":8,"w":8,"x":8,"y":8},"targets":[{"expr":"hikaricp_connections_active{job=~\"$job\", pool=~\"$pool\"} / hikaricp_connections_max{job=~\"$job\", pool=~\"$pool\"} * 100","legendFormat":"{{job}}"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":60},{"color":"red","value":85}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":6,"title":"Connection Timeouts","type":"timeseries","gridPos":{"h":8,"w":8,"x":16,"y":8},"targets":[{"expr":"rate(hikaricp_connections_timeout_total{job=~\"$job\", pool=~\"$pool\"}[5m])","legendFormat":"{{job}} timeouts/s"}],"fieldConfig":{"defaults":{"unit":"ops","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2},"color":{"fixedColor":"red","mode":"fixed"}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":7,"title":"Connection Acquire Time (P95)","type":"timeseries","gridPos":{"h":8,"w":8,"x":0,"y":16},"targets":[{"expr":"histogram_quantile(0.95, sum by(job, le)(rate(hikaricp_connections_acquire_seconds_bucket{job=~\"$job\", pool=~\"$pool\"}[5m])))","legendFormat":"{{job}} p95"}],"fieldConfig":{"defaults":{"unit":"s","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":8,"title":"Connection Creation Time (P95)","type":"timeseries","gridPos":{"h":8,"w":8,"x":8,"y":16},"targets":[{"expr":"histogram_quantile(0.95, sum by(job, le)(rate(hikaricp_connections_creation_seconds_bucket{job=~\"$job\", pool=~\"$pool\"}[5m])))","legendFormat":"{{job}} p95"}],"fieldConfig":{"defaults":{"unit":"s","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":9,"title":"Connection Usage Time (P95)","type":"timeseries","gridPos":{"h":8,"w":8,"x":16,"y":16},"targets":[{"expr":"histogram_quantile(0.95, sum by(job, le)(rate(hikaricp_connections_usage_seconds_bucket{job=~\"$job\", pool=~\"$pool\"}[5m])))","legendFormat":"{{job}} p95"}],"fieldConfig":{"defaults":{"unit":"s","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}}],"schemaVersion":39}
