apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: assistant-api
  namespace: observability
spec:
  folder: 'Services'
  resyncPeriod: 24h
  instanceSelector: { matchLabels: { dashboards: grafana } }
  # assistant-api per-feature overview. Previously every query used
  # `job="assistant-api"` which never matched anything (the
  # ServiceMonitor's scrape job is `assistant-api-actuator`). Switched
  # to `application="assistant-api"` which is the Spring Boot common
  # tag exposed by every Micrometer-Prometheus metric.
  #
  # The first panel is a link to the per-endpoint investigation
  # dashboard for drill-down into individual slow requests.
  json: |
    {
      "uid": "assistant-api",
      "title": "Assistant API",
      "tags": ["assistant", "spring-boot"],
      "timezone": "browser",
      "editable": false,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "schemaVersion": 39,
      "templating": { "list": [] },
      "panels": [
        { "id": 100, "type": "text", "title": "Investigating a slow request?",
          "gridPos": {"h":3,"w":24,"x":0,"y":0},
          "options": {
            "mode": "markdown",
            "content": "This dashboard is the per-feature traffic overview. **To drill into one slow request and see its full span tree, logs, metrics, and profile**, open the [Spring Service — Endpoint Investigation](/d/spring-service-endpoints) dashboard, pick `assistant-api` as the service, and click an exemplar dot on the latency heatmap."
          }
        },
        { "id": 1, "title": "Request rate by URI", "type": "timeseries",
          "gridPos": {"h":8,"w":12,"x":0,"y":3},
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum by(uri)(rate(http_server_requests_seconds_count{application=\"assistant-api\"}[5m]))", "legendFormat": "{{uri}}" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        { "id": 2, "title": "Latency p50 / p95 / p99", "type": "timeseries",
          "gridPos": {"h":8,"w":12,"x":12,"y":3},
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "histogram_quantile(0.50, sum by(le)(rate(http_server_requests_seconds_bucket{application=\"assistant-api\"}[5m])))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum by(le)(rate(http_server_requests_seconds_bucket{application=\"assistant-api\"}[5m])))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum by(le)(rate(http_server_requests_seconds_bucket{application=\"assistant-api\"}[5m])))", "legendFormat": "p99" }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        { "id": 3, "title": "Error rate (5xx) by URI", "type": "timeseries",
          "gridPos": {"h":8,"w":12,"x":0,"y":11},
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum by(uri)(rate(http_server_requests_seconds_count{application=\"assistant-api\", status=~\"5..\"}[5m]))", "legendFormat": "{{uri}}" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        { "id": 4, "title": "Status code mix", "type": "piechart",
          "gridPos": {"h":8,"w":12,"x":12,"y":11},
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum by(status)(rate(http_server_requests_seconds_count{application=\"assistant-api\"}[5m]))", "legendFormat": "{{status}}" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        { "id": 5, "title": "Slowest URIs by p95", "type": "table",
          "gridPos": {"h":8,"w":24,"x":0,"y":19},
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "topk(10, histogram_quantile(0.95, sum by(uri, le)(rate(http_server_requests_seconds_bucket{application=\"assistant-api\"}[5m]))))", "format": "table", "instant": true }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        { "id": 6, "title": "Log volume by level", "type": "timeseries",
          "gridPos": {"h":8,"w":12,"x":0,"y":27},
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum by(level)(rate(logback_events_total{application=\"assistant-api\"}[5m]))", "legendFormat": "{{level}}" }],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        { "id": 7, "title": "Recent errors", "type": "logs",
          "gridPos": {"h":10,"w":12,"x":12,"y":27},
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{service_name=\"assistant-api\"} | json | level=~\"ERROR|error\"" }],
          "options": { "showTime": true, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" }
        }
      ]
    }
