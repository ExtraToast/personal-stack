apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: service-overview
  namespace: observability
spec:
  folder: 'Overview'
  resyncPeriod: 24h
  instanceSelector: { matchLabels: { dashboards: grafana } }
  json: |
    {"uid":"service-overview","title":"Service Overview","schemaVersion":39,"version":1,"refresh":"30s","time":{"from":"now-1h","to":"now"},"templating":{"list":[{"name":"service","type":"query","datasource":{"type":"prometheus","uid":"prometheus"},"query":{"query":"label_values(traces_spanmetrics_calls_total, service_name)","refId":"service"},"includeAll":true,"multi":true,"current":{"selected":true,"text":"All","value":"$__all"}}]},"panels":[{"type":"row","title":"Golden Signals (Tempo span metrics)","gridPos":{"h":1,"w":24,"x":0,"y":0},"collapsed":false},{"type":"timeseries","title":"Request rate (per service)","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":8,"x":0,"y":1},"targets":[{"expr":"sum by (service_name) (rate(traces_spanmetrics_calls_total{service_name=~\"$service\"}[5m]))","legendFormat":"{{service_name}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"reqps"}}},{"type":"timeseries","title":"Error rate (5xx / failed spans)","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":8,"x":8,"y":1},"targets":[{"expr":"sum by (service_name) (rate(traces_spanmetrics_calls_total{service_name=~\"$service\",status_code=\"STATUS_CODE_ERROR\"}[5m])) / sum by (service_name) (rate(traces_spanmetrics_calls_total{service_name=~\"$service\"}[5m]))","legendFormat":"{{service_name}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percentunit","min":0,"max":1}}},{"type":"timeseries","title":"p95 latency","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":8,"x":16,"y":1},"targets":[{"expr":"histogram_quantile(0.95, sum by (le, service_name) (rate(traces_spanmetrics_latency_bucket{service_name=~\"$service\"}[5m])))","legendFormat":"{{service_name}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"s"}}},{"type":"row","title":"Edge (Traefik)","gridPos":{"h":1,"w":24,"x":0,"y":9},"collapsed":false},{"type":"timeseries","title":"Traefik requests by status class","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":0,"y":10},"targets":[{"expr":"sum by (code) (label_replace(rate(traefik_service_requests_total[5m]), \"code\", \"${1}xx\", \"code\", \"^([0-9])..$\"))","legendFormat":"{{code}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"reqps"}}},{"type":"timeseries","title":"Traefik p95 latency by host","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":12,"y":10},"targets":[{"expr":"histogram_quantile(0.95, sum by (le, service) (rate(traefik_service_request_duration_seconds_bucket[5m])))","legendFormat":"{{service}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"s"}}},{"type":"row","title":"Saturation","gridPos":{"h":1,"w":24,"x":0,"y":18},"collapsed":false},{"type":"timeseries","title":"Pod CPU (workloads)","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":0,"y":19},"targets":[{"expr":"sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{container!=\"\",image!=\"\"}[5m]))","legendFormat":"{{namespace}}/{{pod}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"none"}}},{"type":"timeseries","title":"Pod memory (workloads)","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":12,"y":19},"targets":[{"expr":"sum by (namespace, pod) (container_memory_working_set_bytes{container!=\"\",image!=\"\"})","legendFormat":"{{namespace}}/{{pod}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"bytes"}}}]}
