apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-jorisjonkers-dev
  namespace: edge-system
spec:
  secretName: jorisjonkers-dev-tls
  commonName: jorisjonkers.dev
  dnsNames:
    - jorisjonkers.dev
    - '*.jorisjonkers.dev'
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-cloudflare
---
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: edge-system
spec:
  defaultCertificate:
    secretName: jorisjonkers-dev-tls
