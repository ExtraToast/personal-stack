apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-edge-route-catalog
  namespace: edge-system
data:
  edge-route-catalog.yaml: |
    ---
    cluster: "personal-stack"
    routes:
    - name: "adguard"
      service: "adguard"
      host: "adguard.jorisjonkers.dev"
      access: "sso_protected"
    - name: "agents-api"
      service: "agents-api"
      host: "agents.jorisjonkers.dev"
      access: "sso_protected"
      path_prefixes:
      - "/api/"
      excluded_path_prefixes:
      - "/api/actuator/health/"
      excluded_paths:
      - "/api/actuator/health"
      - "/api/v1/health"
    - name: "agents-api-health"
      service: "agents-api"
      host: "agents.jorisjonkers.dev"
      access: "direct"
      path_prefixes:
      - "/api/actuator/health/"
      exact_paths:
      - "/api/actuator/health"
      - "/api/v1/health"
    - name: "agents-ui"
      service: "agents-ui"
      host: "agents.jorisjonkers.dev"
      access: "direct"
      excluded_path_prefixes:
      - "/api/"
    - name: "agents-ws"
      service: "agents-ws"
      host: "agents-ws.jorisjonkers.dev"
      access: "sso_protected"
    - name: "app-ui"
      service: "app-ui"
      host: "jorisjonkers.dev"
      access: "direct"
    - name: "auth-api"
      service: "auth-api"
      host: "auth.jorisjonkers.dev"
      access: "direct"
      path_prefixes:
      - "/api/"
    - name: "auth-api-well-known"
      service: "auth-api"
      host: "auth.jorisjonkers.dev"
      access: "direct"
      path_prefixes:
      - "/.well-known/"
    - name: "auth-ui"
      service: "auth-ui"
      host: "auth.jorisjonkers.dev"
      access: "direct"
      excluded_path_prefixes:
      - "/api/"
      - "/.well-known/"
    - name: "bazarr"
      service: "bazarr"
      host: "bazarr.jorisjonkers.dev"
      access: "sso_protected"
    - name: "faro"
      service: "faro"
      host: "faro.jorisjonkers.dev"
      access: "direct"
    - name: "gatus"
      service: "gatus"
      host: "status.jorisjonkers.dev"
      access: "direct"
    - name: "grafana"
      service: "grafana"
      host: "grafana.jorisjonkers.dev"
      access: "direct"
    - name: "headlamp"
      service: "headlamp"
      host: "dashboard.jorisjonkers.dev"
      access: "sso_protected"
    - name: "immich"
      service: "immich"
      host: "immich.jorisjonkers.dev"
      access: "sso_protected"
    - name: "jellyfin"
      service: "jellyfin"
      host: "jellyfin.jorisjonkers.dev"
      access: "direct"
    - name: "jellyseerr"
      service: "jellyseerr"
      host: "jellyseerr.jorisjonkers.dev"
      access: "direct"
    - name: "knowledge-api"
      service: "knowledge-api"
      host: "kb.jorisjonkers.dev"
      access: "sso_protected"
      excluded_path_prefixes:
      - "/mcp/"
      excluded_paths:
      - "/mcp"
      - "/install.sh"
      - "/install-agents.sh"
    - name: "knowledge-api-mcp"
      service: "knowledge-api"
      host: "kb.jorisjonkers.dev"
      access: "direct"
      path_prefixes:
      - "/mcp/"
      exact_paths:
      - "/mcp"
      - "/install.sh"
      - "/install-agents.sh"
    - name: "n8n"
      service: "n8n"
      host: "n8n.jorisjonkers.dev"
      access: "direct"
    - name: "obsidian-sync"
      service: "obsidian-sync"
      host: "obsidian-sync.jorisjonkers.dev"
      access: "direct"
    - name: "prowlarr"
      service: "prowlarr"
      host: "prowlarr.jorisjonkers.dev"
      access: "sso_protected"
    - name: "qbittorrent"
      service: "qbittorrent"
      host: "qbittorrent.jorisjonkers.dev"
      access: "sso_protected"
    - name: "rabbitmq"
      service: "rabbitmq"
      host: "rabbitmq.jorisjonkers.dev"
      access: "sso_protected"
    - name: "radarr"
      service: "radarr"
      host: "radarr.jorisjonkers.dev"
      access: "sso_protected"
    - name: "samba"
      service: "samba"
      host: "samba.jorisjonkers.dev"
      access: "direct"
    - name: "sonarr"
      service: "sonarr"
      host: "sonarr.jorisjonkers.dev"
      access: "sso_protected"
    - name: "stalwart"
      service: "stalwart"
      host: "stalwart.jorisjonkers.dev"
      access: "sso_protected"
    - name: "vault"
      service: "vault"
      host: "vault.jorisjonkers.dev"
      access: "sso_protected"
    - name: "wolf"
      service: "wolf"
      host: "wolf.jorisjonkers.dev"
      access: "sso_protected"
