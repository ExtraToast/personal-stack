apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-edge-route-catalog
  namespace: edge-system
data:
  edge-route-catalog.yaml: |
    ---
    cluster: "personal-stack"
    routes:
    - name: "adguard"
      service: "adguard"
      host: "adguard.jorisjonkers.dev"
      access: "direct"
    - name: "app-ui"
      service: "app-ui"
      host: "jorisjonkers.dev"
      access: "direct"
    - name: "assistant-api"
      service: "assistant-api"
      host: "assistant.jorisjonkers.dev"
      access: "sso_protected"
      path_prefixes:
      - "/api/"
      excluded_path_prefixes:
      - "/api/actuator/health/"
      excluded_paths:
      - "/api/actuator/health"
      - "/api/v1/health"
    - name: "assistant-api-health"
      service: "assistant-api"
      host: "assistant.jorisjonkers.dev"
      access: "direct"
      path_prefixes:
      - "/api/actuator/health/"
      exact_paths:
      - "/api/actuator/health"
      - "/api/v1/health"
    - name: "assistant-ui"
      service: "assistant-ui"
      host: "assistant.jorisjonkers.dev"
      access: "direct"
      excluded_path_prefixes:
      - "/api/"
    - name: "auth-api"
      service: "auth-api"
      host: "auth.jorisjonkers.dev"
      access: "direct"
      path_prefixes:
      - "/api/"
    - name: "auth-api-well-known"
      service: "auth-api"
      host: "auth.jorisjonkers.dev"
      access: "direct"
      path_prefixes:
      - "/.well-known/"
    - name: "auth-ui"
      service: "auth-ui"
      host: "auth.jorisjonkers.dev"
      access: "direct"
      excluded_path_prefixes:
      - "/api/"
      - "/.well-known/"
    - name: "bazarr"
      service: "bazarr"
      host: "bazarr.jorisjonkers.dev"
      access: "sso_protected"
    - name: "grafana"
      service: "grafana"
      host: "grafana.jorisjonkers.dev"
      access: "direct"
    - name: "headscale"
      service: "headscale"
      host: "headscale.jorisjonkers.dev"
      access: "direct"
    - name: "jellyfin"
      service: "jellyfin"
      host: "jellyfin.jorisjonkers.dev"
      access: "direct"
    - name: "n8n"
      service: "n8n"
      host: "n8n.jorisjonkers.dev"
      access: "direct"
    - name: "prowlarr"
      service: "prowlarr"
      host: "prowlarr.jorisjonkers.dev"
      access: "sso_protected"
    - name: "qbittorrent"
      service: "qbittorrent"
      host: "qbittorrent.jorisjonkers.dev"
      access: "sso_protected"
    - name: "rabbitmq"
      service: "rabbitmq"
      host: "rabbitmq.jorisjonkers.dev"
      access: "sso_protected"
    - name: "radarr"
      service: "radarr"
      host: "radarr.jorisjonkers.dev"
      access: "direct"
    - name: "samba"
      service: "samba"
      host: "samba.jorisjonkers.dev"
      access: "direct"
    - name: "sonarr"
      service: "sonarr"
      host: "sonarr.jorisjonkers.dev"
      access: "direct"
    - name: "uptime-kuma"
      service: "uptime-kuma"
      host: "status.jorisjonkers.dev"
      access: "direct"
    - name: "vault"
      service: "vault"
      host: "vault.jorisjonkers.dev"
      access: "sso_protected"
