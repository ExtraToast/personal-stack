apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: app-ui
  namespace: edge-system
  annotations:
    external-dns.alpha.kubernetes.io/target: ingress.jorisjonkers.dev
    external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
    kubernetes.io/ingress.class: traefik-public
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: 'Host(`jorisjonkers.dev`)'
      services:
        - name: app-ui
          namespace: app-system
          port: 80
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: assistant-api
  namespace: edge-system
  annotations:
    external-dns.alpha.kubernetes.io/target: ingress.jorisjonkers.dev
    external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
    kubernetes.io/ingress.class: traefik-public
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: 'Host(`assistant.jorisjonkers.dev`) && PathPrefix(`/api/`) && !PathPrefix(`/api/actuator/health/`) && !Path(`/api/actuator/health`) && !Path(`/api/v1/health`)'
      middlewares:
        - name: forward-auth
          namespace: edge-system
      services:
        - name: assistant-api
          namespace: assistant-system
          port: 8082
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: assistant-api-health
  namespace: edge-system
  annotations:
    external-dns.alpha.kubernetes.io/target: ingress.jorisjonkers.dev
    external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
    kubernetes.io/ingress.class: traefik-public
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: 'Host(`assistant.jorisjonkers.dev`) && (PathPrefix(`/api/actuator/health/`) || Path(`/api/actuator/health`) || Path(`/api/v1/health`))'
      services:
        - name: assistant-api
          namespace: assistant-system
          port: 8082
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: assistant-ui
  namespace: edge-system
  annotations:
    external-dns.alpha.kubernetes.io/target: ingress.jorisjonkers.dev
    external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
    kubernetes.io/ingress.class: traefik-public
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: 'Host(`assistant.jorisjonkers.dev`) && !PathPrefix(`/api/`)'
      services:
        - name: assistant-ui
          namespace: assistant-system
