apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-edge-catalog
  namespace: edge-system
data:
  edge-catalog.yaml: |
    ---
    cluster: "personal-stack"
    services:
    - name: "adguard"
      exposure: "lan_only"
      access: "direct"
      host: "adguard.jorisjonkers.dev"
    - name: "alloy"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "app-ui"
      exposure: "public"
      access: "direct"
      host: "jorisjonkers.dev"
    - name: "assistant-api"
      exposure: "public"
      access: "sso_protected"
      host: "assistant.jorisjonkers.dev"
    - name: "assistant-ui"
      exposure: "public"
      access: "direct"
      host: "assistant.jorisjonkers.dev"
    - name: "auth-api"
      exposure: "public"
      access: "direct"
      host: "auth.jorisjonkers.dev"
    - name: "auth-ui"
      exposure: "public"
      access: "direct"
      host: "auth.jorisjonkers.dev"
    - name: "bazarr"
      exposure: "public_and_lan"
      access: "sso_protected"
      host: "bazarr.jorisjonkers.dev"
    - name: "flaresolverr"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "grafana"
      exposure: "public"
      access: "direct"
      host: "grafana.jorisjonkers.dev"
    - name: "headscale"
      exposure: "public"
      access: "direct"
      host: "headscale.jorisjonkers.dev"
    - name: "jellyfin"
      exposure: "public_and_lan"
      access: "direct"
      host: "jellyfin.jorisjonkers.dev"
    - name: "jellyseerr"
      exposure: "public_and_lan"
      access: "direct"
      host: "jellyseerr.jorisjonkers.dev"
    - name: "loki"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "n8n"
      exposure: "public"
      access: "direct"
      host: "n8n.jorisjonkers.dev"
    - name: "postgres"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "prometheus"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "prowlarr"
      exposure: "public_and_lan"
      access: "sso_protected"
      host: "prowlarr.jorisjonkers.dev"
    - name: "qbittorrent"
      exposure: "public_and_lan"
      access: "sso_protected"
      host: "qbittorrent.jorisjonkers.dev"
    - name: "rabbitmq"
      exposure: "public"
      access: "sso_protected"
      host: "rabbitmq.jorisjonkers.dev"
    - name: "radarr"
      exposure: "public_and_lan"
      access: "direct"
      host: "radarr.jorisjonkers.dev"
    - name: "samba"
      exposure: "lan_only"
      access: "direct"
      host: "samba.jorisjonkers.dev"
    - name: "sonarr"
      exposure: "public_and_lan"
      access: "direct"
      host: "sonarr.jorisjonkers.dev"
    - name: "stalwart"
      exposure: "public"
      access: "sso_protected"
      host: "stalwart.jorisjonkers.dev"
    - name: "tempo"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "uptime-kuma"
      exposure: "public"
      access: "direct"
      host: "status.jorisjonkers.dev"
    - name: "valkey"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "vault"
      exposure: "public"
      access: "sso_protected"
      host: "vault.jorisjonkers.dev"
    - name: "wireguard-check"
      exposure: "internal_only"
      access: "cluster_internal"
