apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-edge-catalog
  namespace: edge-system
data:
  edge-catalog.yaml: |
    ---
    cluster: "personal-stack"
    services:
    - name: "adguard"
      exposure: "lan_only"
      access: "direct"
      production_host: "adguard.jorisjonkers.dev"
      test_host: "adguard.jorisjonkers.test"
    - name: "alloy"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "app-ui"
      exposure: "public"
      access: "direct"
      production_host: "jorisjonkers.dev"
      test_host: "jorisjonkers.test"
    - name: "assistant-api"
      exposure: "public"
      access: "sso_protected"
      production_host: "assistant.jorisjonkers.dev"
      test_host: "assistant.jorisjonkers.test"
    - name: "assistant-ui"
      exposure: "public"
      access: "direct"
      production_host: "assistant.jorisjonkers.dev"
      test_host: "assistant.jorisjonkers.test"
    - name: "auth-api"
      exposure: "public"
      access: "direct"
      production_host: "auth.jorisjonkers.dev"
      test_host: "auth.jorisjonkers.test"
    - name: "auth-ui"
      exposure: "public"
      access: "direct"
      production_host: "auth.jorisjonkers.dev"
      test_host: "auth.jorisjonkers.test"
    - name: "flaresolverr"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "grafana"
      exposure: "public"
      access: "direct"
      production_host: "grafana.jorisjonkers.dev"
      test_host: "grafana.jorisjonkers.test"
    - name: "headscale"
      exposure: "public"
      access: "direct"
      production_host: "headscale.jorisjonkers.dev"
      test_host: "headscale.jorisjonkers.test"
    - name: "jellyfin"
      exposure: "public_and_lan"
      access: "direct"
      production_host: "jellyfin.jorisjonkers.dev"
      test_host: "jellyfin.jorisjonkers.test"
    - name: "loki"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "n8n"
      exposure: "public"
      access: "direct"
      production_host: "n8n.jorisjonkers.dev"
      test_host: "n8n.jorisjonkers.test"
    - name: "postgres"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "prometheus"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "rabbitmq"
      exposure: "public"
      access: "sso_protected"
      production_host: "rabbitmq.jorisjonkers.dev"
      test_host: "rabbitmq.jorisjonkers.test"
    - name: "radarr"
      exposure: "public_and_lan"
      access: "direct"
      production_host: "radarr.jorisjonkers.dev"
      test_host: "radarr.jorisjonkers.test"
    - name: "samba"
      exposure: "lan_only"
      access: "direct"
      production_host: "samba.jorisjonkers.dev"
      test_host: "samba.jorisjonkers.test"
    - name: "sonarr"
      exposure: "public_and_lan"
      access: "direct"
      production_host: "sonarr.jorisjonkers.dev"
      test_host: "sonarr.jorisjonkers.test"
    - name: "tempo"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "uptime-kuma"
      exposure: "public"
      access: "direct"
      production_host: "status.jorisjonkers.dev"
      test_host: "status.jorisjonkers.test"
    - name: "valkey"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "vault"
      exposure: "public"
      access: "sso_protected"
      production_host: "vault.jorisjonkers.dev"
      test_host: "vault.jorisjonkers.test"
