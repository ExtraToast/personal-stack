apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-edge-catalog
  namespace: edge-system
data:
  edge-catalog.yaml: |
    ---
    cluster: "personal-stack"
    services:
    - name: "adguard"
      exposure: "lan_only"
      access: "direct"
    - name: "alloy"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "app-ui"
      exposure: "public"
      access: "direct"
    - name: "assistant-api"
      exposure: "public"
      access: "direct"
    - name: "assistant-ui"
      exposure: "public"
      access: "direct"
    - name: "auth-api"
      exposure: "public"
      access: "direct"
    - name: "auth-ui"
      exposure: "public"
      access: "direct"
    - name: "flaresolverr"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "grafana"
      exposure: "public"
      access: "direct"
    - name: "headscale"
      exposure: "public"
      access: "direct"
    - name: "jellyfin"
      exposure: "public_and_lan"
      access: "direct"
    - name: "loki"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "n8n"
      exposure: "public"
      access: "direct"
    - name: "postgres"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "prometheus"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "rabbitmq"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "radarr"
      exposure: "public_and_lan"
      access: "direct"
    - name: "samba"
      exposure: "lan_only"
      access: "direct"
    - name: "sonarr"
      exposure: "public_and_lan"
      access: "direct"
    - name: "tempo"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "uptime-kuma"
      exposure: "public"
      access: "direct"
    - name: "valkey"
      exposure: "internal_only"
      access: "cluster_internal"
    - name: "vault"
      exposure: "public"
      access: "sso_protected"
