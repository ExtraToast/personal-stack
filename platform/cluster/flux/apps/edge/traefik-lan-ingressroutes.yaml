apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-lan
  namespace: edge-system
  annotations:
    kubernetes.io/ingress.class: traefik-lan
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: 'Host(`jellyfin.jorisjonkers.dev`)'
      services:
        - name: jellyfin
          namespace: media-system
          port: 8096
  tls: {}
