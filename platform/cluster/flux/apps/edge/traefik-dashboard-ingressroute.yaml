---
# Traefik's own dashboard + API is served by the internal `api@internal`
# provider (activated via `--api.dashboard=true` on the traefik HelmRelease).
# It has no in-cluster Service, so it can't be expressed in fleet.yaml's
# `ingress_intent.kubernetes_backends` and isn't rendered by the usual
# path. Keep this manifest hand-written alongside the other edge wiring.
#
# Two routes:
#   1. /dashboard and /api -> api@internal, gated by forward-auth.
#   2. everything else on the host (incl. `/` and `/favicon.ico`) -> a
#      301 redirect to `/dashboard/` so hitting the bare hostname in a
#      browser does not 404 against Traefik's own default handler.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-redirect
  namespace: edge-system
spec:
  redirectRegex:
    regex: '^https?://traefik\.jorisjonkers\.dev/.*'
    replacement: 'https://traefik.jorisjonkers.dev/dashboard/'
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: edge-system
  annotations:
    external-dns.alpha.kubernetes.io/target: ingress.jorisjonkers.dev
    external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
    kubernetes.io/ingress.class: traefik-public
spec:
  entryPoints:
    - websecure
  routes:
    # Higher priority: the real dashboard + API.
    - kind: Rule
      match: 'Host(`traefik.jorisjonkers.dev`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))'
      priority: 20
      middlewares:
        - name: forward-auth
          namespace: edge-system
      services:
        - name: api@internal
          kind: TraefikService
    # Lower priority: catch-all that redirects to /dashboard/.
    - kind: Rule
      match: 'Host(`traefik.jorisjonkers.dev`)'
      priority: 10
      middlewares:
        - name: traefik-dashboard-redirect
          namespace: edge-system
      services:
        - name: api@internal
          kind: TraefikService
  tls: {}
