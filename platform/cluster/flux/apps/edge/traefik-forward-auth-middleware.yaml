apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth
  namespace: edge-system
spec:
  forwardAuth:
    address: http://auth-api.auth-system.svc.cluster.local:8081/api/v1/auth/verify
    trustForwardHeader: true
    authResponseHeaders:
      - X-User-Id
      - X-User-Roles
