# Reads the Cloudflare API token from Vault (secret/data/platform/edge,
# field cloudflare.dns_api_token) every hour and upserts the Kubernetes
# Secret cloudflare-dns-api-token that cert-manager's ClusterIssuer
# expects (see cluster-issuer-cloudflare.yaml).
#
# Rotation flow:
#   1) vault kv patch secret/platform/edge cloudflare.dns_api_token=<new>
#   2) Wait up to 1h for the next run, or force it:
#        kubectl -n edge-system create job --from=cronjob/cloudflare-token-sync cloudflare-token-sync-rotate
#   3) cert-manager picks up the Secret change on its next challenge.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cloudflare-token-sync
  namespace: edge-system
spec:
  # Hourly is a compromise — short enough that a rotation propagates
  # within one lease lifetime, long enough that it doesn't hammer Vault.
  schedule: '0 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: 'true'
            vault.hashicorp.com/agent-pre-populate-only: 'true'
            vault.hashicorp.com/role: cloudflare-token-sync
            vault.hashicorp.com/agent-inject-secret-api-token: secret/data/platform/edge
            vault.hashicorp.com/agent-inject-template-api-token: |
              {{ with secret "secret/data/platform/edge" }}{{ index .Data.data "cloudflare.dns_api_token" }}{{ end }}
        spec:
          serviceAccountName: cloudflare-token-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: bitnami/kubectl:1.31
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  TOKEN="$(cat /vault/secrets/api-token)"
                  if [ -z "$TOKEN" ]; then
                    echo "api-token file empty — Vault agent did not render the template" >&2
                    exit 1
                  fi
                  kubectl -n edge-system create secret generic cloudflare-dns-api-token \
                    --from-literal=api-token="$TOKEN" \
                    --dry-run=client -o yaml | kubectl apply -f -
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
