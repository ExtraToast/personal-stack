# Public half of the credential-login portal. Reached through Traefik +
# forward-auth (the AGENTS_LOGIN permission); holds no Vault token and stores no
# credential files. It only renders the UI, gates on the forward-auth identity
# headers, and proxies the login flow to the worker over the internal token.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-login-controller
  namespace: agents-system
  labels:
    app.kubernetes.io/name: agents-login-controller
    app.kubernetes.io/part-of: agents-login
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-login-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-login-controller
        app.kubernetes.io/part-of: agents-login
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/extratoast/personal-stack/agents-login:latest
          imagePullPolicy: Always
          args: ['controller']
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AGENTS_LOGIN_MODE
              value: controller
            - name: PORT
              value: '8080'
            - name: WORKER_URL
              value: http://agents-login-worker:8081
            # The forward-auth middleware injects SERVICE_<PERMISSION> roles in
            # X-User-Roles; this host requires AGENTS_LOGIN specifically so an
            # AGENTS grantee cannot mint the fleet's root credentials.
            - name: REQUIRED_PERMISSION
              value: SERVICE_AGENTS_LOGIN
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agents-login-internal
                  key: token
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agents-login-controller
  namespace: agents-system
  labels:
    app.kubernetes.io/name: agents-login-controller
    app.kubernetes.io/part-of: agents-login
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agents-login-controller
  ports:
    - name: http
      port: 8080
      targetPort: 8080
