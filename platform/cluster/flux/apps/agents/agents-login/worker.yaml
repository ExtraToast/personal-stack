# Private half of the portal. Owns the PTY that runs `claude setup-token` and
# `codex login --device`, captures credentials, and posts them to agents-api
# under a Lease lock. Single instance + Recreate so the Lease is never
# contended by two writers across a rollover.
#
# HOME is a writable emptyDir, not the legacy credential PVCs: agents-api
# persists credentials in Postgres, so the worker needs no node pin and can
# schedule anywhere.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-login-worker
  namespace: agents-system
  labels:
    app.kubernetes.io/name: agents-login-worker
    app.kubernetes.io/part-of: agents-login
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-login-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-login-worker
        app.kubernetes.io/part-of: agents-login
    spec:
      serviceAccountName: agents-login-worker
      automountServiceAccountToken: true
      # The image is amd64-only (it bundles the Claude/Codex CLIs + node-pty and
      # is not worth a QEMU arm64 build). Keep it off the arm64 Pi nodes, where
      # it would ImagePullBackOff on "no match for platform in manifest".
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Codex 0.141.x ships a musl static binary. In this cluster IPv6 egress is
      # unreachable, and musl ignores /etc/gai.conf, so auth.openai.com AAAA
      # answers can make `codex login --device-auth` fail before it tries IPv4.
      # Resolve A records at pod startup and mount a pod-local hosts file instead
      # of using static hostAliases, which would stale when Cloudflare rotates IPs.
      initContainers:
        - name: codex-auth-hosts
          image: ghcr.io/extratoast/personal-stack/agents-login:latest
          imagePullPolicy: Always
          command:
            - node
            - -e
            - |
              const dns = require('node:dns').promises;
              const { writeFileSync } = require('node:fs');

              const hosts = (process.env.CODEX_IPV4_HOSTS || 'auth.openai.com')
                .split(/[\s,]+/)
                .filter(Boolean);
              const podIp = process.env.POD_IP || '127.0.0.1';
              const hostname = process.env.HOSTNAME || 'agents-login-worker';
              const lines = [
                '# Kubernetes hosts file generated by codex-auth-hosts.',
                '127.0.0.1\tlocalhost',
                '::1\tlocalhost ip6-localhost ip6-loopback',
                'fe00::0\tip6-localnet',
                'fe00::0\tip6-mcastprefix',
                'fe00::1\tip6-allnodes',
                'fe00::2\tip6-allrouters',
                `${podIp}\t${hostname}`,
                '',
              ];

              (async () => {
                for (const host of hosts) {
                  const ips = await dns.resolve4(host);
                  if (ips.length === 0) {
                    throw new Error(`no A records for ${host}`);
                  }
                  for (const ip of ips) {
                    lines.push(`${ip}\t${host}`);
                  }
                  console.log(`resolved ${host}: ${ips.join(', ')}`);
                }
                writeFileSync('/generated-hosts/hosts', `${lines.join('\n')}\n`, { mode: 0o644 });
              })().catch((err) => {
                console.error(err);
                process.exit(1);
              });
          env:
            - name: CODEX_IPV4_HOSTS
              value: auth.openai.com
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: codex-auth-hosts
              mountPath: /generated-hosts
      containers:
        - name: worker
          image: ghcr.io/extratoast/personal-stack/agents-login:latest
          imagePullPolicy: Always
          args: ['worker']
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: AGENTS_LOGIN_MODE
              value: worker
            - name: PORT
              value: '8081'
            - name: HOME
              value: /home/agent
            - name: CODEX_HOME
              value: /home/agent/.codex
            - name: AGENTS_API_INTERNAL_URL
              value: http://agents-api.agents-system.svc.cluster.local:8082
            - name: AGENTS_API_INTERNAL_BEARER
              valueFrom:
                secretKeyRef:
                  name: agents-login-internal
                  key: token
            - name: LEASE_NAME
              value: agents-login-write
            - name: LEASE_NAMESPACE
              value: agents-system
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agents-login-internal
                  key: token
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: codex-auth-hosts
              mountPath: /etc/hosts
              subPath: hosts
              readOnly: true
            - name: home
              mountPath: /home/agent
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: codex-auth-hosts
          emptyDir: {}
        - name: home
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agents-login-worker
  namespace: agents-system
  labels:
    app.kubernetes.io/name: agents-login-worker
    app.kubernetes.io/part-of: agents-login
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agents-login-worker
  ports:
    - name: http
      port: 8081
      targetPort: 8081
