# Pod-local resolver for the agents-login worker. Codex 0.141.x ships a musl
# static binary whose resolver ignores /etc/gai.conf and /etc/hosts for the
# failing auth.openai.com path; this CoreDNS sidecar strips AAAA at DNS level
# while forwarding every non-AAAA lookup to kube-dns.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agents-login-worker-coredns
  namespace: agents-system
  labels:
    app.kubernetes.io/name: agents-login-worker
    app.kubernetes.io/part-of: agents-login
data:
  Corefile: |
    .:53 {
        errors
        health :8080
        ready :8181
        template IN AAAA . {
            rcode NOERROR
        }
        forward . 10.43.0.10
        cache 30
    }
---
# Private half of the portal. Owns the PTY that runs `claude setup-token` and
# `codex login --device`, captures credentials, and posts them to agents-api
# under a Lease lock. Single instance + Recreate so the Lease is never
# contended by two writers across a rollover.
#
# HOME is a writable emptyDir, not the legacy credential PVCs: agents-api
# persists credentials in Postgres, so the worker needs no node pin and can
# schedule anywhere.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-login-worker
  namespace: agents-system
  labels:
    app.kubernetes.io/name: agents-login-worker
    app.kubernetes.io/part-of: agents-login
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-login-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-login-worker
        app.kubernetes.io/part-of: agents-login
    spec:
      serviceAccountName: agents-login-worker
      automountServiceAccountToken: true
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 127.0.0.1
        searches:
          - agents-system.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: '5'
      # The image is amd64-only (it bundles the Claude/Codex CLIs + node-pty and
      # is not worth a QEMU arm64 build). Keep it off the arm64 Pi nodes, where
      # it would ImagePullBackOff on "no match for platform in manifest".
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dns
          image: registry.k8s.io/coredns/coredns:v1.12.1
          imagePullPolicy: IfNotPresent
          args:
            - -conf
            - /etc/coredns/Corefile
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ['ALL']
              add: ['NET_BIND_SERVICE']
          volumeMounts:
            - name: coredns-config
              mountPath: /etc/coredns
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 8181
            initialDelaySeconds: 1
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: worker
          image: ghcr.io/extratoast/personal-stack/agents-login:latest
          imagePullPolicy: Always
          args: ['worker']
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: AGENTS_LOGIN_MODE
              value: worker
            - name: PORT
              value: '8081'
            - name: HOME
              value: /home/agent
            - name: CODEX_HOME
              value: /home/agent/.codex
            - name: AGENTS_API_INTERNAL_URL
              value: http://agents-api.agents-system.svc.cluster.local:8082
            - name: AGENTS_API_INTERNAL_BEARER
              valueFrom:
                secretKeyRef:
                  name: agents-login-internal
                  key: token
            - name: LEASE_NAME
              value: agents-login-write
            - name: LEASE_NAMESPACE
              value: agents-system
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agents-login-internal
                  key: token
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: home
              mountPath: /home/agent
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: coredns-config
          configMap:
            name: agents-login-worker-coredns
        - name: home
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agents-login-worker
  namespace: agents-system
  labels:
    app.kubernetes.io/name: agents-login-worker
    app.kubernetes.io/part-of: agents-login
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agents-login-worker
  ports:
    - name: http
      port: 8081
      targetPort: 8081
