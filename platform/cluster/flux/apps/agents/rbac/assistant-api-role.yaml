# assistant-api is the only client that mutates agent-runner Pods.
# It needs Pod + PVC CRUD scoped to agents-system, plus the ability
# to read the credential / deploy-key Secrets so it can stamp them
# into each Pod's volume mounts.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: assistant-api-runner-controller
  namespace: agents-system
rules:
  - apiGroups: ['']
    resources: [pods, pods/log, services]
    verbs: [get, list, watch, create, delete, patch]
  - apiGroups: ['']
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, create, delete]
  - apiGroups: ['']
    resources: [secrets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: assistant-api-runner-controller
  namespace: agents-system
subjects:
  - kind: ServiceAccount
    name: assistant-api
    namespace: assistant-system
roleRef:
  kind: Role
  name: assistant-api-runner-controller
  apiGroup: rbac.authorization.k8s.io
