apiVersion: v1
kind: Namespace
metadata:
  name: agents-system
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
---
# Per-workspace agent-runner Pods live in their own namespace so a
# NetworkPolicy can clamp egress without affecting the rest of the
# cluster, and so the auth-bootstrap Pod's credential PVCs stay
# segregated from every other workload's PVC.
apiVersion: v1
kind: Namespace
metadata:
  name: agent-runners
  labels:
    pod-security.kubernetes.io/enforce: baseline
