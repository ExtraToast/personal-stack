# SA used by every runner Pod (created at runtime by agents-api).
# No special RBAC — the runner does not talk to the k8s API itself;
# all orchestration goes through agents-api which has its own SA
# with Pod CRUD in this namespace.
#
# automountServiceAccountToken is false because the runner needs no API
# credential at all: its only cluster visibility is the read-only
# kubernetes MCP server reached over HTTP. The runner Pod spec sets the
# same flag, so an agent (which runs unsandboxed) can never present this
# SA to the API server, even if the SA were later bound to a Role by
# mistake. This SA must therefore never be granted RBAC.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runner
  namespace: agents-system
automountServiceAccountToken: false
