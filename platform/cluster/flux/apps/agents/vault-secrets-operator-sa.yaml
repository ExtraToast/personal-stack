# VSO authenticates against Vault using a SA token sourced from the
# consumer namespace. Every namespace that owns a VaultStaticSecret /
# VaultDynamicSecret needs a ServiceAccount named
# `vault-secrets-operator` (the default `vaultAuthRef:
# vso-system/default` selector keys off this name). Without it,
# VSO logs `ServiceAccount "vault-secrets-operator" not found` and
# every VSS in the namespace stays `SYNCED=False` — which is exactly
# what kept agents-github-deploy-key and agents-kb-bearer unsynced,
# leaving agent-runner Pending and agents-kb-install in
# CreateContainerConfigError.
#
# The same SA pattern lives in knowledge-system, media-system, etc.
# PlatformVsoCoverageTest enforces that every VSS-owning namespace has
# a matching SA manifest.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-secrets-operator
  namespace: agents-system
