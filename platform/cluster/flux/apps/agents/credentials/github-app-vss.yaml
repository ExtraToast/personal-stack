# Bearer the runner's `gh` wrapper presents to agents-api's
# installation-token endpoint. Projected from secret/agents/github-app
# (same path the agents-system copy reads its App id + key from).
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: github-app
  namespace: agents-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: agents/github-app
  destination:
    name: github-app
    create: true
  refreshAfter: 1h
