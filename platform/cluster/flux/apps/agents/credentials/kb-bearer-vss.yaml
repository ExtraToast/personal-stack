# Bearer token for the knowledge-system installer endpoint
# (`https://kb.jorisjonkers.dev/install.sh`) and for the MCP server
# the installed hooks call into. Both sides accept the same token
# format — knowledge-api's McpBearerFilter validates any field
# from `secret/knowledge-system/mcp-bearer`, and the installer is
# served from a separate path that also takes a bearer.
#
# The Vault path stores a single field per device or persona — for
# the agents subsystem we set just `bearer`. Populate out-of-band:
#
#   vault kv put -mount=secret agents/kb-bearer \
#     bearer="$(openssl rand -hex 32)"
#
# Then add the same value as a field on
# `secret/knowledge-system/mcp-bearer` so the MCP filter accepts
# it under a stable name:
#
#   vault kv patch -mount=secret knowledge-system/mcp-bearer \
#     agents="$(vault kv get -mount=secret -field=bearer agents/kb-bearer)"
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: agents-kb-bearer
  namespace: agents-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: agents/kb-bearer
  destination:
    name: agents-kb-bearer
    create: true
  refreshAfter: 1h
