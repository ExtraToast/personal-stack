# GitHub deploy key + known_hosts pulled from Vault. The bootstrap
# script that landed this PR provisions:
#
#   vault kv put -mount=secret agents/github-deploy-key \
#     private_key="$(cat ps-agents-deploy)" \
#     public_key="$(cat ps-agents-deploy.pub)" \
#     known_hosts="$(ssh-keyscan github.com)"
#
# A deploy key (not a PAT) is the right model: it scopes to a
# single repository, supports per-key write access toggles, and
# rotates via Vault without touching the cluster manifest.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: agents-github-deploy-key
  namespace: agents-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: agents/github-deploy-key
  destination:
    name: agents-github-deploy-key
    create: true
  refreshAfter: 1h
---
# Same Secret is needed in the runner namespace because per-workspace
# Pods are created there. VSO can only target a single namespace per
# resource, so a second VSS mirrors the same path.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: agents-github-deploy-key
  namespace: agent-runners
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: agents/github-deploy-key
  destination:
    name: agents-github-deploy-key
    create: true
  refreshAfter: 1h
