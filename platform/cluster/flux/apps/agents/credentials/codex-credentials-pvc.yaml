# OpenAI Codex CLI writes its OAuth tokens to ~/.codex/auth.json
# (force the file form via cli_auth_credentials_store=file under
# CODEX_HOME). Like Claude's, this must be writable so the CLI can
# update the refresh token in place. See claude-credentials-pvc.yaml
# for the rationale behind the local-path + RWO + single-node pinning.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codex-credentials
  namespace: agents-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
