# Persistent home for the Claude Code CLI OAuth tokens. The CLI
# writes to ~/.claude/.credentials.json on Linux and rotates the
# refresh token on every successful refresh, so this volume MUST
# be mounted ReadWrite.
#
# Backing class is the cluster default (`local-path`, k3s built-in)
# because Longhorn is not installed here. local-path is RWO only and
# binds to the first node that consumes it (WaitForFirstConsumer),
# which is fine: every Pod that mounts this volume — the bootstrap
# Pod, the refresh-ping + kb-install CronJobs, and the per-workspace
# agent-runner Pods spawned by assistant-api — is pinned to
# `personal-stack/node: enschede-gtx-960m-1`, so the PV stays on a
# single deterministic node. RWO permits multiple Pods on that node
# to mount the volume simultaneously, which is what the orchestrator
# relies on.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-credentials
  namespace: agents-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
