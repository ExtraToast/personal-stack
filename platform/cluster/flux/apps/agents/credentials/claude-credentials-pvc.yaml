# Persistent home for the Claude Code CLI OAuth tokens. The CLI
# writes to ~/.claude/.credentials.json on Linux and rotates the
# refresh token on every successful refresh, so this volume MUST
# be mounted ReadWrite. RetainOnDelete semantics: even if the
# PVC is deleted, the underlying PV (Longhorn) keeps the data
# until the operator explicitly reclaims it — losing this volume
# means an interactive re-login from the bootstrap Pod.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-credentials
  namespace: agents-system
  annotations:
    # Best-effort hint to the storage class; Longhorn honours it.
    longhorn.io/reclaim-policy: Retain
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn
  resources:
    requests:
      storage: 256Mi
