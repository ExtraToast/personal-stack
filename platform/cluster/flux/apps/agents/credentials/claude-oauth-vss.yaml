# Claude Code OAuth credential projected from Vault into a Secret the runner
# consumes. The credential-login portal uses `claude setup-token`, whose product
# is a long-lived OAuth token (the `oauth_token` field) meant for the
# CLAUDE_CODE_OAUTH_TOKEN env var — that is the primary key here. The
# leading-dot file keys are kept for the interactive `claude login` shape
# (.credentials.json inside ~/.claude/, .claude.json as its sibling); they
# render empty when only a token was captured, which the runner ignores.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: agents-claude-oauth
  namespace: agents-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: agents/claude-oauth
  destination:
    name: agents-claude-oauth
    create: true
    transformation:
      templates:
        oauth_token:
          text: '{{- get .Secrets "oauth_token" -}}'
        .credentials.json:
          text: '{{- get .Secrets "credentials_json" -}}'
        .claude.json:
          text: '{{- get .Secrets "claude_json" -}}'
  refreshAfter: 1h
