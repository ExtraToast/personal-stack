# OAuth credential files for Claude Code, projected from Vault into a
# Secret whose keys are the exact leading-dot filenames used by the CLI.
# A consumer init-copy can mount this Secret and place .claude.json as a
# sibling of .claude/ and .credentials.json inside ~/.claude/.
#
# Populate the Vault path before the first runner Pod starts:
#
#   vault kv put -mount=secret agents/claude-oauth \
#     credentials_json="$(cat ~/.claude/.credentials.json)" \
#     claude_json="$(cat ~/.claude.json)"
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: agents-claude-oauth
  namespace: agents-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: agents/claude-oauth
  destination:
    name: agents-claude-oauth
    create: true
    transformation:
      templates:
        .credentials.json:
          text: '{{- get .Secrets "credentials_json" -}}'
        .claude.json:
          text: '{{- get .Secrets "claude_json" -}}'
  refreshAfter: 1h
