# knowledge-vault deploy key for the Tier-2 weekly KB-curation CronJob to
# clone/push ExtraToast/knowledge-vault over SSH and propose consolidation as
# a branch/PR. A deploy key is repo-scoped and rotates via Vault without
# touching this manifest.
#
# Reads the EXISTING key the knowledge-ingest-worker already uses
# (secret/knowledge-system/vault-deploy-key, field private_key). No copy or
# policy change needed: the shared `vso` policy backing vso-system/default
# already grants read on secret/data/knowledge-system/* (see
# platform/cluster/flux/apps/data/vault/bootstrap-auth.sh). VSO's
# namespace-scoped VSS gates which Pod actually sees the projected Secret.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: agents-knowledge-vault-deploy-key
  namespace: agents-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: knowledge-system/vault-deploy-key
  destination:
    name: agents-knowledge-vault-deploy-key
    create: true
  refreshAfter: 1h
