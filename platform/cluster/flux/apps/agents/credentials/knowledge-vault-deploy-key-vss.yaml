# knowledge-vault deploy key for the Tier-2 weekly KB-curation CronJob to
# clone/push ExtraToast/knowledge-vault over SSH and propose consolidation as
# a branch/PR. A deploy key is repo-scoped and rotates via Vault without
# touching this manifest.
#
# Read from an agents/-prefixed Vault path so the existing agents-system VSO
# policy covers it (no cross-namespace policy grant needed). ONE-TIME SETUP —
# copy the same key knowledge-ingest-worker uses into the agents path:
#
#   k=secret/knowledge-system/vault-deploy-key
#   vault kv put -mount=secret agents/knowledge-vault-deploy-key \
#     private_key="$(vault kv get -mount=secret -field=private_key ${k#secret/})" \
#     known_hosts="$(ssh-keyscan github.com)"
#
# Until that path is populated the VaultStaticSecret simply does not sync and
# the Tier-2 Job fails loudly (no silent partial state).
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: agents-knowledge-vault-deploy-key
  namespace: agents-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: agents/knowledge-vault-deploy-key
  destination:
    name: agents-knowledge-vault-deploy-key
    create: true
  refreshAfter: 1h
