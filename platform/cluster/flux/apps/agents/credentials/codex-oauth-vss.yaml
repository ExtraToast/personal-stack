# OAuth credential files for Codex CLI, projected from Vault into a
# Secret whose keys are the exact filenames used by the CLI.
# A consumer init-copy places auth.json inside ~/.codex/ and
# config.toml alongside it.
#
# Populate the Vault path before the first runner Pod starts:
#
#   vault kv put -mount=secret agents/codex-oauth \
#     auth_json="$(cat ~/.codex/auth.json)" \
#     config_toml="$(cat ~/.codex/config.toml)"
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: agents-codex-oauth
  namespace: agents-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: agents/codex-oauth
  destination:
    name: agents-codex-oauth
    create: true
    transformation:
      templates:
        auth.json:
          text: '{{- get .Secrets "auth_json" -}}'
        config.toml:
          text: '{{- get .Secrets "config_toml" -}}'
  refreshAfter: 1h
