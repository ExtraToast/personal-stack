apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keel
  namespace: utility-system
spec:
  interval: 30m
  chart:
    spec:
      chart: keel
      sourceRef:
        kind: HelmRepository
        name: keel
        namespace: utility-system
  values:
    # Keel polls registries for new image tags and triggers rolling
    # restarts on Deployments/StatefulSets that opt in via
    # `keel.sh/*` annotations. We only want the polling path:
    # no Slack/webhook notifications, no Helm provider, no Keel
    # webhook server. Keel itself is in-cluster and has no public
    # ingress.
    replicaCount: 1
    nodeSelector:
      personal-stack/site: frankfurt
    service:
      enabled: false
    webhookRelay:
      enabled: false
    polling:
      enabled: true
    helmProvider:
      enabled: false
    aws:
      enabled: false
    gcr:
      enabled: false
    azure:
      enabled: false
    googleApplicationCredentials: ''
    dockerRegistry:
      enabled: false
    basicauth:
      enabled: false
    rbac:
      enabled: true
    serviceAccount:
      create: true
    persistence:
      enabled: false
    # Keel's approvals UI, Slack, Hipchat, Mattermost integrations are
    # all unused — turn them off to keep the deployment lean.
    notifications:
      enabled: false
    slack:
      enabled: false
    hipchat:
      enabled: false
    mattermost:
      enabled: false
    # Surface Keel's own logs verbosely while we're new to it; can
    # dial back to `info` once we trust the watcher.
    debug: false
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
