# Nginx reverse-proxy pod that fronts the ASUS router's web UI at
# https://192.168.0.1:8443. The router is only reachable from inside the
# Enschede LAN, so this pod is pinned to an Enschede node via the
# personal-stack/capability-lan-ingress label (same selector the
# LAN traefik uses). From there it reaches 192.168.0.1 over the node's
# default-route LAN interface.
#
# Nginx config lives in the router-relay-nginx ConfigMap in this kustomize
# subdir. See configmap.yaml for the proxy rules (Host rewrite, cookie
# domain rewrite, TLS verification disabled, websocket upgrade passthrough).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-relay
  namespace: utility-system
  labels:
    app.kubernetes.io/name: router-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: router-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: router-relay
    spec:
      nodeSelector:
        personal-stack/capability-lan-ingress: 'true'
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: router-relay-nginx
            items:
              - key: default.conf
                path: default.conf
