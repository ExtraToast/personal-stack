# nginx reverse-proxy config for the ASUS router web UI. The router
# lives at https://192.168.0.1:8443 with a self-signed cert and is
# only reachable from inside the Enschede LAN, so the pod has to run
# on a node that's on that LAN (enforced via nodeSelector on the
# Deployment). Traefik on Frankfurt hits this Service through the
# tailnet, which routes via flannel -> node -> LAN egress -> router.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: router-relay-nginx
  namespace: utility-system
data:
  default.conf: |
    server {
      listen 80 default_server;
      server_name _;

      # Asus router UI uploads (firmware, config backup) can be chunky.
      client_max_body_size 100m;

      # Disable response buffering so long-polling status endpoints and
      # websocket upgrades stream through.
      proxy_buffering off;

      location / {
        proxy_pass https://192.168.0.1:8443;
        # Router ships a self-signed cert. Verifying it would buy us
        # nothing meaningful: we're on the same LAN the router owns.
        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        # Present the router with its own expected Host so its
        # anti-CSRF / referer checks don't reject the request.
        proxy_set_header Host 192.168.0.1:8443;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Rewrite Set-Cookie Domain=192.168.0.1 to the public host so
        # the browser actually keeps the session across subsequent
        # requests.
        proxy_cookie_domain 192.168.0.1 $host;

        # Rewrite absolute Location headers the router emits (login
        # redirects, logout redirects) back to the public host.
        proxy_redirect https://192.168.0.1:8443/ /;
        proxy_redirect http://192.168.0.1:8443/ /;
        proxy_redirect https://192.168.0.1/ /;
        proxy_redirect http://192.168.0.1/ /;

        # WebSocket upgrades (live status graphs on some ASUS firmwares).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }
    }
