# AdGuard Home runs host-native on enschede-t1000-1 (NixOS module
# at platform/nix/modules/services/adguard.nix) because it needs to
# bind the LAN's DNS ports on a reliable interface and predates k8s
# being the deploy target. There's no Deployment to put behind a
# selector-based Service, so this manifest pairs a selector-less
# Service with a hand-written Endpoints pointing at the node's
# Tailscale IP + AdGuard's web/API port.
#
# Traefik's public IngressRoute (rendered from fleet.yaml's
# ingress_intent.kubernetes_backends.adguard) uses the Service name,
# so from the rest of the cluster this looks identical to every
# other backend.
---
apiVersion: v1
kind: Service
metadata:
  name: adguard
  namespace: utility-system
  labels:
    app.kubernetes.io/name: adguard
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: adguard
  namespace: utility-system
  labels:
    app.kubernetes.io/name: adguard
subsets:
  - addresses:
      # enschede-t1000-1 on the tailnet. The node's NixOS firewall
      # opens 3000 on every interface; the Frankfurt traefik hits
      # this address over tailscale0 which is the only network path
      # both sites have in common.
      - ip: 100.103.175.110
    ports:
      - name: http
        port: 3000
        protocol: TCP
