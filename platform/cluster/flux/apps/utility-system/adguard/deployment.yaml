# AdGuard Home runs as a Deployment pinned to the capability-adguard
# node with hostNetwork: true. Why host networking instead of the
# usual pod-CIDR + hostPort setup:
#
#   1. LAN DNS needs a static, predictable endpoint on t1000's LAN IP
#      (the router hands out 192.168.0.100 as the network's DNS
#      server). hostPort + CNI portmap DNAT set up the rules but the
#      inbound packet flow interacts poorly with flannel-over-
#      tailscale on this cluster — LAN queries to :53 time out even
#      though the iptables chain looks correct. hostNetwork avoids
#      the DNAT round-trip entirely: AdGuardHome binds 0.0.0.0:53
#      directly in the host netns, so 192.168.0.100:53 and any other
#      host IP just work natively.
#
#   2. AdGuard wants to bind :53 + :3000 on every interface the node
#      carries (LAN, tailscale0, lo) so LAN clients, tailnet clients,
#      and kubelet + Traefik can all reach it. hostNetwork gives
#      that for free; the pod-CIDR + hostPort path only exposes a
#      subset and adds a conntrack dependency.
#
#   3. There's only ever one AdGuard pod in the fleet (pinned to
#      t1000), so the usual reasons to avoid hostNetwork
#      (port-collisions across replicas, Service-cluster-IP-first
#      discovery) don't apply.
#
# State lives on a hostPath at /var/lib/AdGuardHome so it survives
# pod restarts. Same path the retired NixOS systemd service used,
# so filter lists / blocklists / query log all carry over.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard
  namespace: utility-system
  labels:
    app.kubernetes.io/name: adguard
spec:
  replicas: 1
  # hostPort 53 can't double-bind during a rolling update; only one
  # pod per node may hold the port at a time.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: adguard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adguard
    spec:
      nodeSelector:
        personal-stack/capability-adguard: 'true'
      # Share the node's network namespace — see file header for the
      # full rationale. AdGuardHome binds :53 + :3000 directly on
      # every host interface.
      hostNetwork: true
      # hostNetwork pods would otherwise inherit the cluster's
      # default dnsPolicy (ClusterFirst) and try to query
      # kube-dns via the host's resolv.conf, which on t1000 is
      # 127.0.0.1 — a self-loop through the AdGuard we're starting.
      # ClusterFirstWithHostNet keeps cluster DNS for non-cluster
      # names via the host's upstreams (PR #150's Cloudflare fallback
      # covers the bootstrap).
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: adguardhome
          image: adguard/adguardhome:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
          volumeMounts:
            - name: work
              mountPath: /opt/adguardhome/work
            - name: conf
              mountPath: /opt/adguardhome/conf
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        # Re-use the same on-disk layout the NixOS module created, so
        # existing config + query log survive the migration. The
        # upstream Docker image uses /opt/adguardhome/work and /conf;
        # the NixOS service uses /var/lib/AdGuardHome as a single
        # combined dir — mount it twice so whichever subdir the
        # binary writes to is persisted.
        - name: work
          hostPath:
            path: /var/lib/AdGuardHome
            type: DirectoryOrCreate
        - name: conf
          hostPath:
            path: /var/lib/AdGuardHome
            type: DirectoryOrCreate
