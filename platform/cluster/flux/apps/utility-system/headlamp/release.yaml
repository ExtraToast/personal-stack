apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: utility-system
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: utility-system
  values:
    # Single replica pinned to the frankfurt control plane — Headlamp
    # proxies to the kube-apiserver via the in-cluster ServiceAccount, so
    # it's convenient to run next to the API server.
    replicaCount: 1
    nodeSelector:
      personal-stack/site: frankfurt
    config:
      baseURL: ''
      # OIDC front-door authentication. Users hit dashboard.jorisjonkers.dev,
      # traefik forward-auth verifies DASHBOARD ServicePermission via
      # auth-api, then Headlamp kicks off an OIDC flow against auth-api.
      # The resulting ID token is passed to the k3s API server, which is
      # configured to trust it (see platform/nix/modules/roles/control-plane.nix).
      # The user's RBAC is decided by the `groups` claim:
      # DASHBOARD permission -> oidc:k8s-admin group -> cluster-admin.
      #
      # The clientID and clientSecret live in an externally-managed Secret
      # named `headlamp-oidc` so rotations don't require a chart reconcile.
      oidc:
        secret:
          create: false
        externalSecret:
          enabled: true
          name: headlamp-oidc
        issuerURL: https://auth.jorisjonkers.dev
        scopes: openid profile email groups
        callbackURL: https://dashboard.jorisjonkers.dev/oidc-callback
    service:
      type: ClusterIP
      port: 80
    # Plugins init container was removed in a prior cleanup (403s against
    # ghcr). Keep the PVC disabled — Headlamp falls back to generic
    # Kubernetes resource views.
    persistentVolumeClaim:
      enabled: false
    # With OIDC, each authenticated user's ID token is what the API server
    # authorises against (via the oidc:k8s-admin ClusterRoleBinding). The
    # pod's own ServiceAccount is effectively unused for API calls, so
    # drop the chart-managed ClusterRoleBinding to keep the SA without
    # any cluster-wide grants.
    clusterRoleBinding:
      create: false
