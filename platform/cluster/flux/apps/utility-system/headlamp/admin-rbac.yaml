# ServiceAccount + ClusterRoleBinding for Headlamp's "Login with token"
# flow. The chart-created `headlamp` ServiceAccount in utility-system stays
# on the `view` ClusterRole (that's what the UI runs as day-to-day behind
# forward-auth and is deliberately read-only). This separate SA in
# kube-system is cluster-admin and is only reached via a short-lived bearer
# token minted on demand:
#
#     kubectl -n kube-system create token headlamp-admin --duration=24h
#
# Paste the result into Headlamp's token-login field. The token auto-
# expires; no static secret lives anywhere.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: kube-system
