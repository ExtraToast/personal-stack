apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: ingress-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: ingress-system
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik-public
    ingressRoute:
      dashboard:
        enabled: false
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        enabled: true
        ingressClass: traefik-public
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-public
        publishedService:
          enabled: true
    service:
      annotations:
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
        external-dns.alpha.kubernetes.io/hostname: ingress.jorisjonkers.dev
      spec:
        externalTrafficPolicy: Local
      type: LoadBalancer
