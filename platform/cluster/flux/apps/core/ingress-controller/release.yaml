apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: ingress-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: ingress-system
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik-public
    ingressRoute:
      dashboard:
        enabled: false
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        enabled: true
        ingressClass: traefik-public
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-public
        publishedService:
          enabled: true
    service:
      annotations:
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
        external-dns.alpha.kubernetes.io/hostname: ingress.jorisjonkers.dev
        # Opt out of MetalLB allocation: the Service's LB IP is vestigial
        # (CF reaches this Traefik via hostPort 80/443 on the Frankfurt
        # node, not via a LoadBalancer IP — see note below). Pointing at
        # a pool that does not exist keeps MetalLB from grabbing the sole
        # enschede-lan IP that traefik-lan needs.
        metallb.io/address-pool: frankfurt-unused
      spec:
        externalTrafficPolicy: Local
      type: LoadBalancer
    # Cloudflare proxies jorisjonkers.dev at the apex to 167.86.79.203:443,
    # which is frankfurt-contabo-1. MetalLB only hands out IPs on the
    # enschede LAN, so the LoadBalancer service alone binds nothing
    # reachable from the public internet. Bind web/websecure on hostPort
    # 80/443 directly and pin the pod to frankfurt so Cloudflare has an
    # actual TCP endpoint to reach.
    ports:
      web:
        hostPort: 80
      websecure:
        hostPort: 443
      metrics:
        port: 9100
        expose:
          default: false
        exposedPort: 9100
        protocol: TCP
    logs:
      general:
        format: json
      access:
        enabled: true
        format: json
        fields:
          defaultMode: keep
          headers:
            defaultMode: drop
            names:
              User-Agent: keep
              Referer: keep
              X-Forwarded-For: keep
    metrics:
      # Without `enabled: true` the chart silently skips wiring the
      # static config block, so the Prometheus endpoint never came
      # online after #213.
      prometheus:
        enabled: true
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
    tracing:
      otlp:
        enabled: true
        http:
          enabled: true
          endpoint: http://alloy.observability.svc.cluster.local:4318/v1/traces
      sampleRate: 0.1
    # hostPort 80/443 means only one Traefik pod can bind a node at a
    # time. Default rolling update with maxSurge=1 tries to bring up a
    # second pod alongside the running one — it stays Pending forever
    # because the host ports are already taken, Helm hits its 5m
    # timeout, the HelmRelease goes Failed, and the apps-core flux
    # Kustomization stalls (which then blocks every downstream
    # Kustomization that depends on apps-core).
    #
    # The traefik chart's value path for this is `updateStrategy.*` at
    # the top level, *not* `deployment.rollingUpdate.*` — the previous
    # nesting (added in #220, kept in #227) was a silent no-op and the
    # live Deployment kept the chart default of maxSurge=1 /
    # maxUnavailable=0. Verified against `helm show values traefik
    # --version 39.0.9`.
    deployment:
      kind: Deployment
      replicas: 1
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    nodeSelector:
      personal-stack/site: frankfurt
