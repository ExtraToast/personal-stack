apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: ingress-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: ingress-system
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik-public
    ingressRoute:
      dashboard:
        enabled: false
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        enabled: true
        ingressClass: traefik-public
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-public
        publishedService:
          enabled: true
    service:
      annotations:
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
        external-dns.alpha.kubernetes.io/hostname: ingress.jorisjonkers.dev
      spec:
        externalTrafficPolicy: Local
      type: LoadBalancer
    # Cloudflare proxies jorisjonkers.dev at the apex to 167.86.79.203:443,
    # which is frankfurt-contabo-1. MetalLB only hands out IPs on the
    # enschede LAN, so the LoadBalancer service alone binds nothing
    # reachable from the public internet. Bind web/websecure on hostPort
    # 80/443 directly and pin the pod to frankfurt so Cloudflare has an
    # actual TCP endpoint to reach.
    ports:
      web:
        hostPort: 80
      websecure:
        hostPort: 443
    nodeSelector:
      personal-stack/site: frankfurt
