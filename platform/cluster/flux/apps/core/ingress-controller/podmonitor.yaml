apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: traefik
  namespace: ingress-system
  labels:
    release: metrics-stack
spec:
  # Make Prometheus assign job=<service> from the Service's
  # app.kubernetes.io/name label, instead of the default
  # <namespace>/<servicemonitor-name> form which doesn't match
  # any of our dashboard queries.
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      relabelings:
        - targetLabel: instance_kind
          replacement: public
