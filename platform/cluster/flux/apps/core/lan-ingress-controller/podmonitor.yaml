apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: traefik-lan
  namespace: ingress-lan-system
  labels:
    release: metrics-stack
spec:
  # Make Prometheus assign job=<service> from the Service's
  # app.kubernetes.io/name label, instead of the default
  # <namespace>/<servicemonitor-name> form which doesn't match
  # any of our dashboard queries.
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      # Both ingress-system/traefik and ingress-lan-system/traefik
      # carry app.kubernetes.io/name=traefik (Helm chart default), so
      # they share the job label. Add a constant `instance_kind=lan`
      # so dashboards can split public vs LAN traffic.
      relabelings:
        - targetLabel: instance_kind
          replacement: lan
