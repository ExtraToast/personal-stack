apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-lan
  namespace: ingress-lan-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: ingress-lan-system
  values:
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-lan
    ingressRoute:
      dashboard:
        enabled: false
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        enabled: true
        ingressClass: traefik-lan
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-lan
        publishedService:
          enabled: true
    nodeSelector:
      personal-stack/capability-lan-ingress: 'true'
    service:
      annotations:
        metallb.io/address-pool: enschede-lan
        metallb.io/loadBalancerIPs: 192.168.0.99
      spec:
        externalTrafficPolicy: Local
      type: LoadBalancer
    ports:
      metrics:
        port: 9100
        expose:
          default: false
        exposedPort: 9100
        protocol: TCP
    logs:
      general:
        format: json
      access:
        enabled: true
        format: json
        fields:
          defaultMode: keep
          headers:
            defaultMode: drop
            names:
              User-Agent: keep
              Referer: keep
              X-Forwarded-For: keep
    metrics:
      prometheus:
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
    tracing:
      otlp:
        http:
          endpoint: http://alloy.observability.svc.cluster.local:4318/v1/traces
      sampleRate: 0.1
