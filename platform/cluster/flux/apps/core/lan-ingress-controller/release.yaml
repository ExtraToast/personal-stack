apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-lan
  namespace: ingress-lan-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: ingress-lan-system
  values:
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-lan
    ingressRoute:
      dashboard:
        enabled: false
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        enabled: true
        ingressClass: traefik-lan
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-lan
        publishedService:
          enabled: true
    nodeSelector:
      personal-stack/capability-lan-ingress: 'true'
    service:
      annotations:
        metallb.io/address-pool: enschede-lan
        metallb.io/loadBalancerIPs: 192.168.1.240
      spec:
        externalTrafficPolicy: Local
      type: LoadBalancer
