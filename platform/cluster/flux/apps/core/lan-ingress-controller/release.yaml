apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-lan
  namespace: ingress-lan-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      # Pinned: the chart was floating on '*' and silently rolled to 41.0.0,
      # whose values schema dropped the top-level `logs:` key — Flux then
      # failed every upgrade. Pin to an explicit version so chart bumps land
      # as reviewable Renovate PRs instead of breaking reconciliation.
      version: '41.0.0'
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: ingress-lan-system
  values:
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-lan
    ingressRoute:
      dashboard:
        enabled: false
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        enabled: true
        ingressClass: traefik-lan
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-lan
        publishedService:
          enabled: true
    nodeSelector:
      personal-stack/capability-lan-ingress: 'true'
    service:
      annotations:
        metallb.io/address-pool: enschede-lan
        metallb.io/loadBalancerIPs: 192.168.0.99
      spec:
        externalTrafficPolicy: Local
      type: LoadBalancer
    ports:
      metrics:
        port: 9100
        expose:
          default: false
        exposedPort: 9100
        protocol: TCP
    # Traefik chart 41.0.0 split the old top-level `logs:` key into `log:`
    # (general logging) and `accessLog:` (access logging). Same behaviour as
    # before — JSON format, access logging on, headers dropped except a kept
    # allow-list — re-expressed under the new keys.
    log:
      format: json
    accessLog:
      enabled: true
      format: json
      fields:
        defaultMode: keep
        headers:
          defaultMode: drop
          names:
            User-Agent: keep
            Referer: keep
            X-Forwarded-For: keep
    metrics:
      prometheus:
        enabled: true
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
    tracing:
      otlp:
        enabled: true
        http:
          enabled: true
          endpoint: http://alloy.observability.svc.cluster.local:4318/v1/traces
      sampleRate: 0.1
