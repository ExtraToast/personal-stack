apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-operator
  namespace: vso-system
spec:
  interval: 30m
  chart:
    spec:
      chart: vault-secrets-operator
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: vso-system
  values:
    defaultVaultConnection:
      enabled: true
      address: 'http://vault.data-system.svc.cluster.local:8200'
    defaultAuthMethod:
      enabled: true
      namespace: 'vso-system'
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: vso
        serviceAccount: 'vault-secrets-operator'
        tokenAudiences:
          - vault
