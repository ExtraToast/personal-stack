apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
  values:
    # Pin to the Frankfurt VPS so Cloudflare API calls egress from the
    # VPS public IP (167.86.79.203). The Cloudflare token is IP-filtered
    # to that address; when external-dns was rescheduled onto an Enschede
    # node its calls came from the home egress IP and Cloudflare rejected
    # them with 403 code 9109 ("Cannot use the access token from location
    # …"). external-dns is a single cluster-wide controller — the node it
    # runs on only determines the API-caller IP, not which records it
    # manages (that is set by the annotation/domain filters below).
    nodeSelector:
      personal-stack/site: frankfurt
    provider:
      name: cloudflare
    sources:
      - service
      - traefik-proxy
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token
    extraArgs:
      - --annotation-filter=kubernetes.io/ingress.class=traefik-public
      - --domain-filter=jorisjonkers.dev
      - --txt-owner-id=personal-stack-production
