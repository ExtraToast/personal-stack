apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
spec:
  interval: 30m
  chart:
    spec:
      chart: nvidia-device-plugin
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: nvidia-device-plugin
  values:
    compatWithCPUManager: true
    nodeSelector:
      personal-stack/capability-nvidia: 'true'
    # The chart default nodeAffinity requires a node-feature-discovery label
    # (feature.node.kubernetes.io/pci-10de.present). We do not run NFD yet
    # and instead label NVIDIA-capable nodes ourselves via the k3s role
    # module, so clear the chart's nodeAffinity to rely on nodeSelector only.
    affinity: {}
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    gfd:
      enabled: false
