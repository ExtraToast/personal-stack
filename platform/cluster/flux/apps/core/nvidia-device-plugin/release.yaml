apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
spec:
  interval: 30m
  chart:
    spec:
      chart: nvidia-device-plugin
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: nvidia-device-plugin
  values:
    compatWithCPUManager: true
    nodeSelector:
      personal-stack/capability-nvidia: 'true'
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    gfd:
      enabled: false
