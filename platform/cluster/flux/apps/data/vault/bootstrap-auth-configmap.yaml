apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-auth
  namespace: data-system
data:
  bootstrap.sh: |
    #!/usr/bin/env sh
    set -eu

    if ! vault auth list -format=json | grep -q '"kubernetes/"'; then
      vault auth enable kubernetes
    fi

    vault write auth/kubernetes/config \
      kubernetes_host="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}" \
      token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
      kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

    if ! vault secrets list -format=json | grep -q '"kvv2/"'; then
      vault secrets enable -path=kvv2 kv-v2
    fi

    vault kv put kvv2/platform/sample message="hello from vault"

    cat <<'EOF' >/tmp/platform-sample-read.hcl
    path "kvv2/data/platform/sample" {
      capabilities = ["read"]
    }
    EOF

    vault policy write platform-sample-read /tmp/platform-sample-read.hcl

    vault write auth/kubernetes/role/platform-sample \
      bound_service_account_names="platform-vault-sample" \
      bound_service_account_namespaces="data-system" \
      policies="platform-sample-read" \
      ttl="1h"

    if ! vault read transit/keys/auth-api-jwt >/dev/null 2>&1; then
      vault write transit/keys/auth-api-jwt type="rsa-2048"
    fi

    cat <<'EOF' >/tmp/auth-api.hcl
    path "secret/data/auth-api" {
      capabilities = ["read"]
    }

    path "secret/data/auth-api/*" {
      capabilities = ["read"]
    }

    path "rabbitmq/creds/app-consumer" {
      capabilities = ["read"]
    }

    path "database/creds/auth-api" {
      capabilities = ["read"]
    }

    path "transit/sign/auth-api-jwt" {
      capabilities = ["update"]
    }

    path "transit/keys/auth-api-jwt" {
      capabilities = ["read"]
    }
    EOF

    cat <<'EOF' >/tmp/assistant-api.hcl
    path "secret/data/assistant-api" {
      capabilities = ["read"]
    }

    path "secret/data/assistant-api/*" {
      capabilities = ["read"]
    }

    path "rabbitmq/creds/app-consumer" {
      capabilities = ["read"]
    }

    path "database/creds/assistant-api" {
      capabilities = ["read"]
    }
    EOF

    cat <<'EOF' >/tmp/n8n.hcl
    path "secret/data/platform/automation" {
      capabilities = ["read"]
    }

    path "secret/data/platform/postgres" {
      capabilities = ["read"]
    }

    path "database/creds/n8n" {
      capabilities = ["read"]
    }
    EOF

    cat <<'EOF' >/tmp/postgres.hcl
    path "secret/data/platform/postgres" {
      capabilities = ["read"]
    }
    EOF

    cat <<'EOF' >/tmp/rabbitmq.hcl
    path "secret/data/platform/rabbitmq" {
      capabilities = ["read"]
    }
    EOF

    cat <<'EOF' >/tmp/downloads.hcl
    path "secret/data/platform/media" {
      capabilities = ["read"]
    }
    EOF

    cat <<'EOF' >/tmp/stalwart.hcl
    path "secret/data/platform/mail" {
      capabilities = ["read"]
    }

    path "secret/data/platform/edge" {
      capabilities = ["read"]
    }
    EOF

    # Vault Secrets Operator (VSO) reads here to mint k8s Secrets in
    # the namespaces of the apps that need them:
    # - platform/edge: cloudflare DNS-01 API token (cert-manager,
    #   external-dns).
    # - platform/observability: grafana OAuth client secret, synced
    #   into the observability namespace so the grafana chart can
    #   envFromSecret it into GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET.
    cat <<'EOF' >/tmp/vso.hcl
    path "secret/data/platform/edge" {
      capabilities = ["read"]
    }

    path "secret/data/platform/observability" {
      capabilities = ["read"]
    }
    EOF

    vault policy write auth-api /tmp/auth-api.hcl
    vault policy write assistant-api /tmp/assistant-api.hcl
    vault policy write n8n /tmp/n8n.hcl
    vault policy write postgres /tmp/postgres.hcl
    vault policy write rabbitmq /tmp/rabbitmq.hcl
    vault policy write downloads /tmp/downloads.hcl
    vault policy write stalwart /tmp/stalwart.hcl
    vault policy write vso /tmp/vso.hcl

    vault write auth/kubernetes/role/auth-api \
      bound_service_account_names="auth-api" \
      bound_service_account_namespaces="auth-system" \
      policies="auth-api" \
      ttl="1h"

    vault write auth/kubernetes/role/assistant-api \
      bound_service_account_names="assistant-api" \
      bound_service_account_namespaces="assistant-system" \
      policies="assistant-api" \
      ttl="1h"

    vault write auth/kubernetes/role/n8n \
      bound_service_account_names="n8n" \
      bound_service_account_namespaces="automation-system" \
      policies="n8n" \
      ttl="1h"

    vault write auth/kubernetes/role/postgres \
      bound_service_account_names="postgres" \
      bound_service_account_namespaces="data-system" \
      policies="postgres" \
      ttl="1h"

    vault write auth/kubernetes/role/rabbitmq \
      bound_service_account_names="rabbitmq" \
      bound_service_account_namespaces="data-system" \
      policies="rabbitmq" \
      ttl="1h"

    vault write auth/kubernetes/role/downloads \
      bound_service_account_names="downloads" \
      bound_service_account_namespaces="media-system" \
      policies="downloads" \
      ttl="1h"

    vault write auth/kubernetes/role/stalwart \
      bound_service_account_names="stalwart" \
      bound_service_account_namespaces="mail-system" \
      policies="stalwart" \
      ttl="1h"

    vault write auth/kubernetes/role/vso \
      bound_service_account_names="vault-secrets-operator" \
      bound_service_account_namespaces="vso-system,cert-manager,external-dns,observability" \
      policies="vso" \
      ttl="1h"

    # RabbitMQ dynamic secrets engine. Reconfigure the connection on every
    # bootstrap so the URI + admin creds always match the current cluster;
    # without this, a raft-snapshot restore leaves the engine pointing at
    # the snapshot-time URL and admin password, and every `creds/app-*`
    # read 500s with "failed to create a new user".
    if ! vault secrets list -format=json | grep -q '"rabbitmq/"'; then
      vault secrets enable rabbitmq
    fi
    RMQ_USER=$(vault kv get -field=rabbitmq.user secret/platform/rabbitmq)
    RMQ_PASS=$(vault kv get -field=rabbitmq.password secret/platform/rabbitmq)
    vault write rabbitmq/config/connection \
      connection_uri="http://rabbitmq.data-system.svc.cluster.local:15672" \
      username="${RMQ_USER}" \
      password="${RMQ_PASS}" \
      verify_connection=true
    unset RMQ_USER RMQ_PASS

    vault write rabbitmq/roles/app-consumer \
      vhosts='{"/":{"configure":".*","write":".*","read":".*"}}' \
      default_ttl="72h" \
      max_ttl="768h"

    # Postgres dynamic secrets engine. n8n authenticates with creds issued
    # by `database/creds/n8n`, which until now only existed because someone
    # configured this engine by hand against the live Vault; a raft-snapshot
    # restore loses that state and leaves n8n's pod authenticating as a
    # role with zero grants ("permission denied for table user" on every
    # request). Bootstrap it here so the setup self-heals on every re-run.
    if ! vault secrets list -format=json | grep -q '"database/"'; then
      vault secrets enable database
    fi
    PG_ADMIN_USER=$(vault kv get -field=postgres.user secret/platform/postgres)
    PG_ADMIN_PASS=$(vault kv get -field=postgres.password secret/platform/postgres)
    # The init-databases.sh script on the postgres StatefulSet creates a
    # static `n8n_user` role that owns every table in n8n_db. We mint
    # short-lived dynamic roles that are members of n8n_user with INHERIT,
    # so they automatically pick up every privilege n8n_user has --
    # including SELECT/INSERT/UPDATE on `user`, `workflow_entity`, etc.
    # Without the IN ROLE clause the ephemeral role starts with no grants
    # and the app 500s on every settings load.
    N8N_PARENT_ROLE=$(vault kv get -field=n8n.user secret/platform/postgres)
    AUTH_PARENT_ROLE=$(vault kv get -field=auth.user secret/platform/postgres)
    ASSISTANT_PARENT_ROLE=$(vault kv get -field=assistant.user secret/platform/postgres)
    vault write database/config/postgres \
      plugin_name=postgresql-database-plugin \
      allowed_roles="n8n,auth-api,assistant-api" \
      connection_url="postgres://{{username}}:{{password}}@postgres.data-system.svc.cluster.local:5432/postgres?sslmode=disable" \
      username="${PG_ADMIN_USER}" \
      password="${PG_ADMIN_PASS}" \
      verify_connection=true
    # n8n reads DB creds once at container start; the Vault Agent sidecar
    # (not pre-populate-only) renews the lease for the pod's lifetime.
    # 768h max_ttl covers a full monthly cadence between image updates.
    vault write database/roles/n8n \
      db_name=postgres \
      default_ttl="72h" \
      max_ttl="768h" \
      creation_statements="CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}' IN ROLE \"${N8N_PARENT_ROLE}\" INHERIT;" \
      revocation_statements="REASSIGN OWNED BY \"{{name}}\" TO \"${N8N_PARENT_ROLE}\"; DROP OWNED BY \"{{name}}\"; DROP ROLE \"{{name}}\";"
    # auth-api's application.yml declares spring.cloud.vault.database.role: auth-api
    # and Spring Cloud Vault mints creds via database/creds/auth-api at startup
    # and periodically through its lifecycle manager. Without this role every
    # such call returns "400 no role found" and Spring's DataSourceHealthIndicator
    # flips DOWN, taking /api/v1/auth/me and /api/v1/auth/session-login with it.
    # Same IN ROLE "${AUTH_PARENT_ROLE}" INHERIT shape as n8n so the ephemeral
    # role inherits every grant the static auth_user has on auth_db.
    vault write database/roles/auth-api \
      db_name=postgres \
      default_ttl="72h" \
      max_ttl="168h" \
      creation_statements="CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}' IN ROLE \"${AUTH_PARENT_ROLE}\" INHERIT;" \
      revocation_statements="REASSIGN OWNED BY \"{{name}}\" TO \"${AUTH_PARENT_ROLE}\"; DROP OWNED BY \"{{name}}\"; DROP ROLE \"{{name}}\";"
    # assistant-api has the same spring.cloud.vault.database.role shape as
    # auth-api (services/assistant-api/src/main/resources/application.yml),
    # and was silently affected by the same missing-role bug.
    vault write database/roles/assistant-api \
      db_name=postgres \
      default_ttl="72h" \
      max_ttl="168h" \
      creation_statements="CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}' IN ROLE \"${ASSISTANT_PARENT_ROLE}\" INHERIT;" \
      revocation_statements="REASSIGN OWNED BY \"{{name}}\" TO \"${ASSISTANT_PARENT_ROLE}\"; DROP OWNED BY \"{{name}}\"; DROP ROLE \"{{name}}\";"
    unset PG_ADMIN_USER PG_ADMIN_PASS N8N_PARENT_ROLE AUTH_PARENT_ROLE ASSISTANT_PARENT_ROLE
