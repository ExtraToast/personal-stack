apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-vault-sample
  namespace: data-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-reader
  namespace: data-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-reader
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-reader
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: platform-sample
        vault.hashicorp.com/agent-inject-secret-sample.txt: kvv2/data/platform/sample
        vault.hashicorp.com/agent-inject-template-sample.txt: |
          {{- with secret "kvv2/data/platform/sample" -}}
          message={{ .Data.data.message }}
          {{- end }}
    spec:
      serviceAccountName: platform-vault-sample
      containers:
        - name: sample-reader
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              while true; do
                if [ -f /vault/secrets/sample.txt ]; then
                  cat /vault/secrets/sample.txt
                fi
                sleep 300
              done
