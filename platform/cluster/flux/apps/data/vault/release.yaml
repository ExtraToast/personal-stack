apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: data-system
spec:
  interval: 30m
  chart:
    spec:
      chart: vault
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: data-system
  values:
    ui:
      enabled: true
    injector:
      enabled: true
    csi:
      enabled: true
    server:
      nodeSelector:
        personal-stack/site: frankfurt
      dataStorage:
        enabled: true
        size: 10Gi
      auditStorage:
        enabled: true
        size: 10Gi
      ha:
        enabled: true
        replicas: 1
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true

            listener "tcp" {
              address = "[::]:8200"
              cluster_address = "[::]:8201"
              tls_disable = 1
            }

            storage "raft" {
              path = "/vault/data"
            }

            service_registration "kubernetes" {}
