apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: data-system
spec:
  interval: 30m
  chart:
    spec:
      chart: vault
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: data-system
  values:
    ui:
      enabled: true
    injector:
      enabled: true
      # Fail closed on admission. The chart default is "Ignore", which
      # lets the kube-apiserver admit pods *without* running the vault
      # mutating webhook when the injector is unreachable -- e.g. while
      # it restarts after a node reconnect. Pods admitted unmutated have
      # no vault-agent-init sidecar, never get /vault/secrets populated,
      # and crashloop forever with no way for reconcile to fix them
      # short of a manual pod delete. "Fail" makes admission retry until
      # the webhook is actually up, which is the right trade-off for
      # workloads that require vault-injected secrets to start at all.
      failurePolicy: Fail
      # Run two replicas so a single injector pod restart (e.g. node
      # reboot, image pull, eviction) does not create an admission
      # window during which new pods skip the webhook.
      replicas: 2
    csi:
      enabled: true
    server:
      readinessProbe:
        enabled: true
        timeoutSeconds: 10
      nodeSelector:
        personal-stack/site: frankfurt
      dataStorage:
        enabled: true
        size: 10Gi
      auditStorage:
        enabled: true
        size: 10Gi
      ha:
        enabled: true
        replicas: 1
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true

            listener "tcp" {
              address = "[::]:8200"
              cluster_address = "[::]:8201"
              tls_disable = 1
              # Allow unauthenticated /v1/sys/metrics from inside the
              # cluster only — Prometheus scrapes from Frankfurt at the
              # cluster Service IP. Without this the endpoint requires
              # a token, but ServiceMonitor + bearer token via VSO is
              # cleaner; we still keep auth on for defence in depth, so
              # the token-based scraper below is what actually reaches
              # this endpoint.
              telemetry {
                unauthenticated_metrics_access = false
              }
            }

            storage "raft" {
              path = "/vault/data"
            }

            service_registration "kubernetes" {}

            # Expose Prometheus metrics format on /v1/sys/metrics?format=prometheus
            # and keep histograms for 24h so percentiles aren't reset
            # every scrape cycle.
            telemetry {
              prometheus_retention_time = "24h"
              disable_hostname           = true
            }
