apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-bootstrap-auth
  namespace: data-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-bootstrap-auth-token-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-bootstrap-auth
    namespace: data-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap-auth
  namespace: data-system
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-bootstrap-auth
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-bootstrap-auth
      containers:
        - name: bootstrap
          image: hashicorp/vault
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - /bootstrap/bootstrap.sh
          env:
            - name: VAULT_ADDR
              value: http://vault.data-system.svc.cluster.local:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-bootstrap-token
                  key: token
          volumeMounts:
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
      volumes:
        - name: bootstrap
          configMap:
            name: vault-bootstrap-auth
            defaultMode: 493
