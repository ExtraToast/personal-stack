apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-bootstrap-auth
  namespace: data-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-bootstrap-auth-token-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-bootstrap-auth
    namespace: data-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap-auth
  namespace: data-system
  # Job.spec.template is immutable, so when the hashed vault-bootstrap-auth
  # ConfigMap name changes (content hash drift on bootstrap-auth.sh), a
  # plain `kubectl apply` would fail with "field is immutable". This
  # annotation tells the Flux Kustomization controller to delete and
  # recreate the Job when its spec diverges — the whole point of the
  # configMapGenerator hash is that every bootstrap-auth.sh edit forces
  # a fresh Job run.
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-bootstrap-auth
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-bootstrap-auth
      # Vault itself only runs on Frankfurt (see release.yaml), so the
      # bootstrap Job — which talks to the Frankfurt Vault and only
      # makes sense colocated — pins here too. Without this the Job
      # could land on any worker, and on the AMD enschede-rx7900xtx-1
      # node a freshly-pulled `hashicorp/vault:latest` started failing
      # with `vault: Operation not permitted` on the first command,
      # blocking the entire bootstrap flow (new Vault policies + roles
      # never landed). Pinning to Frankfurt + a known image tag (matches
      # the server-side `vault` StatefulSet version) keeps the Job
      # predictable.
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        - name: bootstrap
          image: hashicorp/vault:1.21.2
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - /bootstrap/bootstrap.sh
          env:
            - name: VAULT_ADDR
              value: http://vault.data-system.svc.cluster.local:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-bootstrap-token
                  key: token
          volumeMounts:
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
      volumes:
        - name: bootstrap
          configMap:
            name: vault-bootstrap-auth
            defaultMode: 493
