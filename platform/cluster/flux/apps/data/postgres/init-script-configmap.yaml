apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: data-system
data:
  init-databases.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    # This script is executed by the PostgreSQL entrypoint on first run.
    # It creates separate databases and users for each service.
    # In production, passwords are read from Docker secrets; defaults are for local dev.

    read_secret() {
        local file="/run/secrets/$1"
        if [ -f "$file" ]; then
            cat "$file"
        else
            echo "$2"
        fi
    }

    resolve_value() {
        local env_name="$1"
        local secret_name="$2"
        local fallback="$3"
        local current="${!env_name:-}"

        if [ -n "$current" ]; then
            echo "$current"
        else
            read_secret "$secret_name" "$fallback"
        fi
    }

    AUTH_DB_USER=$(resolve_value AUTH_DB_USER auth_db_user auth_user)
    AUTH_DB_PASSWORD=$(resolve_value AUTH_DB_PASSWORD auth_db_password auth_password)
    ASSISTANT_DB_USER=$(resolve_value ASSISTANT_DB_USER assistant_db_user assistant_user)
    ASSISTANT_DB_PASSWORD=$(resolve_value ASSISTANT_DB_PASSWORD assistant_db_password assistant_password)
    WOLFMANAGER_DB_USER=$(resolve_value WOLFMANAGER_DB_USER wolfmanager_db_user wolfmanager_user)
    WOLFMANAGER_DB_PASSWORD=$(resolve_value WOLFMANAGER_DB_PASSWORD wolfmanager_db_password wolfmanager_password)
    N8N_DB_USER=n8n_user

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        -- Auth service database
        CREATE USER ${AUTH_DB_USER} WITH PASSWORD '${AUTH_DB_PASSWORD}';
        CREATE DATABASE auth_db OWNER ${AUTH_DB_USER};
        GRANT ALL PRIVILEGES ON DATABASE auth_db TO ${AUTH_DB_USER};

        -- Assistant service database
        CREATE USER ${ASSISTANT_DB_USER} WITH PASSWORD '${ASSISTANT_DB_PASSWORD}';
        CREATE DATABASE assistant_db OWNER ${ASSISTANT_DB_USER};
        GRANT ALL PRIVILEGES ON DATABASE assistant_db TO ${ASSISTANT_DB_USER};

        -- WolfManager database
        CREATE USER ${WOLFMANAGER_DB_USER} WITH PASSWORD '${WOLFMANAGER_DB_PASSWORD}';
        CREATE DATABASE wolfmanager_db OWNER ${WOLFMANAGER_DB_USER};
        GRANT ALL PRIVILEGES ON DATABASE wolfmanager_db TO ${WOLFMANAGER_DB_USER};

        -- n8n database. n8n authenticates via Vault postgres dynamic
        -- creds (database/creds/n8n); n8n_user exists only as a
        -- grant-parent that owns the objects, so it is NOLOGIN with
        -- no password. Ephemeral dynamic roles are IN ROLE n8n_user
        -- INHERIT and pick up every privilege it has.
        CREATE ROLE ${N8N_DB_USER} NOLOGIN;
        CREATE DATABASE n8n_db OWNER ${N8N_DB_USER};
        GRANT ALL PRIVILEGES ON DATABASE n8n_db TO ${N8N_DB_USER};
    EOSQL

    # PostgreSQL 15+ revoked default CREATE on the public schema for non-superusers.
    # Transfer public schema ownership so each service can run migrations.
    # Also enable pg_stat_statements in each app DB so we can inspect
    # top-N slow queries by mean_exec_time; the shared library is
    # preloaded via postgresql.conf (see config-configmap.yaml).
    for db_and_user in "auth_db:${AUTH_DB_USER}" "assistant_db:${ASSISTANT_DB_USER}" "wolfmanager_db:${WOLFMANAGER_DB_USER}" "n8n_db:${N8N_DB_USER}"; do
        db="${db_and_user%%:*}"
        user="${db_and_user##*:}"
        psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$db" <<-EOSQL
            ALTER SCHEMA public OWNER TO ${user};
            CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
    EOSQL
    done

    echo "==> All databases and users created successfully."
