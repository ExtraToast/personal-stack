apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: data-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: data-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: data-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: postgres
        vault.hashicorp.com/agent-inject-secret-postgres.env: secret/data/platform/postgres
        vault.hashicorp.com/agent-inject-template-postgres.env: |
          POSTGRES_DB=postgres
          POSTGRES_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "postgres.user" }}{{ end }}
          POSTGRES_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "postgres.password" }}{{ end }}
          AUTH_DB_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "auth.user" }}{{ end }}
          AUTH_DB_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "auth.password" }}{{ end }}
          ASSISTANT_DB_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "assistant.user" }}{{ end }}
          ASSISTANT_DB_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "assistant.password" }}{{ end }}
          N8N_DB_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "n8n.user" }}{{ end }}
          N8N_DB_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "n8n.password" }}{{ end }}
    spec:
      serviceAccountName: postgres
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -a
              . /vault/secrets/postgres.env
              set +a
              # Point Postgres at our tuned postgresql.conf. Mounted
              # read-only from the postgres-config ConfigMap, which is
              # why we don't use the default config path under the data
              # dir (the entrypoint would try to regenerate it).
              exec docker-entrypoint.sh postgres \
                -c config_file=/etc/postgresql/postgresql.conf
          ports:
            - containerPort: 5432
              name: db
          readinessProbe:
            tcpSocket:
              port: db
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: db
            timeoutSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init-script
              mountPath: /docker-entrypoint-initdb.d/init-databases.sh
              subPath: init-databases.sh
            - name: postgres-config
              mountPath: /etc/postgresql
              readOnly: true
          resources:
            requests:
              cpu: 750m
              memory: 1536Mi
            limits:
              cpu: 1500m
              memory: 3Gi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: postgres-init-script
          configMap:
            name: postgres-init-script
            defaultMode: 493
        - name: postgres-config
          configMap:
            name: postgres-config
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: data-system
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: db
      port: 5432
      targetPort: db
