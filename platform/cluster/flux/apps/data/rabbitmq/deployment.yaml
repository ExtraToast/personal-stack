apiVersion: v1
kind: ServiceAccount
metadata:
  name: rabbitmq
  namespace: data-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data
  namespace: data-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: data-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: rabbitmq
        vault.hashicorp.com/agent-inject-secret-rabbitmq.env: secret/data/platform/rabbitmq
        vault.hashicorp.com/agent-inject-template-rabbitmq.env: |
          RABBITMQ_DEFAULT_USER={{ with secret "secret/data/platform/rabbitmq" }}{{ index .Data.data "rabbitmq.user" }}{{ end }}
          RABBITMQ_DEFAULT_PASS={{ with secret "secret/data/platform/rabbitmq" }}{{ index .Data.data "rabbitmq.password" }}{{ end }}
    spec:
      serviceAccountName: rabbitmq
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        - name: rabbitmq
          image: rabbitmq:4.2-management-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -a
              . /vault/secrets/rabbitmq.env
              set +a
              exec rabbitmq-server
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
            - containerPort: 15692
              name: metrics
          readinessProbe:
            tcpSocket:
              port: amqp
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: amqp
            timeoutSeconds: 5
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
            - name: rabbitmq-enabled-plugins
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
          resources:
            requests:
              cpu: 400m
              memory: 768Mi
            limits:
              cpu: 800m
              memory: 1024Mi
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-data
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config
        - name: rabbitmq-enabled-plugins
          configMap:
            name: rabbitmq-enabled-plugins
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: data-system
spec:
  selector:
    app.kubernetes.io/name: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
    - name: metrics
      port: 15692
      targetPort: metrics
