apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: valkey-data
  namespace: data-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: data-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
    spec:
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: db
          readinessProbe:
            tcpSocket:
              port: db
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: db
            timeoutSeconds: 5
          volumeMounts:
            - name: valkey-data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
        - name: valkey-exporter
          image: oliver006/redis_exporter:v1.78.0-alpine
          imagePullPolicy: IfNotPresent
          args:
            - --redis.addr=redis://localhost:6379
          ports:
            - containerPort: 9121
              name: metrics
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
      volumes:
        - name: valkey-data
          persistentVolumeClaim:
            claimName: valkey-data
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: data-system
spec:
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: db
      port: 6379
      targetPort: db
    - name: metrics
      port: 9121
      targetPort: metrics
