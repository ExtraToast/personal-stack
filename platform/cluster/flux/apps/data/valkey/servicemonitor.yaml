apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: valkey
  namespace: data-system
  labels:
    release: metrics-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scheme: http
