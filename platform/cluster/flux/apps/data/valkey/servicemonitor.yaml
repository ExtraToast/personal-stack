apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: valkey
  namespace: data-system
  labels:
    release: metrics-stack
spec:
  # Make Prometheus assign job=<service> from the Service's
  # app.kubernetes.io/name label, instead of the default
  # <namespace>/<servicemonitor-name> form which doesn't match
  # any of our dashboard queries.
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scheme: http
