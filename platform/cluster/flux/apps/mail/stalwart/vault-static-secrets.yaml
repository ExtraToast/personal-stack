# Vault Secrets Operator projects the Vault secrets stalwart needs into
# k8s Secrets in mail-system. rolloutRestartTargets makes VSO roll the
# stalwart Deployment whenever any of these secrets rotates, so the
# stalwart-apply sidecar re-runs and renews the value (e.g. the
# Cloudflare DNS-01 token) in stalwart's database on the next boot.
#
# The vso Vault role must be bound to this SA in mail-system and the vso
# policy must read these paths — see bootstrap-auth.sh.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-secrets-operator
  namespace: mail-system
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: stalwart-edge
  namespace: mail-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: platform/edge
  destination:
    name: stalwart-edge
    create: true
    transformation:
      templates:
        CF_DNS_API_TOKEN:
          text: '{{- get .Secrets "cloudflare.dns_api_token" -}}'
  rolloutRestartTargets:
    - kind: Deployment
      name: stalwart
  refreshAfter: 1h
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: stalwart-mail
  namespace: mail-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: platform/mail
  destination:
    name: stalwart-mail
    create: true
    transformation:
      templates:
        STALWART_ADMIN_USER:
          text: '{{- get .Secrets "stalwart.admin_user" -}}'
        STALWART_ADMIN_SECRET:
          text: '{{- get .Secrets "stalwart.admin_password" -}}'
        # Composite credential consumed by STALWART_RECOVERY_ADMIN.
        STALWART_RECOVERY_ADMIN:
          text: '{{- get .Secrets "stalwart.admin_user" -}}:{{- get .Secrets "stalwart.admin_password" -}}'
        # Mailbox passwords for the Vault-managed accounts in
        # accounts.json. Populate secret/platform/mail account.password
        # and n8n.password; if a key is absent the apply sidecar skips
        # that account and leaves its existing credential untouched.
        ACCOUNT_MAIL_PASSWORD:
          text: '{{- get .Secrets "account.password" -}}'
        N8N_MAIL_PASSWORD:
          text: '{{- get .Secrets "n8n.password" -}}'
  rolloutRestartTargets:
    - kind: Deployment
      name: stalwart
  refreshAfter: 1h
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: stalwart-auth-mail
  namespace: mail-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: auth-api
  destination:
    name: stalwart-auth-mail
    create: true
    transformation:
      templates:
        AUTH_MAIL_USERNAME:
          text: '{{- get .Secrets "mail.username" -}}'
        AUTH_MAIL_PASSWORD:
          text: '{{- get .Secrets "mail.password" -}}'
  rolloutRestartTargets:
    - kind: Deployment
      name: stalwart
  refreshAfter: 1h
