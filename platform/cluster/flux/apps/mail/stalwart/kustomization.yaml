apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - config-template-configmap.yaml
  - deployment.yaml
  - principal-bootstrap-job.yaml

# Content-hashed ConfigMap holding the principal-bootstrap script.
# Editing the .sh changes the hashed name, which paired with the
# `kustomize.toolkit.fluxcd.io/force: enabled` annotation on the
# Job triggers a delete+recreate every time the script changes —
# Job.spec.template is immutable otherwise.
configMapGenerator:
  - name: stalwart-principal-bootstrap
    namespace: mail-system
    files:
      - principal-bootstrap.sh
