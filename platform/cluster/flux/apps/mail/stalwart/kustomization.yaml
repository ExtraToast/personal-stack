apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pure Kubernetes manifests. The reconcile script, plan templates and
# account manifest live in the stalwart-tools image (source under
# infra/stalwart), not in a ConfigMap — Keel rolls the Deployment when a
# new image is published.
resources:
  - config-json-configmap.yaml
  - vault-static-secrets.yaml
  - deployment.yaml
