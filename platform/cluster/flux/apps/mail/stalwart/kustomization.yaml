apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - config-json-configmap.yaml
  - vault-static-secrets.yaml
  - deployment.yaml

# Content-hashed ConfigMap holding the apply sidecar script and the
# settings plan template. A change to either rotates the hashed name,
# which rolls the stalwart Deployment so the new script/plan takes
# effect (ConfigMap volume updates alone do not restart pods).
configMapGenerator:
  - name: stalwart-apply
    namespace: mail-system
    files:
      - apply.sh
      - plan.ndjson.tmpl
      - accounts.json
