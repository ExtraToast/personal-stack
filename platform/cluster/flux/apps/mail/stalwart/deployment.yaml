apiVersion: v1
kind: ServiceAccount
metadata:
  name: stalwart
  namespace: mail-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stalwart-data
  namespace: mail-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart
  namespace: mail-system
  # Keel rolls the pod when a new stalwart-tools :latest is published
  # (apply.sh / plan / accounts changes), the way other in-house images
  # are managed. The main stalwart container is pinned to a version tag
  # so match-tag leaves it alone.
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: stalwart
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stalwart
    spec:
      serviceAccountName: stalwart
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        # v0.16 reads only the datastore from /etc/stalwart/config.json;
        # everything else is reconciled by the stalwart-apply sidecar.
        # The webui bundle is fetched from github.com on first boot, so
        # this node needs outbound HTTPS.
        - name: stalwart
          image: stalwartlabs/stalwart:v0.16.6
          imagePullPolicy: IfNotPresent
          env:
            # Seeds a known admin (user:password) so the sidecar can
            # authenticate and the webadmin is reachable behind
            # forward-auth. Rotating the admin secret rolls the pod via
            # the stalwart-mail VaultStaticSecret rolloutRestartTarget.
            - name: STALWART_RECOVERY_ADMIN
              valueFrom:
                secretKeyRef:
                  name: stalwart-mail
                  key: STALWART_RECOVERY_ADMIN
          # Mail protocols are raw TCP and cannot traverse Cloudflare's
          # HTTP proxy, so mail.jorisjonkers.dev is a non-proxied A
          # record at 167.86.79.203. Each mail port is bound on the
          # frankfurt host via hostPort. The admin UI (8080) stays
          # internal, fronted by traefik ingress.
          ports:
            - containerPort: 25
              hostPort: 25
              name: smtp
            - containerPort: 110
              hostPort: 110
              name: pop3
            - containerPort: 143
              hostPort: 143
              name: imap
            - containerPort: 465
              hostPort: 465
              name: submissions
            - containerPort: 587
              hostPort: 587
              name: submission
            - containerPort: 993
              hostPort: 993
              name: imaptls
            - containerPort: 995
              hostPort: 995
              name: pop3s
            - containerPort: 4190
              hostPort: 4190
              name: sieve
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /admin/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: stalwart-data
              mountPath: /var/lib/stalwart
            - name: stalwart-config-json
              mountPath: /etc/stalwart/config.json
              subPath: config.json
          resources:
            requests:
              cpu: 300m
              memory: 1536Mi
            limits:
              cpu: 2000m
              memory: 3Gi
        # Reconciles the declarative settings stalwart stores in its
        # datastore (listeners, domain wiring, ACME/DNS providers,
        # Vault-managed accounts) and renews the Cloudflare DNS-01
        # token on every pod start. Idles after a successful pass.
        - name: stalwart-apply
          image: ghcr.io/extratoast/personal-stack/stalwart-tools:latest
          command: ['sh', '/opt/stalwart-tools/apply.sh']
          env:
            - name: STALWART_URL
              value: http://127.0.0.1:8080
            - name: STALWART_HOSTNAME
              value: mail.jorisjonkers.dev
            - name: STALWART_DOMAIN
              value: jorisjonkers.dev
            - name: STALWART_USER
              valueFrom:
                secretKeyRef:
                  name: stalwart-mail
                  key: STALWART_ADMIN_USER
            - name: STALWART_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-mail
                  key: STALWART_ADMIN_SECRET
            - name: CF_DNS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stalwart-edge
                  key: CF_DNS_API_TOKEN
            - name: AUTH_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: stalwart-auth-mail
                  key: AUTH_MAIL_USERNAME
            - name: AUTH_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-auth-mail
                  key: AUTH_MAIL_PASSWORD
            - name: ACCOUNT_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-mail
                  key: ACCOUNT_MAIL_PASSWORD
                  optional: true
            - name: N8N_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-mail
                  key: N8N_MAIL_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: stalwart-data
          persistentVolumeClaim:
            claimName: stalwart-data
        - name: stalwart-config-json
          configMap:
            name: stalwart-config-json
---
apiVersion: v1
kind: Service
metadata:
  name: stalwart
  namespace: mail-system
spec:
  selector:
    app.kubernetes.io/name: stalwart
  ports:
    - name: smtp
      port: 25
      targetPort: smtp
    - name: pop3
      port: 110
      targetPort: pop3
    - name: imap
      port: 143
      targetPort: imap
    - name: submissions
      port: 465
      targetPort: submissions
    - name: submission
      port: 587
      targetPort: submission
    - name: imaptls
      port: 993
      targetPort: imaptls
    - name: pop3s
      port: 995
      targetPort: pop3s
    - name: sieve
      port: 4190
      targetPort: sieve
    - name: http
      port: 8080
      targetPort: http
