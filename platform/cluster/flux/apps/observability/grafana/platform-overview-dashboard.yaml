apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-overview-dashboard
  namespace: observability
  labels:
    grafana_dashboard: '1'
data:
  platform-overview.json: |
    {
      "title": "Platform / Cluster Overview",
      "uid": "platform-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "type": "stat",
          "title": "Cluster CPU Usage",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\",image!=\"\"}[5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Ingress P95 Latency",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(traefik_service_request_duration_seconds_bucket[5m])))",
              "refId": "A"
            }
          ]
        }
      ]
    }
