apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  values:
    fullnameOverride: grafana
    persistence:
      enabled: true
      size: 10Gi
    nodeSelector:
      personal-stack/site: frankfurt
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        searchNamespace: observability
      datasources:
        enabled: true
        label: grafana_datasource
        searchNamespace: observability
