apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  values:
    readinessProbe:
      httpGet:
        path: /api/health
        port: 3000
      timeoutSeconds: 5
    livenessProbe:
      httpGet:
        path: /api/health
        port: 3000
      timeoutSeconds: 5
      failureThreshold: 10
    # The chart's init-chown-data container drops every capability
    # except CHOWN, then does `chown -R 472:472 /var/lib/grafana`.
    # Grafana 12's runtime creates pdf/png/csv subdirs at mode
    # 0700 (drwx--S---); recursive chown has to readdir into them
    # and that requires DAC_READ_SEARCH (or DAC_OVERRIDE), neither
    # of which the container holds. The container crashlooped with
    # `chown: /var/lib/grafana/pdf: Permission denied` on every
    # rollout, blocking the Helm upgrade indefinitely.
    # fsGroup=472 in the pod security context already handles the
    # ownership side of the equation, so the init container is pure
    # redundancy we happen to misconfigure.
    initChownData:
      enabled: false
    fullnameOverride: grafana
    # Pyroscope datasource ships as a built-in core plugin in Grafana
    # 11+, so no plugins block is needed for it. The Profiles Drilldown
    # app does need to be installed.
    plugins:
      - grafana-pyroscope-app
      - grafana-exploretraces-app
      - grafana-lokiexplore-app
      - grafana-metricsdrilldown-app
    persistence:
      enabled: true
      size: 10Gi
    nodeSelector:
      personal-stack/site: frankfurt
    sidecar:
      # Dashboards now provisioned by grafana-operator via
      # GrafanaDashboard CRs (observability/grafana-operator/), so the
      # ConfigMap-watching dashboards sidecar is no longer needed.
      # Datasources sidecar stays — it watches grafana-datasources.yaml.
      datasources:
        enabled: true
        label: grafana_datasource
        searchNamespace: observability
    # auth-api registers grafana as an OIDC client with redirect URI
    # https://grafana.jorisjonkers.dev/login/generic_oauth. The client
    # secret lives in Vault at secret/platform/observability under key
    # grafana.oauth_client_secret and is synced into the kube Secret
    # grafana-oidc-client by the VaultStaticSecret in
    # platform/cluster/flux/apps/vso-secrets/grafana-oidc.yaml. The
    # synced Secret exposes it under the env-var key
    # GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET, which envFromSecret injects
    # verbatim — no chart-level plumbing needed.
    envFromSecret: grafana-oidc-client
    grafana.ini:
      server:
        root_url: https://grafana.jorisjonkers.dev
      auth.generic_oauth:
        enabled: true
        name: personal-stack
        client_id: grafana
        scopes: openid profile email
        auth_url: https://auth.jorisjonkers.dev/api/oauth2/authorize
        token_url: https://auth.jorisjonkers.dev/api/oauth2/token
        api_url: https://auth.jorisjonkers.dev/api/userinfo
        login_attribute_path: preferred_username
        name_attribute_path: name
        email_attribute_path: email
        # auth-api mints ROLE_ADMIN for admin users (see auth-api's
        # AuthenticatedUser.authorities). Map that to GrafanaAdmin so
        # admins get full control; everyone else lands at Viewer.
        role_attribute_path: "contains(roles[*], 'ROLE_ADMIN') && 'GrafanaAdmin' || 'Viewer'"
        allow_assign_grafana_admin: true
        auto_login: true
        use_pkce: true
