apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: '1'
  annotations:
    grafana_folder: 'Traces'
configMapGenerator:
  - name: dashboards-traces
    files:
      - tempo-traces.json
      - tempo-operational.json
      - service-graph.json
