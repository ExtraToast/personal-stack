apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: '1'
  annotations:
    grafana_folder: 'Networking'
configMapGenerator:
  - name: dashboards-networking
    files:
      - coredns.json
      - metallb.json
