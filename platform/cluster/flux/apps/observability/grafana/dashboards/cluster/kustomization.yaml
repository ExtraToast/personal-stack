apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: '1'
  annotations:
    grafana_folder: 'Cluster'
configMapGenerator:
  - name: dashboards-cluster
    files:
      - node-exporter-full.json
      - kube-views-global.json
      - kube-views-namespaces.json
      - kube-views-nodes.json
      - kube-views-pods.json
