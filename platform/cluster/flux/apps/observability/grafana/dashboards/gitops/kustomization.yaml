apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: '1'
  annotations:
    grafana_folder: 'GitOps'
configMapGenerator:
  - name: dashboards-gitops
    files:
      - flux-cluster-stats.json
      - flux-control-plane.json
