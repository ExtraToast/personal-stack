apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: '1'

configMapGenerator:
  - name: grafana-dashboards
    files:
      - assistant-api.json
      - auth-api.json
      - infrastructure-overview.json
      - loki-logs.json
      - postgresql-hikaricp.json
      - rabbitmq.json
      - service-overview.json
      - spring-boot-jvm.json
      - stalwart.json
      - tempo-traces.json
      - traefik.json
      - valkey-redis.json
