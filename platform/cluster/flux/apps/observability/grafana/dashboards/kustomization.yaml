apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Each subdirectory groups dashboards into a Grafana folder via the
# grafana_folder annotation set on the generated ConfigMap. The Grafana
# sidecar (grafana/release.yaml) is configured with
# folderAnnotation: grafana_folder so dashboards land in the right
# folder automatically.
resources:
  - overview
  - slos
  - edge
  - services
  - jvm
  - data-tier
  - cluster
  - networking
  - gitops
  - security
  - gpu
  - logs
  - traces
  - profiles
  - mail
