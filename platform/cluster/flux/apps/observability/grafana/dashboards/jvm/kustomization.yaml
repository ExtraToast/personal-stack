apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: '1'
  annotations:
    grafana_folder: 'JVM'
configMapGenerator:
  - name: dashboards-jvm
    files:
      - spring-boot-jvm.json
      - spring-boot-2.1.json
