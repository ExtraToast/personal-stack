apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: '1'
  annotations:
    grafana_folder: 'Overview'
configMapGenerator:
  - name: dashboards-overview
    files:
      - home.json
      - service-overview.json
      - infrastructure-overview.json
