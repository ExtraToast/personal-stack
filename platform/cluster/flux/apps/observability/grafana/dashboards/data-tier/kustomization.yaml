apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: '1'
  annotations:
    grafana_folder: 'Data Tier'
configMapGenerator:
  - name: dashboards-data-tier
    files:
      - postgresql-hikaricp.json
      - postgres-exporter.json
      - valkey-redis.json
      - redis-exporter.json
      - rabbitmq.json
      - rabbitmq-overview.json
