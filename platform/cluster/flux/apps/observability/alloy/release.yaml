apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: alloy
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  values:
    alloy:
      # Only bump readiness timeout. The Alloy chart ships no default
      # livenessProbe, so overriding just `timeoutSeconds` renders a
      # probe with no handler and k8s rejects the DaemonSet:
      # `livenessProbe: Required value: must specify a handler type`.
      # If we ever add a liveness probe, it needs the full httpGet block.
      readinessProbe:
        timeoutSeconds: 5
      # OTLP receivers — without these in `extraPorts` the Service only
      # exposes the UI port (12345) and any client pushing to
      # alloy.observability.svc.cluster.local:4318 (Traefik, Spring
      # services, anything else with OTLP push) connects to nothing.
      # `otelcol.receiver.otlp` in config.alloy listens on these ports
      # inside the pod; this exposes them via the Service.
      extraPorts:
        - name: otlp-grpc
          port: 4317
          targetPort: 4317
          protocol: TCP
        - name: otlp-http
          port: 4318
          targetPort: 4318
          protocol: TCP
    fullnameOverride: alloy
    controller:
      type: daemonset
    configMap:
      create: false
      name: alloy-config
    serviceMonitor:
      enabled: true
