apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: alloy
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  values:
    alloy:
      readinessProbe:
        timeoutSeconds: 5
      livenessProbe:
        timeoutSeconds: 5
    fullnameOverride: alloy
    controller:
      type: daemonset
    configMap:
      create: false
      name: alloy-config
    serviceMonitor:
      enabled: true
