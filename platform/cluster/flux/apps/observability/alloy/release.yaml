apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: alloy
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  values:
    alloy:
      # Only bump readiness timeout. The Alloy chart ships no default
      # livenessProbe, so overriding just `timeoutSeconds` renders a
      # probe with no handler and k8s rejects the DaemonSet:
      # `livenessProbe: Required value: must specify a handler type`.
      # If we ever add a liveness probe, it needs the full httpGet block.
      readinessProbe:
        timeoutSeconds: 5
      # Without these in `extraPorts` the Service only exposes the UI
      # port (12345) and any client pushing to
      # alloy.observability.svc.cluster.local:4318 (Traefik, Spring
      # services, n8n, anything else with OTLP push) connects to nothing.
      # `otelcol.receiver.otlp` below listens on these ports inside the
      # pod; this exposes them via the Service.
      extraPorts:
        - name: otlp-grpc
          port: 4317
          targetPort: 4317
          protocol: TCP
        - name: otlp-http
          port: 4318
          targetPort: 4318
          protocol: TCP
        # Grafana Faro browser RUM. The SPAs POST Faro-format JSON
        # envelopes to `faro.jorisjonkers.dev/collect`, Traefik routes
        # to this Service, and `faro.receiver` below splits the
        # envelope into logs (Loki) and OTel spans (Tempo).
        - name: faro
          port: 12347
          targetPort: 12347
          protocol: TCP
      # The chart reads inline River config from `alloy.configMap.content`
      # (nested under the `alloy` key, not at the top level — putting it
      # at the top level is silently ignored and the chart ships its
      # default 27-line discovery.kubernetes stub instead). Verified on
      # chart 1.8.1 by reading `/etc/alloy/config.alloy` inside a pod.
      configMap:
        create: true
        content: |
          logging {
            level  = "info"
            format = "logfmt"
          }

          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }

            // Promote the workload's app.kubernetes.io/name pod label to a
            // Loki label called `service_name`. This is the join key our
            // dashboards (auth-api.json, error-feed.json, service-template.json)
            // and Grafana's tracesToLogsV2 link use to find logs for a given
            // service. Without it Loki has no per-service label and queries
            // like `{service_name="auth-api"}` return nothing.
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "service_name"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
          }

          // Spring services (auth-api, assistant-api) emit JSON via the
          // Logstash Logback encoder: each line is {"@timestamp":"…",
          // "level":"INFO","message":"…","traceId":"…","spanId":"…",…}.
          // Surface `level` as a Loki label so {level=~"ERROR|WARN"} queries
          // work, and stash traceId/spanId as structured metadata (high-
          // cardinality — should never become labels).
          loki.process "pods" {
            forward_to = [loki.write.default.receiver]

            stage.json {
              expressions = {
                level   = "level",
                traceId = "traceId",
                spanId  = "spanId",
              }
            }

            stage.labels {
              values = {
                level = "",
              }
            }

            stage.structured_metadata {
              values = {
                traceId = "",
                spanId  = "",
              }
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.process.pods.receiver]
          }

          loki.write "default" {
            endpoint {
              url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
            }
          }

          otelcol.receiver.otlp "default" {
            grpc {
              endpoint = "0.0.0.0:4317"
            }

            http {
              endpoint = "0.0.0.0:4318"
              // CORS is still useful for any client that posts OTLP
              // directly to alloy (e.g. a future native OTel browser
              // SDK). The SPAs no longer hit this endpoint — they go
              // through faro.receiver on :12347.
              cors {
                allowed_origins = [
                  "https://jorisjonkers.dev",
                  "https://auth.jorisjonkers.dev",
                  "https://assistant.jorisjonkers.dev",
                ]
                allowed_headers = ["*"]
              }
            }

            output {
              logs   = [otelcol.processor.batch.default.input]
              traces = [otelcol.processor.filter.drop_actuator.input]
            }
          }

          // Browser RUM: SPAs POST Faro's native JSON envelope to
          // `faro.jorisjonkers.dev/collect` (Traefik → this Service
          // port 12347). The receiver splits the envelope into logs
          // (errors, console events, user events) and OTel-format
          // spans, sending each to the matching pipeline.
          faro.receiver "default" {
            server {
              listen_address       = "0.0.0.0"
              listen_port          = 12347
              cors_allowed_origins = [
                "https://jorisjonkers.dev",
                "https://auth.jorisjonkers.dev",
                "https://assistant.jorisjonkers.dev",
              ]
            }

            extra_log_labels = {
              source = "faro",
            }

            output {
              logs   = [loki.write.default.receiver]
              traces = [otelcol.processor.filter.drop_actuator.input]
            }
          }

          // Drop actuator/health spans at the collector. The OTel
          // Java agent's Tomcat hook creates them independent of
          // Spring's ObservationRegistry, so the Spring-side filter
          // in libs/kotlin-common is a no-op for these spans —
          // Alloy is the right place to drop them. We match both the
          // templated `http.route` (Spring) and the raw `url.path`
          // (Traefik / Faro / anything else).
          otelcol.processor.filter "drop_actuator" {
            error_mode = "ignore"
            traces {
              span = [
                `attributes["http.route"] == "/api/actuator/health/**"`,
                `attributes["http.route"] == "/api/actuator/health"`,
                `attributes["http.route"] == "/actuator/health/**"`,
                `attributes["http.route"] == "/actuator/health"`,
                `attributes["http.route"] == "/api/v1/health"`,
                `IsMatch(attributes["url.path"], "^/api/actuator/.*") == true`,
                `IsMatch(attributes["url.path"], "^/actuator/.*") == true`,
                `attributes["url.path"] == "/api/v1/health"`,
              ]
            }
            output {
              traces = [otelcol.processor.transform.span_names.input]
            }
          }

          // Standardise span names so the originating service is
          // visible directly in the trace list:
          //
          //   `GET /api/v1/auth/me` (auth-api) → `GET auth-api /api/v1/auth/me`
          //   `GET /api/v1/auth/me` (traefik)  → `GET traefik /api/v1/auth/me`
          //   `ReverseProxy`                   → `ReverseProxy ← traefik`
          //   `SELECT auth_db`                 → unchanged (no service prefix needed)
          //   `JooqUserRepository.findById`    → `auth-api JooqUserRepository.findById`
          //
          // OTTL statements run independently per span; guards on
          // attribute existence keep them safe for spans that lack
          // the relevant fields.
          otelcol.processor.transform "span_names" {
            error_mode = "ignore"
            trace_statements {
              context    = "span"
              statements = [
                // SERVER span with templated http.route (Spring MVC)
                `set(name, Concat([attributes["http.request.method"], resource.attributes["service.name"], attributes["http.route"]], " ")) where kind == SPAN_KIND_SERVER and IsString(attributes["http.request.method"]) and IsString(resource.attributes["service.name"]) and IsString(attributes["http.route"])`,
                // SERVER span without http.route — Traefik. Include the
                // Host so the trace list disambiguates vhosts that share
                // paths (auth.jorisjonkers.dev/api/x vs
                // assistant.jorisjonkers.dev/api/x).
                `set(name, Concat([attributes["http.request.method"], resource.attributes["service.name"], Concat([attributes["server.address"], attributes["url.path"]], "")], " ")) where kind == SPAN_KIND_SERVER and IsString(attributes["http.request.method"]) and IsString(resource.attributes["service.name"]) and IsString(attributes["server.address"]) and IsString(attributes["url.path"]) and not IsString(attributes["http.route"])`,
                // SERVER span fallback when server.address is missing too
                `set(name, Concat([attributes["http.request.method"], resource.attributes["service.name"], attributes["url.path"]], " ")) where kind == SPAN_KIND_SERVER and IsString(attributes["http.request.method"]) and IsString(resource.attributes["service.name"]) and IsString(attributes["url.path"]) and not IsString(attributes["http.route"]) and not IsString(attributes["server.address"])`,
                // CLIENT HTTP span — annotate which service made the call
                `set(name, Concat([name, "←", resource.attributes["service.name"]], " ")) where kind == SPAN_KIND_CLIENT and IsString(resource.attributes["service.name"]) and IsString(attributes["http.request.method"])`,
                // INTERNAL spans (the AOP aspect, async work) — prefix `ClassName.method` with the service
                `set(name, Concat([resource.attributes["service.name"], name], " ")) where kind == SPAN_KIND_INTERNAL and IsString(resource.attributes["service.name"])`,
              ]
            }
            output {
              traces = [otelcol.processor.batch.default.input]
            }
          }

          otelcol.processor.batch "default" {
            output {
              logs   = [otelcol.exporter.loki.default.input]
              traces = [otelcol.exporter.otlphttp.tempo.input]
            }
          }

          otelcol.exporter.loki "default" {
            forward_to = [loki.write.default.receiver]
          }

          otelcol.exporter.otlphttp "tempo" {
            client {
              endpoint = "http://tempo.observability.svc.cluster.local:4318"
              tls {
                insecure             = true
                insecure_skip_verify = true
              }
            }
          }
    fullnameOverride: alloy
    controller:
      type: daemonset
    serviceMonitor:
      enabled: true
