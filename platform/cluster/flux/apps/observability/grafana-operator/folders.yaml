# Pre-create folders so the operator places each GrafanaDashboard into
# the right one. Each dashboard then references the folder by `title`
# via spec.folder.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: overview
  namespace: observability
spec:
  title: Overview
  instanceSelector: { matchLabels: { dashboards: grafana } }
