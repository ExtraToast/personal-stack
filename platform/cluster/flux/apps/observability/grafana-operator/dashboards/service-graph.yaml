apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: service-graph
  namespace: observability
spec:
  folder: 'Traces'
  resyncPeriod: 24h
  instanceSelector: { matchLabels: { dashboards: grafana } }
  json: |
    {"uid":"service-graph","title":"Service graph","schemaVersion":39,"version":1,"refresh":"1m","time":{"from":"now-1h","to":"now"},"panels":[{"type":"nodeGraph","title":"Service dependency graph","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":16,"w":24,"x":0,"y":0},"targets":[{"expr":"sum by (client, server) (rate(traces_service_graph_request_total[5m]))","refId":"A","queryType":"service-graph"},{"expr":"sum by (client, server) (rate(traces_service_graph_request_failed_total[5m]))","refId":"B"},{"expr":"histogram_quantile(0.95, sum by (le, client, server) (rate(traces_service_graph_request_server_seconds_bucket[5m])))","refId":"C"}]},{"type":"timeseries","title":"Service-to-service request rate","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":0,"y":16},"targets":[{"expr":"sum by (client, server) (rate(traces_service_graph_request_total[5m]))","legendFormat":"{{client}} \u2192 {{server}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"reqps"}}},{"type":"timeseries","title":"Service-to-service p95 latency","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":12,"y":16},"targets":[{"expr":"histogram_quantile(0.95, sum by (le, client, server) (rate(traces_service_graph_request_server_seconds_bucket[5m])))","legendFormat":"{{client}} \u2192 {{server}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"s"}}}]}
