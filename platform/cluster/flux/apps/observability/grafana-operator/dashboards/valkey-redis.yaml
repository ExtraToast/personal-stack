apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: valkey-redis
  namespace: observability
spec:
  folder: 'Data Tier'
  resyncPeriod: 24h
  instanceSelector: { matchLabels: { dashboards: grafana } }
  json: |
    {"uid":"valkey-redis","title":"Valkey / Redis","tags":["valkey","redis","cache","session"],"timezone":"browser","editable":false,"refresh":"30s","time":{"from":"now-1h","to":"now"},"templating":{"list":[{"name":"job","type":"query","datasource":{"type":"prometheus","uid":"prometheus"},"query":"label_values(lettuce_command_completion_seconds_count, job)","includeAll":true,"multi":true,"current":{"text":"All","value":"$__all"},"refresh":2}]},"panels":[{"id":1,"title":"Command Rate by Type","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":0},"targets":[{"expr":"sum by(command)(rate(lettuce_command_completion_seconds_count{job=~\"$job\"}[5m]))","legendFormat":"{{command}}"}],"fieldConfig":{"defaults":{"unit":"ops","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":2,"title":"Command Latency P95 by Type","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":0},"targets":[{"expr":"histogram_quantile(0.95, sum by(command, le)(rate(lettuce_command_completion_seconds_bucket{job=~\"$job\"}[5m])))","legendFormat":"{{command}} p95"}],"fieldConfig":{"defaults":{"unit":"s","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":3,"title":"Command Latency P99 by Type","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":8},"targets":[{"expr":"histogram_quantile(0.99, sum by(command, le)(rate(lettuce_command_completion_seconds_bucket{job=~\"$job\"}[5m])))","legendFormat":"{{command}} p99"}],"fieldConfig":{"defaults":{"unit":"s","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":4,"title":"First Response Latency P95","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":8},"targets":[{"expr":"histogram_quantile(0.95, sum by(le)(rate(lettuce_command_firstresponse_seconds_bucket{job=~\"$job\"}[5m])))","legendFormat":"First response p95"}],"fieldConfig":{"defaults":{"unit":"s","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":5,"title":"Spring Sessions Created","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":16},"targets":[{"expr":"rate(spring_session_created_sessions_total{job=~\"$job\"}[5m])","legendFormat":"{{job}} sessions created/s"},{"expr":"rate(spring_session_expired_sessions_total{job=~\"$job\"}[5m])","legendFormat":"{{job}} sessions expired/s"}],"fieldConfig":{"defaults":{"unit":"ops","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":6,"title":"Total Command Rate","type":"stat","gridPos":{"h":8,"w":12,"x":12,"y":16},"targets":[{"expr":"sum(rate(lettuce_command_completion_seconds_count{job=~\"$job\"}[5m]))","legendFormat":"Total commands/s"}],"fieldConfig":{"defaults":{"unit":"ops","thresholds":{"steps":[{"color":"green","value":null}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"background","graphMode":"area"},"datasource":{"type":"prometheus","uid":"prometheus"}}],"schemaVersion":39}
