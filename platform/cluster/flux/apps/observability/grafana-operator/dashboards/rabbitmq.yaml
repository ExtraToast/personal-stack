apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: rabbitmq
  namespace: observability
spec:
  folder: 'Data Tier'
  resyncPeriod: 24h
  instanceSelector: { matchLabels: { dashboards: grafana } }
  json: |
    {"uid":"rabbitmq","title":"RabbitMQ","tags":["rabbitmq","messaging"],"timezone":"browser","editable":false,"refresh":"30s","time":{"from":"now-1h","to":"now"},"templating":{"list":[{"name":"queue","type":"query","datasource":{"type":"prometheus","uid":"prometheus"},"query":"label_values(rabbitmq_queue_messages, queue)","includeAll":true,"multi":true,"current":{"text":"All","value":"$__all"},"refresh":2}]},"panels":[{"id":1,"title":"Queue Messages (Ready)","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":0},"targets":[{"expr":"rabbitmq_queue_messages_ready{queue=~\"$queue\"}","legendFormat":"{{queue}} ready"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","fillOpacity":20,"lineWidth":2},"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":100},{"color":"red","value":1000}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":2,"title":"Queue Messages (Unacked)","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":0},"targets":[{"expr":"rabbitmq_queue_messages_unacked{queue=~\"$queue\"}","legendFormat":"{{queue}} unacked"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","fillOpacity":20,"lineWidth":2},"color":{"fixedColor":"orange","mode":"fixed"}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":3,"title":"Published Messages/s","type":"timeseries","gridPos":{"h":8,"w":8,"x":0,"y":8},"targets":[{"expr":"sum(rate(rabbitmq_queue_messages_published_total{queue=~\"$queue\"}[5m]))","legendFormat":"Published/s"}],"fieldConfig":{"defaults":{"unit":"ops","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":4,"title":"Delivered Messages/s","type":"timeseries","gridPos":{"h":8,"w":8,"x":8,"y":8},"targets":[{"expr":"sum(rate(rabbitmq_queue_messages_delivered_total{queue=~\"$queue\"}[5m]))","legendFormat":"Delivered/s"}],"fieldConfig":{"defaults":{"unit":"ops","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":5,"title":"Acknowledged Messages/s","type":"timeseries","gridPos":{"h":8,"w":8,"x":16,"y":8},"targets":[{"expr":"sum(rate(rabbitmq_queue_messages_delivered_ack_total{queue=~\"$queue\"}[5m]))","legendFormat":"Acked/s"}],"fieldConfig":{"defaults":{"unit":"ops","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":6,"title":"Connections","type":"stat","gridPos":{"h":4,"w":6,"x":0,"y":16},"targets":[{"expr":"rabbitmq_connections","legendFormat":"Connections"}],"fieldConfig":{"defaults":{"thresholds":{"steps":[{"color":"green","value":null}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"background","graphMode":"area"},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":7,"title":"Channels","type":"stat","gridPos":{"h":4,"w":6,"x":6,"y":16},"targets":[{"expr":"rabbitmq_channels","legendFormat":"Channels"}],"fieldConfig":{"defaults":{"thresholds":{"steps":[{"color":"green","value":null}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"background","graphMode":"area"},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":8,"title":"Consumers","type":"stat","gridPos":{"h":4,"w":6,"x":12,"y":16},"targets":[{"expr":"sum(rabbitmq_queue_consumers{queue=~\"$queue\"})","legendFormat":"Consumers"}],"fieldConfig":{"defaults":{"thresholds":{"steps":[{"color":"green","value":null}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"background","graphMode":"area"},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":9,"title":"Queues","type":"stat","gridPos":{"h":4,"w":6,"x":18,"y":16},"targets":[{"expr":"rabbitmq_queues","legendFormat":"Queues"}],"fieldConfig":{"defaults":{"thresholds":{"steps":[{"color":"green","value":null}]}}},"options":{"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"background","graphMode":"area"},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":10,"title":"Erlang Process Memory","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":20},"targets":[{"expr":"rabbitmq_process_resident_memory_bytes","legendFormat":"Resident memory"}],"fieldConfig":{"defaults":{"unit":"bytes","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":11,"title":"Disk Space Available","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":20},"targets":[{"expr":"rabbitmq_disk_space_available_bytes","legendFormat":"Disk available"},{"expr":"rabbitmq_disk_space_available_limit_bytes","legendFormat":"Disk limit"}],"fieldConfig":{"defaults":{"unit":"bytes","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2}}},"datasource":{"type":"prometheus","uid":"prometheus"}}],"schemaVersion":39}
