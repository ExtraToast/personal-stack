apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: stalwart
  namespace: observability
spec:
  folder: 'Mail'
  resyncPeriod: 24h
  instanceSelector: { matchLabels: { dashboards: grafana } }
  json: |
    {"uid":"stalwart","title":"Stalwart Mail Server","tags":["stalwart","mail"],"timezone":"browser","editable":false,"refresh":"30s","time":{"from":"now-1h","to":"now"},"templating":{"list":[]},"panels":[{"id":1,"title":"Server Memory","type":"timeseries","gridPos":{"h":8,"w":8,"x":0,"y":0},"targets":[{"expr":"server_memory{job=\"stalwart\"}","legendFormat":"memory"}],"fieldConfig":{"defaults":{"unit":"decbytes","custom":{"drawStyle":"line","fillOpacity":20,"lineWidth":2},"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":536870912},{"color":"red","value":1073741824}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":2,"title":"Users","type":"stat","gridPos":{"h":4,"w":4,"x":8,"y":0},"targets":[{"expr":"user_count{job=\"stalwart\"}","legendFormat":"users"}],"fieldConfig":{"defaults":{"thresholds":{"steps":[{"color":"blue","value":null}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":3,"title":"Domains","type":"stat","gridPos":{"h":4,"w":4,"x":12,"y":0},"targets":[{"expr":"domain_count{job=\"stalwart\"}","legendFormat":"domains"}],"fieldConfig":{"defaults":{"thresholds":{"steps":[{"color":"blue","value":null}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":4,"title":"HTTP Requests/s","type":"stat","gridPos":{"h":4,"w":4,"x":16,"y":0},"targets":[{"expr":"rate(http_connection_start{job=\"stalwart\"}[5m])","legendFormat":"req/s"}],"fieldConfig":{"defaults":{"unit":"reqps","thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":50},{"color":"red","value":200}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":5,"title":"HTTP Request Duration (P95)","type":"stat","gridPos":{"h":4,"w":4,"x":20,"y":0},"targets":[{"expr":"histogram_quantile(0.95, rate(http_request_time_bucket{job=\"stalwart\"}[5m]))","legendFormat":"p95"}],"fieldConfig":{"defaults":{"unit":"s","thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":0.5},{"color":"red","value":2}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":6,"title":"Store Errors","type":"stat","gridPos":{"h":4,"w":4,"x":8,"y":4},"targets":[{"expr":"rate(telemetry_log_error{job=\"stalwart\"}[5m])","legendFormat":"errors/s"}],"fieldConfig":{"defaults":{"unit":"short","thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":0.01},{"color":"red","value":1}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":7,"title":"Store Operations/s","type":"stat","gridPos":{"h":4,"w":4,"x":12,"y":4},"targets":[{"expr":"rate(store_data_iterate{job=\"stalwart\"}[5m]) + rate(store_blob_read{job=\"stalwart\"}[5m])","legendFormat":"ops/s"}],"fieldConfig":{"defaults":{"unit":"ops","thresholds":{"steps":[{"color":"blue","value":null}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":8,"title":"HTTP Response Bytes/s","type":"stat","gridPos":{"h":4,"w":4,"x":16,"y":4},"targets":[{"expr":"rate(http_response_body{job=\"stalwart\"}[5m])","legendFormat":"bytes/s"}],"fieldConfig":{"defaults":{"unit":"Bps","thresholds":{"steps":[{"color":"blue","value":null}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":20,"title":"Active Connections","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":8},"targets":[{"expr":"smtp_active_connections{job=\"stalwart\"}","legendFormat":"SMTP"},{"expr":"imap_active_connections{job=\"stalwart\"}","legendFormat":"IMAP"},{"expr":"pop3_active_connections{job=\"stalwart\"}","legendFormat":"POP3"},{"expr":"http_active_connections{job=\"stalwart\"}","legendFormat":"HTTP"},{"expr":"sieve_active_connections{job=\"stalwart\"}","legendFormat":"ManageSieve"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","fillOpacity":20,"lineWidth":2},"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":50},{"color":"red","value":200}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":21,"title":"Delivery Connections","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":8},"targets":[{"expr":"delivery_active_connections{job=\"stalwart\"}","legendFormat":"outbound delivery"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","fillOpacity":20,"lineWidth":2},"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":10},{"color":"red","value":50}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":30,"title":"HTTP Request Duration Distribution","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":16},"targets":[{"expr":"histogram_quantile(0.50, rate(http_request_time_bucket{job=\"stalwart\"}[5m]))","legendFormat":"p50"},{"expr":"histogram_quantile(0.95, rate(http_request_time_bucket{job=\"stalwart\"}[5m]))","legendFormat":"p95"},{"expr":"histogram_quantile(0.99, rate(http_request_time_bucket{job=\"stalwart\"}[5m]))","legendFormat":"p99"}],"fieldConfig":{"defaults":{"unit":"s","custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":2},"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":0.5},{"color":"red","value":2}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}},{"id":31,"title":"HTTP Connection Rate","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":16},"targets":[{"expr":"rate(http_connection_start{job=\"stalwart\"}[5m])","legendFormat":"connections/s"}],"fieldConfig":{"defaults":{"unit":"reqps","custom":{"drawStyle":"line","fillOpacity":20,"lineWidth":2},"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":50},{"color":"red","value":200}]}}},"datasource":{"type":"prometheus","uid":"prometheus"}}],"schemaVersion":39}
