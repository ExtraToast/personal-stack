apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  values:
    fullnameOverride: loki
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      # The SingleBinary statefulset template requires bucketNames.chunks
      # even though local filesystem storage is used; chart validation
      # rejects the release otherwise. Names are unused placeholders.
      storage:
        type: filesystem
        bucketNames:
          chunks: chunks
          ruler: ruler
          admin: admin
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 20Gi
      nodeSelector:
        personal-stack/site: frankfurt
