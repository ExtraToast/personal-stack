apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# HelmRepository `prometheus-community` is declared once at
# observability/helm-repositories.yaml and referenced by name from release.yaml.
resources:
  - release.yaml
# platform-alerts (PrometheusRule) now lives in apps/observability-rules
# so it applies only after kube-prometheus-stack has installed the
# monitoring.coreos.com CRDs.
