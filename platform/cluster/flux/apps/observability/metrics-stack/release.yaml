apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-stack
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability
  values:
    fullnameOverride: metrics-stack
    grafana:
      enabled: false
    defaultRules:
      create: true
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true
    alertmanager:
      enabled: true
      alertmanagerSpec:
        nodeSelector:
          personal-stack/site: frankfurt
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi
    prometheus:
      service:
        type: ClusterIP
      prometheusSpec:
        nodeSelector:
          personal-stack/site: frankfurt
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
