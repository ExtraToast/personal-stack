---
# Shared HelmRepository sources for the observability stack. Each chart in the
# subdirectories (alloy, grafana, loki, tempo, metrics-stack) references these
# by name. Declaring them once here avoids duplicate-resource errors when
# kustomize assembles the parent observability kustomization.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: observability
spec:
  interval: 1h
  url: https://grafana.github.io/helm-charts
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-operator
  namespace: observability
spec:
  interval: 1h
  type: oci
  url: oci://ghcr.io/grafana/helm-charts
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: observability
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
