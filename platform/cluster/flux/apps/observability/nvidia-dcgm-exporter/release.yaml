apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: dcgm-exporter
      sourceRef:
        kind: HelmRepository
        name: nvidia-dcgm
        namespace: observability
  values:
    # Run as a DaemonSet so every NVIDIA-capable host gets one exporter
    # exposing its local GPU(s) on :9400/metrics.
    nodeSelector:
      personal-stack/capability-nvidia: 'true'
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: personal-stack/capability-nvidia
                  operator: In
                  values:
                    - 'true'
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    # GPU access for DCGM is unsolved on this NixOS / nvidia-cdi stack.
    # Requesting `nvidia.com/gpu: 1` got DCGM running but blocked Jellyfin
    # from scheduling (the t1000 has a single GPU and the resource is
    # exclusive). Drop the request to give Jellyfin its GPU back; DCGM
    # will go back to CrashLoopBackOff with `nvmlInit_v2` failures
    # because nvidia-cdi only injects a device when the device-plugin
    # has attached the CDI annotation. Proper fix is to enable
    # nvidia-device-plugin time-slicing or MIG, tracked separately.
    # Until then GPU dashboards stay empty — losing telemetry is much
    # cheaper than losing transcoding.
    runtimeClassName: nvidia-cdi
    extraEnv:
      - name: NVIDIA_VISIBLE_DEVICES
        value: all
      - name: NVIDIA_DRIVER_CAPABILITIES
        value: compute,utility
    serviceMonitor:
      enabled: true
      interval: 30s
      additionalLabels:
        release: metrics-stack
    service:
      enabled: true
      type: ClusterIP
      port: 9400
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
