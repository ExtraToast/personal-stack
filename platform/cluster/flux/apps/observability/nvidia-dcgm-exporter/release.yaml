apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: dcgm-exporter
      sourceRef:
        kind: HelmRepository
        name: nvidia-dcgm
        namespace: observability
  values:
    # Run as a DaemonSet so every NVIDIA-capable host gets one exporter
    # exposing its local GPU(s) on :9400/metrics.
    nodeSelector:
      personal-stack/capability-nvidia: 'true'
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: personal-stack/capability-nvidia
                  operator: In
                  values:
                    - 'true'
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    # nvidia-cdi only injects the GPU into the container when the
    # device-plugin has attached a CDI annotation, which only happens
    # when the pod requests `nvidia.com/gpu`. Time-slicing on the
    # device-plugin (configured in
    # core/nvidia-device-plugin/release.yaml) advertises each physical
    # GPU as 4 schedulable replicas, so this request takes one slice
    # while Jellyfin still has 3 left for transcoding.
    runtimeClassName: nvidia-cdi
    extraEnv:
      - name: NVIDIA_VISIBLE_DEVICES
        value: all
      - name: NVIDIA_DRIVER_CAPABILITIES
        value: compute,utility
    serviceMonitor:
      enabled: true
      interval: 30s
      additionalLabels:
        release: metrics-stack
    service:
      enabled: true
      type: ClusterIP
      port: 9400
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
        nvidia.com/gpu: 1
      limits:
        cpu: 200m
        memory: 256Mi
        nvidia.com/gpu: 1
