apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: dcgm-exporter
      sourceRef:
        kind: HelmRepository
        name: nvidia-dcgm
        namespace: observability
  values:
    # Run as a DaemonSet so every NVIDIA-capable host gets one exporter
    # exposing its local GPU(s) on :9400/metrics.
    nodeSelector:
      personal-stack/capability-nvidia: 'true'
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: personal-stack/capability-nvidia
                  operator: In
                  values:
                    - 'true'
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    # Run under the nvidia-cdi RuntimeClass like nvidia-device-plugin,
    # but ALSO request a GPU resource so the device-plugin attaches the
    # CDI annotation that nvidia-cdi needs to inject the device. Without
    # the resource request, runtimeClassName: nvidia-cdi runs the
    # container without any nvidia.com/gpu= CDI device, so DCGM's
    # `nvmlInit_v2` call fails with "Driver not loaded" and the
    # process exits in a tight CrashLoopBackOff.
    runtimeClassName: nvidia-cdi
    extraEnv:
      # CDI runtime reads these to choose which devices to inject.
      # `all` plus `compute,utility` matches what nvidia-smi needs.
      - name: NVIDIA_VISIBLE_DEVICES
        value: all
      - name: NVIDIA_DRIVER_CAPABILITIES
        value: compute,utility
    serviceMonitor:
      enabled: true
      interval: 30s
      additionalLabels:
        release: metrics-stack
    service:
      enabled: true
      type: ClusterIP
      port: 9400
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
        nvidia.com/gpu: 1
      limits:
        cpu: 200m
        memory: 256Mi
        nvidia.com/gpu: 1
