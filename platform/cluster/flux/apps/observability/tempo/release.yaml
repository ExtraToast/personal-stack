apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: tempo
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  values:
    fullnameOverride: tempo
    persistence:
      enabled: true
      size: 20Gi
    nodeSelector:
      personal-stack/site: frankfurt
    # All Tempo config has to be nested under `tempo:` for the chart to
    # pick it up. The chart has no top-level `metricsGenerator` or `config`
    # keys; values placed at the top level (which is what we had before)
    # are silently dropped and the chart renders its defaults. Verified
    # by reading /conf/tempo.yaml inside tempo-0 — the file had no
    # `metrics_generator:` block and no `overrides.defaults` config,
    # which is why every TraceQL `rate()` query failed with
    # `error finding generators: empty ring`.
    tempo:
      retention: 168h
      metricsGenerator:
        enabled: true
        remoteWriteUrl: http://metrics-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
        # local_blocks is what powers TraceQL `rate()` / `quantile_over_time()`
        # over recent data (the Drilldown view). Without it the generator
        # joins the ring but the querier still 500s with "empty ring"
        # because there are zero generators answering for that processor.
        processor:
          local_blocks:
            flush_to_storage: true
          service_graphs: {}
          span_metrics: {}
        storage:
          path: /var/tempo/generator/wal
        traces_storage:
          path: /var/tempo/generator/traces
      overrides:
        defaults:
          metrics_generator:
            processors:
              - service-graphs
              - span-metrics
              - local-blocks
            generate_native_histograms: both
