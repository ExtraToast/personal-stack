apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireguard-check
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wireguard-check
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wireguard-check
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: downloads
        vault.hashicorp.com/agent-inject-secret-gluetun-wireguard.env: secret/data/platform/media
        vault.hashicorp.com/agent-inject-template-gluetun-wireguard.env: |
          {{ with secret "secret/data/platform/media" }}
          VPN_SERVICE_PROVIDER=custom
          VPN_TYPE=wireguard
          FIREWALL_OUTBOUND_SUBNETS=100.64.0.0/10,192.168.0.0/16,172.16.0.0/12
          {{ with index .Data.data "pia.wireguard_endpoint_ip" }}
          VPN_ENDPOINT_IP={{ . }}
          {{ end }}
          {{ with index .Data.data "pia.wireguard_endpoint_port" }}
          VPN_ENDPOINT_PORT={{ . }}
          {{ end }}
          {{ with index .Data.data "pia.wireguard_server_public_key" }}
          WIREGUARD_PUBLIC_KEY={{ . }}
          {{ end }}
          {{ with index .Data.data "pia.wireguard_private_key" }}
          WIREGUARD_PRIVATE_KEY={{ . }}
          {{ end }}
          {{ with index .Data.data "pia.wireguard_addresses" }}
          WIREGUARD_ADDRESSES={{ . }}
          {{ end }}
          {{ with index .Data.data "pia.wireguard_preshared_key" }}
          WIREGUARD_PRESHARED_KEY={{ . }}
          {{ end }}
          {{ with index .Data.data "pia.wireguard_dns" }}
          VPN_DNS_ADDRESS={{ . }}
          {{ end }}
          {{ end }}
    spec:
      serviceAccountName: downloads
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.40
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -a
              . /vault/secrets/gluetun-wireguard.env
              set +a
              export TZ=Europe/Amsterdam
              export UPDATER_PERIOD=24h
              export HEALTH_VPN_DURATION_INITIAL=30s
              exec /gluetun-entrypoint
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: curl
          image: curlimages/curl:8.12.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              trap 'exit 0' TERM INT
              while :; do
                date -Iseconds
                curl -fsS https://ifconfig.me/ip
                echo
                sleep 300
              done
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
