apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: radarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radarr
    spec:
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
        personal-stack/capability-samba: 'true'
      containers:
        - name: radarr
          image: linuxserver/radarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
          ports:
            - containerPort: 7878
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: http
          livenessProbe:
            httpGet:
              path: /ping
              port: http
          volumeMounts:
            - name: media-completed
              mountPath: /media/Completed
            - name: media-films
              mountPath: /media/Films
            - name: radarr-config
              mountPath: /config
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1200m
              memory: 1536Mi
      volumes:
        - name: media-completed
          hostPath:
            path: /srv/media/Completed
            type: Directory
        - name: media-films
          hostPath:
            path: /srv/media/Films
            type: Directory
        - name: radarr-config
          hostPath:
            path: /var/lib/personal-stack/media/radarr
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: radarr
  ports:
    - name: http
      port: 7878
      targetPort: http
