apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: media-system
  labels:
    app.kubernetes.io/name: immich-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-server
    spec:
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
        personal-stack/capability-samba: 'true'
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:v2.7.5
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: DB_HOSTNAME
              value: immich-postgres.media-system.svc.cluster.local
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_USERNAME
              value: immich
            - name: REDIS_HOSTNAME
              value: immich-redis.media-system.svc.cluster.local
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning.media-system.svc.cluster.local:3003
          envFrom:
            - secretRef:
                name: immich-postgres
          ports:
            - name: http
              containerPort: 2283
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: photos
              mountPath: /data
            - name: config
              mountPath: /usr/src/app/config
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi
      volumes:
        - name: photos
          hostPath:
            path: /srv/media/Photos
            type: Directory
        - name: config
          hostPath:
            path: /var/lib/personal-stack/media/immich
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: immich-server
  ports:
    - name: http
      port: 2283
      targetPort: http
