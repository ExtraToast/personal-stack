apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyseerr
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyseerr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyseerr
    spec:
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
      containers:
        - name: jellyseerr
          image: ghcr.io/seerr-team/seerr:v3.1.1
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PORT
              value: '5055'
          ports:
            - containerPort: 5055
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/settings/public
              port: http
          livenessProbe:
            httpGet:
              path: /api/v1/settings/public
              port: http
          volumeMounts:
            - name: jellyseerr-config
              mountPath: /app/config
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
      volumes:
        - name: jellyseerr-config
          hostPath:
            path: /var/lib/personal-stack/media/jellyseerr
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: jellyseerr
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: jellyseerr
  ports:
    - name: http
      port: 5055
      targetPort: http
