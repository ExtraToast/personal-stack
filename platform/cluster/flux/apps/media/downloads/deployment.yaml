apiVersion: v1
kind: ServiceAccount
metadata:
  name: downloads
  namespace: media-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloads
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: downloads
  template:
    metadata:
      labels:
        app.kubernetes.io/name: downloads
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: downloads
        vault.hashicorp.com/agent-inject-secret-gluetun.env: secret/data/platform/media
        vault.hashicorp.com/agent-inject-template-gluetun.env: |
          # ProtonVPN via gluetun's NATIVE WireGuard provider. Unlike the
          # earlier PIA `custom` setup, gluetun supplies the server public
          # key, endpoint and tunnel addresses itself — the only secret
          # required is the account's WireGuard private key, and one key
          # works for every Proton server. Generate it at
          # https://account.proton.me/u/0/vpn/WireGuard with NAT-PMP (port
          # forwarding) enabled, then store the PrivateKey value in Vault.
          # WireGuard on Proton's high-capacity servers lifts single-tunnel
          # throughput far above the old OpenVPN transport that capped
          # seed/upload bandwidth to family peers.
          VPN_SERVICE_PROVIDER='protonvpn'
          VPN_TYPE='wireguard'
          WIREGUARD_PRIVATE_KEY='{{ with secret "secret/data/platform/media" }}{{ index .Data.data "proton.wg_private_key" }}{{ end }}'
          # MTU: gluetun's Proton default is 1320, but this pod's eth0 is a
          # flannel veth sized off the flannel-iface (tailscale0, MTU 1280),
          # so the real path MTU is ~1230. A 1320 tunnel emits 1380-byte
          # outer packets that exceed 1230 and fragment / get PMTU-dropped,
          # throttling throughput. WireGuard adds 60 bytes (IPv4/UDP/WG), so
          # cap the tunnel at 1230 - 60 = 1170 to fit the path with no
          # fragmentation. (VPN egress itself is direct out the node WAN, not
          # via tailscale — only the flannel-derived MTU comes from it.) If
          # the pod eth0 MTU ever changes, retune: WIREGUARD_MTU = eth0 - 60.
          WIREGUARD_MTU='1170'
          # Connect only to Netherlands servers that support port forwarding,
          # keeping the VPN exit next to the home uplink for the
          # lowest-latency path to family peers in NL.
          SERVER_COUNTRIES='Netherlands'
          PORT_FORWARD_ONLY='on'
          # FIREWALL_OUTBOUND_SUBNETS is Gluetun's kill-switch allow-list:
          # anything outbound outside the VPN tunnel that doesn't match
          # one of these CIDRs gets dropped. We need:
          #   100.64.0.0/10     Tailscale CGNAT
          #   192.168.0.0/16    Enschede home LAN (and printer, nas, etc)
          #   172.16.0.0/12     RFC1918 spare
          #   10.42.0.0/16      k3s pod CIDR  -- so prowlarr/qbittorrent
          #                      (co-located in this pod with gluetun) can
          #                      reach sonarr/radarr/bazarr/jellyseerr/
          #                      jellyfin pods via in-cluster DNS
          #   10.43.0.0/16      k3s service CIDR -- same reason, for
          #                      ClusterIP addresses
          FIREWALL_OUTBOUND_SUBNETS='100.64.0.0/10,192.168.0.0/16,172.16.0.0/12,10.42.0.0/16,10.43.0.0/16'
          FIREWALL_INPUT_PORTS='8080,9696'
          # Proton hands out an inbound port via NAT-PMP on its P2P servers;
          # without it qBittorrent can only reach peers via outbound
          # connections, which starves upload throughput. Gluetun negotiates
          # and renews the NAT-PMP lease internally and exposes the assigned
          # port on its HTTP control server at GET /v1/portforward (gluetun
          # >= v3.41; the route is auth-gated, see the auth config in the
          # gluetun container command below).
          # The qbittorrent-port-sync sidecar below pushes that port into
          # qBittorrent's listen socket whenever it changes — a live WebAPI
          # call, no container restart. The native protonvpn provider needs
          # no port-forward username or server-name; PORT_FORWARD_ONLY above
          # guarantees a PF-capable server is selected.
          VPN_PORT_FORWARDING=on
          # By default Gluetun owns /etc/resolv.conf and points it at its
          # own DoT resolver (so public DNS leaks can't escape the tunnel).
          # That also means cluster DNS (coredns at 10.43.0.10) gets
          # overwritten and prowlarr/qbittorrent in this pod cannot
          # resolve sonarr.media-system.svc.cluster.local etc. Disable
          # DoT and keep whatever kubelet injected -- the search list
          # includes *.svc.cluster.local and the nameserver is coredns.
          #
          # DNS queries for public domains (trackers, indexers) now
          # traverse coredns -> host resolv.conf -> upstream, bypassing
          # the VPN for DNS only. That is a deliberate trade-off: we
          # keep service-to-service connectivity and accept the DNS
          # leak for the small set of public lookups qBittorrent and
          # Prowlarr make. Actual content traffic still egresses the
          # VPN tunnel.
          DOT=off
          DNS_KEEP_NAMESERVER=on
    spec:
      serviceAccountName: downloads
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
        personal-stack/capability-samba: 'true'
      initContainers:
        - name: tailscale-local-route
          image: busybox:1.38.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              gw="$(ip route | awk '$1 == "default" && $5 == "eth0" { print $3; exit }')"
              test -n "$gw"
              ip route replace 100.64.0.0/10 via "$gw" dev eth0
              ip route | grep '^100\.64\.0\.0/10 '
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: qbittorrent-config-seed
          # Seeds qBittorrent.conf before the main container starts.
          # qBittorrent reads the file at launch and rewrites it on
          # exit, so any value we want to hold has to be forced here,
          # pre-start; the Recreate pod strategy guarantees this init
          # runs again on every restart and re-converges the file.
          #
          # Two groups of keys are managed:
          #   [Preferences] WebUI hardening for the SSO perimeter:
          #     - auth-bypass for loopback so the port-sync sidecar can
          #       reach the WebAPI without shipping credentials.
          #     - CSRF protection off. The host is sso_protected, so
          #       every request arrives via Traefik forward-auth from a
          #       cluster IP, already authenticated. qBittorrent's own
          #       Referer/origin CSRF check fires on a new device's
          #       first request because the SSO login redirect leaves
          #       the Referer pointing at the auth domain, not the
          #       qBittorrent host — a "Referer header & Target origin
          #       mismatch" 401 that only hits sessions without a prior
          #       same-origin Referer. Forward-auth is the real CSRF
          #       boundary, so the redundant check is disabled.
          #   [BitTorrent] DHT/PeX/LSD disabled — peer-discovery
          #     mechanisms that leak swarm participation outside the
          #     tracker; turned off for privacy.
          #
          # Every managed key contains a literal backslash
          # (`WebUI\AuthSubnetWhitelist...`, `Session\DHTEnabled`).
          # Earlier versions piped keys into awk via `-v k=...`, which
          # silently interprets backslash escapes in the value: `\A`
          # decayed to `A` and the rendered conf had unrecognised keys
          # that qBittorrent ignored. The file is built with grep + an
          # awk source-literal (where `\\` in the source is one literal
          # backslash), which avoids -v entirely.
          image: busybox:1.38.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              # linuxserver/qbittorrent reads its preferences from
              # /config/qBittorrent/qBittorrent.conf (NOT
              # /config/qBittorrent/config/qBittorrent.conf — the
              # `config/` subdir does not exist in the linuxserver
              # image). Earlier revisions wrote to the wrong path; a
              # stub file got created there and qBittorrent silently
              # ignored it, leaving auth-required defaults in effect.
              CONF_DIR=/config/qBittorrent
              CONF=$CONF_DIR/qBittorrent.conf
              # Sweep the wrong-path stub left by previous deploys.
              rm -f /config/qBittorrent/config/qBittorrent.conf
              rmdir /config/qBittorrent/config 2>/dev/null || true
              mkdir -p "$CONF_DIR"
              [ -f "$CONF" ] || printf '[Preferences]\n' > "$CONF"
              # Drop any prior versions of every managed key (broken or
              # canonical) so re-runs converge on the right form.
              grep -v -E '^(WebUI\\?(AuthSubnetWhitelist(Enabled)?|CSRFProtection)|Session\\?((DHT|PeX|LSD)Enabled|TempPath(Enabled)?|DefaultSavePath|UseRandomPort|QueueingSystemEnabled|MaxUploads(PerTorrent)?|MaxConnections(PerTorrent)?|Encryption|BTProtocol))=' "$CONF" > "$CONF.tmp"
              # Make sure both section headers survived so the awk
              # insert below has an anchor for each key group.
              grep -qF '[Preferences]' "$CONF.tmp" || printf '[Preferences]\n' >> "$CONF.tmp"
              grep -qF '[BitTorrent]' "$CONF.tmp" || printf '[BitTorrent]\n' >> "$CONF.tmp"
              # Insert the canonical lines right under each header.
              # `\\` in awk source = one literal backslash in output.
              awk '
                /^\[Preferences\]$/ && !pref {
                  print
                  print "WebUI\\AuthSubnetWhitelistEnabled=true"
                  print "WebUI\\AuthSubnetWhitelist=127.0.0.0/8, ::1/128"
                  print "WebUI\\CSRFProtection=false"
                  pref = 1
                  next
                }
                /^\[BitTorrent\]$/ && !bt {
                  print
                  print "Session\\DHTEnabled=false"
                  print "Session\\PeXEnabled=false"
                  print "Session\\LSDEnabled=false"
                  # Download staging and the seed/library location are split
                  # across the two pools entirely through qBittorrent's native
                  # temp/save-path mechanism — no external copy hook:
                  #   TempPath        = /media/Seeding   (NVMe, -> /srv/media-incomplete)
                  #   DefaultSavePath = /media/Completed (HDD,  -> /srv/media/Completed)
                  # In-progress torrents (out-of-order piece writes, many-peer
                  # random I/O the 5400-class HDD handles poorly) stage on the
                  # SSD; on completion qBittorrent moves the content to the HDD
                  # and seeds it from there. Sonarr/Radarr import straight from
                  # /media/Completed — the exact path qBittorrent reports — so
                  # no remote-path mapping is needed on the *arr side.
                  print "Session\\TempPathEnabled=true"
                  print "Session\\TempPath=/media/Seeding"
                  print "Session\\DefaultSavePath=/media/Completed"
                  # Connectability + seeding throughput. UseRandomPort=false
                  # is load-bearing: with a random port qBittorrent ignores
                  # the Proton-forwarded port the port-sync sidecar applies,
                  # so inbound peers never reach it and a completed torrent
                  # stalls at ~0 up. QueueingSystemEnabled=false lets every
                  # torrent seed at once instead of parking most of the
                  # library as "queued" (idle) behind a small active-seed cap.
                  # The Max* caps lift the libtorrent per-session and
                  # per-torrent upload-slot / connection ceilings so a
                  # high-leecher swarm is not slot-starved on a gigabit
                  # symmetric uplink.
                  print "Session\\UseRandomPort=false"
                  print "Session\\QueueingSystemEnabled=false"
                  print "Session\\MaxUploads=40"
                  print "Session\\MaxUploadsPerTorrent=8"
                  print "Session\\MaxConnections=500"
                  print "Session\\MaxConnectionsPerTorrent=100"
                  # Encryption=0 = "Allow encryption" (accept both encrypted
                  # and plaintext peers). Investigation confirmed peer
                  # handshakes complete regardless of this; "Require
                  # encryption" (1) only discards every plaintext peer, and
                  # since all traffic already rides the WireGuard tunnel there
                  # is no ISP that could see or throttle it — so requiring it
                  # is pure peer loss with no privacy gain. Pinned to Allow so
                  # a WebUI toggle to Require does not silently shrink the
                  # peer set on the next restart.
                  print "Session\\Encryption=0"
                  # BTProtocol=Both = offer TCP and uTP. Forcing TCP-only was
                  # tested and made no difference to throughput, so the
                  # widest-reach default is kept rather than the narrower
                  # TCP-only value the A/B test left behind.
                  print "Session\\BTProtocol=Both"
                  bt = 1
                  next
                }
                { print }
              ' "$CONF.tmp" > "$CONF"
              rm -f "$CONF.tmp"
              # [AutoRun] previously ran a copy-to-Completed shell hook on
              # every finished torrent. The native temp/save-path move above
              # replaces it, so force AutoRun off and drop the stale script: a
              # conf carried over from the old design would otherwise keep
              # firing a program that no longer exists. The pass is section-
              # aware (AutoRun keys are unqualified `enabled`/`program`, shared
              # with other sections) and is a no-op when there is no [AutoRun].
              awk '
                /^\[AutoRun\]$/ { print; ar=1; print "enabled=false"; next }
                /^\[/ { ar=0 }
                ar && /^(enabled|program)=/ { next }
                { print }
              ' "$CONF" > "$CONF.ar" && mv "$CONF.ar" "$CONF"
              rm -f /config/qBittorrent/autorun-copy.sh
              chown -R 1000:1000 "$CONF_DIR"
              chmod 600 "$CONF"
              echo "qBittorrent.conf seeded; managed keys:"
              grep -E '^(WebUI\\?(AuthSubnet|CSRFProtection)|Session\\?((DHT|PeX|LSD)Enabled|TempPath(Enabled)?|DefaultSavePath|UseRandomPort|QueueingSystemEnabled|MaxUploads(PerTorrent)?|MaxConnections(PerTorrent)?|Encryption|BTProtocol))' "$CONF" || true
              # The NVMe scratch subvolume (@media-incomplete) is created
              # owned root:root (btrfs subvolume create / disko), and the
              # host-side tmpfiles chown races the `nofail` NVMe mount, so it
              # often lands on the empty mountpoint rather than the mounted
              # subvolume root. qBittorrent runs as UID 1000 and must write
              # here — without this, every download fails with
              # "file_open ... Permission denied". Force ownership of the
              # mount root from this init (runs as root, after kubelet has
              # mounted the hostPath) on every start. Non-recursive: only the
              # root needs to be writable; files inside are created 1000-owned.
              chown 1000:1000 /media/Seeding
              chmod 0775 /media/Seeding
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: media-incomplete
              mountPath: /media/Seeding
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -a
              . /vault/secrets/gluetun.env
              set +a
              export TZ=Europe/Amsterdam
              export UPDATER_PERIOD=24h
              export HEALTH_VPN_DURATION_INITIAL=30s
              export FIREWALL_VPN_INPUT_PORTS=8080,9696
              # Control-server auth. v3.41.x enforces authentication on every
              # control-server route (unauthenticated requests get 401) and
              # renamed the port-forward route to GET /v1/portforward (the old
              # /v1/openvpn/portforwarded was removed). gluetun validates each
              # route named in the auth file against the routes the running
              # build serves and exits 1 on an unknown one, so this config must
              # list exactly the route THIS image serves — for v3.41.x that is
              # GET /v1/portforward. It is granted auth=none so the in-pod
              # qbittorrent-port-sync sidecar can read the forwarded port
              # without credentials; the control server is never reachable
              # outside the pod network namespace (no Service targets :8000 and
              # FIREWALL_INPUT_PORTS omits it), so this carries no exposure. If
              # gluetun is ever downgraded below v3.41 or the route is renamed
              # again, update the route here in the same change or gluetun will
              # crash-loop on an unknown route.
              mkdir -p /gluetun/auth
              printf '%s\n' \
                '[[roles]]' \
                'name = "qbittorrent-port-sync"' \
                'routes = ["GET /v1/portforward"]' \
                'auth = "none"' \
                > /gluetun/auth/config.toml
              export HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH=/gluetun/auth/config.toml
              exec /gluetun-entrypoint
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            # WireGuard is CPU-bound (kernelspace crypto runs in softirq, but
            # userspace fallback and packet handling are charged here). 4
            # cores of headroom keeps the tunnel from CFS-throttling at the
            # ~1 Gbit home uplink. Limits do not count against scheduling —
            # only requests do — so this stays well within the 12-core node.
            limits:
              cpu: '4000m'
              memory: 512Mi
        - name: qbittorrent
          image: linuxserver/qbittorrent:5.2.2_v2.0.13-ls462
          imagePullPolicy: IfNotPresent
          # Wait for gluetun to bring up the VPN interface before starting.
          # qBittorrent binds to tun0 (kill-switch); starting before gluetun
          # creates tun0 logs a critical "configured network interface is
          # invalid" and binds late. /sys/class/net/tun0 appears once the
          # tunnel is up (containers share the pod netns) — gate on it, then
          # hand off to the linuxserver s6 init at /init.
          command:
            - /bin/sh
            - -ec
            - |
              until [ -d /sys/class/net/tun0 ]; do
                echo "waiting for gluetun tun0..."
                sleep 1
              done
              exec /init
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: UMASK
              value: '002'
            - name: TZ
              value: Europe/Amsterdam
            - name: WEBUI_PORT
              value: '8080'
          ports:
            - containerPort: 8080
              name: qbit-http
          readinessProbe:
            httpGet:
              path: /
              port: qbit-http
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: qbit-http
            initialDelaySeconds: 120
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            # HDD pool. qBittorrent's save path: finished torrents are moved
            # here on completion and seed from here, and Sonarr/Radarr import
            # straight from this path (the same one qBittorrent reports).
            - name: media-completed
              mountPath: /media/Completed
            # NVMe scratch subvolume. qBittorrent's temp path: in-progress
            # downloads stage here, then move to /media/Completed on finish.
            - name: media-incomplete
              mountPath: /media/Seeding
            - name: qbittorrent-config
              mountPath: /config
          # Piece hashing and disk I/O at ~1 Gbit are real CPU in qBittorrent's
          # own cgroup, so give it 4 cores of burst headroom. Request stays
          # modest (1 core) to keep the node's schedulable budget healthy —
          # limits oversubscribe safely, requests do not.
          resources:
            requests:
              cpu: '1000m'
              memory: 768Mi
            limits:
              cpu: '4000m'
              memory: 3Gi
        - name: qbittorrent-port-sync
          # Keeps qBittorrent's listen socket pinned to the inbound port
          # Proton hands gluetun via NAT-PMP. Inbound reachability is what
          # makes a pure seeder uploadable: while a torrent is still
          # downloading, qBittorrent dials peers outbound and can upload back
          # on those sockets, but a completed torrent only uploads to leechers
          # that connect IN — which requires the forwarded port to be the one
          # qBittorrent is actually listening on. Proton renews the lease and
          # can hand out a different port on every reconnect, so this loops.
          #
          # Reconciles against qBittorrent's OWN reported listen_port rather
          # than a remembered "last applied" value. The earlier version only
          # re-pushed when gluetun's port changed, so a qBittorrent restart
          # within the pod (crash / OOM / WebUI "use random port") would leave
          # it listening on a stale or random port while the sidecar sat in a
          # silent heartbeat — connectable port forwarded, nothing behind it.
          # Each pass also clears random-port and UPnP: a random listen port
          # ignores the forward entirely, and UPnP/NAT-PMP from the client is
          # meaningless inside the pod (gluetun owns the lease) and only adds
          # failing map attempts.
          image: curlimages/curl:8.20.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              GLUETUN='http://localhost:8000'
              QBT='http://localhost:8080'
              INTERVAL=60
              # Optional control-server API key for gluetun builds that
              # enforce auth on the port-forward route; unset for the
              # auth=none role this pod ships, so the header is omitted.
              AUTH_HDR=''
              [ -n "${GLUETUN_APIKEY:-}" ] && AUTH_HDR="X-API-Key: ${GLUETUN_APIKEY}"

              # Forwarded port from gluetun. v3.41+ renamed the route to
              # /v1/portforward; try it first, fall back to the legacy
              # /v1/openvpn/portforwarded so this works on either image.
              gluetun_port() {
                for p in /v1/portforward /v1/openvpn/portforwarded; do
                  r=$(curl -fsS ${AUTH_HDR:+-H "$AUTH_HDR"} "$GLUETUN$p" 2>/dev/null) || continue
                  v=$(printf '%s' "$r" | sed -n 's/.*"port":[[:space:]]*\([0-9][0-9]*\).*/\1/p')
                  [ -n "$v" ] && { printf '%s' "$v"; return 0; }
                done
                return 1
              }

              echo "[port-sync] waiting for qBittorrent WebAPI..."
              until curl -fsS -o /dev/null "$QBT/api/v2/app/version"; do
                sleep 5
              done
              echo "[port-sync] qBittorrent reachable; entering watch loop"

              while :; do
                ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                port=$(gluetun_port || true)
                prefs=$(curl -fsS "$QBT/api/v2/app/preferences" 2>/dev/null || true)
                cur=$(printf '%s' "$prefs" | sed -n 's/.*"listen_port":[[:space:]]*\([0-9][0-9]*\).*/\1/p')
                # connection_status is qBittorrent's own verdict on inbound
                # reachability: "connected" once a peer has reached the
                # forwarded port, "firewalled" while nothing has, surfaced to
                # Loki so a dead forward is visible without WebUI access.
                conn=$(curl -fsS "$QBT/api/v2/transfer/info" 2>/dev/null \
                  | sed -n 's/.*"connection_status":[[:space:]]*"\([a-z]*\)".*/\1/p')

                if [ -z "$port" ] || [ "$port" = "0" ]; then
                  echo "[port-sync] $ts no forwarded port yet (gluetun unreachable or lease pending)"
                elif [ "$port" != "$cur" ]; then
                  echo "[port-sync] $ts listen_port ${cur:-<unknown>} -> $port (conn=${conn:-?})"
                  if curl -fsS -o /dev/null -X POST "$QBT/api/v2/app/setPreferences" \
                      --data-urlencode "json={\"listen_port\":$port,\"random_port\":false,\"upnp\":false}"; then
                    echo "[port-sync] $ts applied listen_port=$port"
                  else
                    echo "[port-sync] $ts WARN: failed to set listen_port=$port"
                  fi
                else
                  echo "[port-sync] $ts heartbeat listen_port=$port conn=${conn:-?}"
                fi
                sleep "$INTERVAL"
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: qbittorrent-log-tail
          # qBittorrent (linuxserver image) writes its log to
          # /config/qBittorrent/logs/qbittorrent.log instead of
          # stdout, so `kubectl logs` and Alloy/Loki see only the s6
          # init banner. This sidecar tails the log file to its own
          # stdout, which Alloy then ships to Loki — surfacing the
          # File error / IO error / tracker / save-path alerts that
          # are otherwise invisible.
          #
          # `tail -F` keeps following across log rotation and waits
          # for the file to appear, so the sidecar tolerates a fresh
          # pod where qBittorrent hasn't created the file yet.
          image: busybox:1.38.0
          imagePullPolicy: IfNotPresent
          # UID/GID 1000 matches qBittorrent's PUID/PGID, so the log
          # file (created by qbittorrent-nox as 1000:1000) is
          # readable without escalation.
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -ec
            - |
              LOG=/config/qBittorrent/logs/qbittorrent.log
              echo "[log-tail] waiting for $LOG"
              # tail -F retries on ENOENT, so this just works once
              # qBittorrent creates the file. No initial existence
              # check required.
              exec tail -n 0 -F "$LOG"
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: prowlarr
          image: linuxserver/prowlarr:2.4.0.5397-ls150
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: UMASK
              value: '002'
            - name: TZ
              value: Europe/Amsterdam
          ports:
            - containerPort: 9696
              name: prowlarr-http
          readinessProbe:
            httpGet:
              path: /ping
              port: prowlarr-http
            initialDelaySeconds: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: prowlarr-http
            initialDelaySeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: media-completed
          hostPath:
            path: /srv/media/Completed
            type: Directory
        # NVMe scratch subvolume: in-progress downloads stage here, then move
        # to /media/Completed on finish (see nix media-storage.nix).
        # type: Directory (not DirectoryOrCreate) on purpose: if the node
        # mount /srv/media-incomplete is somehow absent, the pod stays
        # Pending rather than silently creating the dir on the root disk and
        # filling it with download data.
        - name: media-incomplete
          hostPath:
            path: /srv/media-incomplete
            type: Directory
        - name: qbittorrent-config
          hostPath:
            path: /var/lib/personal-stack/media/qbittorrent
            type: DirectoryOrCreate
        - name: prowlarr-config
          hostPath:
            path: /var/lib/personal-stack/media/prowlarr
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: downloads
  ports:
    - name: http
      port: 8080
      targetPort: qbit-http
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: downloads
  ports:
    - name: http
      port: 9696
      targetPort: prowlarr-http
