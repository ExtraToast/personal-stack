apiVersion: v1
kind: ServiceAccount
metadata:
  name: downloads
  namespace: media-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloads
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: downloads
  template:
    metadata:
      labels:
        app.kubernetes.io/name: downloads
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: downloads
        vault.hashicorp.com/agent-inject-secret-gluetun.env: secret/data/platform/media
        vault.hashicorp.com/agent-inject-template-gluetun.env: |
          VPN_SERVICE_PROVIDER='private internet access'
          VPN_TYPE='openvpn'
          OPENVPN_USER='{{ with secret "secret/data/platform/media" }}{{ index .Data.data "pia.username" }}{{ end }}'
          OPENVPN_PASSWORD='{{ with secret "secret/data/platform/media" }}{{ index .Data.data "pia.password" }}{{ end }}'
          SERVER_REGIONS='{{ with secret "secret/data/platform/media" }}{{ index .Data.data "pia.server_regions" }}{{ end }}'
          # FIREWALL_OUTBOUND_SUBNETS is Gluetun's kill-switch allow-list:
          # anything outbound outside the VPN tunnel that doesn't match
          # one of these CIDRs gets dropped. We need:
          #   100.64.0.0/10     Tailscale CGNAT
          #   192.168.0.0/16    Enschede home LAN (and printer, nas, etc)
          #   172.16.0.0/12     RFC1918 spare
          #   10.42.0.0/16      k3s pod CIDR  -- so prowlarr/qbittorrent
          #                      (co-located in this pod with gluetun) can
          #                      reach sonarr/radarr/bazarr/jellyseerr/
          #                      jellyfin pods via in-cluster DNS
          #   10.43.0.0/16      k3s service CIDR -- same reason, for
          #                      ClusterIP addresses
          FIREWALL_OUTBOUND_SUBNETS='100.64.0.0/10,192.168.0.0/16,172.16.0.0/12,10.42.0.0/16,10.43.0.0/16'
          FIREWALL_INPUT_PORTS='8080,9696'
          # PIA hands out a forwarded inbound port; without it qBittorrent
          # can only reach peers via outbound connections, which starves
          # upload throughput. Gluetun negotiates and renews the port via
          # PIA's API and exposes it on its HTTP control server at
          # GET /v1/openvpn/portforwarded . The qbittorrent-port-sync
          # sidecar below pushes the assigned port into qBittorrent's
          # listen socket whenever it changes. NB: only PIA regions that
          # advertise port-forward support work — pia.server_regions in
          # Vault must list one of those (most non-US regions qualify).
          VPN_PORT_FORWARDING=on
          # By default Gluetun owns /etc/resolv.conf and points it at its
          # own DoT resolver (so public DNS leaks can't escape the tunnel).
          # That also means cluster DNS (coredns at 10.43.0.10) gets
          # overwritten and prowlarr/qbittorrent in this pod cannot
          # resolve sonarr.media-system.svc.cluster.local etc. Disable
          # DoT and keep whatever kubelet injected -- the search list
          # includes *.svc.cluster.local and the nameserver is coredns.
          #
          # DNS queries for public domains (trackers, indexers) now
          # traverse coredns -> host resolv.conf -> upstream, bypassing
          # the VPN for DNS only. That is a deliberate trade-off: we
          # keep service-to-service connectivity and accept the DNS
          # leak for the small set of public lookups qBittorrent and
          # Prowlarr make. Actual content traffic still egresses the
          # VPN tunnel.
          DOT=off
          DNS_KEEP_NAMESERVER=on
    spec:
      serviceAccountName: downloads
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
        personal-stack/capability-samba: 'true'
      initContainers:
        - name: tailscale-local-route
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              gw="$(ip route | awk '$1 == "default" && $5 == "eth0" { print $3; exit }')"
              test -n "$gw"
              ip route replace 100.64.0.0/10 via "$gw" dev eth0
              ip route | grep '^100\.64\.0\.0/10 '
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: qbittorrent-localhost-auth
          # The port-sync sidecar talks to qBittorrent's WebAPI on
          # localhost (within this pod's shared net namespace) and we
          # don't want to ship its login credentials to a sidecar.
          # qBittorrent supports skipping WebUI auth for whitelisted
          # source subnets — flip that on for loopback.
          #
          # The two pref keys here contain a literal backslash
          # (`WebUI\AuthSubnetWhitelist...`). Earlier versions of this
          # script piped the keys into awk via `-v k=...`, which
          # silently interprets backslash escapes in the value: `\A`
          # decayed to `A` and the rendered conf had unrecognised
          # `WebUIAuthSubnetWhitelist` keys, leaving WebAPI auth on
          # and the port-sync sidecar getting 403 on every request.
          # We now build the file with grep + an awk source-literal
          # (where `\\` in the source is one literal backslash), which
          # avoids -v entirely.
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              # linuxserver/qbittorrent reads its preferences from
              # /config/qBittorrent/qBittorrent.conf (NOT
              # /config/qBittorrent/config/qBittorrent.conf — the
              # `config/` subdir does not exist in the linuxserver
              # image). Earlier revisions wrote to the wrong path; a
              # stub file got created there and qBittorrent silently
              # ignored it, leaving auth-required defaults in effect.
              CONF_DIR=/config/qBittorrent
              CONF=$CONF_DIR/qBittorrent.conf
              # Sweep the wrong-path stub left by previous deploys.
              rm -f /config/qBittorrent/config/qBittorrent.conf
              rmdir /config/qBittorrent/config 2>/dev/null || true
              mkdir -p "$CONF_DIR"
              [ -f "$CONF" ] || printf '[Preferences]\n' > "$CONF"
              # Drop any prior versions of the two keys (broken or
              # canonical) so re-runs converge on the right form.
              grep -v -E '^WebUI\\?AuthSubnetWhitelist(Enabled)?=' "$CONF" > "$CONF.tmp"
              # Make sure the [Preferences] header survived.
              grep -qF '[Preferences]' "$CONF.tmp" || printf '[Preferences]\n' >> "$CONF.tmp"
              # Insert the two canonical lines right under the header.
              # `\\` in awk source = one literal backslash in output.
              awk '
                /^\[Preferences\]$/ && !done {
                  print
                  print "WebUI\\AuthSubnetWhitelistEnabled=true"
                  print "WebUI\\AuthSubnetWhitelist=127.0.0.0/8, ::1/128"
                  done = 1
                  next
                }
                { print }
              ' "$CONF.tmp" > "$CONF"
              rm -f "$CONF.tmp"
              chown -R 1000:1000 "$CONF_DIR"
              chmod 600 "$CONF"
              echo "qBittorrent.conf WebUI auth-bypass for loopback ensured:"
              grep -E '^WebUI\\?AuthSubnet' "$CONF" || true
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.40.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -a
              . /vault/secrets/gluetun.env
              set +a
              export TZ=Europe/Amsterdam
              export UPDATER_PERIOD=24h
              export HEALTH_VPN_DURATION_INITIAL=30s
              export FIREWALL_VPN_INPUT_PORTS=8080,9696
              exec /gluetun-entrypoint
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          resources:
            requests:
              cpu: 400m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 512Mi
        - name: qbittorrent
          image: linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: Europe/Amsterdam
            - name: WEBUI_PORT
              value: '8080'
          ports:
            - containerPort: 8080
              name: qbit-http
          readinessProbe:
            httpGet:
              path: /
              port: qbit-http
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: qbit-http
            initialDelaySeconds: 120
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: media-downloading
              mountPath: /media/Downloading
            - name: media-completed
              mountPath: /media/Completed
            - name: qbittorrent-config
              mountPath: /config
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 3Gi
        - name: qbittorrent-port-sync
          # Polls Gluetun's HTTP control server for the PIA-assigned
          # forwarded port and writes it into qBittorrent's listen
          # socket via the WebAPI. PIA renews the port lease every few
          # minutes and the value can change on every reconnect, so
          # this loops forever rather than running once.
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              GLUETUN='http://localhost:8000'
              QBT='http://localhost:8080'
              INTERVAL=60
              LAST_PORT=''

              echo "[port-sync] waiting for qBittorrent WebAPI..."
              until curl -fsS -o /dev/null "$QBT/api/v2/app/version"; do
                sleep 5
              done
              echo "[port-sync] qBittorrent reachable; entering watch loop"

              while :; do
                resp=$(curl -fsS "$GLUETUN/v1/openvpn/portforwarded" 2>/dev/null || true)
                port=$(printf '%s' "$resp" | sed -n 's/.*"port":[[:space:]]*\([0-9][0-9]*\).*/\1/p')
                if [ -n "$port" ] && [ "$port" != "0" ] && [ "$port" != "$LAST_PORT" ]; then
                  echo "[port-sync] forwarded port: ${LAST_PORT:-<none>} -> $port"
                  if curl -fsS -o /dev/null -X POST "$QBT/api/v2/app/setPreferences" \
                      --data-urlencode "json={\"listen_port\":$port}"; then
                    LAST_PORT="$port"
                    echo "[port-sync] applied listen_port=$port"
                  else
                    echo "[port-sync] WARN: failed to set listen_port=$port"
                  fi
                fi
                sleep "$INTERVAL"
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: prowlarr
          image: linuxserver/prowlarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: Europe/Amsterdam
          ports:
            - containerPort: 9696
              name: prowlarr-http
          readinessProbe:
            httpGet:
              path: /ping
              port: prowlarr-http
            initialDelaySeconds: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: prowlarr-http
            initialDelaySeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: media-downloading
          hostPath:
            path: /srv/media/Downloading
            type: Directory
        - name: media-completed
          hostPath:
            path: /srv/media/Completed
            type: Directory
        - name: qbittorrent-config
          hostPath:
            path: /var/lib/personal-stack/media/qbittorrent
            type: DirectoryOrCreate
        - name: prowlarr-config
          hostPath:
            path: /var/lib/personal-stack/media/prowlarr
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: downloads
  ports:
    - name: http
      port: 8080
      targetPort: qbit-http
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: downloads
  ports:
    - name: http
      port: 9696
      targetPort: prowlarr-http
