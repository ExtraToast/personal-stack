apiVersion: v1
kind: ServiceAccount
metadata:
  name: downloads
  namespace: media-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloads
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: downloads
  template:
    metadata:
      labels:
        app.kubernetes.io/name: downloads
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: downloads
        vault.hashicorp.com/agent-inject-secret-gluetun.env: secret/data/platform/media
        vault.hashicorp.com/agent-inject-template-gluetun.env: |
          # ProtonVPN via gluetun's NATIVE WireGuard provider. Unlike the
          # earlier PIA `custom` setup, gluetun supplies the server public
          # key, endpoint and tunnel addresses itself — the only secret
          # required is the account's WireGuard private key, and one key
          # works for every Proton server. Generate it at
          # https://account.proton.me/u/0/vpn/WireGuard with NAT-PMP (port
          # forwarding) enabled, then store the PrivateKey value in Vault.
          # WireGuard on Proton's high-capacity servers lifts single-tunnel
          # throughput far above the old OpenVPN transport that capped
          # seed/upload bandwidth to family peers.
          VPN_SERVICE_PROVIDER='protonvpn'
          VPN_TYPE='wireguard'
          WIREGUARD_PRIVATE_KEY='{{ with secret "secret/data/platform/media" }}{{ index .Data.data "proton.wg_private_key" }}{{ end }}'
          # MTU: gluetun's Proton default is 1320, but this pod's eth0 is a
          # flannel veth sized off the flannel-iface (tailscale0, MTU 1280),
          # so the real path MTU is ~1230. A 1320 tunnel emits 1380-byte
          # outer packets that exceed 1230 and fragment / get PMTU-dropped,
          # throttling throughput. WireGuard adds 60 bytes (IPv4/UDP/WG), so
          # cap the tunnel at 1230 - 60 = 1170 to fit the path with no
          # fragmentation. (VPN egress itself is direct out the node WAN, not
          # via tailscale — only the flannel-derived MTU comes from it.) If
          # the pod eth0 MTU ever changes, retune: WIREGUARD_MTU = eth0 - 60.
          WIREGUARD_MTU='1170'
          # Connect only to Netherlands servers that support port forwarding,
          # keeping the VPN exit next to the home uplink for the
          # lowest-latency path to family peers in NL.
          SERVER_COUNTRIES='Netherlands'
          PORT_FORWARD_ONLY='on'
          # FIREWALL_OUTBOUND_SUBNETS is Gluetun's kill-switch allow-list:
          # anything outbound outside the VPN tunnel that doesn't match
          # one of these CIDRs gets dropped. We need:
          #   100.64.0.0/10     Tailscale CGNAT
          #   192.168.0.0/16    Enschede home LAN (and printer, nas, etc)
          #   172.16.0.0/12     RFC1918 spare
          #   10.42.0.0/16      k3s pod CIDR  -- so prowlarr/qbittorrent
          #                      (co-located in this pod with gluetun) can
          #                      reach sonarr/radarr/bazarr/jellyseerr/
          #                      jellyfin pods via in-cluster DNS
          #   10.43.0.0/16      k3s service CIDR -- same reason, for
          #                      ClusterIP addresses
          FIREWALL_OUTBOUND_SUBNETS='100.64.0.0/10,192.168.0.0/16,172.16.0.0/12,10.42.0.0/16,10.43.0.0/16'
          FIREWALL_INPUT_PORTS='8080,9696'
          # Proton hands out an inbound port via NAT-PMP on its P2P servers;
          # without it qBittorrent can only reach peers via outbound
          # connections, which starves upload throughput. Gluetun negotiates
          # and renews the NAT-PMP lease internally and exposes the assigned
          # port on its HTTP control server at GET /v1/openvpn/portforwarded .
          # The qbittorrent-port-sync sidecar below pushes that port into
          # qBittorrent's listen socket whenever it changes — a live WebAPI
          # call, no container restart. The native protonvpn provider needs
          # no port-forward username or server-name; PORT_FORWARD_ONLY above
          # guarantees a PF-capable server is selected.
          VPN_PORT_FORWARDING=on
          # By default Gluetun owns /etc/resolv.conf and points it at its
          # own DoT resolver (so public DNS leaks can't escape the tunnel).
          # That also means cluster DNS (coredns at 10.43.0.10) gets
          # overwritten and prowlarr/qbittorrent in this pod cannot
          # resolve sonarr.media-system.svc.cluster.local etc. Disable
          # DoT and keep whatever kubelet injected -- the search list
          # includes *.svc.cluster.local and the nameserver is coredns.
          #
          # DNS queries for public domains (trackers, indexers) now
          # traverse coredns -> host resolv.conf -> upstream, bypassing
          # the VPN for DNS only. That is a deliberate trade-off: we
          # keep service-to-service connectivity and accept the DNS
          # leak for the small set of public lookups qBittorrent and
          # Prowlarr make. Actual content traffic still egresses the
          # VPN tunnel.
          DOT=off
          DNS_KEEP_NAMESERVER=on
    spec:
      serviceAccountName: downloads
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
        personal-stack/capability-samba: 'true'
      initContainers:
        - name: tailscale-local-route
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              gw="$(ip route | awk '$1 == "default" && $5 == "eth0" { print $3; exit }')"
              test -n "$gw"
              ip route replace 100.64.0.0/10 via "$gw" dev eth0
              ip route | grep '^100\.64\.0\.0/10 '
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: qbittorrent-config-seed
          # Seeds qBittorrent.conf before the main container starts.
          # qBittorrent reads the file at launch and rewrites it on
          # exit, so any value we want to hold has to be forced here,
          # pre-start; the Recreate pod strategy guarantees this init
          # runs again on every restart and re-converges the file.
          #
          # Two groups of keys are managed:
          #   [Preferences] WebUI hardening for the SSO perimeter:
          #     - auth-bypass for loopback so the port-sync sidecar can
          #       reach the WebAPI without shipping credentials.
          #     - CSRF protection off. The host is sso_protected, so
          #       every request arrives via Traefik forward-auth from a
          #       cluster IP, already authenticated. qBittorrent's own
          #       Referer/origin CSRF check fires on a new device's
          #       first request because the SSO login redirect leaves
          #       the Referer pointing at the auth domain, not the
          #       qBittorrent host — a "Referer header & Target origin
          #       mismatch" 401 that only hits sessions without a prior
          #       same-origin Referer. Forward-auth is the real CSRF
          #       boundary, so the redundant check is disabled.
          #   [BitTorrent] DHT/PeX/LSD disabled — peer-discovery
          #     mechanisms that leak swarm participation outside the
          #     tracker; turned off for privacy.
          #
          # Every managed key contains a literal backslash
          # (`WebUI\AuthSubnetWhitelist...`, `Session\DHTEnabled`).
          # Earlier versions piped keys into awk via `-v k=...`, which
          # silently interprets backslash escapes in the value: `\A`
          # decayed to `A` and the rendered conf had unrecognised keys
          # that qBittorrent ignored. The file is built with grep + an
          # awk source-literal (where `\\` in the source is one literal
          # backslash), which avoids -v entirely.
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              # linuxserver/qbittorrent reads its preferences from
              # /config/qBittorrent/qBittorrent.conf (NOT
              # /config/qBittorrent/config/qBittorrent.conf — the
              # `config/` subdir does not exist in the linuxserver
              # image). Earlier revisions wrote to the wrong path; a
              # stub file got created there and qBittorrent silently
              # ignored it, leaving auth-required defaults in effect.
              CONF_DIR=/config/qBittorrent
              CONF=$CONF_DIR/qBittorrent.conf
              # Sweep the wrong-path stub left by previous deploys.
              rm -f /config/qBittorrent/config/qBittorrent.conf
              rmdir /config/qBittorrent/config 2>/dev/null || true
              mkdir -p "$CONF_DIR"
              [ -f "$CONF" ] || printf '[Preferences]\n' > "$CONF"
              # Drop any prior versions of every managed key (broken or
              # canonical) so re-runs converge on the right form.
              grep -v -E '^(WebUI\\?(AuthSubnetWhitelist(Enabled)?|CSRFProtection)|Session\\?((DHT|PeX|LSD)Enabled|TempPath(Enabled)?|DefaultSavePath))=' "$CONF" > "$CONF.tmp"
              # Make sure both section headers survived so the awk
              # insert below has an anchor for each key group.
              grep -qF '[Preferences]' "$CONF.tmp" || printf '[Preferences]\n' >> "$CONF.tmp"
              grep -qF '[BitTorrent]' "$CONF.tmp" || printf '[BitTorrent]\n' >> "$CONF.tmp"
              # Insert the canonical lines right under each header.
              # `\\` in awk source = one literal backslash in output.
              awk '
                /^\[Preferences\]$/ && !pref {
                  print
                  print "WebUI\\AuthSubnetWhitelistEnabled=true"
                  print "WebUI\\AuthSubnetWhitelist=127.0.0.0/8, ::1/128"
                  print "WebUI\\CSRFProtection=false"
                  pref = 1
                  next
                }
                /^\[BitTorrent\]$/ && !bt {
                  print
                  print "Session\\DHTEnabled=false"
                  print "Session\\PeXEnabled=false"
                  print "Session\\LSDEnabled=false"
                  # In-progress (incomplete) torrent data goes to the NVMe
                  # scratch subvolume (/media/Incomplete -> hostPath
                  # /srv/media-incomplete) instead of the 5400-class HDD
                  # pool; qBittorrent moves the finished file to its save
                  # path in one sequential pass on completion.
                  print "Session\\TempPathEnabled=true"
                  print "Session\\TempPath=/media/Incomplete"
                  # Completed/save path = /media/Completed (-> hostPath
                  # /srv/media/Completed), the directory Sonarr/Radarr import
                  # from. Pinning it here makes qBittorrent fully config-driven
                  # and interchangeable — a fresh instance lands finished
                  # torrents where the *arr stack already looks, no manual
                  # path setup. On completion qBittorrent moves the file from
                  # the NVMe TempPath to here in one sequential, HDD-friendly
                  # pass.
                  print "Session\\DefaultSavePath=/media/Completed"
                  bt = 1
                  next
                }
                { print }
              ' "$CONF.tmp" > "$CONF"
              rm -f "$CONF.tmp"
              chown -R 1000:1000 "$CONF_DIR"
              chmod 600 "$CONF"
              echo "qBittorrent.conf seeded; managed keys:"
              grep -E '^(WebUI\\?(AuthSubnet|CSRFProtection)|Session\\?((DHT|PeX|LSD)Enabled|TempPath(Enabled)?|DefaultSavePath))' "$CONF" || true
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.40.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -a
              . /vault/secrets/gluetun.env
              set +a
              export TZ=Europe/Amsterdam
              export UPDATER_PERIOD=24h
              export HEALTH_VPN_DURATION_INITIAL=30s
              export FIREWALL_VPN_INPUT_PORTS=8080,9696
              exec /gluetun-entrypoint
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            # WireGuard is CPU-bound (kernelspace crypto runs in softirq, but
            # userspace fallback and packet handling are charged here). 4
            # cores of headroom keeps the tunnel from CFS-throttling at the
            # ~1 Gbit home uplink. Limits do not count against scheduling —
            # only requests do — so this stays well within the 12-core node.
            limits:
              cpu: '4000m'
              memory: 512Mi
        - name: qbittorrent
          image: linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          # Wait for gluetun to bring up the VPN interface before starting.
          # qBittorrent binds to tun0 (kill-switch); starting before gluetun
          # creates tun0 logs a critical "configured network interface is
          # invalid" and binds late. /sys/class/net/tun0 appears once the
          # tunnel is up (containers share the pod netns) — gate on it, then
          # hand off to the linuxserver s6 init at /init.
          command:
            - /bin/sh
            - -ec
            - |
              until [ -d /sys/class/net/tun0 ]; do
                echo "waiting for gluetun tun0..."
                sleep 1
              done
              exec /init
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: UMASK
              value: '002'
            - name: TZ
              value: Europe/Amsterdam
            - name: WEBUI_PORT
              value: '8080'
          ports:
            - containerPort: 8080
              name: qbit-http
          readinessProbe:
            httpGet:
              path: /
              port: qbit-http
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: qbit-http
            initialDelaySeconds: 120
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: media-downloading
              mountPath: /media/Downloading
            - name: media-completed
              mountPath: /media/Completed
            - name: media-incomplete
              mountPath: /media/Incomplete
            - name: qbittorrent-config
              mountPath: /config
          # Piece hashing and disk I/O at ~1 Gbit are real CPU in qBittorrent's
          # own cgroup, so give it 4 cores of burst headroom. Request stays
          # modest (1 core) to keep the node's schedulable budget healthy —
          # limits oversubscribe safely, requests do not.
          resources:
            requests:
              cpu: '1000m'
              memory: 768Mi
            limits:
              cpu: '4000m'
              memory: 3Gi
        - name: qbittorrent-port-sync
          # Polls Gluetun's HTTP control server for the PIA-assigned
          # forwarded port and writes it into qBittorrent's listen
          # socket via the WebAPI. PIA renews the port lease every few
          # minutes and the value can change on every reconnect, so
          # this loops forever rather than running once.
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              GLUETUN='http://localhost:8000'
              QBT='http://localhost:8080'
              INTERVAL=60
              LAST_PORT=''

              echo "[port-sync] waiting for qBittorrent WebAPI..."
              until curl -fsS -o /dev/null "$QBT/api/v2/app/version"; do
                sleep 5
              done
              echo "[port-sync] qBittorrent reachable; entering watch loop"

              while :; do
                resp=$(curl -fsS "$GLUETUN/v1/openvpn/portforwarded" 2>/dev/null || true)
                port=$(printf '%s' "$resp" | sed -n 's/.*"port":[[:space:]]*\([0-9][0-9]*\).*/\1/p')
                # Heartbeat every iteration so Loki sees liveness from
                # this sidecar even when nothing changes (the previous
                # version logged only on port transitions, leaving long
                # silent stretches that looked indistinguishable from a
                # wedged loop).
                ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                if [ -z "$resp" ]; then
                  echo "[port-sync] $ts gluetun control-server unreachable"
                elif [ -z "$port" ] || [ "$port" = "0" ]; then
                  echo "[port-sync] $ts no forwarded port yet (gluetun reports: $resp)"
                elif [ "$port" != "$LAST_PORT" ]; then
                  echo "[port-sync] $ts forwarded port: ${LAST_PORT:-<none>} -> $port"
                  if curl -fsS -o /dev/null -X POST "$QBT/api/v2/app/setPreferences" \
                      --data-urlencode "json={\"listen_port\":$port}"; then
                    LAST_PORT="$port"
                    echo "[port-sync] $ts applied listen_port=$port"
                  else
                    echo "[port-sync] $ts WARN: failed to set listen_port=$port"
                  fi
                else
                  echo "[port-sync] $ts heartbeat listen_port=$port"
                fi
                sleep "$INTERVAL"
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: qbittorrent-log-tail
          # qBittorrent (linuxserver image) writes its log to
          # /config/qBittorrent/logs/qbittorrent.log instead of
          # stdout, so `kubectl logs` and Alloy/Loki see only the s6
          # init banner. This sidecar tails the log file to its own
          # stdout, which Alloy then ships to Loki — surfacing the
          # File error / IO error / tracker / save-path alerts that
          # are otherwise invisible.
          #
          # `tail -F` keeps following across log rotation and waits
          # for the file to appear, so the sidecar tolerates a fresh
          # pod where qBittorrent hasn't created the file yet.
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          # UID/GID 1000 matches qBittorrent's PUID/PGID, so the log
          # file (created by qbittorrent-nox as 1000:1000) is
          # readable without escalation.
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -ec
            - |
              LOG=/config/qBittorrent/logs/qbittorrent.log
              echo "[log-tail] waiting for $LOG"
              # tail -F retries on ENOENT, so this just works once
              # qBittorrent creates the file. No initial existence
              # check required.
              exec tail -n 0 -F "$LOG"
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: prowlarr
          image: linuxserver/prowlarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: UMASK
              value: '002'
            - name: TZ
              value: Europe/Amsterdam
          ports:
            - containerPort: 9696
              name: prowlarr-http
          readinessProbe:
            httpGet:
              path: /ping
              port: prowlarr-http
            initialDelaySeconds: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: prowlarr-http
            initialDelaySeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: media-downloading
          hostPath:
            path: /srv/media/Downloading
            type: Directory
        - name: media-completed
          hostPath:
            path: /srv/media/Completed
            type: Directory
        # NVMe scratch for in-progress torrents (see nix media-storage.nix).
        # type: Directory (not DirectoryOrCreate) on purpose: if the node
        # mount /srv/media-incomplete is somehow absent, the pod stays
        # Pending rather than silently creating the dir on the root disk and
        # filling it with download data.
        - name: media-incomplete
          hostPath:
            path: /srv/media-incomplete
            type: Directory
        - name: qbittorrent-config
          hostPath:
            path: /var/lib/personal-stack/media/qbittorrent
            type: DirectoryOrCreate
        - name: prowlarr-config
          hostPath:
            path: /var/lib/personal-stack/media/prowlarr
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: downloads
  ports:
    - name: http
      port: 8080
      targetPort: qbit-http
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: downloads
  ports:
    - name: http
      port: 9696
      targetPort: prowlarr-http
