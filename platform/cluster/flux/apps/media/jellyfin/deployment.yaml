apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
    spec:
      # Schedule under the nvidia-cdi runtime handler so containerd
      # picks up the CDI spec NixOS emits at
      # /var/run/cdi/nvidia-container-toolkit.json and injects the GPU
      # device nodes + driver libs into the container. The device
      # plugin sets NVIDIA_VISIBLE_DEVICES on us (envvar strategy),
      # which the CDI runtime translates to the CDI device request.
      runtimeClassName: nvidia-cdi
      # Default dnsPolicy (ClusterFirst) is kept so kube-dns stays first
      # in the pod's resolv.conf — cluster-internal hosts like
      # radarr.media-system.svc.cluster.local must resolve (the Home
      # Screen Sections plugin calls Sonarr/Radarr by that name). What
      # changes: ndots drops from the kubelet default of 5 to 2 so that
      # external lookups like image.tmdb.org skip the four cluster-suffix
      # search-domain tries that otherwise precede every TMDb / Fanart
      # query and starve the plugin's HttpClient pool. timeout:1 +
      # attempts:2 caps total DNS wait at ~2s on a slow resolver; the
      # glibc race where A/AAAA share a 5-tuple is worked around with
      # single-request-reopen.
      dnsConfig:
        options:
          - { name: ndots, value: '2' }
          - { name: timeout, value: '1' }
          - { name: attempts, value: '2' }
          - { name: single-request-reopen }
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
        personal-stack/capability-samba: 'true'
        personal-stack/capability-nvidia: 'true'
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: personal-stack/gpu-model-t1000
                    operator: In
                    values:
                      - 'true'
            - weight: 50
              preference:
                matchExpressions:
                  - key: personal-stack/gpu-model-gtx960m
                    operator: In
                    values:
                      - 'true'
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.8
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
          ports:
            - containerPort: 8096
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: media-series
              mountPath: /media/Series
            - name: media-films
              mountPath: /media/Films
            - name: jellyfin-config
              mountPath: /config
          resources:
            requests:
              cpu: 2000m
              memory: 4096Mi
              nvidia.com/gpu: 1
            limits:
              cpu: 12000m
              memory: 8192Mi
              nvidia.com/gpu: 1
      volumes:
        - name: media-series
          hostPath:
            path: /srv/media/Series
            type: Directory
        - name: media-films
          hostPath:
            path: /srv/media/Films
            type: Directory
        - name: jellyfin-config
          hostPath:
            path: /var/lib/personal-stack/media/jellyfin
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: http
