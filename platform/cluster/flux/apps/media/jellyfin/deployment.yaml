apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
    spec:
      # Bypass the cluster DNS path (kube-dns → AdGuard on t1000) for
      # non-cluster names. Jellyfin does a lot of outbound lookups
      # to image.tmdb.org / api.themoviedb.org / fanart.tv and the
      # HomeScreenSections plugin fires hundreds of image fetches in
      # parallel; a 2+ s resolver round-trip through AdGuard was
      # eating the plugin's HttpClient budget and leaving half the
      # home-page posters blank.
      #
      # dnsPolicy: None + dnsConfig.nameservers gives this pod its
      # own resolver chain while leaving every other pod on the
      # cluster default. `ndots:1` avoids tacking `.svc.cluster.local`
      # onto external names (the default ndots:5 does that, which
      # also slows lookups). Cluster-internal Service DNS still
      # works via the search domains below.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 1.0.0.1
        searches:
          - media-system.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - { name: ndots, value: '1' }
      # Schedule under the nvidia-cdi runtime handler so containerd
      # picks up the CDI spec NixOS emits at
      # /var/run/cdi/nvidia-container-toolkit.json and injects the GPU
      # device nodes + driver libs into the container. The device
      # plugin sets NVIDIA_VISIBLE_DEVICES on us (envvar strategy),
      # which the CDI runtime translates to the CDI device request.
      runtimeClassName: nvidia-cdi
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
        personal-stack/capability-samba: 'true'
        personal-stack/capability-nvidia: 'true'
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: personal-stack/gpu-model-t1000
                    operator: In
                    values:
                      - 'true'
            - weight: 50
              preference:
                matchExpressions:
                  - key: personal-stack/gpu-model-gtx960m
                    operator: In
                    values:
                      - 'true'
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.8
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
          ports:
            - containerPort: 8096
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: media-library
              mountPath: /media
            - name: jellyfin-config
              mountPath: /config
          resources:
            requests:
              cpu: 2000m
              memory: 4096Mi
              nvidia.com/gpu: 1
            limits:
              cpu: 12000m
              memory: 8192Mi
              nvidia.com/gpu: 1
      volumes:
        - name: media-library
          hostPath:
            path: /srv/media
            type: Directory
        - name: jellyfin-config
          hostPath:
            path: /var/lib/personal-stack/media/jellyfin
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: http
