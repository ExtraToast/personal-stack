apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
    spec:
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
        personal-stack/capability-samba: 'true'
        personal-stack/capability-nvidia: 'true'
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: personal-stack/gpu-model-t1000
                    operator: In
                    values:
                      - 'true'
            - weight: 50
              preference:
                matchExpressions:
                  - key: personal-stack/gpu-model-gtx960m
                    operator: In
                    values:
                      - 'true'
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.8
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
          ports:
            - containerPort: 8096
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: media-library
              mountPath: /media
            - name: jellyfin-config
              mountPath: /config
          resources:
            requests:
              cpu: 2000m
              memory: 4096Mi
            limits:
              cpu: 12000m
              memory: 8192Mi
      volumes:
        - name: media-library
          hostPath:
            path: /srv/media
            type: Directory
        - name: jellyfin-config
          hostPath:
            path: /var/lib/personal-stack/media/jellyfin
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: http
