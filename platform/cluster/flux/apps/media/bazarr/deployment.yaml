apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: media-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bazarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bazarr
    spec:
      nodeSelector:
        personal-stack/site: enschede
        personal-stack/role-utility-host: 'true'
        personal-stack/capability-samba: 'true'
      containers:
        - name: bazarr
          image: linuxserver/bazarr:1.5.6
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Amsterdam
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
          ports:
            - containerPort: 6767
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          volumeMounts:
            - name: media-library
              mountPath: /media
            - name: bazarr-config
              mountPath: /config
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
      volumes:
        - name: media-library
          hostPath:
            path: /srv/media
            type: Directory
        - name: bazarr-config
          hostPath:
            path: /var/lib/personal-stack/media/bazarr
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: media-system
spec:
  selector:
    app.kubernetes.io/name: bazarr
  ports:
    - name: http
      port: 6767
      targetPort: http
