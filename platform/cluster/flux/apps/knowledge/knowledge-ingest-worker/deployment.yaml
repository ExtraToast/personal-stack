apiVersion: v1
kind: ServiceAccount
metadata:
  name: knowledge-ingest-worker
  namespace: knowledge-system
---
# RWO clone of the private knowledge-vault repo. The worker pulls
# before each commit and pushes after; humans + LiveSync also write
# the same git tree from their own clones, so the worker's writes
# are scoped to `notes/<scope>/<type>/<id>.md` where its filename
# scheme avoids collisions with hand-edited notes.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: knowledge-vault-clone
  namespace: knowledge-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-ingest-worker
  namespace: knowledge-system
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  # Single replica per the single-replica-on-frankfurt policy.
  # AMQP makes scaling out trivial later: bump replicas, RabbitMQ
  # round-robins across consumers on the same queue.
  replicas: 1
  progressDeadlineSeconds: 1800
  # Recreate-friendly: the worker mounts an RWO PVC for the vault
  # clone so two pods can't bind simultaneously.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: knowledge-ingest-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knowledge-ingest-worker
      annotations:
        # Vault Agent inject: RabbitMQ consumer creds + the
        # knowledge-vault deploy key. Both land as files under
        # /vault/secrets/ and are picked up by the worker.
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: knowledge-ingest-worker
        # Vault Agent defaults to running as `nobody` (uid 100) and
        # writes /vault/secrets/* with that uid. Files with mode 0400
        # (the id_ed25519 deploy key) are then unreadable to the worker
        # container which runs as uid 1000. Align both sides so the
        # key file is owned by the same user that loads it.
        vault.hashicorp.com/agent-run-as-user: '1000'
        vault.hashicorp.com/agent-run-as-group: '1000'
        vault.hashicorp.com/agent-inject-secret-rabbitmq.env: secret/data/platform/rabbitmq
        vault.hashicorp.com/agent-inject-template-rabbitmq.env: |
          RABBITMQ_USER={{ with secret "secret/data/platform/rabbitmq" }}{{ index .Data.data "rabbitmq.user" }}{{ end }}
          RABBITMQ_PASSWORD={{ with secret "secret/data/platform/rabbitmq" }}{{ index .Data.data "rabbitmq.password" }}{{ end }}
        vault.hashicorp.com/agent-inject-secret-postgres.env: secret/data/platform/postgres
        vault.hashicorp.com/agent-inject-template-postgres.env: |
          DB_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "kb.user" }}{{ end }}
          DB_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "kb.password" }}{{ end }}
        vault.hashicorp.com/agent-inject-secret-id_ed25519: secret/data/knowledge-system/vault-deploy-key
        vault.hashicorp.com/agent-inject-template-id_ed25519: |
          {{ with secret "secret/data/knowledge-system/vault-deploy-key" }}{{ index .Data.data "private_key" }}{{ end }}
        vault.hashicorp.com/agent-inject-perms-id_ed25519: '0400'
    spec:
      serviceAccountName: knowledge-ingest-worker
      nodeSelector:
        personal-stack/site: frankfurt
      volumes:
        - name: vault-clone
          persistentVolumeClaim:
            claimName: knowledge-vault-clone
      containers:
        - name: knowledge-ingest-worker
          image: ghcr.io/extratoast/personal-stack/knowledge-ingest-worker:latest
          imagePullPolicy: Always
          # Source the Vault-projected RabbitMQ env file, then exec
          # the OTel auto-instrumented entry point. The Dockerfile's
          # ENTRYPOINT covers `opentelemetry-instrument python -m
          # knowledge_worker`; the shell wrapper here only exists to
          # ingest /vault/secrets/rabbitmq.env into the process env.
          command:
            - /bin/sh
            - -ec
            - |
              set -a
              . /vault/secrets/rabbitmq.env
              . /vault/secrets/postgres.env
              set +a
              exec opentelemetry-instrument python -m knowledge_worker
          volumeMounts:
            - name: vault-clone
              mountPath: /var/lib/knowledge-vault
          env:
            - name: RABBITMQ_HOST
              value: rabbitmq.data-system.svc.cluster.local
            - name: RABBITMQ_PORT
              value: '5672'
            - name: INGEST_QUEUE
              value: knowledge.ingest
            - name: INGEST_PREFETCH
              value: '4'
            - name: LOG_LEVEL
              value: INFO
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
            - name: OTEL_SERVICE_NAME
              value: knowledge-ingest-worker
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_LOGS_EXPORTER
              value: none
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: 'true'
            - name: VAULT_ENABLED
              value: 'true'
            - name: VAULT_CLONE_URL
              value: git@github.com:ExtraToast/knowledge-vault.git
            - name: VAULT_CLONE_DIR
              value: /var/lib/knowledge-vault
            - name: VAULT_BRANCH
              value: main
            - name: VAULT_SSH_KEY_PATH
              value: /vault/secrets/id_ed25519
            - name: VAULT_AUTHOR_NAME
              value: knowledge-ingest-worker
            - name: VAULT_AUTHOR_EMAIL
              value: worker@knowledge.jorisjonkers.dev
            # The PVC mount root /var/lib/knowledge-vault is created
            # by kubelet as root:root while the contents land owned
            # by the worker uid 1000. Git refuses to operate on a
            # working tree whose root has a different owner than the
            # running process ("detected dubious ownership"); the
            # check fires before stdin is read, so GitPython sees an
            # EPIPE on cat-file --batch and surfaces it as a
            # confusing `BrokenPipeError` deep inside index.commit.
            # GIT_CONFIG_COUNT/KEY/VALUE inject a safe.directory=*
            # override that every git subprocess inherits.
            - name: GIT_CONFIG_COUNT
              value: '1'
            - name: GIT_CONFIG_KEY_0
              value: safe.directory
            - name: GIT_CONFIG_VALUE_0
              value: '*'
            - name: DB_HOST
              value: postgres.data-system.svc.cluster.local
            - name: DB_PORT
              value: '5432'
            - name: DB_NAME
              value: knowledge_db
            - name: KB_PERSIST_ENABLED
              value: 'true'
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
