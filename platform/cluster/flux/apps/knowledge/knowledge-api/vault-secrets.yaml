# Bearer-token allow-list for the public `/mcp` endpoint. Spring's
# McpBearerFilter resolves an incoming `Authorization: Bearer …`
# value against this allow-list and stamps `mcp:<name>` on the
# request — the matching key name becomes the audit identity, so
# each device (workstation, laptop, phone, …) gets its own
# token without sharing.
#
# Vault path is populated out-of-band, one field per device:
#
#   vault kv put -mount=secret knowledge-system/mcp-bearer \
#     workstation="$(openssl rand -hex 32)" \
#     laptop="$(openssl rand -hex 32)"
#
# `vault kv patch -mount=secret knowledge-system/mcp-bearer \
#    phone="$(openssl rand -hex 32)"` adds a new device without
# rewriting the existing pairs; the rolloutRestartTarget below
# bounces knowledge-api so the new token is loaded.
#
# No `transformation.templates` block: VSO projects every Vault
# field straight into Secret data keys. The Deployment's `envFrom`
# prepends `KNOWLEDGE_MCP_TOKENS_`, so Spring's relaxed binding
# wires field `workstation` to `knowledge.mcp.tokens.workstation`
# without per-device manifest edits.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: knowledge-api-mcp-tokens
  namespace: knowledge-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: knowledge-system/mcp-bearer
  destination:
    name: knowledge-api-mcp-tokens
    create: true
  refreshAfter: 1h
  rolloutRestartTargets:
    - kind: Deployment
      name: knowledge-api
