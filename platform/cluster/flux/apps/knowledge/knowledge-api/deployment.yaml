apiVersion: v1
kind: ServiceAccount
metadata:
  name: knowledge-api
  namespace: knowledge-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-api
  namespace: knowledge-system
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  # Single replica for the skeleton phase — knowledge-api isn't on the
  # forward-auth hot path and the workload is mostly idempotent jOOQ
  # reads/writes that the ingest worker (later PR) re-queues on failure.
  # Promote to 2 once tools land and human session traffic shows up.
  replicas: 1
  progressDeadlineSeconds: 1800
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: knowledge-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knowledge-api
      annotations:
        # Vault Agent inject: knowledge-api role (created in
        # bootstrap-auth.sh) → policy `knowledge-api` → read on
        # secret/data/platform/postgres + secret/data/knowledge-api.
        # Same shape as auth-api / assistant-api use.
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-token: 'true'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/role: knowledge-api
        vault.hashicorp.com/agent-inject-secret-knowledge-api.env: secret/data/platform/postgres
        vault.hashicorp.com/agent-inject-template-knowledge-api.env: |
          DB_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "kb.user" }}{{ end }}
          DB_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "kb.password" }}{{ end }}
        vault.hashicorp.com/agent-inject-secret-rabbitmq.env: secret/data/platform/rabbitmq
        vault.hashicorp.com/agent-inject-template-rabbitmq.env: |
          RABBITMQ_USER={{ with secret "secret/data/platform/rabbitmq" }}{{ index .Data.data "rabbitmq.user" }}{{ end }}
          RABBITMQ_PASSWORD={{ with secret "secret/data/platform/rabbitmq" }}{{ index .Data.data "rabbitmq.password" }}{{ end }}
    spec:
      serviceAccountName: knowledge-api
      nodeSelector:
        personal-stack/site: frankfurt
      containers:
        - name: knowledge-api
          image: ghcr.io/extratoast/personal-stack/knowledge-api:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
            - |
              set -a
              . /vault/secrets/knowledge-api.env
              . /vault/secrets/rabbitmq.env
              set +a
              exec java \
                -XX:+UseZGC \
                -XX:MaxRAMPercentage=75 \
                -javaagent:/app/otel-javaagent.jar \
                -jar /app/app.jar
          # VSO projects every field under
          # `secret/data/knowledge-system/mcp-bearer` into the
          # knowledge-api-mcp-tokens Secret. `KNOWLEDGE_MCP_TOKENS_`
          # prefixes each key, so Spring's relaxed binding wires e.g.
          # field `workstation` to `knowledge.mcp.tokens.workstation`
          # without any per-device manifest edit. An empty Vault path
          # produces an empty Secret which leaves the filter rejecting
          # every /mcp request (the default-deny posture).
          envFrom:
            - secretRef:
                name: knowledge-api-mcp-tokens
              prefix: KNOWLEDGE_MCP_TOKENS_
          env:
            - name: SERVER_PORT
              value: '8080'
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_HOST
              value: postgres.data-system.svc.cluster.local
            - name: DB_PORT
              value: '5432'
            - name: DB_NAME
              value: knowledge_db
            - name: RABBITMQ_HOST
              value: rabbitmq.data-system.svc.cluster.local
            - name: RABBITMQ_PORT
              value: '5672'
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
            - name: OTEL_SERVICE_NAME
              value: knowledge-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_LOGS_EXPORTER
              value: none
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: '5000'
            - name: OTEL_BSP_SCHEDULE_DELAY
              value: '5000'
            - name: OTEL_BSP_MAX_QUEUE_SIZE
              value: '16384'
            - name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
              value: '2048'
            # Heavy chat endpoint — host-native Ollama on
            # enschede-rx7900xtx-1 (RX 7900 XTX, 24 GiB VRAM) fronted
            # by the selector-less ollama-heavy Service.
            # OllamaChatEndpointResolver probes this URL at startup
            # and every OLLAMA_HEAVY_PROBE_CACHE_SECONDS; a 2xx
            # response routes /digest chat calls here with
            # OLLAMA_HEAVY_CHAT_MODEL, any failure stays on the
            # in-cluster light pair from application.yml.
            - name: OLLAMA_HEAVY_BASE_URL
              value: http://ollama-heavy.utility-system.svc.cluster.local:11434/v1
            - name: OLLAMA_HEAVY_CHAT_MODEL
              value: qwen2.5:14b-instruct
            - name: OLLAMA_HEAVY_PROBE_TIMEOUT_MS
              value: '2000'
            - name: OLLAMA_HEAVY_PROBE_CACHE_SECONDS
              value: '120'
          ports:
            - containerPort: 8080
              name: http
          startupProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-api
  namespace: knowledge-system
spec:
  selector:
    app.kubernetes.io/name: knowledge-api
  ports:
    - name: http
      port: 8080
      targetPort: http
