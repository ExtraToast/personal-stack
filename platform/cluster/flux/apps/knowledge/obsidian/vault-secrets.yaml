apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-secrets-operator
  namespace: knowledge-system
---
# Read-only deploy key for git@github.com:ExtraToast/knowledge-vault.git.
# The Obsidian pod (and, later, the ingest worker) clones the vault using
# this key. VSO rotates the underlying Secret on Vault changes and rolls
# the Deployment so a key rotation only takes one reconcile cycle.
#
# Vault path is populated out-of-band by tmp.sh:
#   vault kv put -mount=secret knowledge-system/vault-deploy-key \
#     id_ed25519=@/path/to/id_ed25519
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: obsidian-deploy-key
  namespace: knowledge-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: knowledge-system/vault-deploy-key
  destination:
    name: obsidian-deploy-key
    create: true
    transformation:
      templates:
        id_ed25519:
          text: '{{- get .Secrets "id_ed25519" -}}'
  refreshAfter: 1h
  rolloutRestartTargets:
    - kind: Deployment
      name: obsidian
---
# Selkies HTTP Basic Auth credentials. The browser-Obsidian image
# bakes a WebRTC-over-WebSocket data channel on `/ws` (and related
# paths) for input + framebuffer streaming. With forward-auth in the
# ingress chain, the SPA loads fine but the WebSocket upgrade for
# `/ws` is 302'd back to the auth-ui login (verified with `curl -I
# https://obsidian.jorisjonkers.dev/ws -H "Upgrade: websocket"`),
# which the browser cannot follow during a WS handshake — so the
# session stalls at a blank screen.
#
# Setting `BASIC_AUTH_USER` / `BASIC_AUTH_PASSWORD` switches the
# linuxserver/obsidian entrypoint into self-auth mode: every endpoint
# (including the WebSocket upgrade) requires HTTP Basic Auth, which
# browsers send automatically on every same-origin request. The
# IngressRoute drops the forward-auth middleware in tandem (see the
# `access_intent` edit on `obsidian` for the rendered effect) so
# Basic Auth becomes the single gate.
#
# Vault path populated out-of-band:
#   vault kv put -mount=secret knowledge-system/obsidian-selkies \
#     basic_auth_user=obsidian \
#     basic_auth_password="$(openssl rand -hex 24)"
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: obsidian-selkies
  namespace: knowledge-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: knowledge-system/obsidian-selkies
  destination:
    name: obsidian-selkies
    create: true
    transformation:
      templates:
        BASIC_AUTH_USER:
          text: '{{- get .Secrets "basic_auth_user" -}}'
        BASIC_AUTH_PASSWORD:
          text: '{{- get .Secrets "basic_auth_password" -}}'
  refreshAfter: 1h
  rolloutRestartTargets:
    - kind: Deployment
      name: obsidian
