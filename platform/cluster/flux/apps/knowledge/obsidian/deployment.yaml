apiVersion: v1
kind: ServiceAccount
metadata:
  name: obsidian
  namespace: knowledge-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: obsidian-data
  namespace: knowledge-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian
  namespace: knowledge-system
spec:
  replicas: 1
  # RWO PVC for the vault clone + Selkies session state — recreate on
  # rollout, no concurrent writers.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: obsidian
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obsidian
    spec:
      serviceAccountName: obsidian
      # Kubernetes auto-injects env vars for every Service in the
      # namespace (OBSIDIAN_PORT=tcp://…). Selkies/linuxserver's
      # entrypoint reads OBSIDIAN_* and crashes; suppress.
      enableServiceLinks: false
      securityContext:
        # linuxserver/obsidian runs as abc (uid 911 / gid 911) by default,
        # but PUID/PGID below remap it to 1000. fsGroup matches so the
        # PVC contents are writable.
        fsGroup: 1000
      nodeSelector:
        personal-stack/site: frankfurt
      initContainers:
        # Clone knowledge-vault on first boot. Idempotent on restarts —
        # if .git exists, the clone is skipped and the running cron
        # sidecar handles updates.
        - name: vault-clone
          image: alpine/git:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              if [ -d /config/vaults/knowledge-vault/.git ]; then
                echo "vault already cloned, skipping initial fetch"
                exit 0
              fi
              mkdir -p /config/vaults /root/.ssh
              cp /etc/git-secrets/id_ed25519 /root/.ssh/id_ed25519
              chmod 0400 /root/.ssh/id_ed25519
              ssh-keyscan github.com >> /root/.ssh/known_hosts 2>/dev/null
              git clone --depth=1 \
                git@github.com:ExtraToast/knowledge-vault.git \
                /config/vaults/knowledge-vault
              # Match the runtime uid/gid so linuxserver/obsidian (running
              # as uid 1000 after PUID remap) can read+write the clone.
              chown -R 1000:1000 /config/vaults
          volumeMounts:
            - name: data
              mountPath: /config
            - name: deploy-key
              mountPath: /etc/git-secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
      containers:
        - name: obsidian
          # Docker Hub mirror — lscr.io's IPv6 path from the Frankfurt VPS
          # is consistently "connection reset by peer" mid-blob, while
          # docker.io (where alpine/git in the same pod pulls from cleanly)
          # works fine. Linuxserver publishes the same image to both.
          image: linuxserver/obsidian:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: Europe/Amsterdam
            # Selkies binds to all interfaces by default; explicit for clarity.
            - name: CUSTOM_PORT
              value: '3000'
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: data
              mountPath: /config
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
        # Pulls the vault every 5 minutes so external commits (from the
        # ingest worker, or desktop Obsidian via LiveSync once that lands)
        # show up in the browser session without a manual git pull. Only
        # pulls — humans commit through Obsidian-Git or a terminal inside
        # the browser-Obsidian Files panel.
        - name: vault-puller
          image: alpine/git:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /root/.ssh
              cp /etc/git-secrets/id_ed25519 /root/.ssh/id_ed25519
              chmod 0400 /root/.ssh/id_ed25519
              ssh-keyscan github.com >> /root/.ssh/known_hosts 2>/dev/null
              while true; do
                if [ -d /config/vaults/knowledge-vault/.git ]; then
                  git -C /config/vaults/knowledge-vault \
                    pull --rebase --autostash 2>&1 \
                    || echo "$(date -u +%FT%TZ) pull failed (continuing)"
                fi
                sleep 300
              done
          volumeMounts:
            - name: data
              mountPath: /config
            - name: deploy-key
              mountPath: /etc/git-secrets
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: obsidian-data
        - name: deploy-key
          secret:
            secretName: obsidian-deploy-key
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: obsidian
  namespace: knowledge-system
spec:
  selector:
    app.kubernetes.io/name: obsidian
  ports:
    - name: http
      port: 3000
      targetPort: http
