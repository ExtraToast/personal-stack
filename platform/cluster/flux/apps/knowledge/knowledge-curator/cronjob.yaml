# knowledge-curator runs the orchestrator entrypoint
# (`python -m curator.orchestrator`) on a single CronJob. Each tick
# walks the registered Passes (inbox, needs-review-drain; title
# quality + relation enrichment land in a follow-up PR) and only
# runs the ones whose `has_work(state)` probe returns True against
# `kb_curator_runs`. The probes are cheap — a single filesystem
# stat or indexed SQL count — so the 98% no-op case exits in
# <100 ms with zero LLM calls.
#
# Cadence: hourly, 24/7. The no-op tick is effectively free, but a
# tick that finds work drives an LLM burst on the heavy qwen3:32b
# host (enschede-rx7900xtx-1), and at the old 5-minute cadence those
# bursts — combined with the 60m model keep-alive — held the RX 7900
# XTX's weights resident around the clock, so the card never idled
# its fans or clocked down. Hourly batches an hour of captures into a
# single warm-model pass: ~12x fewer wake-ups, and with the keep-alive
# now shorter than the cadence (see ollama-rocm.nix) the GPU unloads
# the model and idles between passes. Captures consolidate within the
# hour, which is ample for a personal vault. `suspend: false` is
# explicit so a manual `kubectl patch suspend=true` for a planned
# outage gets reverted on the next Flux reconcile — the intended
# safety net.
#
# `concurrencyPolicy: Forbid` keeps two ticks from running
# concurrently at the kubelet level. Inside the orchestrator each
# pass additionally takes a `pg_advisory_xact_lock(hashtext(
# 'curator/<pass_name>'))` inside `record_pass_outcome`'s
# transaction, so a slow pass that overlaps the next tick blocks
# at the lock instead of racing on the vault PVC or the `kb_*`
# tables.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: knowledge-curator
  namespace: knowledge-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: knowledge-curator
  namespace: knowledge-system
  annotations:
    # Keel rolls each CronJob's pod template the same way it rolls
    # a Deployment when a new :latest image lands. Without
    # `match-tag: 'true'` Keel would pin to the first SHA it ever
    # saw (per CLAUDE.md "Keel image automation").
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  # Hourly, 24/7. The orchestrator gates each pass behind a cheap
  # has_work() probe (single indexed SQL count or filesystem stat),
  # so a no-op tick still takes <100 ms; the cost that matters is the
  # LLM burst on the heavy GPU host when a tick finds work. Hourly
  # collapses an hour of captures into one warm-model pass instead of
  # up to twelve, and lets the GPU unload its model and idle in
  # between (keep-alive is now shorter than the cadence — see
  # ollama-rocm.nix). Real compute still only happens when the
  # ingest-worker dropped a capture or a file landed in
  # _inbox/_needs-review/ since the last pass.
  schedule: '0 * * * *'
  # `suspend: false` is explicit so kustomize-controller owns the
  # field. Manual `kubectl patch suspend=true` for a planned outage
  # gets reverted on the next Flux reconcile — which is the intended
  # safety net, not a footgun.
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  # 30-min deadline matches the worst-case CPU-fallback drain window
  # (20 needs-review candidates × ~40 s/qwen3:8b on CPU ≈ 13 min)
  # plus headroom. Below this, a slow pass eats the next trigger;
  # above this, missed starts queue forever.
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: 'true'
            vault.hashicorp.com/agent-inject-token: 'true'
            vault.hashicorp.com/agent-pre-populate-only: 'true'
            vault.hashicorp.com/role: knowledge-curator
            # Same uid-alignment trick the worker uses so the Vault-
            # projected files in /vault/secrets land readable by the
            # curator container.
            vault.hashicorp.com/agent-run-as-user: '1000'
            vault.hashicorp.com/agent-run-as-group: '1000'
            vault.hashicorp.com/agent-inject-secret-postgres.env: secret/data/platform/postgres
            vault.hashicorp.com/agent-inject-template-postgres.env: |
              DB_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "kb.user" }}{{ end }}
              DB_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "kb.password" }}{{ end }}
            vault.hashicorp.com/agent-inject-secret-id_ed25519: secret/data/knowledge-system/vault-deploy-key
            vault.hashicorp.com/agent-inject-template-id_ed25519: |
              {{ with secret "secret/data/knowledge-system/vault-deploy-key" }}{{ index .Data.data "private_key" }}{{ end }}
            vault.hashicorp.com/agent-inject-perms-id_ed25519: '0400'
            vault.hashicorp.com/agent-inject-secret-mcp.env: secret/data/knowledge-system/mcp-bearer
            # Single-quote the token value so shell `source` tolerates
            # any character a bearer token might contain (`$`, `&`,
            # parens, etc.). Without the quotes, unquoted assignment
            # fails at boot with `Syntax error: newline unexpected`
            # and the curator can't even start.
            vault.hashicorp.com/agent-inject-template-mcp.env: |
              KNOWLEDGE_API_BEARER_TOKEN='{{ with secret "secret/data/knowledge-system/mcp-bearer" }}{{ index .Data.data "curator" }}{{ end }}'
        spec:
          serviceAccountName: knowledge-curator
          restartPolicy: OnFailure
          nodeSelector:
            personal-stack/site: frankfurt
          volumes:
            - name: vault-clone
              persistentVolumeClaim:
                claimName: knowledge-vault-clone
            - name: topics
              configMap:
                name: knowledge-curator-topics
          containers:
            - name: curator
              image: ghcr.io/extratoast/personal-stack/knowledge-curator:latest
              imagePullPolicy: Always
              command:
                - /bin/sh
                - -ec
                - |
                  set -a
                  . /vault/secrets/postgres.env
                  . /vault/secrets/mcp.env
                  set +a
                  exec opentelemetry-instrument python -m curator.orchestrator
              volumeMounts:
                - name: vault-clone
                  mountPath: /var/lib/knowledge-vault
                - name: topics
                  mountPath: /etc/curator
              env:
                - name: LOG_LEVEL
                  value: INFO
                - name: DEPLOYMENT_ENVIRONMENT
                  value: production
                - name: OTEL_SERVICE_NAME
                  value: knowledge-curator
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: http://alloy.observability.svc.cluster.local:4318
                - name: OTEL_EXPORTER_OTLP_PROTOCOL
                  value: http/protobuf
                - name: OTEL_LOGS_EXPORTER
                  value: none
                - name: OTEL_METRICS_EXPORTER
                  value: none
                - name: OTEL_TRACES_EXPORTER
                  value: otlp
                - name: OTEL_PYTHON_LOG_CORRELATION
                  value: 'true'
                - name: VAULT_CLONE_URL
                  value: git@github.com:ExtraToast/knowledge-vault.git
                - name: VAULT_CLONE_DIR
                  value: /var/lib/knowledge-vault
                - name: VAULT_BRANCH
                  value: main
                - name: VAULT_SSH_KEY_PATH
                  value: /vault/secrets/id_ed25519
                - name: CURATOR_AUTHOR_NAME
                  value: knowledge-curator
                - name: CURATOR_AUTHOR_EMAIL
                  value: curator@knowledge.jorisjonkers.dev
                - name: DB_HOST
                  value: postgres.data-system.svc.cluster.local
                - name: DB_PORT
                  value: '5432'
                - name: DB_NAME
                  value: knowledge_db
                - name: OLLAMA_BASE_URL
                  value: http://ollama.knowledge-system.svc.cluster.local:11434/v1
                - name: OLLAMA_CHAT_MODEL
                  # qwen3:8b replaces qwen2.5:7b-instruct: same ~5 GiB
                  # Q4 footprint, native structured-output mode (no
                  # Ollama grammar overlay needed), better reasoning.
                  # Roll back via this env var alone if JSON-validity
                  # rate or topic-classification precision regresses —
                  # the qwen2.5:7b model stays pulled on the Ollama
                  # PVC during the cutover.
                  value: qwen3:8b
                # Heavy chat endpoint — host-native Ollama on
                # enschede-rx7900xtx-1 (RX 7900 XTX, 24 GiB VRAM)
                # fronted by the selector-less ollama-heavy Service.
                # `curator.ollama_router.resolve_chat` probes this
                # URL once per pass; a 2xx response routes the
                # classifier here with OLLAMA_HEAVY_CHAT_MODEL, any
                # timeout / 5xx / connection failure falls back to
                # the OLLAMA_BASE_URL / OLLAMA_CHAT_MODEL pair above.
                # Embedding traffic stays on the light endpoint —
                # flipping embedding models per pass would push the
                # backfill CronJob into permanent re-embedding.
                - name: OLLAMA_HEAVY_BASE_URL
                  value: http://ollama-heavy.utility-system.svc.cluster.local:11434/v1
                - name: OLLAMA_HEAVY_CHAT_MODEL
                  # Bumped from qwen2.5:14b-instruct → qwen3:32b on
                  # the rx7900xtx host. ~2× the parameters, native
                  # structured-output mode (Qwen2.5 needed a GBNF
                  # overlay), ~8–12 tok/s on the RX 7900 XTX. Single
                  # resident model — see
                  # platform/nix/modules/services/ollama-rocm.nix.
                  value: qwen3:32b
                - name: OLLAMA_HEAVY_PROBE_TIMEOUT_SECONDS
                  value: '2.0'
                - name: OLLAMA_EMBEDDING_MODEL
                  # qwen3-embedding:0.6b feeds the recall path's
                  # pgvector ANN leg (knowledge-api V9 schema).
                  # `kb_notes.embedding_model` carries this same
                  # string so the backfill CronJob can spot stale
                  # rows when the model swaps out.
                  value: qwen3-embedding:0.6b
                # 5 minutes. Big enough that even a worst-case
                # cold load (4.7 GB qwen2.5:7b paged in from disk on
                # CPU with a hot page-cache miss) completes inside
                # the budget. Pair: `OLLAMA_KEEP_ALIVE=60m` on the
                # Ollama deployment normally keeps the model warm,
                # but this is the belt for the braces.
                - name: OLLAMA_REQUEST_TIMEOUT_SECONDS
                  value: '300'
                - name: KNOWLEDGE_API_BASE_URL
                  value: http://knowledge-api.knowledge-system.svc.cluster.local:8080
                - name: CLASSIFY_TOP_K_NEIGHBOURS
                  value: '5'
                - name: CLASSIFY_CONFIDENCE_FLOOR
                  value: '0.55'
                - name: TOPICS_YAML_PATH
                  value: /etc/curator/topics.yaml
                - name: LIGHTRAG_BASE_URL
                  value: http://lightrag.knowledge-system.svc.cluster.local:9621
                - name: LIGHTRAG_REQUEST_TIMEOUT_SECONDS
                  value: '30'
                # Same safe.directory bypass the worker manifest
                # carries: the PVC mount root is root-owned and git
                # otherwise refuses to operate.
                - name: GIT_CONFIG_COUNT
                  value: '1'
                - name: GIT_CONFIG_KEY_0
                  value: safe.directory
                - name: GIT_CONFIG_VALUE_0
                  value: '*'
                # Drain `_inbox/_needs-review/` on every pass alongside
                # the day-bucket inbox walk. Initially these were two
                # separate manual operations (a one-off Job with the
                # env, then the regular cron) — but with qwen3:32b on
                # the rx7900xtx heavy endpoint the per-note re-classify
                # is fast enough (~5–10 s) that even a backlog of ~50
                # needs-review notes finishes in a single ~5–10 min
                # pass. `concurrencyPolicy: Forbid` on the CronJob
                # already keeps slow passes from running concurrently,
                # and the per-file Promoter swallows individual
                # failures so a stuck classify on one file does not
                # abort the rest.
                - name: CURATOR_DRAIN_NEEDS_REVIEW
                  value: '1'
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
