# Periodic re-titling of promoted notes whose title shape is poor
# ("How to ...", "What is ...?", "Notes on ...", etc.). The inbox
# curator's prompt nudges new captures toward 3-8-word declarative
# titles; this CronJob retroactively applies the same contract to
# older promotions via the heavy qwen3:32b model on enschede-rx7900xtx-1.
#
# Schedule: 04:23 UTC nightly. Concurrent runs are forbidden — a slow
# pass blocks the next start rather than overlapping the inbox
# curator on the shared vault PVC.
#
# Routing: reuses curator.ollama_router.resolve_chat so passes land on
# the rx7900xtx heavy endpoint when reachable and silently fall back
# to the in-cluster CPU Ollama otherwise. The model env is the same
# OLLAMA_HEAVY_* set the inbox CronJob already carries — kept here
# explicitly so a future operator can tune patterns / batch size
# without touching the inbox CronJob.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: knowledge-curator-title-quality
  namespace: knowledge-system
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 2m'
spec:
  schedule: '23 4 * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: 'true'
            vault.hashicorp.com/agent-inject-token: 'true'
            vault.hashicorp.com/agent-pre-populate-only: 'true'
            vault.hashicorp.com/role: knowledge-curator
            vault.hashicorp.com/agent-run-as-user: '1000'
            vault.hashicorp.com/agent-run-as-group: '1000'
            vault.hashicorp.com/agent-inject-secret-postgres.env: secret/data/platform/postgres
            vault.hashicorp.com/agent-inject-template-postgres.env: |
              DB_USER={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "kb.user" }}{{ end }}
              DB_PASSWORD={{ with secret "secret/data/platform/postgres" }}{{ index .Data.data "kb.password" }}{{ end }}
            vault.hashicorp.com/agent-inject-secret-id_ed25519: secret/data/knowledge-system/vault-deploy-key
            vault.hashicorp.com/agent-inject-template-id_ed25519: |
              {{ with secret "secret/data/knowledge-system/vault-deploy-key" }}{{ index .Data.data "private_key" }}{{ end }}
            vault.hashicorp.com/agent-inject-perms-id_ed25519: '0400'
        spec:
          serviceAccountName: knowledge-curator
          restartPolicy: OnFailure
          nodeSelector:
            personal-stack/site: frankfurt
          volumes:
            - name: vault-clone
              persistentVolumeClaim:
                claimName: knowledge-vault-clone
          containers:
            - name: title-quality
              image: ghcr.io/extratoast/personal-stack/knowledge-curator:latest
              imagePullPolicy: Always
              command:
                - /bin/sh
                - -ec
                - |
                  set -a
                  . /vault/secrets/postgres.env
                  set +a
                  exec opentelemetry-instrument python -m curator.maintenance.title_quality
              volumeMounts:
                - name: vault-clone
                  mountPath: /var/lib/knowledge-vault
              env:
                - name: LOG_LEVEL
                  value: INFO
                - name: DEPLOYMENT_ENVIRONMENT
                  value: production
                - name: OTEL_SERVICE_NAME
                  value: knowledge-curator-title-quality
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: http://alloy.observability.svc.cluster.local:4318
                - name: OTEL_EXPORTER_OTLP_PROTOCOL
                  value: http/protobuf
                - name: OTEL_LOGS_EXPORTER
                  value: none
                - name: OTEL_METRICS_EXPORTER
                  value: none
                - name: OTEL_TRACES_EXPORTER
                  value: otlp
                - name: OTEL_PYTHON_LOG_CORRELATION
                  value: 'true'
                - name: VAULT_CLONE_URL
                  value: git@github.com:ExtraToast/knowledge-vault.git
                - name: VAULT_CLONE_DIR
                  value: /var/lib/knowledge-vault
                - name: VAULT_BRANCH
                  value: main
                - name: VAULT_SSH_KEY_PATH
                  value: /vault/secrets/id_ed25519
                - name: CURATOR_AUTHOR_NAME
                  value: knowledge-curator
                - name: CURATOR_AUTHOR_EMAIL
                  value: curator@knowledge.jorisjonkers.dev
                - name: DB_HOST
                  value: postgres.data-system.svc.cluster.local
                - name: DB_PORT
                  value: '5432'
                - name: DB_NAME
                  value: knowledge_db
                - name: OLLAMA_BASE_URL
                  value: http://ollama.knowledge-system.svc.cluster.local:11434/v1
                - name: OLLAMA_CHAT_MODEL
                  value: qwen3:8b
                # Heavy endpoint matches the inbox curator's wiring —
                # title rewrites land on qwen3:32b when the rx7900xtx
                # node is up and fall back to qwen3:8b in-cluster
                # otherwise.
                - name: OLLAMA_HEAVY_BASE_URL
                  value: http://ollama-heavy.utility-system.svc.cluster.local:11434/v1
                - name: OLLAMA_HEAVY_CHAT_MODEL
                  value: qwen3:32b
                - name: OLLAMA_HEAVY_PROBE_TIMEOUT_SECONDS
                  value: '2.0'
                - name: OLLAMA_REQUEST_TIMEOUT_SECONDS
                  value: '300'
                # 25 candidates × ~10 s/rewrite at qwen3:32b ≈ 4 min
                # per pass on the heavy host. Drops to whatever the
                # in-cluster qwen3:8b can sustain on the fallback.
                # Tune via env without code changes.
                - name: KB_TITLE_BATCH_SIZE
                  value: '25'
                # Same safe.directory bypass the inbox CronJob carries.
                - name: GIT_CONFIG_COUNT
                  value: '1'
                - name: GIT_CONFIG_KEY_0
                  value: safe.directory
                - name: GIT_CONFIG_VALUE_0
                  value: '*'
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
