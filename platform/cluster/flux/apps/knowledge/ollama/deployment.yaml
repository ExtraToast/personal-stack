# Ollama — in-cluster LLM + embedding runtime. Backs both the
# knowledge-curator's qwen2.5:14b classification calls and
# LightRAG's extraction + mix-mode generation, plus the curator's
# nomic-embed-text similarity-recall path.
#
# CPU-only deployment. The cluster's available GPU (GTX 960M)
# reports 2 GiB VRAM via SMI — that's the 2 GiB SKU of the card,
# not the 4 GiB variant. qwen2.5:7b-instruct (~4.5 GiB) doesn't
# fit, and Ollama's CPU offload then OOM-kills under the curator's
# classification load. Until a bigger GPU lands in the cluster we
# run on CPU only. Scheduler picks whichever enschede / frankfurt
# node has the most free memory; no node selector needed.
#
# Models are pulled lazily on first request and persisted to the
# RWO `ollama-models` PVC. Init container pre-pulls
# `qwen2.5:7b-instruct` (~4.4 GiB) + `nomic-embed-text` (~274 MiB)
# so the first curator request after a fresh deploy doesn't
# 60-second-block on a model load + download. The 7b model is
# what fits the available 4 GiB VRAM hardware (T1000 / GTX 960M);
# larger models (14b, 32b) would overflow into CPU offload and
# the llama-runner has crashed under that load on this stack.
#
# `OLLAMA_MAX_LOADED_MODELS=1` keeps VRAM contention in check: the
# 7b chat model and the smaller nomic-embed-text don't both need
# to be hot. Ollama swaps on demand. `OLLAMA_KEEP_ALIVE` is set to
# `60m` — long enough that the 5-min curator CronJob always finds
# the model warm. The previous `5m` value matched the cron cadence
# exactly, so the model evicted right as the next pass started:
# every pass paid the 4.7 GB cold-load tax on CPU, which on this
# host (no GPU, qwen2.5:7b in `cpu_avx2` mode) routinely exceeded
# the curator's 180 s per-request timeout and crashed the pass.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ollama
  namespace: knowledge-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: knowledge-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: knowledge-system
  annotations:
    # Vendored upstream image — bump deliberately via PR. Avoid
    # 0.13.0-0.13.2 (LightRAG #2495 embedding regression).
    keel.sh/policy: never
spec:
  # Back to 1: at 0 the knowledge recall embedding path (qwen3-embedding)
  # had no backend at all — embedding traffic only ever routes to this
  # light endpoint, never to ollama-heavy — so every curator pass logged
  # `relation_enrichment.recall_failed: Connection refused` and recall's
  # vector leg was dead even while the desktop served chat. The curator is
  # hourly now (not every 5 min), so the laptop only wakes for a brief
  # embedding burst about once an hour rather than constantly. Pinned to
  # the gtx960m laptop because the model PVC is node-local there; the
  # durable noise fix is still to relocate to an always-on, out-of-earshot
  # node (t1000), tracked separately.
  replicas: 1
  progressDeadlineSeconds: 1800
  strategy:
    # RWO model PVC; old pod must release before new pod can mount.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
    spec:
      serviceAccountName: ollama
      # CPU-only (no runtimeClassName / GPU request), but pinned to the
      # laptop: the `ollama-models` PVC is ReadWriteOnce local-path and
      # its PV is node-affined to enschede-gtx-960m-1, so the pod can
      # only ever bind there anyway. Pinning makes that explicit and
      # keeps the light fallback off the frankfurt VPS and off the
      # intermittently-powered desktop (enschede-rx7900xtx-1) — the
      # laptop is the always-on home for the light model, the desktop
      # hosts the heavy qwen3:32b model behind the ollama-heavy Service.
      nodeSelector:
        personal-stack/node: enschede-gtx-960m-1
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
      # Init container pre-pulls the model set so the curator's
      # first /v1/chat/completions call doesn't pay the 9 GiB
      # download latency. Idempotent — `ollama pull` is a no-op
      # when the model is already in the cache.
      initContainers:
        - name: warm-models
          image: ollama/ollama:0.12.11
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              ollama serve &
              SERVE_PID=$!
              until ollama list >/dev/null 2>&1; do sleep 2; done
              # Pre-pull is best-effort. A missing/renamed tag or a
              # transient registry 404 on any one model must never fail
              # the init container — that is exactly what kept this pod
              # in Init:CrashLoopBackOff: `ollama pull qwen3-reranker:0.6b`
              # 404s because no `qwen3-reranker` model exists in the
              # Ollama library, and under `set -e` the non-zero exit
              # crash-looped the whole light backend, taking the
              # knowledge fallback offline whenever the heavy desktop
              # host was down. Each pull is now independently non-fatal.
              #   qwen2.5:7b-instruct — previous curator chat model, kept
              #     for one-flip rollback during the qwen3 cutover.
              #   qwen3:8b            — current curator chat model.
              #   nomic-embed-text    — legacy embeddings, retired once
              #     the backfill drains kb_notes.embedding_model rows.
              #   qwen3-embedding:0.6b — recall pgvector ANN embeddings.
              # The deep-mode listwise reranker is best-effort at request
              # time (OllamaListwiseReranker falls back to input order),
              # so its model is intentionally not pre-pulled here.
              for m in qwen2.5:7b-instruct qwen3:8b nomic-embed-text qwen3-embedding:0.6b; do
                ollama pull "$m" || echo "warn: pre-pull of $m failed, continuing"
              done
              kill $SERVE_PID
              wait $SERVE_PID 2>/dev/null || true
          env:
            - name: OLLAMA_HOST
              value: 127.0.0.1:11434
            - name: OLLAMA_MODELS
              value: /var/lib/ollama
          volumeMounts:
            - name: models
              mountPath: /var/lib/ollama
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              # Pull dominates network not CPU/memory.
              cpu: 2000m
              memory: 2Gi
      containers:
        - name: ollama
          # Pinned away from 0.13.0-0.13.2 — those releases broke
          # embedding-endpoint compatibility for LightRAG and any
          # nomic-embed-text consumer (#2495).
          image: ollama/ollama:0.12.11
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
            - name: OLLAMA_MODELS
              value: /var/lib/ollama
            # Only one model loaded at a time. On CPU the model
            # lives in `OLLAMA_MAX_LOADED_MODELS` pages of RAM; with
            # qwen2.5:7b that's ~4.5 GiB, plus nomic-embed-text
            # ~300 MiB. Single-model swap-on-demand keeps the
            # resident set inside the container memory limit.
            - name: OLLAMA_MAX_LOADED_MODELS
              value: '1'
            # Keep the model resident long enough that the next
            # 5-min curator pass always finds it warm. The previous
            # `5m` matched the pass cadence exactly and evicted at
            # the worst possible moment; `60m` adds enough slack
            # that bursts (drain Job, multiple worker captures in a
            # window, manual MCP calls) all hit a hot model.
            - name: OLLAMA_KEEP_ALIVE
              value: '60m'
            # No GPU. Force CPU-only inference so Ollama doesn't
            # try to discover and partially-offload onto a card
            # we deliberately don't request.
            - name: CUDA_VISIBLE_DEVICES
              value: ''
            - name: OLLAMA_LLM_LIBRARY
              value: cpu_avx2
            # Cap the worker thread pool so we don't peg every
            # core on the host while other workloads run alongside.
            - name: OLLAMA_NUM_PARALLEL
              value: '1'
          volumeMounts:
            - name: models
              mountPath: /var/lib/ollama
          ports:
            - containerPort: 11434
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 5
          resources:
            # Memory budget for the CPU path:
            #   qwen2.5:7b weights (~4.5 GiB, mmapped) + kv cache
            #   (~700 MiB) + working buffers (~1 GiB) + overhead
            #   = ~6-7 GiB realistic peak.
            # 10 GiB limit gives a safety margin without exceeding
            # the ~13 GiB free that the enschede nodes currently
            # report. Request stays modest so the scheduler can
            # still pack the pod alongside other workloads.
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: 4000m
              memory: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: knowledge-system
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
