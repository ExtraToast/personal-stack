# CouchDB admin credentials for the LiveSync backend. Populated out-of-band
# by tmp.sh:
#   vault kv put -mount=secret knowledge-system/obsidian-livesync \
#     couchdb.user=admin \
#     couchdb.password=<generated>
#
# VSO projects it as a Secret named obsidian-livesync-creds in
# knowledge-system, and the StatefulSet's env block reads from there.
# Rotation rolls the StatefulSet (and therefore re-applies the password
# on the next CouchDB start; existing data remains since CouchDB stores
# hashed admin creds in /opt/couchdb/data/_users metadata).
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: obsidian-livesync-creds
  namespace: knowledge-system
spec:
  vaultAuthRef: vso-system/default
  type: kv-v2
  mount: secret
  path: knowledge-system/obsidian-livesync
  destination:
    name: obsidian-livesync-creds
    create: true
    transformation:
      templates:
        COUCHDB_USER:
          text: '{{- get .Secrets "couchdb.user" -}}'
        COUCHDB_PASSWORD:
          text: '{{- get .Secrets "couchdb.password" -}}'
  refreshAfter: 1h
  rolloutRestartTargets:
    - kind: StatefulSet
      name: obsidian-livesync
