# Builds + publishes container images to ghcr.io with `:latest` and
# `:<sha>` tags. Cluster rollout is handled out-of-band: Keel polls
# ghcr every 2 minutes and rolls the matching Deployment when the
# `:latest` digest changes, while Flux reconciles manifest changes
# from `main`. Neither is this workflow's responsibility — the name
# reflects that.
name: Build & Publish

on:
  push:
    branches: [main]
  # Manual trigger for the cases where a push event never fires the
  # workflow (rare GitHub oddity — observed once with the `#308`
  # merge: workflow silently absent for that SHA) or where a merge
  # only changed manifests and the per-service path filters skipped
  # the matrix. `workflow_dispatch` runs the same paths-filter logic
  # against `HEAD` vs the previous commit, so the same incremental
  # rebuild behaviour applies; pass `force_all: true` to bypass the
  # filter and rebuild every service.
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Rebuild every service image regardless of filters'
        type: boolean
        default: false

concurrency:
  group: build-and-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    # Compare the merged-into-main commit against the previous main
    # commit and only build the services whose code (or its shared
    # dependencies) actually changed. The matrix feeds build-and-push
    # dynamically; services that didn't change keep their existing
    # ghcr :latest tag untouched, which is exactly what Keel polls on,
    # so Flux-managed pods don't churn for no reason either.
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      has-matrix: ${{ steps.compute.outputs.has-matrix }}
      # knowledge-api is built by its own CRaC job (see build-knowledge-api-crac),
      # not the generic matrix, because its image bakes a runtime-produced CRaC
      # checkpoint.
      knowledge-api: ${{ steps.compute.outputs.knowledge_api }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            workflow:
              - '.github/workflows/build-and-publish.yml'
            auth-api:
              - 'services/auth-api/**'
            assistant-api:
              - 'services/assistant-api/**'
            knowledge-api:
              - 'services/knowledge-api/**'
            agent-runner:
              - 'services/agent-runner/**'
              - 'services/agent-gateway/**'
            knowledge-ingest-worker:
              - 'services/knowledge-ingest-worker/**'
            knowledge-curator:
              - 'services/knowledge-curator/**'
            kotlin-common:
              - 'libs/kotlin-common/**'
            build-logic:
              - 'build-logic/**'
            gradle-config:
              - 'gradle/**'
              - 'gradle.properties'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradlew'
              - 'gradlew.bat'
            auth-ui:
              - 'services/auth-ui/**'
            assistant-ui:
              - 'services/assistant-ui/**'
            app-ui:
              - 'services/app-ui/**'
            stalwart-tools:
              - 'infra/stalwart/**'
            vue-common:
              - 'libs/vue-common/**'
            frontend-config:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'eslint.config.ts'
      - name: Compute rebuild matrix
        id: compute
        env:
          FILTER_WORKFLOW: ${{ steps.filter.outputs.workflow }}
          FILTER_KOTLIN_COMMON: ${{ steps.filter.outputs.kotlin-common }}
          FILTER_BUILD_LOGIC: ${{ steps.filter.outputs.build-logic }}
          FILTER_GRADLE_CONFIG: ${{ steps.filter.outputs.gradle-config }}
          FILTER_AUTH_API: ${{ steps.filter.outputs.auth-api }}
          FILTER_ASSISTANT_API: ${{ steps.filter.outputs.assistant-api }}
          FILTER_KNOWLEDGE_API: ${{ steps.filter.outputs.knowledge-api }}
          FILTER_AGENT_RUNNER: ${{ steps.filter.outputs.agent-runner }}
          FILTER_KNOWLEDGE_INGEST_WORKER: ${{ steps.filter.outputs.knowledge-ingest-worker }}
          FILTER_KNOWLEDGE_CURATOR: ${{ steps.filter.outputs.knowledge-curator }}
          FILTER_VUE_COMMON: ${{ steps.filter.outputs.vue-common }}
          FILTER_FRONTEND_CONFIG: ${{ steps.filter.outputs.frontend-config }}
          FILTER_AUTH_UI: ${{ steps.filter.outputs.auth-ui }}
          FILTER_ASSISTANT_UI: ${{ steps.filter.outputs.assistant-ui }}
          FILTER_APP_UI: ${{ steps.filter.outputs.app-ui }}
          FILTER_STALWART_TOOLS: ${{ steps.filter.outputs.stalwart-tools }}
        run: |
          set -euo pipefail
          any() { for v in "$@"; do [[ "$v" == "true" ]] && echo "true" && return; done; echo "false"; }

          KOTLIN_SHARED=$(any "$FILTER_WORKFLOW" "$FILTER_KOTLIN_COMMON" "$FILTER_BUILD_LOGIC" "$FILTER_GRADLE_CONFIG")
          FRONTEND_SHARED=$(any "$FILTER_WORKFLOW" "$FILTER_VUE_COMMON" "$FILTER_FRONTEND_CONFIG")

          MATRIX="[]"
          append() {
            local name=$1 dockerfile=$2 platforms=$3 build_arg=${4:-}
            MATRIX=$(echo "$MATRIX" | jq -c --arg n "$name" --arg d "$dockerfile" --arg p "$platforms" --arg b "$build_arg" \
              '. + [{"name":$n, "dockerfile":$d, "platforms":$p, "build_arg":$b}]')
          }

          # JVM services stay amd64-only — they run on frankfurt-contabo-1 and
          # would crawl on a Pi (Cortex-A72 vs JVM class load + ZGC). UIs are
          # nginx-served static bundles; build them multi-arch (amd64+arm64)
          # so they can schedule on the enschede Pi nodes and free CPU on
          # Frankfurt.
          #
          # Multi-arch is gated on `main` only. The arm64 leg builds under
          # QEMU emulation and roughly doubles the UI build time; we don't
          # want to pay that on every reconcile / dispatch / future trigger
          # that someone might add. Today the workflow's `on:` only fires
          # for push to main, but this guard makes the intent explicit and
          # forward-safe — if you add workflow_dispatch later, feature
          # branches still build amd64-only.
          AMD64=linux/amd64
          if [[ "${{ github.ref }}" == "refs/heads/main" && "${{ github.event_name }}" == "push" ]]; then
            UI_PLATFORMS=linux/amd64,linux/arm64
          else
            UI_PLATFORMS=linux/amd64
            echo "::notice::Not on main push (ref=${{ github.ref }}, event=${{ github.event_name }}); UIs build amd64-only this run."
          fi

          # `force_all=true` on workflow_dispatch overrides every
          # per-service filter so all images rebuild in one go.
          FORCE_ALL="${{ github.event.inputs.force_all || 'false' }}"

          [[ "$(any "$FORCE_ALL" "$KOTLIN_SHARED"   "$FILTER_AUTH_API")"      == "true" ]] && append auth-api      services/auth-api/Dockerfile      "$AMD64"
          [[ "$(any "$FORCE_ALL" "$KOTLIN_SHARED"   "$FILTER_ASSISTANT_API")" == "true" ]] && append assistant-api services/assistant-api/Dockerfile "$AMD64"
          # knowledge-api is intentionally NOT appended to the matrix: it needs
          # the bespoke train -> checkpoint -> bake flow in build-knowledge-api-crac.
          # The boolean is surfaced as its own output so that job can gate on it.
          KNOWLEDGE_API=$(any "$FORCE_ALL" "$KOTLIN_SHARED" "$FILTER_KNOWLEDGE_API")
          # agent-runner bundles the agent-gateway jar (built from the
          # same Gradle settings), so a single image rebuild covers both
          # the per-workspace tmux/runner shell and the gateway HTTP
          # sidecar. amd64-only — the credential PVCs pin every
          # consumer to a single amd64 Enschede worker anyway.
          [[ "$(any "$FORCE_ALL" "$KOTLIN_SHARED"   "$FILTER_AGENT_RUNNER")" == "true" ]] && append agent-runner services/agent-runner/Dockerfile "$AMD64"
          # Python services — only depend on their own dir; no shared
          # Kotlin or frontend trigger keys.
          [[ "$(any "$FORCE_ALL" "$FILTER_WORKFLOW" "$FILTER_KNOWLEDGE_INGEST_WORKER")" == "true" ]] && append knowledge-ingest-worker services/knowledge-ingest-worker/Dockerfile "$AMD64"
          [[ "$(any "$FORCE_ALL" "$FILTER_WORKFLOW" "$FILTER_KNOWLEDGE_CURATOR")" == "true" ]] && append knowledge-curator services/knowledge-curator/Dockerfile "$AMD64"
          [[ "$(any "$FORCE_ALL" "$FRONTEND_SHARED" "$FILTER_AUTH_UI")"       == "true" ]] && append auth-ui       services/auth-ui/Dockerfile       "$UI_PLATFORMS"
          [[ "$(any "$FORCE_ALL" "$FRONTEND_SHARED" "$FILTER_ASSISTANT_UI")"  == "true" ]] && append assistant-ui  services/assistant-ui/Dockerfile  "$UI_PLATFORMS"
          [[ "$(any "$FORCE_ALL" "$FRONTEND_SHARED" "$FILTER_APP_UI")"        == "true" ]] && append app-ui        services/app-ui/Dockerfile        "$UI_PLATFORMS"
          # stalwart-tools: small alpine image baking stalwart-cli + the
          # reconcile scripts/plans/accounts; amd64-only (frankfurt).
          [[ "$(any "$FORCE_ALL" "$FILTER_WORKFLOW" "$FILTER_STALWART_TOOLS")" == "true" ]] && append stalwart-tools infra/stalwart/Dockerfile "$AMD64"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "knowledge_api=$KNOWLEDGE_API" >> "$GITHUB_OUTPUT"
          echo "knowledge-api CRaC build: $KNOWLEDGE_API"
          if [[ "$MATRIX" == "[]" ]]; then
            echo "has-matrix=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No service image needs rebuilding for this push."
          else
            echo "has-matrix=true" >> "$GITHUB_OUTPUT"
            echo "Rebuild matrix: $MATRIX"
          fi

  build-and-push:
    name: Build & Push Images
    needs: detect-changes
    if: needs.detect-changes.outputs.has-matrix == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set image prefix (lowercase)
        run: echo "IMAGE_PREFIX=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      # QEMU is only needed when a service builds for a non-runner arch
      # (the UIs build linux/arm64 alongside amd64). No-op for the
      # amd64-only JVM services.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          platforms: ${{ matrix.service.platforms }}
          # `GIT_SHA` is always passed so the runtime image can bake
          # it into `ENV SERVICE_VERSION`. Each service's per-matrix
          # `build_arg` is appended on a second line so an entry that
          # wants additional args still works (docker/build-push-action
          # accepts newline-separated KEY=VALUE pairs).
          build-args: |
            GIT_SHA=${{ github.sha }}
            ${{ matrix.service.build_arg }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  build-knowledge-api-crac:
    # knowledge-api's production image bakes a CRaC checkpoint so a fresh pod
    # restores with the read path already JIT-hot (see services/knowledge-api/
    # Dockerfile + crac-launch.sh). The checkpoint can only be produced by
    # *running* the trained JVM against real Postgres (pgvector) + RabbitMQ, so
    # this cannot be a plain build-push matrix entry — knowledge-api is handled
    # here instead. Isolated as its own job on purpose: a failure leaves the
    # previous knowledge-api :latest in place (Keel keeps serving it) and never
    # blocks the other services' images.
    name: Build & Push knowledge-api (CRaC)
    needs: detect-changes
    if: needs.detect-changes.outputs.knowledge-api == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    services:
      postgres:
        # pgvector image, not plain postgres: knowledge-api's Flyway migrations
        # create vector / HNSW / GIN objects, so a vanilla server fails to
        # migrate and the JVM never reaches ApplicationReadyEvent (no checkpoint).
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: knowledge_db
          POSTGRES_USER: kb_user
          POSTGRES_PASSWORD: kb_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set image prefix (lowercase)
        run: echo "IMAGE_PREFIX=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build train image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: services/knowledge-api/Dockerfile
          target: train
          load: true
          tags: knowledge-api-train:local
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=knowledge-api
          cache-to: type=gha,mode=max,scope=knowledge-api
      - name: Run training (drives warmup, dumps checkpoint)
        run: |
          set -euo pipefail
          mkdir -p crac-checkpoint
          chmod 777 crac-checkpoint
          # --privileged so CRIU has CHECKPOINT_RESTORE / SYS_PTRACE under any
          # host seccomp profile; --network=host reaches the GHA service
          # sidecars on localhost. Exit 137 is the expected clean-dump signal.
          set +e
          docker run --rm \
            --privileged \
            --network=host \
            -v "$PWD/crac-checkpoint:/opt/crac/checkpoint" \
            -e DB_HOST=localhost -e DB_PORT=5432 \
            -e DB_NAME=knowledge_db -e DB_USER=kb_user -e DB_PASSWORD=kb_password \
            -e RABBITMQ_HOST=localhost -e RABBITMQ_PORT=5672 \
            -e RABBITMQ_USER=guest -e RABBITMQ_PASSWORD=guest \
            -e SERVER_PORT=8080 \
            knowledge-api-train:local
          EXIT_CODE=$?
          set -e
          echo "Container exit code: ${EXIT_CODE}"
          echo "::group::Checkpoint directory listing"
          ls -la crac-checkpoint || true
          echo "::endgroup::"
          if [ -z "$(ls -A crac-checkpoint 2>/dev/null)" ]; then
            echo "::error::checkpoint dir is empty — CRaC dump did not produce files"
            exit 1
          fi
          if [ "${EXIT_CODE}" -ne 0 ] && [ "${EXIT_CODE}" -ne 137 ]; then
            echo "::error::training container exited ${EXIT_CODE}"
            exit "${EXIT_CODE}"
          fi
      - name: Build and push final image with baked checkpoint
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: services/knowledge-api/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            GIT_SHA=${{ github.sha }}
            CRAC_CHECKPOINT_DIR=crac-checkpoint
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/knowledge-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/knowledge-api:latest
          cache-from: type=gha,scope=knowledge-api
