name: Nightly Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mutation-test-kotlin:
    name: Mutation Tests (Kotlin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew pitest || true
      - uses: actions/upload-artifact@v7
        with:
          name: pitest-reports
          path: '**/build/reports/pitest/'

  mutation-test-frontend:
    name: Mutation Tests (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @personal-stack/auth-ui stryker run || true

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: auth-api, context: '.', file: 'services/auth-api/Dockerfile' }
          - { name: assistant-api, context: '.', file: 'services/assistant-api/Dockerfile' }
          - { name: auth-ui, context: 'services/auth-ui', file: 'services/auth-ui/Dockerfile' }
          - { name: assistant-ui, context: 'services/assistant-ui', file: 'services/assistant-ui/Dockerfile' }
          - { name: app-ui, context: 'services/app-ui', file: 'services/app-ui/Dockerfile' }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.file }}
          tags: personal-stack/${{ matrix.service.name }}:latest
          outputs: type=docker,dest=/tmp/${{ matrix.service.name }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/upload-artifact@v7
        with:
          name: nightly-image-${{ matrix.service.name }}
          path: /tmp/${{ matrix.service.name }}.tar
          retention-days: 1

  system-tests:
    name: System Tests (Nomad)
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: nightly-image-*
          path: /tmp/images
      - name: Load images
        run: |
          for tar in /tmp/images/nightly-image-*/*.tar; do docker load -i "$tar"; done
      - name: Set up dev DNS
        run: sudo bash infra/scripts/setup-dev-dns.sh
      - name: Bootstrap Nomad stack
        run: sudo bash infra/scripts/ci-bootstrap-nomad.sh
        env:
          STACK_DIR: ${{ github.workspace }}
      - name: Wait for Traefik routes to stabilize
        run: |
          check_route() {
            local route="$1" url="$2"
            echo -n "  $route ($url): "
            for i in $(seq 1 60); do
              if curl -sfk --max-time 2 -o /dev/null "$url" 2>/dev/null; then
                echo "reachable"; return 0
              fi
              sleep 2
            done
            echo "TIMEOUT"; return 1
          }
          check_route auth-api "https://auth.jorisjonkers.test/api/actuator/health"
          check_route assistant-api "https://assistant.jorisjonkers.test/api/actuator/health"
      - run: npx playwright install --with-deps chromium
      - name: Run system tests
        run: >-
          bash infra/scripts/run-strict-command.sh ./gradlew :services:system-tests:test
          -Dtest.auth-api.url=https://auth.jorisjonkers.test
          -Dtest.assistant-api.url=https://assistant.jorisjonkers.test
          -Dtest.db.password=ci_auth_pass
        continue-on-error: true
      - name: Dump Nomad logs on failure
        if: failure()
        run: |
          source "${{ github.workspace }}/.nomad-keys" 2>/dev/null || true
          export NOMAD_TOKEN="${NOMAD_BOOTSTRAP_TOKEN:-}"
          nomad status || true
          for job in postgres valkey rabbitmq traefik auth-api assistant-api; do
            echo "========== $job =========="
            alloc=$(nomad job allocs -json "$job" 2>/dev/null | jq -r '.[0].ID // empty' 2>/dev/null)
            [ -n "$alloc" ] && nomad alloc logs "$alloc" 2>/dev/null | tail -60 || true
          done

  security-advanced:
    name: Advanced Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
