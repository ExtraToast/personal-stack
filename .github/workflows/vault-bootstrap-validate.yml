name: Vault Bootstrap Validate

# Runs `platform/cluster/flux/apps/data/vault/bootstrap-auth.sh` against
# a fresh dev-mode Vault container in CI. Two failure modes are gated
# by this workflow:
#
# 1. HCL syntax / policy correctness. Every `vault policy write …` call
#    inside the script will fail loudly here if the HCL is malformed,
#    catching syntax mistakes before they reach the cluster where the
#    in-cluster `vault-bootstrap-auth` Job would otherwise fail
#    silently into a CrashLoop.
#
# 2. Image-pull drift. The Job in production pins `hashicorp/vault`
#    to a specific tag (matching the StatefulSet); this workflow uses
#    the same pinned tag. A future bump must continue to exec the
#    `vault` binary cleanly under containerd's default seccomp profile
#    — when PR #409 hit `vault: Operation not permitted` after a new
#    node pulled a fresh `:latest`, this workflow would have flagged
#    the same EPERM before the image bump merged.
#
# Kubernetes-specific operations in the script (`vault write
# auth/kubernetes/config …`) are stored as configuration only — Vault
# does not validate the kubernetes_host URL at write time, so a stub
# URL + dummy CA bundle is sufficient for the CI run. Real cluster
# connectivity is only exercised by the in-cluster Job once Flux
# reconciles.
#
# Database / RabbitMQ creds are stubbed to dummy values; the dynamic
# secrets backends will fail their connectivity probe but the
# `Success! Uploaded policy:` lines for every service policy must
# still land. Those `Success!` lines are the assertion target.

on:
  workflow_call:

permissions:
  contents: read

# Match the image tag pinned in
# `platform/cluster/flux/apps/data/vault/bootstrap-auth-job.yaml`.
# Bump both at the same time or this workflow drifts from production.
env:
  VAULT_IMAGE: hashicorp/vault:1.21.2
  VAULT_DEV_ROOT_TOKEN: dev-root-token

jobs:
  validate:
    name: Run bootstrap-auth.sh against a fresh dev-mode Vault
    runs-on: ubuntu-latest
    services:
      vault:
        image: hashicorp/vault:1.21.2
        env:
          VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
        ports:
          - 8200:8200
        options: >-
          --cap-add=IPC_LOCK
          --health-cmd "wget -q -O - http://127.0.0.1:8200/v1/sys/health || true"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Sanity-check the Vault binary can exec under the runner's seccomp profile
        # This is the PR #409 canary. If `hashicorp/vault:<tag>` is
        # incompatible with containerd's default seccomp profile,
        # invoking `vault status` here fails with `Operation not
        # permitted` — same shape as the in-cluster Job did. Pinning
        # the image is the fix; this step makes the bump fail loudly
        # before merge.
        run: |
          docker run --rm \
            -e VAULT_ADDR=http://127.0.0.1:8200 \
            "${VAULT_IMAGE}" \
            vault version

      - name: Wait for the dev-mode Vault to be reachable
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8200/v1/sys/health >/dev/null; then
              echo "vault reachable after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "vault never became reachable" >&2
          curl -sv http://127.0.0.1:8200/v1/sys/health >&2 || true
          exit 1

      - name: Install the vault CLI on the runner
        run: |
          # Use the same major version as the dev-mode container so
          # the CLI's API shape matches the server's. Pin the
          # tarball URL to the exact tag.
          curl -sfLo /tmp/vault.zip \
            "https://releases.hashicorp.com/vault/1.21.2/vault_1.21.2_linux_amd64.zip"
          unzip -q /tmp/vault.zip -d /tmp/vault-cli
          sudo mv /tmp/vault-cli/vault /usr/local/bin/vault
          vault version

      - name: Enable the transit secrets engine
        # bootstrap-auth.sh assumes `transit/` is already mounted and
        # reads/writes `transit/keys/auth-api-jwt` against it. In
        # production the engine is enabled by hand on initial Vault
        # bring-up; in CI the dev-mode Vault starts fresh on every
        # workflow run, so we have to provision the mount before the
        # script runs or every `vault write transit/keys/…` returns
        # a 404 mount-not-found.
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: dev-root-token
        run: |
          vault secrets enable transit

      - name: Seed the KV paths the script reads at runtime
        # Late in the script the dynamic-secrets blocks (rabbitmq /
        # postgres roles) read connection creds back out of Vault:
        #   RMQ_USER=$(vault kv get -field=rabbitmq.user secret/platform/rabbitmq)
        #   AUTH_PARENT_ROLE=$(vault kv get -field=auth.user secret/platform/postgres)
        # In production those KV entries land via Vault Secrets
        # Operator + ad-hoc operator writes; here we stub them so the
        # script's reads return non-empty values and the dynamic
        # backend writes don't fail with a `password ""` reject. The
        # values are opaque to the script's correctness check —
        # Vault is what enforces the policies, and the assertion
        # downstream is on the `Success! Uploaded policy:` log lines.
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: dev-root-token
        run: |
          vault kv put secret/platform/rabbitmq \
            rabbitmq.user=ci-rmq-user \
            rabbitmq.password=ci-rmq-pass
          vault kv put secret/platform/postgres \
            postgres.user=ci-pg-admin \
            postgres.password=ci-pg-admin-pass \
            auth.user=ci_auth_parent \
            assistant.user=ci_assistant_parent

      - name: Provision a dummy Kubernetes CA so bootstrap-auth.sh runs end-to-end
        # The script reads `kubernetes_ca_cert=@/var/run/secrets/.../ca.crt`.
        # Vault stores it as-is at write time (no liveness probe), so a
        # throwaway self-signed cert is sufficient.
        # openssl is preinstalled on ubuntu-latest.
        run: |
          sudo mkdir -p /var/run/secrets/kubernetes.io/serviceaccount
          sudo openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -subj '/CN=ci-vault-bootstrap-stub' \
            -keyout /tmp/stub.key \
            -out /var/run/secrets/kubernetes.io/serviceaccount/ca.crt 2>/dev/null
          ls -l /var/run/secrets/kubernetes.io/serviceaccount/ca.crt

      - name: Run bootstrap-auth.sh against the dev-mode Vault
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: dev-root-token
          # K8s-auth config write — Vault stores these as opaque
          # strings, so a stub host is fine. The script only uses
          # these two; OIDC config lives in a separate
          # `vault-oidc-init` container in docker-compose and is out
          # of scope for this validation workflow.
          KUBERNETES_SERVICE_HOST: 'fake-control-plane.svc'
          KUBERNETES_SERVICE_PORT_HTTPS: '443'
          # RMQ_* / PG_ADMIN_* / *_PARENT_ROLE values are pulled out
          # of `secret/platform/rabbitmq` and `secret/platform/postgres`
          # by the script itself (see the previous step seeding those
          # KV entries with CI stubs); no env-var passthrough needed.
        run: |
          # Tee stdout to a log so the next step can grep for the
          # "Success! Uploaded policy:" lines per service. The
          # dynamic-backends section (rabbitmq/config/connection +
          # database/config/postgres) sits AFTER all policy writes
          # and uses `verify_connection=true`, which TCP-connects to
          # `postgres.data-system.svc.cluster.local:5432` /
          # `rabbitmq.data-system.svc.cluster.local:5672` — neither
          # resolvable in CI. The script's `set -eu` aborts there.
          # We swallow the failure here and rely on the grep step
          # below as the actual signal: every policy write must
          # have completed before the dynamic-backend section was
          # reached.
          bash platform/cluster/flux/apps/data/vault/bootstrap-auth.sh 2>&1 \
            | tee /tmp/bootstrap.log \
            || echo "bootstrap-auth.sh exited non-zero (expected — see comment above)"

      - name: Assert every service policy uploaded cleanly
        # The script's `vault policy write …` lines emit
        # `Success! Uploaded policy: <name>` on success; a syntax
        # error in the HCL would short-circuit `vault policy write`
        # with a non-zero exit (and `set -eu` at the top of the
        # script kills the run). The grep guards against the
        # complementary failure: the policy-write *succeeds* but the
        # log line we expect doesn't show up — meaning some upstream
        # refactor moved the policy out of the script silently.
        run: |
          # Each line is the bare policy name from a corresponding
          # `vault policy write <name> /tmp/<name>.hcl` invocation in
          # bootstrap-auth.sh. Sorted alphabetically; keep in sync
          # with the script when a policy lands or is retired.
          required_policies=(
            assistant-api
            auth-api
            downloads
            knowledge-api
            knowledge-curator
            knowledge-ingest-worker
            lightrag
            n8n
            platform-sample-read
            postgres
            rabbitmq
            stalwart
            vso
          )
          missing=()
          for policy in "${required_policies[@]}"; do
            if ! grep -q "Success! Uploaded policy: ${policy}\$" /tmp/bootstrap.log; then
              missing+=("${policy}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing policy uploads in bootstrap-auth.sh output:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            printf '\nThis usually means a `vault policy write` block was renamed or deleted in bootstrap-auth.sh.\n' >&2
            printf 'If a removal was intentional, drop the policy name from the required_policies list in this workflow.\n' >&2
            exit 1
          fi
          echo "all required policies uploaded successfully"
