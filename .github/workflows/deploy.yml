name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        service:
          - name: auth-api
            dockerfile: services/auth-api/Dockerfile
          - name: assistant-api
            dockerfile: services/assistant-api/Dockerfile
          - name: auth-ui
            dockerfile: services/auth-ui/Dockerfile
          - name: assistant-ui
            dockerfile: services/assistant-ui/Dockerfile
          - name: app-ui
            dockerfile: services/app-ui/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - name: Set image prefix (lowercase)
        run: echo "IMAGE_PREFIX=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  deploy:
    name: Deploy to Nomad
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      packages: read
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 2222
          script: |
            cd /opt/personal-stack
            git fetch origin main
            git reset --hard origin/main
            export IMAGE_TAG=$(git rev-parse HEAD)
            export IMAGE_REPO=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
            MAX_RETRIES=3
            RETRY_DELAY=10
            for img in auth-api assistant-api auth-ui assistant-ui app-ui; do
              success=false
              for attempt in $(seq 1 $MAX_RETRIES); do
                if docker pull ${IMAGE_REPO}/${img}:${IMAGE_TAG}; then
                  success=true
                  break
                fi
                echo "⚠️ Pull failed for ${img} (attempt ${attempt}/${MAX_RETRIES}), retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              done
              if [ "$success" = false ]; then
                echo "❌ Failed to pull ${img} after ${MAX_RETRIES} attempts"
                exit 1
              fi
            done
            IMAGE_REPO="${IMAGE_REPO}" bash infra/scripts/migrate-to-nomad.sh deploy
