name: System Tests

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      fail-fast:
        description: 'Fail the workflow if system tests fail (false = continue-on-error)'
        type: boolean
        default: true
      changed-services:
        description: >-
          Space-separated list of service names whose images need to be
          rebuilt from the PR source. Any service NOT in this list is
          pulled from ghcr :latest and re-tagged for CI, saving the
          build round-trip when nothing that affects that image changed
          on the branch. Defaults to all five services for callers that
          haven't computed a narrower set.
        type: string
        default: 'auth-api assistant-api auth-ui assistant-ui app-ui'

concurrency:
  group: system-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

jobs:
  build-images:
    name: Build Image (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    permissions:
      # Read access to the image packages so we can `docker pull` the
      # :latest tag when a service's sources haven't changed.
      packages: read
      contents: read
    strategy:
      matrix:
        service:
          - name: auth-api
            dockerfile: services/auth-api/Dockerfile
            build_arg: ''
          - name: assistant-api
            dockerfile: services/assistant-api/Dockerfile
            build_arg: ''
          - name: auth-ui
            dockerfile: services/auth-ui/Dockerfile
            build_arg: ''
          - name: assistant-ui
            dockerfile: services/assistant-ui/Dockerfile
            build_arg: VITE_AUTH_URL=https://auth.jorisjonkers.test
          - name: app-ui
            dockerfile: services/app-ui/Dockerfile
            build_arg: VITE_AUTH_URL=https://auth.jorisjonkers.test
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Set image prefix (lowercase)
        run: echo "IMAGE_PREFIX=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Decide build-or-pull
        id: decide
        env:
          SERVICE_NAME: ${{ matrix.service.name }}
          CHANGED_SERVICES: ${{ inputs.changed-services }}
        run: |
          set -euo pipefail
          if [[ " $CHANGED_SERVICES " == *" $SERVICE_NAME "* ]]; then
            echo "mode=build" >> "$GITHUB_OUTPUT"
            echo "::notice::$SERVICE_NAME changed on this branch — building image from source."
          else
            echo "mode=pull" >> "$GITHUB_OUTPUT"
            echo "::notice::$SERVICE_NAME unchanged — pulling ghcr :latest and re-tagging for CI."
          fi
      - name: Log in to ghcr (pull mode)
        if: steps.decide.outputs.mode == 'pull'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull latest from ghcr and re-tag
        if: steps.decide.outputs.mode == 'pull'
        shell: bash
        run: |
          set -euo pipefail
          src="${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.service.name }}:latest"
          dst="personal-stack/${{ matrix.service.name }}:ci"
          docker pull "$src"
          docker tag "$src" "$dst"
      - name: Build image (build mode)
        if: steps.decide.outputs.mode == 'build'
        shell: bash
        run: |
          set -euo pipefail
          build_args=()
          if [ -n "${{ matrix.service.build_arg }}" ]; then
            build_args+=(--build-arg "${{ matrix.service.build_arg }}")
          fi

          docker buildx build \
            --progress=plain \
            --load \
            -f "${{ matrix.service.dockerfile }}" \
            -t "personal-stack/${{ matrix.service.name }}:ci" \
            --cache-from "type=gha,scope=${{ matrix.service.name }}" \
            --cache-to "type=gha,mode=max,scope=${{ matrix.service.name }}" \
            "${build_args[@]}" \
            .
      - name: Export image
        run: docker save personal-stack/${{ matrix.service.name }}:ci -o /tmp/${{ matrix.service.name }}.tar
      - uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.service.name }}
          path: /tmp/${{ matrix.service.name }}.tar
          retention-days: 1

  test-system:
    name: System Tests (${{ matrix.suite.name }})
    concurrency:
      group: system-tests-run-${{ github.workflow }}-${{ github.ref }}-${{ matrix.suite.name }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    needs: [build-images]
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: api
            gradle_task: :services:system-tests:testNonPlaywright
            shard_args: ''
          - name: playwright-1
            gradle_task: :services:system-tests:testPlaywright
            shard_args: -Dtest.shard.index=1 -Dtest.shard.count=4
          - name: playwright-2
            gradle_task: :services:system-tests:testPlaywright
            shard_args: -Dtest.shard.index=2 -Dtest.shard.count=4
          - name: playwright-3
            gradle_task: :services:system-tests:testPlaywright
            shard_args: -Dtest.shard.index=3 -Dtest.shard.count=4
          - name: playwright-4
            gradle_task: :services:system-tests:testPlaywright
            shard_args: -Dtest.shard.index=4 -Dtest.shard.count=4
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java-gradle
        with:
          java-version: ${{ inputs.java-version }}
      - uses: ./.github/actions/prepare-ci-host
      - name: Start Docker Compose stack
        timeout-minutes: 6
        run: bash .github/scripts/start-system-test-stack.sh
      - name: Seed stalwart mail account
        run: bash .github/scripts/seed-stalwart-ci.sh
      - name: Verify database migrations ran
        run: bash .github/scripts/verify-system-test-migrations.sh
      - name: Wait for Traefik routes to stabilize
        run: bash .github/scripts/wait-for-system-test-routes.sh
      - name: Run system tests
        id: run-tests
        continue-on-error: ${{ !inputs.fail-fast }}
        run: >-
          bash infra/scripts/run-strict-command.sh ./gradlew ${{ matrix.suite.gradle_task }}
          -Dtest.auth-api.url=https://auth.jorisjonkers.test
          -Dtest.assistant-api.url=https://assistant.jorisjonkers.test
          -Dtest.db.password=ci_auth_pass
          ${{ matrix.suite.shard_args }}
      - name: Dump diagnostics on failure
        if: always() && (failure() || cancelled() || steps.run-tests.outcome == 'failure')
        run: bash .github/scripts/dump-compose-ci-diagnostics.sh
