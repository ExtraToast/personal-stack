name: System Tests

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      fail-fast:
        description: 'Fail the workflow if system tests fail (false = continue-on-error)'
        type: boolean
        default: true

concurrency:
  group: system-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-images:
    name: Build Image (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-api
            dockerfile: services/auth-api/Dockerfile
            build_arg: ''
          - name: assistant-api
            dockerfile: services/assistant-api/Dockerfile
            build_arg: ''
          - name: auth-ui
            dockerfile: services/auth-ui/Dockerfile
            build_arg: ''
          - name: assistant-ui
            dockerfile: services/assistant-ui/Dockerfile
            build_arg: VITE_AUTH_URL=https://auth.jorisjonkers.test
          - name: app-ui
            dockerfile: services/app-ui/Dockerfile
            build_arg: VITE_AUTH_URL=https://auth.jorisjonkers.test
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          build_args=()
          if [ -n "${{ matrix.service.build_arg }}" ]; then
            build_args+=(--build-arg "${{ matrix.service.build_arg }}")
          fi

          docker buildx build \
            --progress=plain \
            --load \
            -f "${{ matrix.service.dockerfile }}" \
            -t "personal-stack/${{ matrix.service.name }}:ci" \
            --cache-from "type=gha,scope=${{ matrix.service.name }}" \
            --cache-to "type=gha,mode=max,scope=${{ matrix.service.name }}" \
            "${build_args[@]}" \
            .
      - name: Export image
        run: docker save personal-stack/${{ matrix.service.name }}:ci -o /tmp/${{ matrix.service.name }}.tar
      - uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.service.name }}
          path: /tmp/${{ matrix.service.name }}.tar
          retention-days: 1

  test-system:
    name: System Tests (Docker Compose)
    concurrency:
      group: system-tests-run-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: image-*
          path: /tmp/images
      - name: Load images
        run: |
          for tar in /tmp/images/image-*/*.tar; do docker load -i "$tar"; done
      - name: Set up dev DNS
        run: sudo bash infra/scripts/setup-dev-dns.sh
      - name: Start Docker Compose stack
        timeout-minutes: 6
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait --timeout 300
      - name: Seed stalwart mail account
        run: bash .github/scripts/seed-stalwart-ci.sh
      - name: Verify database migrations ran
        run: bash .github/scripts/verify-system-test-migrations.sh
      - name: Wait for Traefik routes to stabilize
        run: bash .github/scripts/wait-for-system-test-routes.sh
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run system tests
        id: run-tests
        continue-on-error: ${{ !inputs.fail-fast }}
        run: >-
          bash infra/scripts/run-strict-command.sh ./gradlew :services:system-tests:test
          -Dtest.auth-api.url=https://auth.jorisjonkers.test
          -Dtest.assistant-api.url=https://assistant.jorisjonkers.test
          -Dtest.db.password=ci_auth_pass
      - name: Dump diagnostics on failure
        if: always() && (failure() || cancelled() || steps.run-tests.outcome == 'failure')
        run: bash .github/scripts/dump-compose-ci-diagnostics.sh
