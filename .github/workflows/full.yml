name: Full Pipeline

on:
  pull_request:
    branches: [main]

concurrency:
  group: full-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-kotlin:
    name: Lint Kotlin (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: auth-api
            gradle-path: :services:auth-api
          - module: assistant-api
            gradle-path: :services:assistant-api
          - module: kotlin-common
            gradle-path: :libs:kotlin-common
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew ${{ matrix.gradle-path }}:detekt ${{ matrix.gradle-path }}:ktlintCheck

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint --max-warnings 0
      - run: pnpm format:check

  test-kotlin-unit:
    name: Kotlin Unit Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: auth-api
            gradle-path: :services:auth-api
          - module: assistant-api
            gradle-path: :services:assistant-api
          - module: kotlin-common
            gradle-path: :libs:kotlin-common
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew ${{ matrix.gradle-path }}:test

  test-frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test -- --coverage

  test-kotlin-integration:
    name: Kotlin Integration Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: auth-api
            gradle-path: :services:auth-api
          - module: assistant-api
            gradle-path: :services:assistant-api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew ${{ matrix.gradle-path }}:integrationTest

  verify-coverage:
    name: Coverage Threshold (${{ matrix.module }})
    needs: [test-kotlin-unit, test-kotlin-integration]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: auth-api
            gradle-path: :services:auth-api
            has-integration: true
          - module: assistant-api
            gradle-path: :services:assistant-api
            has-integration: true
          - module: kotlin-common
            gradle-path: :libs:kotlin-common
            has-integration: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - name: Run tests and verify coverage (80%)
        if: matrix.has-integration
        run: ./gradlew ${{ matrix.gradle-path }}:test ${{ matrix.gradle-path }}:integrationTest ${{ matrix.gradle-path }}:jacocoTestCoverageVerification
      - name: Run tests and verify coverage (80%) - unit only
        if: '!matrix.has-integration'
        run: ./gradlew ${{ matrix.gradle-path }}:test ${{ matrix.gradle-path }}:jacocoTestCoverageVerification

  test-architecture:
    name: Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ./gradlew :services:auth-api:test :services:assistant-api:test --tests "*ArchitectureTest*"
      - run: pnpm -r depcruise

  build-images:
    name: Build Image (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-api
            dockerfile: services/auth-api/Dockerfile
          - name: assistant-api
            dockerfile: services/assistant-api/Dockerfile
          - name: auth-ui
            dockerfile: services/auth-ui/Dockerfile
          - name: assistant-ui
            dockerfile: services/assistant-ui/Dockerfile
          - name: app-ui
            dockerfile: services/app-ui/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: personal-stack/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
      - name: Export image
        run: docker save personal-stack/${{ matrix.service.name }}:latest -o /tmp/${{ matrix.service.name }}.tar
      - uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.service.name }}
          path: /tmp/${{ matrix.service.name }}.tar
          retention-days: 1

  test-system:
    name: System Tests
    runs-on: ubuntu-latest
    needs: [test-kotlin-unit, test-kotlin-integration, build-images]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: image-*
          path: /tmp/images
      - name: Load images
        run: |
          for tar in /tmp/images/image-*/*.tar; do docker load -i "$tar"; done
      - name: Set up dev DNS
        run: sudo bash infra/scripts/setup-dev-dns.sh
      - name: Build and start full stack
        run: docker compose up -d --no-build postgres valkey rabbitmq vault auth-api assistant-api traefik auth-ui assistant-ui app-ui n8n grafana stalwart --wait --wait-timeout 300
      - name: Wait for Traefik routes to stabilize
        run: |
          echo "Waiting for Traefik routes to become reachable..."
          check_route() {
            local route="$1" url="$2"
            echo -n "  $route ($url): "
            for i in $(seq 1 30); do
              if curl -sf --max-time 2 -o /dev/null "$url" 2>/dev/null; then
                echo "reachable"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "TIMEOUT"
                exit 1
              fi
              sleep 1
            done
          }
          check_route app-ui         "http://jorisjonkers.test:80/"
          check_route auth-ui        "http://auth.jorisjonkers.test:80/"
          check_route assistant-ui   "http://assistant.jorisjonkers.test:80/"
          check_route auth-api       "http://auth.jorisjonkers.test:80/api/actuator/health"
          check_route assistant-api  "http://assistant.jorisjonkers.test:80/api/actuator/health"
      - name: Verify all services are healthy
        run: |
          echo "==> Service status:"
          docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Health}}"
          echo ""
          UNHEALTHY=$(docker compose ps --format json | jq -r 'select(.Health == "unhealthy") | .Name')
          if [ -n "$UNHEALTHY" ]; then
            echo "==> UNHEALTHY services detected:"
            echo "$UNHEALTHY"
            for svc in $UNHEALTHY; do
              echo "==> Logs for $svc:"
              docker logs "$svc" --tail 30 2>&1
            done
            exit 1
          fi
          echo "==> All services healthy"
      - name: Verify database migrations ran
        run: |
          docker exec personal-stack-postgres psql -U auth_user -d auth_db -c '\dt' | grep -q app_user || { echo "auth_db migrations missing"; exit 1; }
          docker exec personal-stack-postgres psql -U assistant_user -d assistant_db -c '\dt' | grep -q conversation || { echo "assistant_db migrations missing"; exit 1; }
          echo "==> Database migrations verified"
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run system tests
        run: >-
          ./gradlew :services:system-tests:test
          -Dtest.auth-api.url=http://localhost:8081
          -Dtest.assistant-api.url=http://localhost:8082
      - name: Dump service logs on failure
        if: failure()
        run: |
          for svc in postgres valkey rabbitmq vault auth-api assistant-api traefik auth-ui assistant-ui app-ui n8n grafana stalwart; do
            echo "========== $svc =========="
            docker compose logs "$svc" --tail 80
          done

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pipeline-complete:
    name: Pipeline Complete
    if: always()
    needs:
      - lint-kotlin
      - lint-frontend
      - test-kotlin-unit
      - test-frontend-unit
      - test-kotlin-integration
      - verify-coverage
      - test-architecture
      - build-images
      - test-system
      - security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Check pipeline result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Pipeline failed or was cancelled"
            exit 1
          fi
          echo "All checks passed"
