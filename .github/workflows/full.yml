name: Full Pipeline

on:
  pull_request:
    branches: [main]

concurrency:
  group: full-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  lint-kotlin:
    name: Lint Kotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew detekt ktlintCheck

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint --max-warnings 0
      - run: pnpm format:check

  test-kotlin-unit:
    name: Kotlin Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test -x integrationTest -x :services:system-tests:test

  test-frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  test-kotlin-integration:
    name: Kotlin Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew integrationTest

  test-architecture:
    name: Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ./gradlew test --tests "*ArchitectureTest*"
      - run: pnpm -r depcruise

  test-system:
    name: System Tests
    runs-on: ubuntu-latest
    needs: [test-kotlin-unit, test-kotlin-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and start full stack
        run: docker compose up -d postgres valkey rabbitmq vault auth-api assistant-api --build --wait --wait-timeout 240
      - name: Verify all services are healthy
        run: |
          echo "==> Service status:"
          docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Health}}"
          echo ""
          UNHEALTHY=$(docker compose ps --format json | jq -r 'select(.Health == "unhealthy") | .Name')
          if [ -n "$UNHEALTHY" ]; then
            echo "==> UNHEALTHY services detected:"
            echo "$UNHEALTHY"
            for svc in $UNHEALTHY; do
              echo "==> Logs for $svc:"
              docker logs "$svc" --tail 30 2>&1
            done
            exit 1
          fi
          echo "==> All services healthy"
      - name: Verify database migrations ran
        run: |
          docker exec private-stack-postgres psql -U auth_user -d auth_db -c '\dt' | grep -q app_user || { echo "auth_db migrations missing"; exit 1; }
          docker exec private-stack-postgres psql -U assistant_user -d assistant_db -c '\dt' | grep -q conversation || { echo "assistant_db migrations missing"; exit 1; }
          echo "==> Database migrations verified"
      - name: Run system tests
        run: >-
          ./gradlew :services:system-tests:test
          -Dtest.auth-api.url=http://localhost:8081
          -Dtest.assistant-api.url=http://localhost:8082
      - name: Dump service logs on failure
        if: failure()
        run: |
          for svc in postgres valkey rabbitmq vault auth-api assistant-api; do
            echo "========== $svc =========="
            docker compose logs "$svc" --tail 80
          done

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
