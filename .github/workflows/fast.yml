name: Fast Pipeline

on:
  push:
    branches-ignore: [main]

concurrency:
  group: fast-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-pr:
    name: Check for open PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      has_pr: ${{ steps.check.outputs.has_pr }}
    steps:
      - id: check
        run: |
          PR_COUNT=$(gh pr list --repo "${{ github.repository }}" --head "${{ github.ref_name }}" --state open --json number --jq 'length')
          echo "has_pr=$([ "$PR_COUNT" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-kotlin:
    name: Lint Kotlin (${{ matrix.module }})
    needs: check-pr
    if: needs.check-pr.outputs.has_pr == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: auth-api
            gradle-path: :services:auth-api
          - module: assistant-api
            gradle-path: :services:assistant-api
          - module: kotlin-common
            gradle-path: :libs:kotlin-common
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew ${{ matrix.gradle-path }}:detekt ${{ matrix.gradle-path }}:ktlintCheck

  lint-frontend:
    name: Lint Frontend
    needs: check-pr
    if: needs.check-pr.outputs.has_pr == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint --max-warnings 0
      - run: pnpm format:check

  typecheck-frontend:
    name: Typecheck Frontend
    needs: check-pr
    if: needs.check-pr.outputs.has_pr == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck

  test-kotlin-unit:
    name: Kotlin Unit Tests (${{ matrix.module }})
    needs: check-pr
    if: needs.check-pr.outputs.has_pr == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: auth-api
            gradle-path: :services:auth-api
          - module: assistant-api
            gradle-path: :services:assistant-api
          - module: kotlin-common
            gradle-path: :libs:kotlin-common
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew ${{ matrix.gradle-path }}:test

  test-frontend-unit:
    name: Frontend Unit Tests
    needs: check-pr
    if: needs.check-pr.outputs.has_pr == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  build-verify:
    name: Build Verification
    needs: check-pr
    if: needs.check-pr.outputs.has_pr == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ./gradlew assemble
      - run: pnpm -r build
