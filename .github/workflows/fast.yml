name: Fast Pipeline

on:
  push:
    branches-ignore: [main]

concurrency:
  group: fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-kotlin:
    name: Lint Kotlin (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: auth-api
            gradle-path: :services:auth-api
          - module: assistant-api
            gradle-path: :services:assistant-api
          - module: kotlin-common
            gradle-path: :libs:kotlin-common
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew ${{ matrix.gradle-path }}:detekt ${{ matrix.gradle-path }}:ktlintCheck

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint --max-warnings 0
      - run: pnpm format:check

  typecheck-frontend:
    name: Typecheck Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck

  test-kotlin-unit:
    name: Kotlin Unit Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: auth-api
            gradle-path: :services:auth-api
          - module: assistant-api
            gradle-path: :services:assistant-api
          - module: kotlin-common
            gradle-path: :libs:kotlin-common
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew ${{ matrix.gradle-path }}:test

  test-frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  build-verify:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ./gradlew assemble
      - run: pnpm -r build
