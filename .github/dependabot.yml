# Cooldown: every update block waits 7 days after a release before
# Dependabot opens a PR. Rationale: by then any malicious/poisoned
# package uploaded to a public registry has usually been caught and
# taken down. The repo accepts staying a week behind bleeding edge
# in exchange for that catch window.
version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      all-gradle:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      all-npm:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /services/auth-api
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      all-docker-auth-api:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /services/assistant-api
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      all-docker-assistant-api:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /services/auth-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      all-docker-auth-ui:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /services/assistant-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      all-docker-assistant-ui:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /services/app-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      all-docker-app-ui:
        patterns: ['*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      all-actions:
        patterns: ['*']
