version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /services/auth-api
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /services/assistant-api
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /services/auth-ui
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
