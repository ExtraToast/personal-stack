services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    networks:
      - personal-stack-overlay
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    secrets:
      - postgres_user
      - postgres_password
      - n8n_db_password
      - auth_db_password
      - assistant_db_password
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  valkey:
    image: valkey/valkey:8-alpine
    networks:
      - personal-stack-overlay
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    networks:
      - personal-stack-overlay
    entrypoint:
      - bash
      - -c
      - |
        export RABBITMQ_DEFAULT_USER=$$(cat /run/secrets/rabbitmq_user)
        export RABBITMQ_DEFAULT_PASS=$$(cat /run/secrets/rabbitmq_password)
        exec docker-entrypoint.sh rabbitmq-server
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.prod.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    secrets:
      - rabbitmq_user
      - rabbitmq_password
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  vault:
    image: hashicorp/vault:1.19
    user: '0'
    networks:
      - personal-stack-overlay
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./infra/vault/config/vault.hcl:/vault/config/vault.hcl:ro
    entrypoint:
      - sh
      - -ec
      - |
        mkdir -p /vault/data
        chown -R vault:vault /vault/data
        exec su-exec vault vault server -config=/vault/config/vault.hcl
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8200/v1/sys/seal-status || exit 0']
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  traefik:
    image: traefik:v3.6
    networks:
      - personal-stack-overlay
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    environment:
      CF_DNS_API_TOKEN_FILE: /run/secrets/cf_dns_api_token
    secrets:
      - cf_dns_api_token
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  # ── Application services ────────────────────────────────────────
  auth-api:
    image: ghcr.io/extratoast/personal-stack/auth-api:${IMAGE_TAG:-latest}
    networks:
      - personal-stack-overlay
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_CONFIG_IMPORT: vault://
      VAULT_ENABLED: 'true'
      VAULT_ADDR: http://vault:8200
      MAIL_HOST: stalwart
      MAIL_PORT: 587
      AUTH_LOGIN_URL: https://auth.jorisjonkers.dev/login
      AUTH_ISSUER: https://auth.jorisjonkers.dev
      AUTH_CLIENTS_GRAFANA_SECRET: grafana-secret
      AUTH_CLIENTS_N8N_SECRET: n8n-secret
      AUTH_CLIENTS_VAULT_SECRET: vault-secret
      SESSION_COOKIE_DOMAIN: jorisjonkers.dev
      SESSION_COOKIE_SECURE: 'true'
      AUTH_CORS_ALLOWED_ORIGINS: https://jorisjonkers.dev,https://auth.jorisjonkers.dev,https://assistant.jorisjonkers.dev,https://vault.jorisjonkers.dev,https://n8n.jorisjonkers.dev,https://grafana.jorisjonkers.dev,https://rabbitmq.jorisjonkers.dev,https://stalwart.jorisjonkers.dev,https://traefik.jorisjonkers.dev,https://status.jorisjonkers.dev
      OTEL_SERVICE_NAME: auth-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_EXPORTER: otlp
    entrypoint:
      - sh
      - -c
      - |
        export VAULT_ROLE_ID=$$(cat /run/secrets/vault_auth_api_role_id)
        export VAULT_SECRET_ID=$$(cat /run/secrets/vault_auth_api_secret_id)
        exec java -javaagent:otel-javaagent.jar -jar app.jar
    secrets:
      - vault_auth_api_role_id
      - vault_auth_api_secret_id
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8081/api/actuator/health/liveness || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  assistant-api:
    image: ghcr.io/extratoast/personal-stack/assistant-api:${IMAGE_TAG:-latest}
    networks:
      - personal-stack-overlay
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_CONFIG_IMPORT: vault://
      VAULT_ENABLED: 'true'
      VAULT_ADDR: http://vault:8200
      OTEL_SERVICE_NAME: assistant-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_EXPORTER: otlp
    entrypoint:
      - sh
      - -c
      - |
        export VAULT_ROLE_ID=$$(cat /run/secrets/vault_assistant_api_role_id)
        export VAULT_SECRET_ID=$$(cat /run/secrets/vault_assistant_api_secret_id)
        exec java -javaagent:otel-javaagent.jar -jar app.jar
    secrets:
      - vault_assistant_api_role_id
      - vault_assistant_api_secret_id
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8082/api/actuator/health/liveness || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  auth-ui:
    image: ghcr.io/extratoast/personal-stack/auth-ui:${IMAGE_TAG:-latest}
    networks:
      - personal-stack-overlay
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:80 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  assistant-ui:
    image: ghcr.io/extratoast/personal-stack/assistant-ui:${IMAGE_TAG:-latest}
    networks:
      - personal-stack-overlay
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:80 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  app-ui:
    image: ghcr.io/extratoast/personal-stack/app-ui:${IMAGE_TAG:-latest}
    networks:
      - personal-stack-overlay
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:80 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  n8n:
    image: n8nio/n8n:2.13.4
    networks:
      - personal-stack-overlay
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER_FILE: /run/secrets/n8n_db_user
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/n8n_db_password
      N8N_PROTOCOL: https
      N8N_HOST: n8n.jorisjonkers.dev
      N8N_EDITOR_BASE_URL: https://n8n.jorisjonkers.dev
      N8N_TRUST_PROXY: 'true'
      WEBHOOK_URL: https://n8n.jorisjonkers.dev/
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      EXTERNAL_HOOK_FILES: /data/n8n/hooks.js
      EXTERNAL_FRONTEND_HOOKS_URLS: /assets/oidc-frontend-hook.js
      N8N_ADDITIONAL_NON_UI_ROUTES: auth
      OIDC_ISSUER_URL: https://auth.jorisjonkers.dev
      OIDC_CLIENT_ID: n8n
      OIDC_CLIENT_SECRET: n8n-secret
      OIDC_REDIRECT_URI: https://n8n.jorisjonkers.dev/auth/oidc/callback
      OIDC_SCOPES: openid email profile
    volumes:
      - n8n-data:/home/node/.n8n
      - ./infra/n8n/hooks.js:/data/n8n/hooks.js:ro
    secrets:
      - n8n_db_user
      - n8n_db_password
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  # ── Observability ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.1
    networks:
      - personal-stack-overlay
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9090/-/healthy || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  grafana:
    image: grafana/grafana:11.6.0
    networks:
      - personal-stack-overlay
    environment:
      GF_SERVER_ROOT_URL: https://grafana.jorisjonkers.dev
      GF_AUTH_GENERIC_OAUTH_ENABLED: 'true'
      GF_AUTH_GENERIC_OAUTH_NAME: personal-stack
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: grafana-secret
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://auth.jorisjonkers.dev/api/oauth2/authorize
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://auth.jorisjonkers.dev/api/oauth2/token
      GF_AUTH_GENERIC_OAUTH_API_URL: https://auth.jorisjonkers.dev/api/userinfo
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: preferred_username
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: name
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: email
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(roles[*], 'ROLE_ADMIN') && 'GrafanaAdmin' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: 'true'
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: 'true'
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: 'true'
      GF_SECURITY_ADMIN_USER__FILE: /run/secrets/grafana_admin_user
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  loki:
    image: grafana/loki:3.5.0
    networks:
      - personal-stack-overlay
    volumes:
      - ./infra/observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  promtail:
    image: grafana/promtail:3.5.0
    networks:
      - personal-stack-overlay
    volumes:
      - ./infra/observability/promtail/promtail.yaml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    deploy:
      mode: global
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  tempo:
    image: grafana/tempo:2.7.2
    networks:
      - personal-stack-overlay
    volumes:
      - ./infra/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/tempo.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3200/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  # ── Mail Server ──────────────────────────────────────────
  stalwart:
    image: stalwartlabs/stalwart:latest
    hostname: mail.jorisjonkers.dev
    networks:
      - personal-stack-overlay
    ports:
      - '25:25'
      - '465:465'
      - '587:587'
      - '993:993'
    volumes:
      - stalwart-data:/opt/stalwart
    healthcheck:
      test: ['CMD', 'bash', '-c', 'echo >/dev/tcp/localhost/8080']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  uptime-kuma:
    image: louislam/uptime-kuma:2
    networks:
      - personal-stack-overlay
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - uptime-kuma-data:/app/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

volumes:
  postgres-data:
  valkey-data:
  rabbitmq-data:
  vault-data:
  traefik-certs:
  n8n-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  uptime-kuma-data:
  stalwart-data:

networks:
  personal-stack-overlay:
    driver: overlay
    attachable: true

secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true
  rabbitmq_user:
    external: true
  rabbitmq_password:
    external: true
  cf_dns_api_token:
    external: true
  vault_auth_api_role_id:
    external: true
  vault_auth_api_secret_id:
    external: true
  vault_assistant_api_role_id:
    external: true
  vault_assistant_api_secret_id:
    external: true
  n8n_db_user:
    external: true
  n8n_db_password:
    external: true
  grafana_admin_user:
    external: true
  grafana_admin_password:
    external: true
  auth_db_password:
    external: true
  assistant_db_password:
    external: true
