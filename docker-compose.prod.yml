services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    networks:
      - private-stack-overlay
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    secrets:
      - postgres_user
      - postgres_password
      - n8n_db_password
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  valkey:
    image: valkey/valkey:8-alpine
    networks:
      - private-stack-overlay
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    networks:
      - private-stack-overlay
    entrypoint:
      - bash
      - -c
      - |
        export RABBITMQ_DEFAULT_USER=$$(cat /run/secrets/rabbitmq_user)
        export RABBITMQ_DEFAULT_PASS=$$(cat /run/secrets/rabbitmq_password)
        exec docker-entrypoint.sh rabbitmq-server
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    secrets:
      - rabbitmq_user
      - rabbitmq_password
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  vault:
    image: hashicorp/vault:1.19
    user: '0'
    networks:
      - private-stack-overlay
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./infra/vault/config/vault.hcl:/vault/config/vault.hcl:ro
    entrypoint:
      - sh
      - -ec
      - |
        mkdir -p /vault/data
        chown -R vault:vault /vault/data
        exec su-exec vault vault server -config=/vault/config/vault.hcl
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8200/v1/sys/seal-status || exit 0']
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  traefik:
    image: traefik:v3.6
    networks:
      - private-stack-overlay
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    environment:
      CF_DNS_API_TOKEN_FILE: /run/secrets/cf_dns_api_token
    secrets:
      - cf_dns_api_token
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  # ── Application services ────────────────────────────────────────
  auth-api:
    image: ghcr.io/extratoast/private-stack/auth-api:latest
    networks:
      - private-stack-overlay
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: auth_user
      DB_PASSWORD: placeholder
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      VAULT_ADDR: http://vault:8200
      OTEL_SERVICE_NAME: auth-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_LOGS_EXPORTER: none
    entrypoint:
      - sh
      - -c
      - |
        export VAULT_ROLE_ID=$$(cat /run/secrets/vault_auth_api_role_id)
        export VAULT_SECRET_ID=$$(cat /run/secrets/vault_auth_api_secret_id)
        exec java -javaagent:otel-javaagent.jar -jar app.jar
    secrets:
      - vault_auth_api_role_id
      - vault_auth_api_secret_id
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8081/actuator/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  assistant-api:
    image: ghcr.io/extratoast/private-stack/assistant-api:latest
    networks:
      - private-stack-overlay
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: assistant_user
      DB_PASSWORD: placeholder
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      VAULT_ADDR: http://vault:8200
      OTEL_SERVICE_NAME: assistant-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_LOGS_EXPORTER: none
    entrypoint:
      - sh
      - -c
      - |
        export VAULT_ROLE_ID=$$(cat /run/secrets/vault_assistant_api_role_id)
        export VAULT_SECRET_ID=$$(cat /run/secrets/vault_assistant_api_secret_id)
        exec java -javaagent:otel-javaagent.jar -jar app.jar
    secrets:
      - vault_assistant_api_role_id
      - vault_assistant_api_secret_id
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8082/actuator/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  auth-ui:
    image: ghcr.io/extratoast/private-stack/auth-ui:latest
    networks:
      - private-stack-overlay
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:80 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  assistant-ui:
    image: ghcr.io/extratoast/private-stack/assistant-ui:latest
    networks:
      - private-stack-overlay
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:80 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  app-ui:
    image: ghcr.io/extratoast/private-stack/app-ui:latest
    networks:
      - private-stack-overlay
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:80 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  n8n:
    image: n8nio/n8n:2.13.4
    networks:
      - private-stack-overlay
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER_FILE: /run/secrets/n8n_db_user
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/n8n_db_password
      N8N_PROTOCOL: https
      N8N_HOST: n8n.jorisjonkers.dev
      WEBHOOK_URL: https://n8n.jorisjonkers.dev/
    volumes:
      - n8n-data:/home/node/.n8n
    secrets:
      - n8n_db_user
      - n8n_db_password
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  # ── Observability ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.1
    networks:
      - private-stack-overlay
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9090/-/healthy || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  grafana:
    image: grafana/grafana:11.6.0
    networks:
      - private-stack-overlay
    environment:
      GF_SERVER_ROOT_URL: https://grafana.jorisjonkers.dev
      GF_SECURITY_ADMIN_USER__FILE: /run/secrets/grafana_admin_user
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  loki:
    image: grafana/loki:3.5.0
    networks:
      - private-stack-overlay
    volumes:
      - ./infra/observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  promtail:
    image: grafana/promtail:3.5.0
    networks:
      - private-stack-overlay
    volumes:
      - ./infra/observability/promtail/promtail.yaml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    deploy:
      mode: global
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  tempo:
    image: grafana/tempo:2.7.2
    networks:
      - private-stack-overlay
    volumes:
      - ./infra/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/tempo.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3200/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

  uptime-kuma:
    image: louislam/uptime-kuma:2
    networks:
      - private-stack-overlay
    volumes:
      - uptime-kuma-data:/app/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: any

volumes:
  postgres-data:
  valkey-data:
  rabbitmq-data:
  vault-data:
  traefik-certs:
  n8n-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  uptime-kuma-data:

networks:
  private-stack-overlay:
    driver: overlay
    attachable: true

secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true
  rabbitmq_user:
    external: true
  rabbitmq_password:
    external: true
  cf_dns_api_token:
    external: true
  vault_auth_api_role_id:
    external: true
  vault_auth_api_secret_id:
    external: true
  vault_assistant_api_role_id:
    external: true
  vault_assistant_api_secret_id:
    external: true
  n8n_db_user:
    external: true
  n8n_db_password:
    external: true
  grafana_admin_user:
    external: true
  grafana_admin_password:
    external: true
