services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    container_name: personal-stack-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: personal-stack-valkey
    ports:
      - '6379:6379'
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    container_name: personal-stack-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.19
    container_name: personal-stack-vault
    ports:
      - '8200:8200'
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data

  traefik:
    image: traefik:v3.6
    container_name: personal-stack-traefik
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik-dev.yml:/etc/traefik/traefik.yml:ro

  # ── Backend Services ────────────────────────────────────────────

  auth-api:
    build:
      context: .
      dockerfile: services/auth-api/Dockerfile
    container_name: personal-stack-auth-api
    ports:
      - '8081:8081'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: auth_user
      DB_PASSWORD: auth_password
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      OTEL_SERVICE_NAME: auth-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_LOGS_EXPORTER: none
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8081/actuator/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth-api.rule=Host(`auth.localhost`) && PathPrefix(`/api`)'
      - 'traefik.http.services.auth-api.loadbalancer.server.port=8081'

  assistant-api:
    build:
      context: .
      dockerfile: services/assistant-api/Dockerfile
    container_name: personal-stack-assistant-api
    ports:
      - '8082:8082'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: assistant_user
      DB_PASSWORD: assistant_password
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      OTEL_SERVICE_NAME: assistant-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_LOGS_EXPORTER: none
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8082/actuator/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.assistant-api.rule=Host(`app.localhost`) && PathPrefix(`/api`)'
      - 'traefik.http.services.assistant-api.loadbalancer.server.port=8082'

  # ── Frontend Services ───────────────────────────────────────────

  auth-ui:
    build:
      context: .
      dockerfile: services/auth-ui/Dockerfile
    container_name: personal-stack-auth-ui
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth-ui.rule=Host(`auth.localhost`)'
      - 'traefik.http.routers.auth-ui.priority=1'
      - 'traefik.http.services.auth-ui.loadbalancer.server.port=80'

  assistant-ui:
    build:
      context: .
      dockerfile: services/assistant-ui/Dockerfile
    container_name: personal-stack-assistant-ui
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.assistant-ui.rule=Host(`app.localhost`)'
      - 'traefik.http.routers.assistant-ui.priority=1'
      - 'traefik.http.services.assistant-ui.loadbalancer.server.port=80'

  app-ui:
    build:
      context: .
      dockerfile: services/app-ui/Dockerfile
    container_name: personal-stack-app-ui
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.app-ui.rule=Host(`localhost`)'
      - 'traefik.http.services.app-ui.loadbalancer.server.port=80'

volumes:
  postgres-data:
  valkey-data:
  rabbitmq-data:
  vault-data:
