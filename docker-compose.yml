services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    container_name: personal-stack-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: personal-stack-valkey
    ports:
      - '6379:6379'
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    container_name: personal-stack-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.19
    container_name: personal-stack-vault
    ports:
      - '8200:8200'
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
    healthcheck:
      test: ['CMD', 'vault', 'status', '-address=http://127.0.0.1:8200']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.vault.rule=Host(`vault.localhost`)'
      - 'traefik.http.routers.vault.middlewares=forward-auth@docker,security-headers@file'
      - 'traefik.http.services.vault.loadbalancer.server.port=8200'
      - 'traefik.http.middlewares.forward-auth.forwardauth.address=http://auth-api:8081/api/v1/auth/verify'
      - 'traefik.http.middlewares.forward-auth.forwardauth.trustForwardHeader=true'
      - 'traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Email,X-User-Roles'

  traefik:
    image: traefik:v3.6
    container_name: personal-stack-traefik
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik-dev.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.traefik-dashboard.rule=Host(`traefik.localhost`)'
      - 'traefik.http.routers.traefik-dashboard.entrypoints=web'
      - 'traefik.http.routers.traefik-dashboard.service=api@internal'
      - 'traefik.http.routers.traefik-dashboard.middlewares=forward-auth@docker,security-headers@file'

  n8n:
    image: n8nio/n8n:2.13.4
    container_name: personal-stack-n8n
    environment:
      N8N_HOST: n8n.localhost
      N8N_PROTOCOL: http
      N8N_PORT: '5678'
    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.n8n.rule=Host(`n8n.localhost`)'
      - 'traefik.http.routers.n8n.middlewares=forward-auth@docker,security-headers@file'
      - 'traefik.http.services.n8n.loadbalancer.server.port=5678'

  grafana:
    image: grafana/grafana:11.6.0
    container_name: personal-stack-grafana
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`grafana.localhost`)'
      - 'traefik.http.routers.grafana.middlewares=forward-auth@docker,security-headers@file'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3000'

  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: personal-stack-stalwart
    healthcheck:
      test: ['CMD', 'bash', '-c', 'echo >/dev/tcp/localhost/8080']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.stalwart.rule=Host(`stalwart.localhost`)'
      - 'traefik.http.services.stalwart.loadbalancer.server.port=8080'
      - 'traefik.http.routers.stalwart.middlewares=forward-auth@docker,security-headers@file'

  # ── Backend Services ────────────────────────────────────────────

  auth-api:
    image: personal-stack/auth-api:latest
    build:
      context: .
      dockerfile: services/auth-api/Dockerfile
    container_name: personal-stack-auth-api
    ports:
      - '8081:8081'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: auth_user
      DB_PASSWORD: auth_password
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      MAIL_HOST: stalwart
      MAIL_PORT: 587
      MANAGEMENT_HEALTH_MAIL_ENABLED: 'false'
      AUTH_LOGIN_URL: http://auth.localhost/login
      OTEL_SERVICE_NAME: auth-api
      OTEL_LOGS_EXPORTER: none
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8081/api/actuator/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth-api.rule=Host(`auth.localhost`) && PathPrefix(`/api/`)'
      - 'traefik.http.routers.auth-api.middlewares=security-headers@file'
      - 'traefik.http.services.auth-api.loadbalancer.server.port=8081'

  assistant-api:
    image: personal-stack/assistant-api:latest
    build:
      context: .
      dockerfile: services/assistant-api/Dockerfile
    container_name: personal-stack-assistant-api
    ports:
      - '8082:8082'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: assistant_user
      DB_PASSWORD: assistant_password
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      OTEL_SERVICE_NAME: assistant-api
      OTEL_LOGS_EXPORTER: none
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8082/api/actuator/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.assistant-api.rule=Host(`app.localhost`) && PathPrefix(`/api/`)'
      - 'traefik.http.routers.assistant-api.middlewares=security-headers@file'
      - 'traefik.http.services.assistant-api.loadbalancer.server.port=8082'

  # ── Frontend Services ───────────────────────────────────────────

  auth-ui:
    image: personal-stack/auth-ui:latest
    build:
      context: .
      dockerfile: services/auth-ui/Dockerfile
    container_name: personal-stack-auth-ui
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1/ || exit 1']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth-ui.rule=Host(`auth.localhost`)'
      - 'traefik.http.routers.auth-ui.priority=1'
      - 'traefik.http.routers.auth-ui.middlewares=security-headers@file'
      - 'traefik.http.services.auth-ui.loadbalancer.server.port=80'

  assistant-ui:
    image: personal-stack/assistant-ui:latest
    build:
      context: .
      dockerfile: services/assistant-ui/Dockerfile
    container_name: personal-stack-assistant-ui
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1/ || exit 1']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.assistant-ui.rule=Host(`app.localhost`)'
      - 'traefik.http.routers.assistant-ui.priority=1'
      - 'traefik.http.routers.assistant-ui.middlewares=security-headers@file'
      - 'traefik.http.services.assistant-ui.loadbalancer.server.port=80'

  app-ui:
    image: personal-stack/app-ui:latest
    build:
      context: .
      dockerfile: services/app-ui/Dockerfile
    container_name: personal-stack-app-ui
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1/ || exit 1']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.app-ui.rule=Host(`localhost`)'
      - 'traefik.http.routers.app-ui.middlewares=security-headers@file'
      - 'traefik.http.services.app-ui.loadbalancer.server.port=80'

volumes:
  postgres-data:
  valkey-data:
  rabbitmq-data:
  vault-data:
  n8n-data:
  grafana-data:
