spring:
  application:
    name: assistant-api
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      - org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_ADDR:http://localhost:8200}
      authentication: ${VAULT_AUTHENTICATION:APPROLE}
      app-role:
        role-id: ${VAULT_ROLE_ID:}
        secret-id: ${VAULT_SECRET_ID:}
      database:
        enabled: ${VAULT_DB_ENABLED:false}
        role: assistant-api
        backend: database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/assistant_db
    username: ${DB_USER:assistant_user}
    password: ${DB_PASSWORD:assistant_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}

server:
  port: 8082

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      group:
        liveness:
          include: ping

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/swagger-ui
