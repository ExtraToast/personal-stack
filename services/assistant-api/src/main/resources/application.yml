spring:
  application:
    name: assistant-api
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      - org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_ADDR:http://localhost:8200}
      authentication: ${VAULT_AUTHENTICATION:TOKEN}
      config:
        lifecycle:
          enabled: true
          min-renewal: 10s
          expiry-threshold: 60s
          lease-endpoints: Leases
      database:
        enabled: ${VAULT_DB_ENABLED:false}
        role: assistant-api
        backend: database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/assistant_db
    username: ${DB_USER:assistant_user}
    password: ${DB_PASSWORD:assistant_password}
    hikari:
      pool-name: assistant-api-pool
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 10000
      validation-timeout: 5000
      idle-timeout: 600000
      keepalive-time: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      initialization-fail-timeout: 60000
      auto-commit: true
      data-source-properties:
        tcpKeepAlive: true
        socketTimeout: 30
        connectTimeout: 10
        loginTimeout: 10
        ApplicationName: assistant-api
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}

server:
  port: 8082

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      # Full per-contributor breakdown so a composite 503 is diagnosable
      # with one curl, matching auth-api. Actuator is behind forward-auth
      # in production and details expose descriptor data only — never
      # credentials.
      show-details: always
      group:
        liveness:
          include: ping
  metrics:
    tags:
      # Common Micrometer tag — see auth-api/application.yml for the
      # rationale; both services standardise on `application=<name>`
      # so the spring-boot-jvm and service-template dashboards can
      # filter consistently.
      application: ${spring.application.name}
  # OTLP tracing — see auth-api/application.yml for the rationale,
  # including the note about OTel-agent-owned sampling in prod.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_PROBABILITY:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://alloy.observability.svc.cluster.local:4318/v1/traces}
  observations:
    key-values:
      service.name: ${spring.application.name}
      deployment.environment: ${DEPLOYMENT_ENVIRONMENT:unknown}

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/swagger-ui

agent-runtime:
  namespace: ${AGENT_RUNTIME_NAMESPACE:agents-system}
  image: ${AGENT_RUNTIME_IMAGE:ghcr.io/extratoast/personal-stack/agent-runner:latest}
  image-pull-policy: ${AGENT_RUNTIME_IMAGE_PULL_POLICY:Always}
  service-account: ${AGENT_RUNTIME_SERVICE_ACCOUNT:agent-runner}
  workspace-storage-class: ${AGENT_RUNTIME_WORKSPACE_STORAGE_CLASS:local-path}
  workspace-storage-size: ${AGENT_RUNTIME_WORKSPACE_STORAGE_SIZE:8Gi}
  gateway-port: ${AGENT_RUNTIME_GATEWAY_PORT:8090}
  claude-credentials-pvc: ${AGENT_RUNTIME_CLAUDE_PVC:claude-credentials}
  codex-credentials-pvc: ${AGENT_RUNTIME_CODEX_PVC:codex-credentials}
  github-deploy-key-secret: ${AGENT_RUNTIME_GH_KEY_SECRET:agents-github-deploy-key}
  # Pinning to a single node is mandatory because the shared
  # credential PVCs (claude-credentials / codex-credentials) are
  # backed by local-path RWO — every runner Pod must land on the
  # node that owns the PV. See platform/cluster/flux/apps/agents/
  # credentials/claude-credentials-pvc.yaml for the rationale.
  # Spring Boot's `@ConfigurationProperties` relaxed binding lowercases
  # map keys and strips special chars (`-`, `/`, `.`) unless the key
  # is bracket-escaped. Without the brackets, `personal-stack/node`
  # bound to `personalstacknode` on the runtime side and every
  # agent-runner Pod sat Pending forever ("0/7 nodes are available:
  # 7 node(s) didn't match Pod's node affinity/selector"). The
  # bracket form forces Spring to take the key literally.
  # https://docs.spring.io/spring-boot/reference/features/external-config.html#features.external-config.typesafe-configuration-properties.relaxed-binding.maps
  node-selector:
    '[personal-stack/node]': ${AGENT_RUNTIME_NODE:enschede-gtx-960m-1}
  # Idle scale-down. A workspace whose last observed activity is
  # older than `idle-after-seconds` gets its Pod + Service + per-
  # workspace Secret deleted; the workspace PVC survives so a
  # future wake-up can re-mount the same disk. The sweep runs at
  # `idle-sweep-period-ms` intervals.
  idle-after-seconds: ${AGENT_RUNTIME_IDLE_AFTER_SECONDS:1800}
  idle-sweep-period-ms: ${AGENT_RUNTIME_IDLE_SWEEP_PERIOD_MS:300000}
